---
# OIDC gate — uses the shared/envoy Gateway OIDC client
# (the same one grafana, frigate, etc. use) so users don't need a separate
# Pocket ID client per agent web app.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: hermes-placeholder-oidc
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: hermes-placeholder-web
  oidc:
    provider:
      issuer: "https://pocket-id.${COMMON_DOMAIN}"
    clientID: "placeholder-client-id"
    clientSecret:
      name: hermes-placeholder-oidc
    redirectURL: "https://placeholder.agents.${COMMON_DOMAIN}/oauth2/callback"
    logoutPath: "/logout"
    cookieDomain: "agents.${COMMON_DOMAIN}"