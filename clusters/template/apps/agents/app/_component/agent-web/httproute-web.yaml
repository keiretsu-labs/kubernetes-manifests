---
# Web UI served from Garage S3 via web API (port 3902).
# OIDC-gated through the public/private gateways (same pattern as grafana).
# Garage resolves buckets by stripping the root_domain suffix from the Host
# header, so we rewrite hostname → <agent>-web.keiretsu.top (bucket alias).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hermes-placeholder-web
  annotations:
    item.homer.rajsingh.info/name: "Hermes Placeholder Web"
    item.homer.rajsingh.info/subtitle: "Agent Web UI"
    item.homer.rajsingh.info/keywords: "website, agent, web"
    service.homer.rajsingh.info/name: "Infrastructure"
    service.homer.rajsingh.info/icon: "fas fa-globe"
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: public
      namespace: home
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: private
      namespace: home
  hostnames:
    - "placeholder.agents.${COMMON_DOMAIN}"
  rules:
    - filters:
        - type: URLRewrite
          urlRewrite:
            hostname: "placeholder-web.${COMMON_DOMAIN}"
      backendRefs:
        - group: ""
          kind: Service
          name: garage-gateway
          namespace: garage
          port: 3902
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /