---
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
# agent-web — reusable kustomize component for single Hermes agents
#   with an Envoy OIDC-gated web UI served via Garage S3.
#
# The overlay provides an agent-meta ConfigMap (via configMapGenerator);
# this component reads it via replacements to template all resource names,
# hostnames, labels, and OIDC config.
#
# agent-meta fields:
#   name              agent name (kebab-case, e.g. "my-agent")
#   host              public hostname (e.g. "my-agent.agents.${COMMON_DOMAIN}")
#   clientID          Pocket ID OIDC client UUID
#   size              PVC size (e.g. "20Gi")
#   tailscaleTag      Tailscale tag for the LB Service (e.g. "tag:k8s", "tag:raj")
#
# agent-meta is marked local-config:true so it never reaches the cluster.
#
# The overlay also supplies: deployment.yaml, configmap.yaml, secret.yaml
#   (agent-specific — not provided by this component).
#
# IMPORTANT: kustomize applies replacements sequentially. Replacements that
# change metadata.name MUST come last, otherwise subsequent selectors that
# match by the original name will fail to find the resource.
resources:
  - service.yaml
  - service-tailscale.yaml
  - storagestack.yaml
  - garagekey.yaml
  - httproute.yaml
  - httproute-web.yaml
  - securitypolicy.yaml
  - oidc-secret.yaml

replacements:
  # =========================================================
  # FIRST: non-name-changing replacements (annotations, hostnames, data fields).
  # These match by original resource names before any name mutation occurs.
  # =========================================================

  # ---- Tailscale Service: hostname annotation ----
  - source:
      kind: ConfigMap
      name: agent-meta
      fieldPath: data.name
    targets:
      - select:
          kind: Service
          name: hermes-placeholder-ts
        fieldPaths:
          - metadata.annotations.[tailscale.com/hostname]
  # ---- Tailscale Service: tags annotation ----
  - source:
      kind: ConfigMap
      name: agent-meta
      fieldPath: data.tailscaleTag
    targets:
      - select:
          kind: Service
          name: hermes-placeholder-ts
        fieldPaths:
          - metadata.annotations.[tailscale.com/tags]

  # ---- HTTPRoute (ts): hostname ----
  - source:
      kind: ConfigMap
      name: agent-meta
      fieldPath: data.host
    targets:
      - select: { kind: HTTPRoute, name: hermes-placeholder-ts }
        fieldPaths: [ spec.hostnames.0 ]
        options:
          delimiter: "."
          index: 0

  # ---- HTTPRoute (web): hostname ----
  - source:
      kind: ConfigMap
      name: agent-meta
      fieldPath: data.host
    targets:
      - select: { kind: HTTPRoute, name: hermes-placeholder-web }
        fieldPaths: [ spec.hostnames.0 ]

  # ---- HTTPRoute (web): URLRewrite hostname ----
  - source:
      kind: ConfigMap
      name: agent-meta
      fieldPath: data.name
    targets:
      - select: { kind: HTTPRoute, name: hermes-placeholder-web }
        fieldPaths: [ spec.rules.0.filters.0.urlRewrite.hostname ]
        options: { delimiter: "-", index: 0 }

  # ---- SecurityPolicy: clientID ----
  - source:
      kind: ConfigMap
      name: agent-meta
      fieldPath: data.clientID
    targets:
      - select: { group: gateway.envoyproxy.io, kind: SecurityPolicy, name: hermes-placeholder-oidc }
        fieldPaths: [ spec.oidc.clientID ]

  # ---- SecurityPolicy: redirectURL ----
  - source:
      kind: ConfigMap
      name: agent-meta
      fieldPath: data.host
    targets:
      - select: { group: gateway.envoyproxy.io, kind: SecurityPolicy, name: hermes-placeholder-oidc }
        fieldPaths: [ spec.oidc.redirectURL ]
        options: { delimiter: "/", index: 2 }

  # ---- StorageStack: size ----
  - source:
      kind: ConfigMap
      name: agent-meta
      fieldPath: data.size
    targets:
      - select: { kind: StorageStack }
        fieldPaths: [ spec.size ]

  # ---- StorageStack: s3Path ----
  - source:
      kind: ConfigMap
      name: agent-meta
      fieldPath: data.name
    targets:
      - select: { kind: StorageStack }
        fieldPaths: [ spec.s3Path ]
        options: { delimiter: "/", index: 1 }

  # =========================================================
  # LAST: name-changing replacements.
  # Once metadata.name changes, later selectors using the old name
  # will miss their targets.
  # =========================================================

  # ---- Service (ClusterIP) ----
  - source:
      kind: ConfigMap
      name: agent-meta
      fieldPath: data.name
    targets:
      - select: { kind: Service, name: hermes-placeholder }
        fieldPaths:
          - metadata.name
          - spec.selector.[app.kubernetes.io/name]
        options: { delimiter: "-", index: 1 }

  # ---- Service (Tailscale LB) ----
  - source:
      kind: ConfigMap
      name: agent-meta
      fieldPath: data.name
    targets:
      - select: { kind: Service, name: hermes-placeholder-ts }
        fieldPaths:
          - metadata.name
          - spec.selector.[app.kubernetes.io/name]
        options: { delimiter: "-", index: 1 }

  # ---- HTTPRoute (ts gateway) ----
  - source:
      kind: ConfigMap
      name: agent-meta
      fieldPath: data.name
    targets:
      - select: { kind: HTTPRoute, name: hermes-placeholder-ts }
        fieldPaths:
          - metadata.name
          - spec.rules.0.backendRefs.0.name
        options: { delimiter: "-", index: 1 }

  # ---- HTTPRoute (web — Garage S3) ----
  - source:
      kind: ConfigMap
      name: agent-meta
      fieldPath: data.name
    targets:
      - select: { kind: HTTPRoute, name: hermes-placeholder-web }
        fieldPaths:
          - metadata.name
        options: { delimiter: "-", index: 1 }

  # ---- SecurityPolicy (Envoy OIDC) ----
  - source:
      kind: ConfigMap
      name: agent-meta
      fieldPath: data.name
    targets:
      - select: { group: gateway.envoyproxy.io, kind: SecurityPolicy, name: hermes-placeholder-oidc }
        fieldPaths:
          - metadata.name
          - spec.targetRefs.0.name
          - spec.oidc.clientSecret.name
        options: { delimiter: "-", index: 1 }

  # ---- OIDC Secret ----
  - source:
      kind: ConfigMap
      name: agent-meta
      fieldPath: data.name
    targets:
      - select: { kind: Secret, name: hermes-placeholder-oidc }
        fieldPaths: [ metadata.name ]
        options: { delimiter: "-", index: 1 }

  # ---- StorageStack ----
  - source:
      kind: ConfigMap
      name: agent-meta
      fieldPath: data.name
    targets:
      - select: { kind: StorageStack }
        fieldPaths:
          - metadata.name
          - spec.name
        options: { delimiter: "-", index: 1 }

  # ---- GarageKey ----
  - source:
      kind: ConfigMap
      name: agent-meta
      fieldPath: data.name
    targets:
      - select: { group: garage.rajsingh.info, kind: GarageKey }
        fieldPaths:
          - metadata.name
          - spec.name
          - spec.secretTemplate.name
        options: { delimiter: "-", index: 1 }