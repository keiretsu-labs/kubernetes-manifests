---
apiVersion: v1
kind: Service
metadata:
  name: hermes-placeholder-ts
  annotations:
    tailscale.com/hostname: hermes-placeholder
    tailscale.com/tags: "tag:k8s"
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  selector:
    app.kubernetes.io/name: hermes-placeholder
  ports:
    - name: dashboard
      port: 80
      targetPort: 9119
      protocol: TCP
    - name: gateway
      port: 8642
      targetPort: 8642
      protocol: TCP