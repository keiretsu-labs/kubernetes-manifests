---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: agents
components:
  - ../_component/agent-web
generatorOptions:
  disableNameSuffixHash: true
  annotations:
    config.kubernetes.io/local-config: "true"
configMapGenerator:
  - name: agent-meta
    literals:
      - name=my-agent
      - host=my-agent.agents.${COMMON_DOMAIN}
      - clientID=00000000-0000-0000-0000-000000000000
      - size=20Gi
      - tailscaleTag=tag:k8s
resources:
  - deployment.yaml
  - configmap.yaml
  - secret.yaml
patches:
  - target:
      kind: ConfigMap
      name: hermes-placeholder-config
    patch: |-
      - op: replace
        path: /data/AGENT_NAME
        value: "my-agent"
      - op: replace
        path: /data/AGENT_SYSTEM_PROMPT
        value: |
          You are my-agent, an AI agent.
          Customize this prompt per agent.