---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: agents
resources:
  - bucket.yaml
  - egress.yaml
  # Individual agents are NOT listed here. Each is reconciled by
  # its own Flux Kustomization (ks-<name>.yaml) so agents build independently —
  # no shared kustomize accumulation and one agent's failure can't block the rest.
  # Run add-agent-web.sh to wire up new agents with their own KS.