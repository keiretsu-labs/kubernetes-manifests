---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-settings
  namespace: flux-system
data:
  # === Cluster Identity ===
  LOCATION: ""                         # e.g. robbinsdale, ottawa, stpetersburg
  FAILOVER: ""                         # e.g. ottawa — primary failover target
  SITE_ID: ""                          # sequential cluster id (1, 2, 3...)
  TIMEZONE: ""                         # e.g. America/Chicago, America/New_York
  CLUSTER_NAME: ""                     # e.g. talos-robbinsdale
  CLUSTER_DISPLAY_NAME: ""             # human-friendly, e.g. "Robbinsdale"

  # === K8s Networking ===
  CLUSTER_POD_CIDR: ""                 # e.g. 10.1.0.0/16
  CLUSTER_SERVICE_CIDR: ""             # e.g. 10.0.0.0/16
  CLUSTER_LOAD_BALANCER_CIDR: ""       # e.g. 10.50.0.0/16

  # === Physical Network ===
  LAN_CIDR: ""                         # e.g. 192.168.50.0/24
  LAN_GATEWAY_IP: ""                   # e.g. "192.168.50.1"
  KUBERNETES_API_VIP: ""               # e.g. "192.168.50.25"

  # === Domain ===
  CLUSTER_DOMAIN: ""                   # e.g. lukehouge.com, killinit.cc, rajsingh.info

  # === Storage ===
  STORAGECLASS_LONGTERM: ""            # e.g. smb, local-path
  STORAGECLASS_DEFAULT: ""             # e.g. ceph-block-replicated-nvme, local-path
  STORAGECLASS_METADATA: ""            # e.g. ceph-block-replicated-nvme, local-path

  # === Garage S3 (cluster-local endpoint — overrides common-secrets) ===
  COMMON_S3_ENDPOINT: "garage-gateway.garage.svc.cluster.local:3900"
  GARAGE_STORAGE_LAYOUT_POLICY: ""     # "Manual" for hand-managed per-node layout
  # Garage affinity / topology overrides — uncomment as needed:
  # GARAGE_GATEWAY_AFFINITY: '{}'
  # GARAGE_NODE_SELECTOR: '{}'
  # GARAGE_REPLICAS: "1"
  # GARAGE_TOPOLOGY_SPREAD: '[]'