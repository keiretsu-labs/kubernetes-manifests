---
# SOPS-encrypted secrets template.
# Generate with: sops --encrypt clusters/CLUSTER_NAME/flux/vars/cluster-secrets.sops.yaml
#
# Required keys (defined below):
#   DEFAULT_PASSWORD
#   TAILSCALE_API_KEY
#   TAILSCALE_TAILNET
#   TS_OAUTH_CLIENT_SECRET
#   TS_OAUTH_CLIENT_ID
#   TS_AUTHKEY
#   ... (add cluster-specific secrets as needed)
apiVersion: v1
kind: Secret
metadata:
  name: cluster-secrets
  namespace: flux-system
stringData:
  DEFAULT_PASSWORD: ""        # default admin password for cluster services
  TAILSCALE_API_KEY: ""       # tailscale API key for oauth/device auth
  TAILSCALE_TAILNET: ""       # tailscale tailnet name
  TS_OAUTH_CLIENT_SECRET: ""  # tailscale OAuth client secret
  TS_OAUTH_CLIENT_ID: ""      # tailscale OAuth client ID
  TS_AUTHKEY: ""              # tailscale auth key for node registration
sops:
  kms: []
  gcp_kms: []
  azure_kv: []
  hc_vault: []
  age: []
  lastmodified: ""
  mac: ""
  pgp:
    - created_at: ""
      enc: ""
      fp: FAC8E7C3A2BC7DEE58A01C5928E1AB8AF0CF07A5
  encrypted_regex: ^(stringData|data)$
  version: 3.9.2