---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: REPLACE_APP_NAME-cdn
  namespace: REPLACE_NAMESPACE
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: cdn
      namespace: keiretsu
  hostnames:
    - "REPLACE_HOSTNAME"
  rules:
    - backendRefs:
        - name: REPLACE_APP_NAME
          port: 80
      matches:
        - path:
            type: PathPrefix
            value: /
---
apiVersion: k8gb.absa.oss/v1beta1
kind: Gslb
metadata:
  name: REPLACE_APP_NAME-status
  namespace: REPLACE_NAMESPACE
  annotations:
    k8gb.io/exposed-hostnames: "${LOCATION}.${COMMON_DOMAIN}"
spec:
  resourceRef:
    apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    name: REPLACE_APP_NAME-cdn
  strategy:
    type: roundRobin
    dnsTtlSeconds: 60
    weight:
      ottawa: 33
      robbinsdale: 33
      stpetersburg: 34
