---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellyfin
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      hostname: jellyfin-robbinsdale
      containers:
        - name: jellyfin
          image: jellyfin/jellyfin:10.11.8
          ports:
            - name: http
              containerPort: 8096
              protocol: TCP
          env:
            - name: PUID
              value: "0"
            - name: GUID
              value: "0"
            - name: TZ
              value: ${TIMEZONE}
            - name: JELLYFIN_PublishedServerUrl
              value: jellyfin.rajsingh.info
          volumeMounts:
            - name: config-volume
              mountPath: /config
      volumes:
        - name: config-volume
          persistentVolumeClaim:
            claimName: jellyfin-config-ceph
---
apiVersion: v1
kind: Service
metadata:
  name: jellyfin
  annotations:
    tailscale.com/hostname: ${LOCATION}-jellyfin
    tailscale.com/proxy-group: common-ingress
spec:
  selector:
    app: jellyfin
  ports:
    - name: http
      port: 8096
      protocol: TCP
      targetPort: 8096
  type: LoadBalancer
  loadBalancerClass: tailscale
