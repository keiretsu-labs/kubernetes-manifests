---
apiVersion: storage.keiretsu.ts.net/v1alpha1
kind: StorageStack
metadata:
  name: jellyfin-config-ceph
  namespace: media
  labels:
    keiretsu.ts.net/location: robbinsdale
spec:
  name: jellyfin-config-ceph
  size: 20Gi
  storageClass: ceph-block-replicated-nvme
  s3Path: media/jellyfin-config
  schedule: "0 6 * * *"
  restoreMode: restore
  restorePaused: false
  restorePrevious: 2
