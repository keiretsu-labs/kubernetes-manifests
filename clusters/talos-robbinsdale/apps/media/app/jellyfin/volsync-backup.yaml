---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: media-jellyfin-config-ceph
spec:
  sourcePVC: jellyfin-config-ceph
  trigger:
    schedule: "0 6 * * *"
  restic:
    pruneIntervalDays: 14
    repository: restic-media-jellyfin-config-ceph
    retain:
      hourly: 1
      daily: 3
      weekly: 4
      monthly: 2
      yearly: 1
    copyMethod: Direct
---
apiVersion: garage.rajsingh.info/v1alpha1
kind: GarageKey
metadata:
  name: volsync-media-jellyfin-config-ceph-key
spec:
  clusterRef:
    name: garage
    namespace: garage
  name: "Media Jellyfin Config Ceph Volsync Key"
  secretTemplate:
    name: restic-media-jellyfin-config-ceph
    namespace: media
    accessKeyIdKey: AWS_ACCESS_KEY_ID
    secretAccessKeyKey: AWS_SECRET_ACCESS_KEY
    includeEndpoint: false
    includeRegion: false
    additionalData:
      RESTIC_REPOSITORY: "s3:http://${COMMON_S3_ENDPOINT}/keiretsu/${LOCATION}/media/jellyfin-config"
      RESTIC_PASSWORD: "${COMMON_RESTIC_SECRET}"
  bucketPermissions:
    - globalAlias: keiretsu
      read: true
      write: true
