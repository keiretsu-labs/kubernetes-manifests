---
apiVersion: storage.keiretsu.ts.net/v1alpha1
kind: StorageStack
metadata:
  name: transmission-tv-config
  namespace: media
  labels:
    keiretsu.ts.net/location: robbinsdale
spec:
  name: transmission-tv-config
  size: 5Gi
  storageClass: ceph-block-replicated-nvme
  s3Path: media/transmission-tv-config
  schedule: "0 4 * * *"
  restorePaused: true
  restorePrevious: 4
  copyMethod: Snapshot
