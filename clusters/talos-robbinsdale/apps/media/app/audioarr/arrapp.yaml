---
apiVersion: media.keiretsu.ts.net/v1alpha1
kind: ArrApp
metadata:
  name: audioarr
  namespace: media
spec:
  name: audioarr
  image: lscr.io/linuxserver/readarr
  # renovate: datasource=docker depName=lscr.io/linuxserver/readarr
  tag: "develop"
  port: 8787
  hostname: audioarr
  homerName: "Audioarr"
  homerSubtitle: "Audiobook Collection Manager"
  homerLogo: "https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/svg/readarr.svg"
  configStorageSize: 5Gi
  configStorageClass: ceph-block-replicated-nvme
  mediaClaimName: readarr-books-unas
  mediaMountPath: /books
  downloadsClaimName: transmission-books-data-unas
  downloadsMountPath: /downloads
  volsyncCopyMethod: Direct
  volsyncManualTrigger: "first"
  volsyncPaused: false
  s3Endpoint: "${COMMON_S3_ENDPOINT}"
  s3Location: "${LOCATION}"
  resticPassword: "${COMMON_RESTIC_SECRET}"
  clusterDomain: "${CLUSTER_DOMAIN}"
