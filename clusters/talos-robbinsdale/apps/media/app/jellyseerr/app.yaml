---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyseerr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellyseerr
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: jellyseerr
    spec:
      containers:
      - name: jellyseerr
        image: ghcr.io/seerr-team/seerr:v3.1.1
        ports:
        - name: http
          containerPort: 5055
          protocol: TCP
        env:
        - name: PUID
          value: '0'
        - name: GUID
          value: '0'
        - name: TZ
          value: UTC
        volumeMounts:
        - name: config
          mountPath: /app/config
        - name: media
          mountPath: /media-share
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: jellyseerr-config
      - name: media
        persistentVolumeClaim:
          claimName: media-share
---
apiVersion: v1
kind: Service
metadata:
  name: jellyseerr
spec:
  selector:
    app: jellyseerr
  ports:
  - name: http
    port: 5055
    protocol: TCP
    targetPort: 5055
