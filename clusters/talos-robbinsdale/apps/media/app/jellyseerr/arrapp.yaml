---
apiVersion: media.keiretsu.ts.net/v1alpha1
kind: ArrApp
metadata:
  name: jellyseerr
  namespace: media
spec:
  name: jellyseerr
  image: ghcr.io/seerr-team/seerr
  # renovate: datasource=docker depName=ghcr.io/seerr-team/seerr
  tag: "v3.1.0"
  port: 5055
  hostname: jellyseerr
  homerName: "Jellyseerr"
  homerSubtitle: "Media Request Manager"
  homerLogo: "https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/svg/jellyseerr.svg"
  configStorageSize: 5Gi
  configStorageClass: ceph-block-replicated-nvme
  mediaClaimName: media-share
  mediaMountPath: /media-share
  volsyncCopyMethod: Direct
  volsyncManualTrigger: "first"
  volsyncPaused: true
  s3Endpoint: "${COMMON_S3_ENDPOINT}"
  s3Location: "${LOCATION}"
  resticPassword: "${COMMON_RESTIC_SECRET}"
  clusterDomain: "${CLUSTER_DOMAIN}"
