---
apiVersion: media.keiretsu.ts.net/v1alpha1
kind: ArrApp
metadata:
  name: flaresolverr
  namespace: media
spec:
  name: flaresolverr
  image: ghcr.io/flaresolverr/flaresolverr
  # renovate: datasource=docker depName=ghcr.io/flaresolverr/flaresolverr
  tag: "v3.4.6"
  port: 8191
  hostname: flaresolverr
  homerName: "FlareSolverr"
  homerSubtitle: "Cloudflare Bypass Proxy"
  homerLogo: "https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/svg/flaresolverr.svg"
  configStorageSize: 1Gi
  configStorageClass: ceph-block-replicated-nvme
  mediaClaimName: media-share
  mediaMountPath: /media-share
  volsyncCopyMethod: Direct
  volsyncManualTrigger: "first"
  volsyncPaused: true
  s3Endpoint: "${COMMON_S3_ENDPOINT}"
  s3Location: "${LOCATION}"
  resticPassword: "${COMMON_RESTIC_SECRET}"
  clusterDomain: "${CLUSTER_DOMAIN}"
