---
apiVersion: storage.keiretsu.ts.net/v1alpha1
kind: StorageStack
metadata:
  name: transmission-books-config
  namespace: media
  labels:
    keiretsu.ts.net/location: robbinsdale
spec:
  name: transmission-books-config
  size: 5Gi
  storageClass: ceph-block-replicated-nvme
  s3Path: media/transmission-books-config
  schedule: "0 4 * * *"
  restoreMode: backup-only
  copyMethod: Direct
