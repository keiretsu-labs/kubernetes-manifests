---
apiVersion: media.keiretsu.ts.net/v1alpha1
kind: ArrApp
metadata:
  name: sonarr-anime
  namespace: media
spec:
  name: sonarr-anime
  image: lscr.io/linuxserver/sonarr
  tag: "4.0.17"
  port: 8989
  hostname: sonarr-anime
  homerName: "Sonarr Anime"
  homerSubtitle: "TV Series Collection Manager"
  homerLogo: "https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/svg/sonarr.svg"
  configStorageSize: 5Gi
  configStorageClass: ceph-block-replicated-nvme
  mediaClaimName: media-share
  mediaMountPath: /media-share
  volsyncCopyMethod: Direct
  volsyncManualTrigger: "first"
  volsyncPaused: true
  s3Endpoint: "${COMMON_S3_ENDPOINT}"
  s3Location: "${LOCATION}"
  resticPassword: "${COMMON_RESTIC_SECRET}"
  clusterDomain: "${CLUSTER_DOMAIN}"
