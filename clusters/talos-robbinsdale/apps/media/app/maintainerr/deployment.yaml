---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: maintainerr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: maintainerr
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: maintainerr
    spec:
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: maintainerr
          image: ghcr.io/maintainerr/maintainerr:3.3.0
          ports:
            - name: http
              containerPort: 6246
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /opt/data
          env:
            - name: TZ
              value: ${TIMEZONE}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: maintainerr-data
