---
apiVersion: media.keiretsu.ts.net/v1alpha1
kind: ArrApp
metadata:
  name: wizarr
  namespace: media
spec:
  name: wizarr
  image: ghcr.io/wizarrrr/wizarr
  # renovate: datasource=docker depName=ghcr.io/wizarrrr/wizarr
  tag: "v2026.4.0"
  port: 5690
  hostname: wizarr
  homerName: "Wizarr"
  homerSubtitle: "Auth Server"
  homerLogo: "https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/svg/wizarr.svg"
  configMountPath: /data
  puid: "1000"
  pgid: "1000"
  configStorageSize: 5Gi
  configStorageClass: ceph-block-replicated-nvme
  mediaClaimName: media-share
  mediaMountPath: /media-share
  volsyncCopyMethod: Direct
  volsyncManualTrigger: "first"
  volsyncPaused: false
  s3Endpoint: "${COMMON_S3_ENDPOINT}"
  s3Location: "${LOCATION}"
  resticPassword: "${COMMON_RESTIC_SECRET}"
  clusterDomain: "${CLUSTER_DOMAIN}"
