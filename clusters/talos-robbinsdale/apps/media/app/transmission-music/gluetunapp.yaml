---
apiVersion: media.keiretsu.ts.net/v1alpha1
kind: GluetunApp
metadata:
  name: transmission-music
  namespace: media
spec:
  name: transmission-music
  clientImage: lscr.io/linuxserver/transmission
  # renovate: datasource=docker depName=lscr.io/linuxserver/transmission
  clientTag: "4.1.1"
  clientPort: 9091
  clientPeerPort: 51413
  # renovate: datasource=docker depName=ghcr.io/qdm12/gluetun
  gluetunTag: "v3.41.1"
  vpnSecretName: transmission-music-secret
  vpnCountry: "Netherlands"
  podCidr: "${CLUSTER_POD_CIDR}"
  serviceCidr: "${CLUSTER_SERVICE_CIDR}"
  hostname: transmission-music
  homerName: "Transmission Music"
  homerSubtitle: "Music Torrent Client"
  homerLogo: "https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/svg/transmission.svg"
  downloadsClaimName: media-share
  downloadsMountPath: /downloads
  configStorageSize: 5Gi
  configStorageClass: ceph-block-replicated-nvme
  volsyncCopyMethod: Direct
  volsyncManualTrigger: "first"
  volsyncPaused: true
  s3Endpoint: "${COMMON_S3_ENDPOINT}"
  s3Location: "${LOCATION}"
  resticPassword: "${COMMON_RESTIC_SECRET}"
  clusterDomain: "${CLUSTER_DOMAIN}"
  timezone: "${TIMEZONE}"
