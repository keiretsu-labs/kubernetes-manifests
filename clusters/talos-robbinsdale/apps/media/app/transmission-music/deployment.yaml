---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: transmission-music
spec:
  replicas: 1
  selector:
    matchLabels:
      app: transmission-music
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: transmission-music
    spec:
      containers:
      - name: transmission-music
        image: haugene/transmission-openvpn
        env:
        - name: OPENVPN_PROVIDER
          value: "MULLVAD"
        - name: OPENVPN_CONFIG
          value: "any"
        - name: OPENVPN_USERNAME
          value: "none"
        - name: OPENVPN_PASSWORD
          value: "none"
        - name: LOCAL_NETWORK
          value: "10.0.0.0/8"
        ports:
        - name: http
          containerPort: 9091
          protocol: TCP
        resources:
          limits:
            squat.ai/tun: "1"
        volumeMounts:
        - name: data-volume
          mountPath: /data
        - name: config-volume
          mountPath: /config
      volumes:
      - name: data-volume
        persistentVolumeClaim:
          claimName: transmission-music-data-unas
      - name: config-volume
        persistentVolumeClaim:
          claimName: transmission-music-config-unas
