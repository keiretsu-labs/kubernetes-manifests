---
apiVersion: media.keiretsu.ts.net/v1alpha1
kind: ArrApp
metadata:
  name: lidarr
  namespace: media
spec:
  name: lidarr
  image: lscr.io/linuxserver/lidarr
  # renovate: datasource=docker depName=lscr.io/linuxserver/lidarr
  tag: "3.1.0"
  port: 8686
  hostname: lidarr
  homerName: "Lidarr"
  homerSubtitle: "Music Collection Manager"
  homerLogo: "https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/svg/lidarr.svg"
  configStorageSize: 5Gi
  configStorageClass: ceph-block-replicated-nvme
  mediaClaimName: media-share
  mediaMountPath: /media-share
  volsyncCopyMethod: Direct
  volsyncManualTrigger: "first"
  volsyncPaused: false
  s3Endpoint: "${COMMON_S3_ENDPOINT}"
  s3Location: "${LOCATION}"
  resticPassword: "${COMMON_RESTIC_SECRET}"
  clusterDomain: "${CLUSTER_DOMAIN}"
