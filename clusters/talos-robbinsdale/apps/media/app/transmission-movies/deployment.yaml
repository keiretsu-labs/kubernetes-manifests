---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: transmission-movies
spec:
  replicas: 1
  selector:
    matchLabels:
      app: transmission-movies
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: transmission-movies
    spec:
      containers:
      - name: transmission-movies
        image: linuxserver/transmission
        env:
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        ports:
        - name: http
          containerPort: 9091
          protocol: TCP
        volumeMounts:
        - name: data-volume
          mountPath: /downloads
        - name: config-volume
          mountPath: /config
      volumes:
      - name: data-volume
        persistentVolumeClaim:
          claimName: transmission-movies-data-unas
      - name: config-volume
        persistentVolumeClaim:
          claimName: transmission-movies-config-unas
