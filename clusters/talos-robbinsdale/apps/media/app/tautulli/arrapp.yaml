---
apiVersion: media.keiretsu.ts.net/v1alpha1
kind: ArrApp
metadata:
  name: tautulli
  namespace: media
spec:
  name: tautulli
  image: tautulli/tautulli
  # renovate: datasource=docker depName=tautulli/tautulli
  tag: "v2.17.0"
  port: 8181
  hostname: tautulli
  publicGateway: true
  homerName: "Tautulli"
  homerSubtitle: "Plex Monitoring & Statistics"
  homerLogo: "https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/svg/tautulli.svg"
  configStorageSize: 5Gi
  configStorageClass: ceph-block-replicated-nvme
  mediaClaimName: media-share
  mediaMountPath: /media-share
  volsyncCopyMethod: Direct
  volsyncManualTrigger: "first"
  volsyncPaused: false
  s3Endpoint: "${COMMON_S3_ENDPOINT}"
  s3Location: "${LOCATION}"
  resticPassword: "${COMMON_RESTIC_SECRET}"
  clusterDomain: "${CLUSTER_DOMAIN}"
