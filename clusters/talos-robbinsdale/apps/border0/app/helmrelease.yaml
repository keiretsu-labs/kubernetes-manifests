---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailzero-connector
  namespace: border0
spec:
  interval: 30m
  chart:
    spec:
      chart: tailzero-connector
      version: 0.3.0
      sourceRef:
        kind: HelmRepository
        name: border0
        namespace: flux-system
      interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    image:
      repository: ghcr.io/borderzero/tailzero
      tag: latest
      pullPolicy: Always
    # api-admin grants the connector's ServiceAccount wildcard access to the
    # kube-apiserver + impersonation. REQUIRED for Kubernetes API proxying
    # (the Cluster Dashboard / kubectl-over-Border0 path). Per-user authz is
    # enforced by Border0 policies in the admin portal, not k8s RBAC.
    rbac:
      clusterRoleMode: api-admin
    config:
      # One-time invite code minted in the Border0 admin portal (Connectors page).
      # The tailzero connector exchanges this ONCE for a durable connector token +
      # Tailscale auth key, then persists them into the chart-managed Secret
      # "tailzero-connector-credentials" (in ns border0) via its secret-manager Role.
      # On every restart it loads creds FROM that Secret and does NOT re-exchange the
      # invite, so leaving the (already-consumed) invite here is safe and idempotent.
      # The Secret's data is runtime-populated and NOT in git; Flux's 3-way merge
      # preserves it across reconciles (manifest declares no .data).
      #
      # NOTE: this REPLACES the legacy `border0-connector` chart
      # (image ghcr.io/borderzero/border0), which could not serve the Tailscale-
      # integrated k8s API-proxy data path (clients connected as WireGuard peers but
      # packets were dropped at the connector's empty filter trie -> infinite spin in
      # the Cluster Dashboard). tailzero (ghcr.io/borderzero/tailzero) is the current
      # connector the portal's "Launch New Connector" wizard provisions.
      inviteCode: "7cSHjV6_0O8"
      hostname: robbinsdale-tailzero
