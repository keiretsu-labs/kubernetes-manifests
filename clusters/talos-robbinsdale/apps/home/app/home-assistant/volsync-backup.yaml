---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: home-homeassistant-config-ceph
spec:
  sourcePVC: homeassistant-config-ceph
  trigger:
    schedule: "0 12 * * *"
  restic:
    pruneIntervalDays: 14
    repository: restic-home-homeassistant-config-ceph
    retain:
      hourly: 1
      daily: 3
      weekly: 4
      monthly: 2
      yearly: 1
    copyMethod: Direct
---
apiVersion: garage.rajsingh.info/v1alpha1
kind: GarageKey
metadata:
  name: volsync-home-homeassistant-config-ceph-key
spec:
  clusterRef:
    name: garage
    namespace: garage
  name: "Home Homeassistant Config Ceph Volsync Key"
  secretTemplate:
    name: restic-home-homeassistant-config-ceph
    namespace: home
    accessKeyIdKey: AWS_ACCESS_KEY_ID
    secretAccessKeyKey: AWS_SECRET_ACCESS_KEY
    includeEndpoint: false
    includeRegion: false
    additionalData:
      RESTIC_REPOSITORY: "s3:http://${COMMON_S3_ENDPOINT}/keiretsu/${LOCATION}/home/homeassistant-config"
      RESTIC_PASSWORD: "${COMMON_RESTIC_SECRET}"
  bucketPermissions:
    - bucketRef: keiretsu
      read: true
      write: true
