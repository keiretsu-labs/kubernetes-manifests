---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: homeassistant-config-ceph
  namespace: home
  annotations:
    kustomize.toolkit.fluxcd.io/prune: disabled
  labels:
    app: homeassistant
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: ceph-block-replicated-nvme 