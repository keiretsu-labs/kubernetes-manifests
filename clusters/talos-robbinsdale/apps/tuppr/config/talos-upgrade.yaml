---
apiVersion: tuppr.home-operations.com/v1alpha1
kind: TalosUpgrade
metadata:
  name: talos
spec:
  talos:
    # renovate: datasource=docker depName=ghcr.io/siderolabs/installer
    version: v1.12.6
  policy:
    debug: true
    force: true
    rebootMode: default
    placement: soft
    timeout: 30m
  drain:
    deleteLocalData: true
    ignoreDaemonSets: true
  healthChecks:
    - apiVersion: v1
      kind: Node
      expr: status.conditions.exists(c, c.type == "Ready" && c.status == "True")
      description: All nodes must be Ready
      timeout: 10m
    - apiVersion: ceph.rook.io/v1
      kind: CephCluster
      name: rook-ceph
      namespace: rook-ceph
      expr: status.ceph.health == "HEALTH_OK" || status.ceph.health == "HEALTH_WARN"
      description: Ceph cluster must be healthy before upgrading next node
      timeout: 15m
