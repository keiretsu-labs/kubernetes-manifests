apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app mimir-ruler
  namespace: flux-system
spec:
  targetNamespace: mimir
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: mimir
  path: ./clusters/talos-robbinsdale/apps/mimir-ruler/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: kubernetes-manifests
  interval: 30m
  retryInterval: 1m
  timeout: 5m
