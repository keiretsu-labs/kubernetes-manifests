apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - deployment.yaml
configMapGenerator:
  - name: mimir-ruler-config
    files:
      - mimir.yaml=mimir-config.yaml
  - name: mimir-ruler-rules
    files:
      - blackbox.yaml
      - flux.yaml
      - garage.yaml
      - k8gb.yaml
      - monitoring.yaml
      - smartctl.yaml
