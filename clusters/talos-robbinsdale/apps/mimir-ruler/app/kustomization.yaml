---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: mimir
resources:
  - deployment.yaml
configMapGenerator:
  - name: mimir-ruler-config
    files:
      - mimir.yaml=mimir-config.yaml
  - name: mimir-ruler-rules
    files:
      - rules/blackbox.yaml
      - rules/flux.yaml
      - rules/garage.yaml
      - rules/k8gb.yaml
      - rules/monitoring.yaml
      - rules/smartctl.yaml