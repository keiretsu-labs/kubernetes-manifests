---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grafana-redirect
  namespace: flux-system
spec:
  targetNamespace: home
  path: ./clusters/talos-robbinsdale/apps/grafana-redirect
  prune: true
  sourceRef:
    kind: GitRepository
    name: kubernetes-manifests
  interval: 30m
  retryInterval: 1m
  timeout: 3m