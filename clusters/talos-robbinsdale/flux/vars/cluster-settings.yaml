---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-settings
  namespace: flux-system
data:
  LOCATION: robbinsdale
  FAILOVER: ottawa
  SITE_ID: "1"
  TIMEZONE: America/Chicago
  CLUSTER_NAME: talos-robbinsdale
  CLUSTER_DISPLAY_NAME: Robbinsdale

  # K8s
  CLUSTER_POD_CIDR: 10.1.0.0/16
  CLUSTER_SERVICE_CIDR: 10.0.0.0/16
  CLUSTER_LOAD_BALANCER_CIDR: 10.50.0.0/16

  # Networking
  LAN_CIDR: 192.168.50.0/24
  LAN_GATEWAY_IP: "192.168.50.1"
  KUBERNETES_API_VIP: "192.168.50.25"

  # Domain
  CLUSTER_DOMAIN: lukehouge.com


  # Storage
  STORAGECLASS_LONGTERM: smb
  STORAGECLASS_DEFAULT: ceph-block-replicated-nvme
  STORAGECLASS_METADATA: ceph-block-replicated-nvme

  # Garage S3 endpoint override (takes precedence over common-secrets COMMON_S3_ENDPOINT).
  # Point at the cluster-local STORAGE service (tier:storage) instead of the gateway:
  # gateway pods are not layout-assigned in unified Auto-mode (operator v0.6.5 gap), so
  # their local key_table is frequently empty -> "403 No such key" / Access Denied. The
  # storage service always holds the full FullReplication key_table. Resolves per-cluster.
  COMMON_S3_ENDPOINT: "garage.garage.svc.cluster.local:3900"

  GARAGE_GATEWAY_AFFINITY: '{}'
