---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: mimir
resources:
  - namespace.yaml
  - serviceingress.yaml
  - garagekey.yaml
patches:
  - target:
      kind: GarageKey
      name: mimir-key
    patch: |
      - op: replace
        path: /metadata/namespace
        value: garage
helmCharts:
  - name: mimir-distributed
    repo: https://grafana.github.io/helm-charts
    version: 6.0.6
    releaseName: mimir
    namespace: mimir
    valuesFile: values.yaml
    includeCRDs: false
