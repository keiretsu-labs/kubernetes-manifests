    port: 80
  hostname: keiretsu-test
  proxyGroup: common-ingress
  global:
    enabled: true
    hostname: keiretsu-test
    tags: "tag:k8s"
    ports:
    - name: http
      port: 80
    proxyGroup: common-ingress
