# Shared ClusterPropagationPolicy for all floating single-replica workloads
# Any resource with karmada.io/scheduling=floating gets:
# - Resource-based scheduling to the cluster with most available capacity
# - Single-cluster placement (maxGroups: 1)
# - Graceful failover on cluster failure
# - Auto-discovery of pod template dependencies (Secrets, PVCs, ConfigMaps)
---
apiVersion: policy.karmada.io/v1alpha1
kind: ClusterPropagationPolicy
metadata:
  name: floating
spec:
  propagateDeps: true

  resourceSelectors:
    - apiVersion: apps/v1
      kind: Deployment
      labelSelector:
        matchLabels:
          karmada.io/scheduling: floating
    - apiVersion: v1
      kind: Service
      labelSelector:
        matchLabels:
          karmada.io/scheduling: floating
    - apiVersion: v1
      kind: Secret
      labelSelector:
        matchLabels:
          karmada.io/scheduling: floating
    - apiVersion: v1
      kind: PersistentVolumeClaim
      labelSelector:
        matchLabels:
          karmada.io/scheduling: floating
    - apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      labelSelector:
        matchLabels:
          karmada.io/scheduling: floating

  placement:
    clusterAffinity:
      clusterNames:
        - talos-ottawa
        - talos-robbinsdale
        - talos-stpetersburg

    clusterTolerations:
      - key: cluster.karmada.io/unreachable
        effect: NoExecute
        operator: Exists
        tolerationSeconds: 120
      - key: cluster.karmada.io/not-ready
        effect: NoExecute
        operator: Exists
        tolerationSeconds: 120

    spreadConstraints:
      - maxGroups: 1
        minGroups: 1
        spreadByField: cluster

    replicaScheduling:
      replicaSchedulingType: Divided
      replicaDivisionPreference: Weighted
      weightPreference:
        dynamicWeight: AvailableReplicas

  failover:
    application:
      decisionConditions:
        tolerationSeconds: 120
      purgeMode: Gracefully
      gracePeriodSeconds: 300
