# MultiClusterService resources for gatus
# Enables cross-cluster service discovery using MCS API
# With flat networking via Tailscale subnet routing, pods can reach
# each other directly — MCS provides the discovery/DNS layer on top.
---
apiVersion: multicluster.x-k8s.io/v1alpha1
kind: ServiceExport
metadata:
  name: gatus
  namespace: keiretsu-top
---
apiVersion: multicluster.x-k8s.io/v1alpha1
kind: ServiceImport
metadata:
  name: gatus
  namespace: keiretsu-top
spec:
  type: ClusterSetIP
  ports:
    - port: 80
      protocol: TCP
---
apiVersion: policy.karmada.io/v1alpha1
kind: PropagationPolicy
metadata:
  name: gatus-service-export
  namespace: keiretsu-top
spec:
  resourceSelectors:
    - apiVersion: multicluster.x-k8s.io/v1alpha1
      kind: ServiceExport
      name: gatus
  placement:
    clusterAffinity:
      clusterNames:
        - talos-ottawa
        - talos-robbinsdale
        - talos-stpetersburg
