---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus
  namespace: keiretsu-top
  labels:
    karmada.io/app: prometheus
spec:
  interval: 30m
  chart:
    spec:
      chart: prometheus
      version: "*"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    server:
      retention: 2d
      retentionSize: 8GB
      persistentVolume:
        enabled: true
        existingClaim: prometheus-server
      resources:
        requests:
          cpu: 50m
          memory: 512Mi
        limits:
          memory: 2Gi
      extraFlags:
        - "web.enable-lifecycle"
      global:
        scrape_interval: 60s

    alertmanager:
      enabled: false
    kube-state-metrics:
      enabled: false
    prometheus-node-exporter:
      enabled: false
    prometheus-pushgateway:
      enabled: false

    extraScrapeConfigs: |
      - job_name: gatus
        metrics_path: /metrics
        static_configs:
          - targets: ["gatus.keiretsu-top:80"]
