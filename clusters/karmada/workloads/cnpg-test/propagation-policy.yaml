# Primary CNPG cluster pinned to Ottawa
---
apiVersion: policy.karmada.io/v1alpha1
kind: ClusterPropagationPolicy
metadata:
  name: cnpg-test-primary
spec:
  resourceSelectors:
    - apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      labelSelector:
        matchLabels:
          karmada.io/app: cnpg-test-primary
    - apiVersion: postgresql.cnpg.io/v1
      kind: ScheduledBackup
      labelSelector:
        matchLabels:
          karmada.io/app: cnpg-test-primary
  placement:
    clusterAffinity:
      clusterNames:
        - talos-ottawa
---
# Replica CNPG cluster pinned to Robbinsdale
apiVersion: policy.karmada.io/v1alpha1
kind: ClusterPropagationPolicy
metadata:
  name: cnpg-test-replica
spec:
  resourceSelectors:
    - apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      labelSelector:
        matchLabels:
          karmada.io/app: cnpg-test-replica
  placement:
    clusterAffinity:
      clusterNames:
        - talos-robbinsdale
