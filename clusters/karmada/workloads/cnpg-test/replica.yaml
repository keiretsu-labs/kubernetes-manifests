---
# Replica CNPG cluster - deployed to Robbinsdale only
# Continuously restores from Ottawa's S3 backups
# Can be promoted to primary on failover via: kubectl cnpg promote cnpg-test-replica
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: cnpg-test-replica
  namespace: keiretsu-top
  labels:
    karmada.io/scheduling: pinned-robbinsdale
spec:
  instances: 1
  inheritedMetadata:
    labels:
      app: cnpg-test-replica

  replica:
    enabled: true
    source: cnpg-test-s3

  bootstrap:
    recovery:
      source: cnpg-test-s3

  storage:
    size: 5Gi
  monitoring:
    enablePodMonitor: true

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: cnpg-test-s3-store
        serverName: cnpg-test-replica

  externalClusters:
    - name: cnpg-test-s3
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: cnpg-test-s3-store
          serverName: cnpg-test
