# ClusterPropagationPolicy to propagate the namespace to member clusters
---
apiVersion: policy.karmada.io/v1alpha1
kind: ClusterPropagationPolicy
metadata:
  name: setec-namespace
spec:
  resourceSelectors:
    - apiVersion: v1
      kind: Namespace
      name: setec
  placement:
    clusterAffinity:
      clusterNames:
        - talos-ottawa
        - talos-robbinsdale
        - talos-stpetersburg
