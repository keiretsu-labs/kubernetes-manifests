---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: setec
  namespace: setec
  labels:
    app: setec
    karmada.io/scheduling: floating
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: setec
  template:
    metadata:
      labels:
        app: setec
    spec:
      initContainers:
        - name: generate-authkey
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              TOKEN=$$(curl -sf -d "client_id=$$CLIENT_ID" -d "client_secret=$$CLIENT_SECRET" \
                "https://api.tailscale.com/api/v2/oauth/token" | sed -n 's/.*"access_token":"\([^"]*\)".*/\1/p')
              if [ -z "$$TOKEN" ]; then
                echo "Failed to get OAuth access token"
                exit 1
              fi
              AUTHKEY=$$(curl -sf -X POST \
                -H "Authorization: Bearer $$TOKEN" \
                -H "Content-Type: application/json" \
                -d '{"capabilities":{"devices":{"create":{"reusable":false,"ephemeral":true,"preauthorized":true,"tags":["tag:k8s"]}}}}' \
                "https://api.tailscale.com/api/v2/tailnet/-/keys" | sed -n 's/.*"key":"\([^"]*\)".*/\1/p')
              if [ -z "$$AUTHKEY" ]; then
                echo "Failed to generate auth key"
                exit 1
              fi
              echo "$$AUTHKEY" > /auth/ts-authkey
              echo "Auth key generated successfully"
          env:
            - name: CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: setec-tailscale
                  key: client_id
            - name: CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: setec-tailscale
                  key: client_secret
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
          volumeMounts:
            - name: auth
              mountPath: /auth
        - name: restore-backup
          image: amazon/aws-cli:latest
          command:
            - sh
            - -c
            - |
              EP="--endpoint-url http://$$S3_ENDPOINT"
              LATEST=$$(aws s3api list-objects-v2 --bucket setec $$EP --query 'sort_by(Contents,&Key)[-1].Key' --output text 2>/dev/null)
              if [ -n "$$LATEST" ] && [ "$$LATEST" != "None" ]; then
                echo "Restoring backup: $$LATEST"
                aws s3api get-object --bucket setec --key "$$LATEST" /app/state/database $$EP
                echo "Restore complete"
              else
                echo "No backup found, starting fresh"
              fi
          env:
            - name: S3_ENDPOINT
              value: "${COMMON_S3_ENDPOINT}"
          envFrom:
            - secretRef:
                name: setec-s3-auth
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: state
              mountPath: /app/state
      containers:
        - name: setec
          image: ghcr.io/rajsinghtech/setec:latest
          command:
            - sh
            - -c
            - |
              export TS_AUTHKEY=$$(cat /auth/ts-authkey)
              exec ./setec server --dev \
                --hostname secrets \
                --state-dir /app/state \
                --backup-bucket setec \
                --backup-bucket-region garage
          env:
            - name: AWS_ENDPOINT_URL_S3
              value: "http://${COMMON_S3_ENDPOINT}"
          envFrom:
            - secretRef:
                name: setec-s3-auth
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: state
              mountPath: /app/state
            - name: auth
              mountPath: /auth
              readOnly: true
      volumes:
        - name: state
          emptyDir: {}
        - name: auth
          emptyDir:
            medium: Memory
