---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: qbittorrent
  namespace: keiretsu-top
  labels:
    app: qbittorrent
    karmada.io/app: qbittorrent
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: ts
      namespace: home
  hostnames:
    - "qb.ts.keiretsu.top"
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: qbittorrent
          port: 80
      matches:
        - path:
            type: PathPrefix
            value: /
