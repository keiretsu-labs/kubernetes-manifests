---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
  namespace: keiretsu-top
  labels:
    app: qbittorrent
    karmada.io/scheduling: floating
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qbittorrent
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: qbittorrent
    spec:
      initContainers:
        - name: generate-authkey
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              TOKEN=$$(curl -sf -d "client_id=$$CLIENT_ID" -d "client_secret=$$CLIENT_SECRET" \
                "https://api.tailscale.com/api/v2/oauth/token" | sed -n 's/.*"access_token":"\([^"]*\)".*/\1/p')
              if [ -z "$$TOKEN" ]; then
                echo "Failed to get OAuth access token"
                exit 1
              fi
              AUTHKEY=$$(curl -sf -X POST \
                -H "Authorization: Bearer $$TOKEN" \
                -H "Content-Type: application/json" \
                -d '{"capabilities":{"devices":{"create":{"reusable":false,"ephemeral":true,"preauthorized":true,"tags":["tag:k8s"]}}}}' \
                "https://api.tailscale.com/api/v2/tailnet/-/keys" | sed -n 's/.*"key":"\([^"]*\)".*/\1/p')
              if [ -z "$$AUTHKEY" ]; then
                echo "Failed to generate auth key"
                exit 1
              fi
              echo "$$AUTHKEY" > /auth/ts-authkey
              echo "Auth key generated successfully"
          env:
            - name: CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: qbittorrent-ts
                  key: client_id
            - name: CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: qbittorrent-ts
                  key: client_secret
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
          volumeMounts:
            - name: auth
              mountPath: /auth
      containers:
        - name: gluetun
          image: ghcr.io/qdm12/gluetun:v3.41.1
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
            allowPrivilegeEscalation: false
          env:
            - name: VPN_SERVICE_PROVIDER
              value: protonvpn
            - name: VPN_TYPE
              value: wireguard
            - name: WIREGUARD_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: qbittorrent-vpn
                  key: WIREGUARD_PRIVATE_KEY
            - name: WIREGUARD_PERSISTENT_KEEPALIVE_INTERVAL
              value: 14s
            - name: WIREGUARD_MTU
              value: "1410"
            - name: HEALTH_VPN_DURATION_ADDITION
              value: 5s
            - name: VPN_PORT_FORWARDING
              value: "on"
            - name: PORT_FORWARD_ONLY
              value: "on"
            - name: DOT
              value: "off"
            - name: HEALTH_TARGET_ADDRESS
              value: "1.1.1.1:443"
            - name: FIREWALL_INPUT_PORTS
              value: "8080,6881,8000"
            - name: FIREWALL_OUTBOUND_SUBNETS
              value: "10.0.0.0/8"
            - name: UPDATER_PERIOD
              value: "24h"
            - name: UPDATER_PROTONVPN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: qbittorrent-vpn
                  key: UPDATER_PROTONVPN_EMAIL
            - name: UPDATER_PROTONVPN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: qbittorrent-vpn
                  key: UPDATER_PROTONVPN_PASSWORD
            - name: HEALTH_VPN_DURATION_INITIAL
              value: "10s"
            - name: LOG_LEVEL
              value: info
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: gluetun-config
              mountPath: /gluetun
        - name: gluetun-qb-port-sync
          image: ghcr.io/bjw-s-labs/gluetun-qb-port-sync:0.0.4
          env:
            - name: GLUETUN_CONTROL_SERVER_HOST
              value: localhost
            - name: GLUETUN_CONTROL_SERVER_PORT
              value: "8000"
            - name: QBITTORRENT_HOST
              value: localhost
            - name: QBITTORRENT_WEBUI_PORT
              value: "8080"
            - name: CRON_ENABLED
              value: "true"
            - name: CRON_SCHEDULE
              value: "*/5 * * * *"
            - name: LOG_TIMESTAMP
              value: "false"
            - name: CRON_INIT
              value: "true"
          command: ["/bin/sh"]
          args: ["-c", "echo '*/5 * * * * /app/gluetun-qb-port-sync' > /config/crontab && exec /entrypoint.sh"]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
          volumeMounts:
            - name: qb-port-sync-config
              mountPath: /config
        - name: qbittorrent
          image: lscr.io/linuxserver/qbittorrent:5.1.4
          ports:
            - name: webui
              containerPort: 8080
              protocol: TCP
            - name: torrenting
              containerPort: 6881
              protocol: TCP
            - name: torrenting-udp
              containerPort: 6881
              protocol: UDP
          env:
            - name: PUID
              value: "568"
            - name: PGID
              value: "568"
            - name: TZ
              value: America/Chicago
            - name: WEBUI_PORT
              value: "8080"
            - name: TORRENTING_PORT
              value: "6881"
            - name: QBITTORRENT__AUTH_SubnetWhitelist
              value: "10.0.0.0/8"
            - name: QBITTORRENT__Auth_AuthSubnetWhitelistEnabled
              value: "true"
            - name: QBITTORRENT__Auth_LocalHostAuth
              value: "false"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: qbittorrent-config
        - name: downloads
          persistentVolumeClaim:
            claimName: qbittorrent-downloads
        - name: gluetun-config
          emptyDir: {}
        - name: qb-port-sync-config
          emptyDir: {}
        - name: auth
          emptyDir:
            medium: Memory
