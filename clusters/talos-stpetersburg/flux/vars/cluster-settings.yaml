---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-settings
  namespace: flux-system
data:
  LOCATION: stpetersburg
  FAILOVER: ottawa
  SITE_ID: "3"
  TIMEZONE: America/New_York
  CLUSTER_NAME: talos-stpetersburg
  CLUSTER_DISPLAY_NAME: StPetersburg

  # K8s
  CLUSTER_POD_CIDR: 10.5.0.0/16
  CLUSTER_SERVICE_CIDR: 10.4.0.0/16
  CLUSTER_LOAD_BALANCER_CIDR: 10.73.0.0/16

  # Networking
  LAN_CIDR: 192.168.73.0/24 
  LAN_GATEWAY_IP: "192.168.73.1"
  KUBERNETES_API_VIP: "192.168.73.25"

  # Domain
  CLUSTER_DOMAIN: rajsingh.info


  # Storage
  STORAGECLASS_LONGTERM: local-path
  STORAGECLASS_DEFAULT: local-path
  STORAGECLASS_METADATA: local-path

  # Garage S3 endpoint override (takes precedence over common-secrets COMMON_S3_ENDPOINT).
  # Point at the cluster-local GATEWAY service (tier:gateway). As of operator v0.6.9 the
  # gateway holds the full FullReplication key_table (garage-operator#209/#224 fixed), so
  # S3 sig-auth resolves locally — no more "403 No such key". The gateway also survives
  # local-storage-loss: it proxies reads to a surviving region's storage (read_quorum=1),
  # whereas the storage service has NO endpoints if local storage is destroyed. Swap this
  # one value to repoint every app — all S3 clients use ${COMMON_S3_ENDPOINT}.
  COMMON_S3_ENDPOINT: "garage-gateway.garage.svc.cluster.local:3900"
  VICTORIA_LOGS_HOST: "victoria-logs-victoria-logs-single-server.monitoring"

  # Garage: STORAGE layout is hand-managed per Spark node via GarageNode CRs in
  # clusters/talos-stpetersburg/apps/garage (decoupled from clusters/common so
  # each Spark can carry its own heterogeneous storage array). Per-tier Manual
  # stops the operator from generating/owning storage GarageNodes here; the
  # GATEWAY tier stays operator-managed (Auto). The cluster CR (federation,
  # gateway tier, replication) still comes from common. Requires operator
  # v0.6.11+ (spec.storage.layoutPolicy).
  GARAGE_STORAGE_LAYOUT_POLICY: "Manual"
  GARAGE_REPLICAS: "2"
  GARAGE_NODE_SELECTOR: '{"node.kubernetes.io/instance-type":"dgx-spark"}'
  GARAGE_TOPOLOGY_SPREAD: '[{"maxSkew":1,"topologyKey":"kubernetes.io/hostname","whenUnsatisfiable":"DoNotSchedule","labelSelector":{"matchLabels":{"app.kubernetes.io/name":"garage"}}}]'
