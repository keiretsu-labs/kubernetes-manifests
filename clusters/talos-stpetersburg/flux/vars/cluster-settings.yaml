---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-settings
  namespace: flux-system
data:
  LOCATION: stpetersburg
  FAILOVER: ottawa
  SITE_ID: "3"
  TIMEZONE: America/New_York
  CLUSTER_NAME: talos-stpetersburg
  CLUSTER_DISPLAY_NAME: StPetersburg

  # K8s
  CLUSTER_POD_CIDR: 10.5.0.0/16
  CLUSTER_SERVICE_CIDR: 10.4.0.0/16
  CLUSTER_LOAD_BALANCER_CIDR: 10.73.0.0/16

  # Networking
  LAN_CIDR: 192.168.73.0/24 
  LAN_GATEWAY_IP: "192.168.73.1"
  KUBERNETES_API_VIP: "192.168.73.25"

  # Domain
  CLUSTER_DOMAIN: rajsingh.info


  # Storage
  STORAGECLASS_LONGTERM: local-path
  STORAGECLASS_DEFAULT: local-path
  STORAGECLASS_METADATA: local-path

  # Garage: run one storage replica per Spark (excludes orin-0).
  GARAGE_REPLICAS: "2"
  GARAGE_NODE_SELECTOR: '{"node.kubernetes.io/instance-type":"dgx-spark"}'
  GARAGE_TOPOLOGY_SPREAD: '[{"maxSkew":1,"topologyKey":"kubernetes.io/hostname","whenUnsatisfiable":"DoNotSchedule","labelSelector":{"matchLabels":{"app.kubernetes.io/name":"garage"}}}]'
