[tools]
task = "3"
talhelper = "latest"
talosctl = "latest"
sops = "latest"
kubectl = "latest"
helmfile = "latest"

[env]
KUBECONFIG = "{{config_root}}/kubeconfig"
TALOSCONFIG = "{{config_root}}/bootstrap/talos/clusterconfig/talosconfig"
# Force Go's native DNS resolver for talosctl hostname resolution
GODEBUG = "netdns=go"

[tasks.init]
run = "task -d bootstrap/talos init"
description = "Initialize Talos secrets (generates and encrypts talsecret.sops.yaml)"

[tasks.bootstrap]
run = "task -d bootstrap/talos bootstrap"
description = "Bootstrap the Talos cluster"

[tasks.genconfig]
run = "task -d bootstrap/talos genconfig"
description = "Generate Talos configuration"

[tasks.apply]
run = "task -d bootstrap/talos apply"
description = "Apply Talos configuration to nodes"

[tasks.apply-insecure]
run = "task -d bootstrap/talos apply-insecure"
description = "Apply Talos configuration to nodes in maintenance mode (initial install)"

[tasks.apply-staged]
run = "task -d bootstrap/talos apply-staged"
description = "Stage Talos config — applied on each node's next reboot (no immediate disruption)"

[tasks.kubeconfig]
run = "task -d bootstrap/talos kubeconfig"
description = "Fetch kubeconfig from cluster"

[tasks.health]
run = "task -d bootstrap/talos health"
description = "Check cluster health"

[tasks.dashboard]
run = "task -d bootstrap/talos dashboard"
description = "Open Talos dashboard"

[tasks.gpu-status]
run = "task -d bootstrap/talos gpu-status"
description = "Check NVIDIA GPU status"

[tasks.reset]
run = """
NODE="${1:-spark-0}"
echo "[Destructive] This will reset node: $NODE"
echo ""
echo "WARNING: This will DESTROY data on $NODE!"
echo "Are you absolutely sure you want to proceed? (y/N)"
read -r response

if [ "$response" = "y" ] || [ "$response" = "Y" ]; then
  talosctl -n "$NODE" -e "$NODE" reset --system-labels-to-wipe EPHEMERAL,STATE --graceful=false --reboot --force
else
  echo "Reset cancelled."
fi
"""
description = "Reset node with confirmation (DESTRUCTIVE) — usage: mise run reset [node]"

[tasks.disk]
run = "task -d bootstrap/talos disk"
description = "Show discovered volumes"

[tasks.link]
run = "task -d bootstrap/talos link"
description = "Show network link status"

[tasks.addresses]
run = "task -d bootstrap/talos addresses"
description = "Show IP addresses"

[tasks.service]
run = "task -d bootstrap/talos service"
description = "List services"

[tasks.reboot]
run = """
NODE="${1:-spark-0}"
echo "WARNING: This will reboot $NODE! Press Ctrl+C to cancel..."
sleep 5
talosctl -e "$NODE" -n "$NODE" reboot --debug
"""
description = "Reboot node (DISRUPTIVE) — usage: mise run reboot [node]"

[tasks.upgrade]
run = """
NODE="${1:-spark-0}"
TALOS_VERSION="${2:-v1.13.3}"
echo "Upgrading $NODE to Talos $TALOS_VERSION"
talosctl upgrade --nodes "$NODE" --image ghcr.io/siderolabs/installer:${TALOS_VERSION} -e "$NODE" --wait --debug
"""
description = "Upgrade Talos version — usage: mise run upgrade [node] [version]"

[tasks.k9s]
run = "k9s --context admin@k8s.stpetersburg.internal"
description = "Launch k9s with cluster context"

[tasks.iso-spark]
run = """
SCHEMATIC_ID=c07545af5f345c55b28c99002209a4d511632ca96774114b0db38ff6352c7b32
TALOS_VERSION=$(grep '^talosVersion:' bootstrap/talos/talconfig.yaml | awk '{print $2}')
echo "spark-0 schematic: $SCHEMATIC_ID @ $TALOS_VERSION"
curl -L --progress-bar -o bootstrap/talos/metal-arm64-spark.iso \\
  "https://factory.talos.dev/image/${SCHEMATIC_ID}/${TALOS_VERSION}/metal-arm64.iso"
"""
description = "Download spark-0 ISO (NVIDIA-flavored arm64)"

[tasks.iso-orin]
run = """
SCHEMATIC_ID=f1b5e8899067375144c74b23ae6849ede993b6ac771248b654b521905f65b0fa
TALOS_VERSION=$(grep '^talosVersion:' bootstrap/talos/talconfig.yaml | awk '{print $2}')
echo "orin-0 schematic: $SCHEMATIC_ID @ $TALOS_VERSION"
curl -L --progress-bar -o bootstrap/talos/metal-arm64-orin.iso \\
  "https://factory.talos.dev/image/${SCHEMATIC_ID}/${TALOS_VERSION}/metal-arm64.iso"
"""
description = "Download orin-0 ISO (minimal arm64, no NVIDIA)"

[tasks.nodes]
run = "kubectl get nodes -o wide"
description = "Show cluster nodes"

[tasks.pods]
run = "kubectl get pods -A"
description = "Show all pods in cluster"

[tasks.talos-shell]
run = """
NODE="${1:-spark-0}"
talosctl -n "$NODE" -e "$NODE" shell
"""
description = "Open shell on node — usage: mise run talos-shell [node]"

[tasks.logs]
run = """
NODE="${1:-spark-0}"
SERVICE="${2:-kubelet}"
echo "Showing logs for $SERVICE on $NODE"
talosctl -n "$NODE" -e "$NODE" logs "$SERVICE"
"""
description = "Show service logs — usage: mise run logs [node] [service]"

[tasks.dmesg]
run = """
NODE="${1:-spark-0}"
talosctl -n "$NODE" -e "$NODE" dmesg
"""
description = "Show kernel logs — usage: mise run dmesg [node]"

[tasks.apply-orin-insecure]
run = """
ORIN_IP="${1?usage: mise run apply-orin-insecure <orin-ip>}"
echo "Applying orin-0 config to $ORIN_IP (maintenance mode)"
talosctl apply-config --insecure -n "$ORIN_IP" \\
  --file bootstrap/talos/clusterconfig/k8s.stpetersburg.internal-orin-0.yaml
"""
description = "Apply orin-0 config in maintenance mode — usage: mise run apply-orin-insecure <ip>"

[tasks.discover-orin-disk]
run = """
ORIN_IP="${1?usage: mise run discover-orin-disk <orin-ip>}"
echo "Discovering disks on $ORIN_IP (maintenance mode):"
talosctl --insecure -n "$ORIN_IP" -e "$ORIN_IP" get disks
"""
description = "List disks on orin-0 in maintenance mode — usage: mise run discover-orin-disk <ip>"
