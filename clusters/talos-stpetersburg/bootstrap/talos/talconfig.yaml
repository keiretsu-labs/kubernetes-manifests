# yaml-language-server: $schema=https://raw.githubusercontent.com/budimanjojo/talhelper/master/pkg/config/schemas/talconfig.json
---
# renovate: datasource=docker depName=ghcr.io/siderolabs/installer
talosVersion: v1.13.3
# renovate: datasource=docker depName=ghcr.io/siderolabs/kubelet
kubernetesVersion: v1.36.1
clusterName: "k8s.stpetersburg.internal"
endpoint: https://k8s.stpetersburg.internal:6443
# orin-0 is the sole control plane and is dedicated to it — taint it so workloads
# reschedule onto the GPU workers (spark-0/spark-1). Setting these false adds
# node-role.kubernetes.io/control-plane:NoSchedule to every control-plane node.
allowSchedulingOnMasters: false
allowSchedulingOnControlPlanes: false
clusterPodNets:
  - "10.5.0.0/16"
clusterSvcNets:
  - "10.4.0.0/16"

additionalApiServerCertSans:
  - "192.168.73.25"
  - "192.168.73.211"
  - "default-kubernetes-stpetersburg-ingress.keiretsu.ts.net"
  - "kubernetes-stpetersburg.keiretsu.ts.net"
  - "kubernetes.stpetersburg.rajsingh.info"
  - "kubernetes-stpetersburg.default.svc.cluster.local"
  - 127.0.0.1 # KubePrism

additionalMachineCertSans:
  - "192.168.73.25"
  - "192.168.73.206"
  - "k8s.stpetersburg.internal"
  - "spark-0.stpetersburg.internal"
  - "spark-1.stpetersburg.internal"
  - "orin-0.stpetersburg.internal"
  - "192.168.73.211"
  - "default-kubernetes-stpetersburg-ingress.keiretsu.ts.net"
  - "kubernetes-stpetersburg.keiretsu.ts.net"
  - "kubernetes.stpetersburg.rajsingh.info"
  - "kubernetes-stpetersburg.default.svc.cluster.local"
  - 127.0.0.1 # KubePrism

# Disable built-in Flannel to use Cilium
cniConfig:
  name: none

# Per-node specific configuration
nodes:
  ###################################################################
  - hostname: "spark-0"
    ipAddress: "spark-0.stpetersburg.internal"
    # 4.1TB Samsung NVMe
    installDiskSelector:
      serial: "S8C2NG0Y733052"
    # Pinned to NVIDIA-flavored arm64 schematic (GB10 GPU)
    talosImageURL: "factory.talos.dev/installer/fa4bd9762d62e94cf3de1d8f7dbfb4cfe11647c205ba673d831a2fa1ae055113"
    # Worker — GPU compute. Control plane lives solely on orin-0 (no HA).
    controlPlane: false
    networkInterfaces:
        # Pinned by MAC — net.ifnames=0 + 5 NICs means bare "eth0" can reorder on reboot/firmware update
        # No VIP: the API-server VIP (192.168.73.25) belongs to the control plane (orin-0) only.
      - deviceSelector:
          hardwareAddr: "4c:bb:47:2d:95:33"  # onboard mgmt NIC
        dhcp: true
    patches:
      - "@./patches/node/spark-0.yaml"

  ###################################################################
  - hostname: "orin-0"
    ipAddress: "orin-0.stpetersburg.internal"
    # Onboard M.2 NVMe (only NVMe in the unit; mmcblk0 is the SD card we booted from)
    installDiskSelector:
      type: "nvme"
    # Minimal arm64 schematic — no NVIDIA extensions (Tegra integrated GPU not used)
    talosImageURL: "factory.talos.dev/installer/4c073ebf8a42d342831306af45e6fec8edee66c8e2db76ef2a950b809882253b"
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "3c:6d:66:76:77:55"  # single onboard NIC
        dhcp: true
        vip:
          ip: "192.168.73.25"
    patches:
      - "@./patches/node/orin-0.yaml"

  ###################################################################
  - hostname: "spark-1"
    ipAddress: "spark-1.stpetersburg.internal"
    # 4.1TB Samsung MZALC4T0HBL1 NVMe (same model as spark-0, serial S8C2NG0Y806827)
    installDiskSelector:
      type: "nvme"
    # Same NVIDIA-flavored arm64 schematic as spark-0 (paired GB10 GPU box)
    talosImageURL: "factory.talos.dev/installer/fa4bd9762d62e94cf3de1d8f7dbfb4cfe11647c205ba673d831a2fa1ae055113"
    # Worker — GPU compute. Control plane lives solely on orin-0 (no HA).
    controlPlane: false
    networkInterfaces:
        # Pinned by MAC — net.ifnames=0 + 5 NICs means bare "eth0" can reorder on reboot/firmware update
        # No VIP: the API-server VIP (192.168.73.25) belongs to the control plane (orin-0) only.
      - deviceSelector:
          hardwareAddr: "4c:bb:47:2b:90:4c"  # onboard mgmt NIC
        dhcp: true
    patches:
      - "@./patches/node/spark-1.yaml"

# Global patches (apply to all nodes — NVIDIA-specific bits live in node/spark-0.yaml)
patches:
  - "@./patches/global/cluster-discovery.yaml"
  - "@./patches/global/disable-search-domain.yaml"
  - "@./patches/global/hostdns.yaml"
  - "@./patches/global/kubelet.yaml"
  - "@./patches/global/local-path-provisioner.yaml"
  - "@./patches/global/metrics-server.yaml"
  - "@./patches/global/sysctls.yaml"
  - "@./patches/global/machine-logging.yaml"

# Control plane nodes config
controlPlane:
  schematic:
    customization:
      systemExtensions:
        officialExtensions:
          - siderolabs/gvisor
          # NVIDIA GPU — proprietary nonfree driver. Required: open-kernel-modules
          # crashed the GB10 kernel on boot (2026-05-11 upgrade attempt to
          # schematic 1328418d... rolled back via UEFI). Stay on nonfree + the
          # arm64.nobti kernel arg workaround (baked into spark schematic fa4bd976...).
          - siderolabs/nonfree-kmod-nvidia-lts
          - siderolabs/nvidia-container-toolkit-lts
          # Utilities
          - siderolabs/binfmt-misc
          - siderolabs/util-linux-tools
      extraKernelArgs:
        - apparmor=0
        - init_on_alloc=0
        - init_on_free=0
        - mitigations=off
        - security=none
        - talos.auditd.disabled=1
        - net.ifnames=0
        - nvidia_drm.modeset=1
        - nvidia_drm.fbdev=1
        - talos.logging.kernel=tcp://10.73.69.51:5170/
  patches:
    - "@./patches/controller/api-access.yaml"
    - "@./patches/controller/disable-proxy.yaml"
    - "@./patches/controller/kubelet-certs.yaml"
    - "@./patches/controller/etcd-metrics-patch.yaml"

# Worker nodes config — spark-0 / spark-1 (GB10 GPU boxes).
# Mirrors the control-plane schematic so worker configs carry the same NVIDIA system
# extensions and kernel args. Each spark also pins its own NVIDIA factory talosImageURL,
# so the install image is correct regardless; this keeps talhelper's generation aligned.
worker:
  schematic:
    customization:
      systemExtensions:
        officialExtensions:
          - siderolabs/gvisor
          # NVIDIA GPU — proprietary nonfree driver (open-kernel-modules crashes the GB10).
          - siderolabs/nonfree-kmod-nvidia-lts
          - siderolabs/nvidia-container-toolkit-lts
          - siderolabs/binfmt-misc
          - siderolabs/util-linux-tools
      extraKernelArgs:
        - apparmor=0
        - init_on_alloc=0
        - init_on_free=0
        - mitigations=off
        - security=none
        - talos.auditd.disabled=1
        - net.ifnames=0
        - nvidia_drm.modeset=1
        - nvidia_drm.fbdev=1
        - talos.logging.kernel=tcp://10.73.69.51:5170/
