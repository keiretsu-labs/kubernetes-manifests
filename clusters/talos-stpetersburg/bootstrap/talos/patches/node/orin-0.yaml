# Node-specific configuration for orin-0 (Jetson Orin Nano Super Developer Kit)
# Tegra integrated GPU is not used here — node serves as control plane only.
# No NVIDIA kernel modules loaded (schematic excludes nonfree-kmod-nvidia-lts).
machine:
  nodeLabels:
    node.kubernetes.io/instance-type: jetson-orin-nano-super
  files:
    # 20-customization.part exists on all stpetersburg nodes; overwriting with this content
    # adds discard_unpacked_layers=false for spegel P2P caching.
    # op: overwrite (not create) — Talos v1.13 blocks file create outside /var.
    - content: |
        [plugins."io.containerd.cri.v1.images"]
          discard_unpacked_layers = false
      path: /etc/cri/conf.d/20-customization.part
      op: overwrite
