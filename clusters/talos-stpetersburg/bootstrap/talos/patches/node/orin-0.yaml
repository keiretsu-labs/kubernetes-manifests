# Node-specific configuration for orin-0 (Jetson Orin Nano Super Developer Kit)
# Tegra integrated GPU is not used here — node serves as control plane only.
# No NVIDIA kernel modules loaded (schematic excludes nonfree-kmod-nvidia-lts).
# Tainted to repel common workloads; only cluster-specific infra should tolerate.
machine:
  nodeLabels:
    node.kubernetes.io/instance-type: jetson-orin-nano-super
  nodeTaints:
    - key: stpetersburg/orin
      value: "true"
      effect: NoSchedule
