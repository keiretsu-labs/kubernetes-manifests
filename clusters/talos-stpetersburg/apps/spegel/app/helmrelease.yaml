---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: spegel
  namespace: spegel
spec:
  interval: 5m
  chart:
    spec:
      chart: spegel
      version: v0.0.30
      sourceRef:
        kind: HelmRepository
        name: spegel
        namespace: flux-system
      interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    image:
      # chart appVersion lags upstream; pin to current spegel release
      tag: v0.7.0
    spegel:
      # Talos containerd is preconfigured to read hosts.toml fragments from this directory
      containerdRegistryConfigPath: /etc/cri/conf.d/hosts
      logLevel: INFO
    service:
      registry:
        # exposed via hostPort on every node; spegel peers reach each other on this port
        nodePort: 30020
        port: 5000
    serviceMonitor:
      enabled: true
    grafanaDashboard:
      enabled: true
      labels:
        grafana_dashboard: "1"
    # All stpetersburg nodes are control-planes; tolerations already include
    # NoSchedule but they don't carry CriticalAddonsOnly, so the defaults suffice.
