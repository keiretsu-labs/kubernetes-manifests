---
apiVersion: v1
kind: Service
metadata:
  name: comfyui
  namespace: comfyui
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8188
    protocol: TCP
    targetPort: http
  selector:
    app: comfyui
---
apiVersion: v1
kind: Service
metadata:
  name: comfyui-ts
  namespace: comfyui
  annotations:
    tailscale.com/hostname: "${LOCATION}-comfyui"
    tailscale.com/proxy-group: common-ingress
    tailscale.com/tags: "tag:singh360,tag:k8s,tag:${LOCATION}"
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 8188
  selector:
    app: comfyui
