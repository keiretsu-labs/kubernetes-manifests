apiVersion: batch/v1
kind: CronJob
metadata:
  name: mimir-watchdog
  labels:
    app.kubernetes.io/name: mimir-watchdog
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: mimir-watchdog
          restartPolicy: Never
          containers:
            - name: alert
              image: curlimages/curl:8.12.1
              command:
                - /bin/sh
                - -c
                - |
                  curl -s -o /dev/null -w "%{http_code}" \
                    -XPOST http://kube-prometheus-stack-alertmanager.monitoring.svc.cluster.local:9093/api/v1/alerts \
                    -H "Content-Type: application/json" \
                    -d '[{"labels":{"alertname":"Watchdog","severity":"none","cluster":"talos-stpetersburg"},"annotations":{"message":"Watchdog: synthetic heartbeat for talos-stpetersburg"}}]'
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mimir-watchdog
  labels:
    app.kubernetes.io/name: mimir-watchdog
