---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tailvoy-bridge
  namespace: tailvoy-bridge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tailvoy-bridge
  template:
    metadata:
      labels:
        app: tailvoy-bridge
    spec:
      containers:
        - name: tailvoy-bridge
          image: ghcr.io/rajsinghtech/tailvoy:bridge-latest
          imagePullPolicy: Always
          command:
            - tailvoy
            - --config
            - /etc/tailvoy/config.yaml
            - --log-level
            - debug
          env:
            - name: KEIRETSU_TS_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: tailvoy-bridge-credentials
                  key: keiretsu_client_id
            - name: KEIRETSU_TS_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: tailvoy-bridge-credentials
                  key: keiretsu_client_secret
            - name: TSJUSTWORKS_TS_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: tailvoy-bridge-credentials
                  key: tsjustworks_client_id
            - name: TSJUSTWORKS_TS_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: tailvoy-bridge-credentials
                  key: tsjustworks_client_secret
          volumeMounts:
            - name: config
              mountPath: /etc/tailvoy
              readOnly: true
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: tailvoy-bridge-config
