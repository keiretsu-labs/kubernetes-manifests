---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tailvoy-bridge-config
  namespace: tailvoy-bridge
data:
  config.yaml: |
    bridge:
      tailnets:
        keiretsu:
          clientId: ${KEIRETSU_TS_CLIENT_ID}
          clientSecret: ${KEIRETSU_TS_CLIENT_SECRET}
          tags: ["tag:bridge"]
        tsjustworks:
          clientId: ${TSJUSTWORKS_TS_CLIENT_ID}
          clientSecret: ${TSJUSTWORKS_TS_CLIENT_SECRET}
          tags: ["tag:bridge"]

      directions:
        "keiretsu>tsjustworks":
          serviceTags: ["tag:bridge-svc"]
          dns:
            enabled: true
            splitDns: true
        "tsjustworks>keiretsu":
          serviceTags: ["tag:bridge-svc"]
          dns:
            enabled: true
            splitDns: true

      rules:
        - from: keiretsu
          to: tsjustworks
          discover:
            tags: ["tag:k8s", "tag:stpetersburg"]
            ports: [22, 80, 443, 8080]

        - from: tsjustworks
          to: keiretsu
          discover:
            tags: ["tag:bridge"]
            ports: [22, 80, 443, 8080]

      pollInterval: 30s
      dialTimeout: 10s
