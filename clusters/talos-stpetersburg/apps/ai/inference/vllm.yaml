# vLLM Deployment for DGX Spark (GB10/ARM/Blackwell)
# Model: AEON-7/Qwen3.6-35B-A3B-heretic-NVFP4 + DFlash speculative decoding
# Image: ghcr.io/aeon-7/vllm-spark-omni-q36:v1.2 (ARM64/SBSA, patched vLLM)
# Reference: https://github.com/AEON-7/Qwen3.6-NVFP4-DFlash
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-models
  namespace: ai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 200Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: ai
  labels:
    app: vllm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      enableServiceLinks: false
      initContainers:
      - name: download-models
        image: ghcr.io/aeon-7/vllm-spark-omni-q36:v1.2
        command: [bash, -c]
        args:
        - |
          set -e
          if [ ! -f /models/qwen36-nvfp4/config.json ]; then
            echo "Downloading AEON-7/Qwen3.6-35B-A3B-heretic-NVFP4..."
            huggingface-cli download AEON-7/Qwen3.6-35B-A3B-heretic-NVFP4 \
              --local-dir /models/qwen36-nvfp4
          else
            echo "Main model already cached."
          fi
          if [ ! -f /models/qwen36-dflash/config.json ]; then
            echo "Downloading z-lab/Qwen3.6-35B-A3B-DFlash..."
            huggingface-cli download z-lab/Qwen3.6-35B-A3B-DFlash \
              --local-dir /models/qwen36-dflash
          else
            echo "Drafter model already cached."
          fi
        env:
        - name: HUGGING_FACE_HUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-secret
              key: HF_TOKEN
        - name: HF_HOME
          value: "/models/huggingface"
        volumeMounts:
        - name: models
          mountPath: /models
        resources:
          requests:
            memory: "4Gi"
            cpu: "2000m"
          limits:
            memory: "8Gi"
      containers:
      - name: vllm
        image: ghcr.io/aeon-7/vllm-spark-omni-q36:v1.2
        command: [bash, -c]
        args:
        - |
          exec vllm serve /models/qwen36-nvfp4 \
            --served-model-name Qwen3.6-35B-A3B qwen36-fast qwen36-deep \
            --host 0.0.0.0 \
            --port 8000 \
            --tensor-parallel-size 1 \
            --dtype auto \
            --quantization compressed-tensors \
            --max-model-len 262144 \
            --max-num-seqs 128 \
            --max-num-batched-tokens 65536 \
            --gpu-memory-utilization 0.75 \
            --enable-chunked-prefill \
            --enable-prefix-caching \
            --load-format safetensors \
            --trust-remote-code \
            --enable-auto-tool-choice \
            --tool-call-parser qwen3_coder \
            --reasoning-parser qwen3 \
            --default-chat-template-kwargs '{"enable_thinking": true, "thinking_budget": 2048}' \
            --speculative-config '{"method":"dflash","model":"/models/qwen36-dflash","num_speculative_tokens":15}' \
            --attention-backend flash_attn
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        env:
        - name: VLLM_TEST_FORCE_FP8_MARLIN
          value: "1"
        - name: TORCH_MATMUL_PRECISION
          value: "high"
        - name: PYTORCH_CUDA_ALLOC_CONF
          value: "expandable_segments:True"
        - name: NVIDIA_FORWARD_COMPAT
          value: "1"
        - name: NCCL_IGNORE_CPU_AFFINITY
          value: "1"
        - name: HUGGING_FACE_HUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-secret
              key: HF_TOKEN
        - name: HF_HOME
          value: "/models/huggingface"
        resources:
          requests:
            memory: "16Gi"
            cpu: "4000m"
            nvidia.com/gpu: "1"
          limits:
            memory: "96Gi"
            nvidia.com/gpu: "1"
        volumeMounts:
        - name: models
          mountPath: /models
        - name: shm
          mountPath: /dev/shm
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 300
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 120
          periodSeconds: 10
          timeoutSeconds: 5
        startupProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 30
      volumes:
      - name: models
        persistentVolumeClaim:
          claimName: vllm-models
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: 8Gi
      nodeSelector:
        nvidia.com/gpu.present: "true"
      terminationGracePeriodSeconds: 120
---
apiVersion: v1
kind: Service
metadata:
  name: vllm
  namespace: ai
  labels:
    app: vllm
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8000
    protocol: TCP
    targetPort: http
  selector:
    app: vllm
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-ts
  namespace: ai
  annotations:
    tailscale.com/hostname: "${LOCATION}-vllm"
    tailscale.com/proxy-group: common-ingress
    tailscale.com/tags: "tag:singh360,tag:k8s,tag:${LOCATION}"
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 8000
  selector:
    app: vllm
