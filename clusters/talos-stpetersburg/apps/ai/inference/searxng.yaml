---
apiVersion: v1
kind: ConfigMap
metadata:
  name: searxng-config
  namespace: ai
data:
  settings.yml: |
    use_default_settings: true
    server:
      secret_key: "changeme"
      limiter: false
      image_proxy: true
      bind_address: "0.0.0.0"
      port: 8080
      method: "POST"
    real_ip:
      x_for: 1
      real_ip_header: X-Forwarded-For
    outgoing:
      retry_on_timeout: true
      timeout: 10
      max_request_size: 5242880
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: ai
  labels:
    app: searxng
spec:
  replicas: 1
  selector:
    matchLabels:
      app: searxng
  template:
    metadata:
      labels:
        app: searxng
    spec:
      enableServiceLinks: false
      initContainers:
      - name: copy-settings
        image: busybox:latest
        command: ["sh", "-c", "cp /config/settings.yml /etc/searxng/settings.yml"]
        volumeMounts:
        - name: settings-config
          mountPath: /config
        - name: settings-writable
          mountPath: /etc/searxng
      containers:
      - name: searxng
        image: docker.io/searxng/searxng:latest
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: PORT
          value: "8080"
        volumeMounts:
        - name: settings-writable
          mountPath: /etc/searxng
        - name: cache
          mountPath: /var/cache/searxng
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: settings-config
        configMap:
          name: searxng-config
      - name: settings-writable
        emptyDir: {}
      - name: cache
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: searxng
  namespace: ai
  labels:
    app: searxng
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: searxng
---
apiVersion: v1
kind: Service
metadata:
  name: searxng-ts
  namespace: ai
  annotations:
    tailscale.com/hostname: "${LOCATION}-searxng"
    tailscale.com/proxy-group: common-ingress
    tailscale.com/tags: "tag:singh360,tag:k8s,tag:${LOCATION}"
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 8080
  selector:
    app: searxng
