---
apiVersion: v1
kind: ConfigMap
metadata:
  name: searxng-config
  namespace: ai
data:
  settings.yml: |
    use_default_settings: true
    general:
      instance_name: "SearXNG"
      donation_url: false
      contact_url: false
    server:
      secret_key: "changeme"
      limiter: false
      image_proxy: true
      bind_address: "0.0.0.0"
      port: 8080
      method: "GET"
      default_http_headers:
        X-Content-Type-Options: nosniff
        X-Robots-Tag: noindex, nofollow
    ui:
      static_use_hash: true
      default_locale: en
      default_theme: simple
      center_alignment: true
      infinite_scroll: false
      search_on_category_select: true
      hotkeys: default
    search:
      safe_search: 0
      autocomplete: ""
      default_lang: "auto"
      ban_time_on_fail: 5
      max_ban_time_on_fail: 120
      formats:
        - html
        - json
    outgoing:
      request_timeout: 3.0
      max_request_timeout: 15.0
      pool_connections: 100
      pool_maxsize: 20
      retry_on_http_error: true
  limiter.toml: |
    [real_ip]
    x_for = 0
    [botdetection.ip_limit]
    filter_link_local = false
    link_token = false
    [botdetection.ip_lists]
    block_ip = []
    pass_ip = ["0.0.0.0/0", "::/0"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: ai
  labels:
    app: searxng
spec:
  replicas: 1
  selector:
    matchLabels:
      app: searxng
  template:
    metadata:
      labels:
        app: searxng
    spec:
      enableServiceLinks: false
      initContainers:
      - name: copy-settings
        image: busybox:latest
        command: ["sh", "-c", "cp /config/settings.yml /etc/searxng/settings.yml && cp /config/limiter.toml /etc/searxng/limiter.toml"]
        volumeMounts:
        - name: settings-config
          mountPath: /config
        - name: settings-writable
          mountPath: /etc/searxng
      containers:
      - name: searxng
        image: docker.io/searxng/searxng:latest
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: PORT
          value: "8080"
        volumeMounts:
        - name: settings-writable
          mountPath: /etc/searxng
        - name: cache
          mountPath: /var/cache/searxng
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: settings-config
        configMap:
          name: searxng-config
      - name: settings-writable
        emptyDir: {}
      - name: cache
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: searxng
  namespace: ai
  labels:
    app: searxng
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: searxng
---
apiVersion: v1
kind: Service
metadata:
  name: searxng-ts
  namespace: ai
  annotations:
    tailscale.com/hostname: "${LOCATION}-searxng"
    tailscale.com/proxy-group: common-ingress
    tailscale.com/tags: "tag:singh360,tag:k8s,tag:${LOCATION}"
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 8080
  selector:
    app: searxng
