# Envoy Gateway routing for vLLM with consistent-hash load balancing.
# Goal: pin a given chat session to the same replica so prefix-cache hits the
# warm KV blocks. Falls back to source IP when no X-Session-Id header is sent.
# TODO: migrate to Envoy AI Gateway (Backend + AIServiceBackend + AIGatewayRoute)
# once spark-1 DNS/xDS connectivity is fixed — the AI Gateway rollout requires
# an extproc sidecar on every gateway pod, which got blocked by spark-1 not
# reaching the envoy-gateway xDS service.
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vllm
  namespace: ai
spec:
  parentRefs:
    - name: ts
      namespace: home
      sectionName: wildcard-keiretsu-top-https
  hostnames:
    - "${LOCATION}-vllm.${COMMON_DOMAIN}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: vllm
          port: 8000
---
# Consistent-hash LB + long timeouts for streaming completions.
# Sticky routing by X-Session-Id header keeps prefix-cache warm per chat;
# clients without the header fall back to source-IP hashing (still sticky
# per-client, just less granular).
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: vllm
  namespace: ai
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: vllm
  loadBalancer:
    type: ConsistentHash
    consistentHash:
      type: Header
      header:
        name: X-Session-Id
  timeout:
    http:
      requestTimeout: 0s
      connectionIdleTimeout: 600s
      maxConnectionDuration: 0s
  connection:
    bufferLimit: 65536
