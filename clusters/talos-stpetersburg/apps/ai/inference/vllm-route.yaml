# Envoy AI Gateway routing for vLLM.
# Stack: Backend (FQDN) -> AIServiceBackend (OpenAI schema) -> AIGatewayRoute.
# AIGatewayRoute gives us token-aware metrics, model-name routing, and
# streaming-aware LB. BackendTrafficPolicy preserves consistent-hash sticky
# routing on X-Session-Id so prefix-cache stays warm per chat session.
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: vllm
  namespace: ai
spec:
  endpoints:
    - fqdn:
        hostname: vllm.ai.svc.cluster.local
        port: 8000
---
apiVersion: aigateway.envoyproxy.io/v1beta1
kind: AIServiceBackend
metadata:
  name: vllm
  namespace: ai
spec:
  schema:
    name: OpenAI
  backendRef:
    group: gateway.envoyproxy.io
    kind: Backend
    name: vllm
---
apiVersion: aigateway.envoyproxy.io/v1beta1
kind: AIGatewayRoute
metadata:
  name: vllm
  namespace: ai
spec:
  parentRefs:
    - name: ts
      namespace: home
      kind: Gateway
      group: gateway.networking.k8s.io
      sectionName: wildcard-keiretsu-top-https
  # Token-aware metrics exported to Prometheus via Envoy dynamic metadata.
  # Lets Grafana chart tokens/s, cache-hit ratio, TTFT per request.
  llmRequestCosts:
    - metadataKey: llm_input_token
      type: InputToken
    - metadataKey: llm_output_token
      type: OutputToken
    - metadataKey: llm_total_token
      type: TotalToken
    - metadataKey: llm_cached_input_token
      type: CachedInputToken
  rules:
    # AIGatewayRoute has no hostnames field; the generated HTTPRoute attaches
    # to the gateway listener (wildcard *.keiretsu.top). Filter to this
    # hostname only so other apps on the same listener don't get LLM-mangled.
    - matches:
        - headers:
            - name: Host
              type: Exact
              value: "${LOCATION}-vllm.${COMMON_DOMAIN}"
      backendRefs:
        - name: vllm
      timeouts:
        # vLLM streaming completions can run for minutes on long generations.
        request: 0s
        backendRequest: 0s
---
# Sticky routing by X-Session-Id keeps prefix-cache warm per chat; clients
# without the header fall back to source-IP hashing. Long timeouts for
# streaming. AI Gateway controller auto-generates an HTTPRoute named after
# the AIGatewayRoute ("vllm") — target that.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: vllm
  namespace: ai
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: vllm
  loadBalancer:
    type: ConsistentHash
    consistentHash:
      type: Header
      header:
        name: X-Session-Id
  timeout:
    http:
      requestTimeout: 0s
      connectionIdleTimeout: 600s
      maxConnectionDuration: 0s
  connection:
    bufferLimit: 65536
