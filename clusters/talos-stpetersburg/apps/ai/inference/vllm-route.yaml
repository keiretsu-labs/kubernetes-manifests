# vLLM routing on the dedicated ai-gateway. Token-aware metrics, model-aware
# routing, streaming-aware LB via Envoy AI Gateway. Consistent-hash sticky
# routing on X-Session-Id (BackendTrafficPolicy targets the auto-generated
# HTTPRoute) keeps prefix-cache warm per chat session.
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: vllm
  namespace: ai
spec:
  endpoints:
    - fqdn:
        hostname: vllm.ai.svc.cluster.local
        port: 8000
---
apiVersion: aigateway.envoyproxy.io/v1beta1
kind: AIServiceBackend
metadata:
  name: vllm
  namespace: ai
spec:
  schema:
    name: OpenAI
  backendRef:
    group: gateway.envoyproxy.io
    kind: Backend
    name: vllm
---
apiVersion: aigateway.envoyproxy.io/v1beta1
kind: AIGatewayRoute
metadata:
  name: vllm
  namespace: ai
spec:
  parentRefs:
    - name: ai-gateway
      kind: Gateway
      group: gateway.networking.k8s.io
  # Token-aware metrics exported via Envoy dynamic metadata for Prometheus.
  llmRequestCosts:
    - metadataKey: llm_input_token
      type: InputToken
    - metadataKey: llm_output_token
      type: OutputToken
    - metadataKey: llm_total_token
      type: TotalToken
    - metadataKey: llm_cached_input_token
      type: CachedInputToken
  rules:
    # Dedicated gateway, single listener for *-ai-gateway.${COMMON_DOMAIN}.
    # No Host filter needed — all traffic on this gateway is AI.
    - backendRefs:
        - name: vllm
      timeouts:
        # vLLM streaming completions can run for minutes on long generations.
        request: 0s
        backendRequest: 0s
---
# Sticky routing by X-Session-Id keeps prefix-cache warm per chat; clients
# without the header fall back to source-IP hashing. AI Gateway controller
# auto-generates an HTTPRoute named after the AIGatewayRoute (vllm) — target it.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: vllm
  namespace: ai
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: vllm
  loadBalancer:
    type: ConsistentHash
    consistentHash:
      type: Header
      header:
        name: X-Session-Id
  timeout:
    http:
      requestTimeout: 0s
      connectionIdleTimeout: 600s
      maxConnectionDuration: 0s
  connection:
    bufferLimit: 65536
