---
# vLLM OpenAI-compatible inference server.
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: app-vllm
spec:
  jobName: blackbox
  module: http_2xx
  prober:
    url: blackbox-exporter.monitoring.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        - http://vllm.ai:8000/health
        - http://vllm.ai:8000/v1/models
      labels:
        service: ai-inference
        target: vllm
---
# vLLM exposed externally via Tailscale.
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: app-vllm-ts
spec:
  jobName: blackbox
  module: http_2xx
  prober:
    url: blackbox-exporter.monitoring.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        - http://stpetersburg-vllm.tailscale/health
      labels:
        service: ai-inference
        target: vllm-tailscale
---
# SearXNG meta-search backend used by AI agents.
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: app-searxng
spec:
  jobName: blackbox
  module: http_2xx
  prober:
    url: blackbox-exporter.monitoring.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        - http://searxng.ai:8080/healthz
      labels:
        service: ai-inference
        target: searxng
---
# Envoy AI gateway data-plane listener. Gateway-managed Service has a hash
# suffix that changes on recreation, so probe the stable Tailscale hostname.
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: app-ai-gateway
spec:
  jobName: blackbox
  module: tcp_connect
  prober:
    url: blackbox-exporter.monitoring.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        - stpetersburg-ai-gateway.tailscale:80
      labels:
        service: ai-inference
        target: ai-gateway
---
# Valkey (Redis-compat) backing store for the AI stack.
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: app-valkey
spec:
  jobName: blackbox
  module: tcp_connect
  prober:
    url: blackbox-exporter.monitoring.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        - valkey.ai:6379
      labels:
        service: ai-inference
        target: valkey
