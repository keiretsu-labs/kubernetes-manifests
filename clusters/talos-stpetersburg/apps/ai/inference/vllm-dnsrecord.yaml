# Public DNS for the vLLM endpoint. The AI Gateway-generated HTTPRoute has no
# hostnames field (the Host filter lives inside matches.headers), so neither
# the keiretsu.top external-dns (--source=crd only) nor the ts-external-dns
# (--source=gateway-httproute) can extract it. Pin the record explicitly.
#
# 100.81.186.108 is the Tailscale CGNAT VIP of the ts gateway (loadBalancer
# class: tailscale, hostname stpetersburg-home-envoy-gateway). Only reachable
# from tailnet-connected machines — Cloudflare proxy must stay disabled.
---
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: vllm
  namespace: ai
  labels:
    dns-target: cloudflare
spec:
  endpoints:
    - dnsName: "${LOCATION}-vllm.${COMMON_DOMAIN}"
      recordType: A
      targets:
        - "100.81.186.108"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
