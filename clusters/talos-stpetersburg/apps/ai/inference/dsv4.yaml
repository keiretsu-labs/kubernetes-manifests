# DeepSeek-V4-Flash on the DGX Sparks — multi-node TP=2 over the 200G RDMA rail.
#
# Model: 0xSero/DeepSeek-V4-Flash-180B (deepseek_v4 arch, FP8 block-scaled, ~103GB).
#   Chosen over the full 284B flagship because 103GB / 2 = ~52GB/node leaves ~35GB/node
#   for the 1M-token KV cache — so FULL 1M context fits OOM-safely. The flagship (~160GB,
#   ~80GB/node) left <15GB/node and could not hold 1M without OOM risk.
# Image: aidendle94/sparkrun-vllm-ds4-gb10:production-ready (recipe image — vLLM 0.21.1,
#   b12x MoE kernels, deepseek_v4 tokenizer/tool/reasoning parsers, multi-node entrypoint).
#
# Topology: dsv4-head (spark-0, rank 0, serves :8000) + dsv4-worker (spark-1, rank 1,
#   headless). NCCL all-reduce runs over the ConnectX-7 rail (mlx5_1 / eth2,
#   192.168.74.1 <-> .2, RoCEv2). hostNetwork + privileged + /dev/infiniband mounts because
#   the k8s RDMA device-plugin reports "0 devices" on this hardware (see rdma-shared-dp note).
#
# OOM-safety (the hard constraint): util 0.70 (~87GB GPU view) + Guaranteed QoS limit 92Gi
#   (request==limit) so the kernel evicts co-tenants before vLLM. ~52GB weights + ~30GB KV +
#   ~5GB overhead. ClickHouse is descheduled (clusters/common/apps/clickhouse) to clear the
#   ~16Gi burst that previously caused OOMs on spark-1. shm 16Gi (NOT the recipe's 64GB — that
#   would compete with weights on a 128GB unified-memory node).
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dsv4-download-script
  namespace: ai
data:
  download.py: |
    import glob, os
    from huggingface_hub import snapshot_download, hf_hub_download
    token = os.environ.get('HUGGING_FACE_HUB_TOKEN')
    repo, path = '0xSero/DeepSeek-V4-Flash-180B', '/models/dsv4-180b'
    has_config = os.path.exists(os.path.join(path, 'config.json'))
    has_weights = bool(glob.glob(os.path.join(path, '*.safetensors')))
    if not (has_config and has_weights):
        print(f'Downloading {repo} (config={has_config}, weights={has_weights})...', flush=True)
        snapshot_download(repo_id=repo, local_dir=path, token=token, max_workers=4)
        print(f'Done: {repo}', flush=True)
    else:
        print(f'Already cached: {repo}', flush=True)
    # The repo's snapshot sometimes lands without the (tiny) HF tokenizer files,
    # which vLLM needs — DSV4-Flash otherwise only ships the raw encoding_dsv4.py.
    # Ensure them explicitly (idempotent, no weight re-pull).
    for f in ('tokenizer.json', 'tokenizer_config.json'):
        dst = os.path.join(path, f)
        if not os.path.exists(dst):
            print(f'Fetching missing {f}...', flush=True)
            import shutil
            shutil.copy(hf_hub_download(repo, f, token=token), dst)
    print('Tokenizer files present.', flush=True)
---
# Per-node weight PVCs (each node loads its TP shard from a full local copy of the checkpoint).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dsv4-head-models
  namespace: ai
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 200Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dsv4-worker-models
  namespace: ai
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 200Gi
---
# ─────────────────────────── HEAD (rank 0, spark-0, serves :8000) ───────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dsv4-head
  namespace: ai
  labels: { app: dsv4, role: head }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: dsv4, role: head }
  template:
    metadata:
      labels: { app: dsv4, role: head }
    spec:
      hostNetwork: true
      hostIPC: true
      dnsPolicy: ClusterFirstWithHostNet
      enableServiceLinks: false
      nodeSelector:
        kubernetes.io/hostname: spark-0
      terminationGracePeriodSeconds: 120
      initContainers:
      - name: download-models
        image: aidendle94/sparkrun-vllm-ds4-gb10:production-ready
        command: [python3, /scripts/download.py]
        env:
        - { name: HUGGING_FACE_HUB_TOKEN, valueFrom: { secretKeyRef: { name: hf-secret, key: HF_TOKEN } } }
        - { name: HF_HOME, value: "/models/huggingface" }
        # The recipe image bakes HF_HUB_OFFLINE=1 (self-contained/offline by default).
        # Override here so the init container can actually fetch the checkpoint.
        - { name: HF_HUB_OFFLINE, value: "0" }
        - { name: TRANSFORMERS_OFFLINE, value: "0" }
        volumeMounts:
        - { name: models, mountPath: /models }
        - { name: download-script, mountPath: /scripts }
        resources:
          requests: { memory: "4Gi", cpu: "2000m" }
          limits: { memory: "8Gi" }
      - name: drop-caches
        image: busybox:1.38
        command: [sh, -c, "sync && echo 3 > /proc/sys/vm/drop_caches && echo dropped"]
        securityContext: { privileged: true }
        resources:
          requests: { memory: "16Mi", cpu: "100m" }
          limits: { memory: "32Mi" }
      containers:
      - name: vllm
        image: aidendle94/sparkrun-vllm-ds4-gb10:production-ready
        command: [bash, -c]
        args:
        - |
          exec /usr/local/bin/dsv4-vllm-entrypoint serve /models/dsv4-180b \
            --served-model-name DeepSeek-V4-Flash deepseek-v4-flash \
            --host 0.0.0.0 --port 8000 --trust-remote-code \
            --tensor-parallel-size 2 --pipeline-parallel-size 1 \
            --kv-cache-dtype fp8 --block-size 256 \
            --max-model-len 1000000 --max-num-seqs 6 --max-num-batched-tokens 8192 \
            --gpu-memory-utilization 0.70 \
            --enable-prefix-caching \
            --tokenizer-mode auto \
            --tool-call-parser deepseek_v4 --enable-auto-tool-choice \
            --reasoning-parser deepseek_v4 \
            --distributed-executor-backend mp \
            --nnodes 2 --node-rank 0 \
            --master-addr 192.168.74.1 --master-port 25000
        ports:
        - { containerPort: 8000, name: http, protocol: TCP }
        env:
        - { name: NODE_RANK, value: "0" }
        - { name: MASTER_ADDR, value: "192.168.74.1" }
        # b12x fused-MoE kernel only supports the official 256-expert layout; the
        # 180B variant has 160 experts ("Unsupported expert number: 160"), so use
        # the standard fused-MoE kernel (arbitrary expert count, slightly slower prefill).
        - { name: VLLM_USE_B12X_MOE, value: "0" }
        - { name: VLLM_ALLOW_LONG_MAX_MODEL_LEN, value: "1" }
        - { name: VLLM_SPARSE_INDEXER_MAX_LOGITS_MB, value: "256" }
        - { name: PYTORCH_CUDA_ALLOC_CONF, value: "expandable_segments:True" }
        # RoCEv2 over the rail. GID index 3 = RoCE v2 with the rail IPv4 (192.168.74.x),
        # verified from the device GID table. This NCCL build is IB-only (socket NET
        # plugin won't init), so IB must work. GDR disabled (NCCL_NET_GDR_LEVEL=0):
        # the GB10's unified LPDDR5X confuses GPUDirect RDMA, which hung the collective
        # — force host-buffer staging instead.
        - { name: NCCL_SOCKET_IFNAME, value: "eth2" }
        - { name: GLOO_SOCKET_IFNAME, value: "eth2" }
        - { name: NCCL_IB_HCA, value: "mlx5_1" }
        - { name: NCCL_IB_GID_INDEX, value: "3" }
        - { name: NCCL_IB_DISABLE, value: "0" }
        - { name: NCCL_NET_GDR_LEVEL, value: "0" }
        - { name: NCCL_IB_TIMEOUT, value: "22" }
        - { name: NCCL_DEBUG, value: "INFO" }
        - { name: HUGGING_FACE_HUB_TOKEN, valueFrom: { secretKeyRef: { name: hf-secret, key: HF_TOKEN } } }
        - { name: HF_HOME, value: "/models/huggingface" }
        - { name: VLLM_COMPILE_CACHE_DIR, value: "/models/compile-cache" }
        - { name: VLLM_CACHE_ROOT, value: "/models/vllm-cache" }
        securityContext:
          privileged: true
          capabilities:
            add: ["IPC_LOCK", "SYS_RESOURCE"]
        resources:
          requests: { memory: "92Gi", cpu: "8000m", nvidia.com/gpu: "1" }
          limits: { memory: "92Gi", nvidia.com/gpu: "1" }
        volumeMounts:
        - { name: models, mountPath: /models }
        - { name: shm, mountPath: /dev/shm }
        - { name: infiniband, mountPath: /dev/infiniband }
        - { name: sys-ib, mountPath: /sys/class/infiniband }
        startupProbe:
          httpGet: { path: /health, port: http }
          initialDelaySeconds: 120
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 120
        livenessProbe:
          httpGet: { path: /health, port: http }
          initialDelaySeconds: 600
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 5
      volumes:
      - { name: models, persistentVolumeClaim: { claimName: dsv4-head-models } }
      - { name: download-script, configMap: { name: dsv4-download-script } }
      - { name: shm, emptyDir: { medium: Memory, sizeLimit: 16Gi } }
      - { name: infiniband, hostPath: { path: /dev/infiniband } }
      - { name: sys-ib, hostPath: { path: /sys/class/infiniband } }
---
# ─────────────────────────── WORKER (rank 1, spark-1, headless) ───────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dsv4-worker
  namespace: ai
  labels: { app: dsv4, role: worker }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: dsv4, role: worker }
  template:
    metadata:
      labels: { app: dsv4, role: worker }
    spec:
