---
# Cluster-internal Service → head pod (serves the OpenAI API). hostNetwork pods are still
# selectable by a Service. The ai-gateway Backend is repointed here (vllm-route.yaml).
apiVersion: v1
kind: Service
metadata:
  name: dsv4
  namespace: ai
  labels: { app: dsv4 }
spec:
  type: ClusterIP
  selector: { app: dsv4, role: head }
  ports:
  - { name: http, port: 8000, protocol: TCP, targetPort: 8000 }
