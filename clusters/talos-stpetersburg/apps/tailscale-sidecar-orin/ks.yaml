---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app tailscale-sidecar-orin
  namespace: flux-system
spec:
  targetNamespace: tailscale-examples
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  path: ./clusters/${CLUSTER_NAME}/apps/tailscale-sidecar-orin/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: kubernetes-manifests
    namespace: flux-system
  wait: false
  interval: 30m
  retryInterval: 1m
  timeout: 5m
