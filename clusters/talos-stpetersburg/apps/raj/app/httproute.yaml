---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: raj-openclaw
  annotations:
    item.homer.rajsingh.info/name: OpenClaw (raj)
    item.homer.rajsingh.info/subtitle: Personal AI agent
    item.homer.rajsingh.info/logo: https://avatars.githubusercontent.com/u/openclaw-rocks
    item.homer.rajsingh.info/keywords: ai, agent, openclaw, raj
    service.homer.rajsingh.info/name: AI
    service.homer.rajsingh.info/icon: fas fa-robot
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: ts
      namespace: home
  hostnames:
    - openclaw.${CLUSTER_DOMAIN}
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: raj
          port: 18789
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
