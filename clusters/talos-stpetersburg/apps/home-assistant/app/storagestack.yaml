---
apiVersion: storage.keiretsu.ts.net/v1alpha1
kind: StorageStack
metadata:
  name: homeassistant-config
  labels:
    keiretsu.ts.net/location: stpetersburg
spec:
  name: homeassistant-config
  size: 10Gi
  storageClass: local-path
  # Tailscale FQDN reachable via UDM (LAN default route) → Tailscale subnet
  # routes → Garage. Avoids the cluster-DNS dependency that pinned us to
  # using kube-dns + service-CIDR routing from a Multus macvlan pod.
  s3Endpoint: garage.keiretsu.ts.net:3900
  s3Path: home-assistant/config
  schedule: "0 12 * * *"
  copyMethod: Direct
  restorePaused: true
  restorePrevious: 1
