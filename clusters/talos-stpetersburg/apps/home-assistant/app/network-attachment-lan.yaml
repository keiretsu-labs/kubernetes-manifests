---
# Multus NetworkAttachmentDefinition: macvlan side-leg on eth0 with DHCP IPAM
# from the LAN's UDM, chained with Spiderpool's coordinator plugin which
# reconciles routing against the primary CNI (Cilium). The coordinator:
#   - preserves Cilium's default route + cluster service routing
#   - moves the macvlan default into a per-source policy table
#   - sets rp_filter=0 so reverse-path doesn't drop reply traffic on the
#     "wrong" interface
#   - reads the cluster pod/service CIDRs from the SpiderCoordinator/default
#     CR (10.5.0.0/16 + 10.4.0.0/16)
#
# Replaces the route-fix init container that previously had to hand-patch
# /16 routes inside every pod.
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: lan
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "name": "lan",
      "plugins": [
        {
          "type": "macvlan",
          "master": "eth0",
          "mode": "bridge",
          "ipam": {
            "type": "dhcp"
          }
        },
        {
          "type": "coordinator",
          "mode": "overlay",
          "podCIDRType": "cluster",
          "tunePodRoutes": true
        }
      ]
    }
