---
# Tailscale-operator-managed egress to Aperture (the tailnet-hosted AI gateway
# in front of vLLM / multi-model routing). HA reaches it at
# http://aperture.home-assistant.svc.cluster.local/v1 — the operator updates
# externalName from "placeholder" to the actual ProxyGroup endpoint after
# admission.
apiVersion: v1
kind: Service
metadata:
  name: aperture
  annotations:
    tailscale.com/tailnet-fqdn: aperture.keiretsu.ts.net
    tailscale.com/proxy-group: common-egress
spec:
  externalName: placeholder
  type: ExternalName
  ports:
    - name: http
      port: 80
      protocol: TCP
