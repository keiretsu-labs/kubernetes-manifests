---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: music-assistant
spec:
  replicas: 1
  serviceName: music-assistant
  selector:
    matchLabels:
      app: music-assistant
  template:
    metadata:
      labels:
        app: music-assistant
      annotations:
        # macvlan side-leg + default-route on LAN. MA's stream-server
        # auto-detects its publish IP via getsockname() on a UDP socket to
        # 8.8.8.8 — with the default route on the LAN iface, that returns
        # the 192.168.73.x address Sonos can fetch from. Also gives the
        # Sonos UPnP/SSDP discovery a real LAN identity.
        k8s.v1.cni.cncf.io/networks: |
          [{"name":"lan","namespace":"home-assistant","default-route":["192.168.73.1"]}]
    spec:
      initContainers:
        # See HA statefulset for explanation — pins cluster CIDRs to eth0
        # so they don't get racetracked through the macvlan default route.
        - name: route-fix
          image: busybox:1.36
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
          command:
            - sh
            - -c
            - |
              set -e
              GW=$(ip -4 route show default 2>/dev/null | awk '/dev eth0/ {print $3; exit}')
              echo "Cilium gateway: $GW"
              [ -n "$GW" ] || { echo "no eth0 default route, bailing"; exit 1; }
              ip route add 10.4.0.0/16 via "$GW" dev eth0 2>/dev/null || true
              ip route add 10.5.0.0/16 via "$GW" dev eth0 2>/dev/null || true
              echo "Added cluster routes via $GW"; ip route show
        - name: restic-restore
          image: restic/restic:0.18.0
          command:
            - /bin/sh
            - -c
            - |
              set -e
              if restic snapshots --json --last 1 2>/dev/null | grep -q '"id"'; then
                echo "Restoring latest snapshot into /data"
                restic restore latest --target /data
                echo "Restore complete"
              else
                echo "No snapshots in repo (first boot or empty), starting fresh"
              fi
          envFrom:
            - secretRef:
                name: restic-musicassistant-data
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: music-assistant
          image: ghcr.io/music-assistant/server:2.8.7
          securityContext:
            capabilities:
              add:
                - SYS_ADMIN
                - DAC_READ_SEARCH
          env:
            - name: TZ
              value: ${TIMEZONE}
            - name: LOG_LEVEL
              value: info
          ports:
            - name: http
              containerPort: 8095
            - name: stream
              containerPort: 8097
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: musicassistant-data
