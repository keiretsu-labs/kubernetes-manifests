---
# AirConnect — bridges AirPlay senders (iPhone, Mac, Music Assistant's AirPlay
# provider) to UPnP/DLNA devices like the Sonos Playbar group, which doesn't
# speak AirPlay 2 natively. airupnp advertises each Sonos as an AirPlay 2
# endpoint on the LAN via mDNS.
#
# Multus macvlan side-leg gives the pod its own LAN IP/MAC, so airupnp and
# aircast can mDNS-advertise from a unique identity without competing with
# the host or other pods. -b is omitted now that auto-detect will pick the
# macvlan iface (default route is on the LAN). Pod is free to schedule
# anywhere — no nodeSelector needed.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airconnect
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: airconnect
  template:
    metadata:
      labels:
        app: airconnect
      annotations:
        k8s.v1.cni.cncf.io/networks: |
          [{"name":"lan","namespace":"home-assistant","default-route":["192.168.73.1"]}]
    spec:
      initContainers:
        # See HA statefulset — pin cluster /16s to eth0 so socketLB's
        # destination-rewrites route correctly.
        - name: route-fix
          image: busybox:1.36
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
          command:
            - sh
            - -c
            - |
              set -e
              GW=$(ip -4 route show default 2>/dev/null | awk '/dev eth0/ {print $3; exit}')
              [ -n "$GW" ] || { echo "no eth0 default route"; exit 1; }
              ip route add 10.4.0.0/16 via "$GW" dev eth0 2>/dev/null || true
              ip route add 10.5.0.0/16 via "$GW" dev eth0 2>/dev/null || true
      containers:
        - name: airconnect
          image: 1activegeek/airconnect:1.9.3
          env:
            # -l 500:1000   audio pre-buffer window in ms
            # -r 44100      lock sample rate (Sonos native, no resample)
            - name: AIRUPNP_OPTS
              value: "-l 500:1000 -r 44100"
            - name: AIRCAST_OPTS
              value: ""
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
