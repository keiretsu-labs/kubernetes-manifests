---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app home-assistant
  namespace: flux-system
spec:
  targetNamespace: home-assistant
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  path: ./clusters/${CLUSTER_NAME}/apps/home-assistant/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: kubernetes-manifests
    namespace: flux-system
  wait: false
  interval: 5m
  retryInterval: 1m
  timeout: 5m
