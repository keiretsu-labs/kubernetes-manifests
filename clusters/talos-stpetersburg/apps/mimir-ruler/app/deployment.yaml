---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mimir-ruler
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mimir-ruler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mimir-ruler
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: copy-rules
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              rm -rf /data/rules
              mkdir -p /data/rules/talos-stpetersburg
              cp /rules-source/*.yaml /data/rules/talos-stpetersburg/
          volumeMounts:
            - name: rules-source
              mountPath: /rules-source
            - name: data
              mountPath: /data
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
      containers:
        - name: ruler
          image: grafana/mimir:3.0.4
          args:
            - -target=ruler
            - -config.file=/conf/mimir.yaml
          workingDir: /data
          ports:
            - name: http-metrics
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /ready
              port: http-metrics
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http-metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /conf
              readOnly: true
            - name: rules-source
              mountPath: /rules-source
              readOnly: true
            - name: data
              mountPath: /data
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: mimir-ruler-config
        - name: rules-source
          configMap:
            name: mimir-ruler-rules
        - name: data
          emptyDir: {}