---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rdma-shared-dp
  namespace: rdma-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rdma-shared-dp
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rdma-shared-dp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: rdma-shared-dp
subjects:
  - kind: ServiceAccount
    name: rdma-shared-dp
    namespace: rdma-system
