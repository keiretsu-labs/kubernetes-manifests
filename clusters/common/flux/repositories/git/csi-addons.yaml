---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: csi-addons
  namespace: flux-system
spec:
  interval: 30m
  url: https://github.com/csi-addons/kubernetes-csi-addons
  ref:
    # Pin to a release tag. The controller manifests live in ./deploy/controller
    # (crds.yaml, rbac.yaml, setup-controller.yaml, csi-addons-config.yaml).
    # Bump this tag AND the ROOK_CSIADDONS_IMAGE / csi.csiAddons sidecar tag together.
    tag: v0.14.0
  ignore: |
    # only need the controller deploy manifests
    /*
    !/deploy/controller
