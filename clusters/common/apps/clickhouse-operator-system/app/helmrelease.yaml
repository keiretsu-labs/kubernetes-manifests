---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: clickhouse-operator
spec:
  interval: 30m
  chart:
    spec:
      chart: altinity-clickhouse-operator
      version: 0.27.0
      sourceRef:
        kind: HelmRepository
        name: clickhouse
        namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    # Keep the resource name aligned with the existing ServiceMonitor selector
    # (app.kubernetes.io/name: clickhouse-operator).
    nameOverride: clickhouse-operator
    metrics:
      enabled: true
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: monitoring
