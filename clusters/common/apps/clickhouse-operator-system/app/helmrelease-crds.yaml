---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: clickhouse-operator-crds
spec:
  interval: 30m
  chart:
    spec:
      chart: clickhouse-operator-crds
      version: v0.31.0
      sourceRef:
        kind: HelmRepository
        name: clickhouse
        namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 3
---
