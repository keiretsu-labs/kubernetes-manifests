---
# yaml-language-server: $schema=https://raw.githubusercontent.com/kashalls/kromgo/main/config.schema.json
apiVersion: v1
kind: ConfigMap
metadata:
  name: kromgo-config
data:
  config.yaml: |
    badge:
      font: Verdana.ttf
      size: 12

    metrics:
      - name: talos_version
        query: label_replace(node_os_info{name="Talos"}, "version_id", "$1", "version_id", "v(.+)")
        label: version_id
        title: Talos

      - name: kubernetes_version
        query: label_replace(kubernetes_build_info{service="kubernetes"}, "git_version", "$1", "git_version", "v(.+)")
        label: git_version
        title: Kubernetes

      - name: tailscale_operator_version
        query: label_replace(gotk_resource_info{name="tailscale-operator"}, "chart_app_version", "$1", "chart_app_version", "[vV](.*)")
        label: chart_app_version
        title: Tailscale

      - name: cluster_node_count
        query: count(count by (node) (kube_node_labels))
        colors:
          - {color: "green", min: 0, max: 9999}
        title: Nodes

      - name: cluster_pod_count
        query: sum(kubelet_running_pods)
        colors:
          - {color: "green", min: 0, max: 9999}
        title: Pods

      - name: cluster_cpu_usage
        query: round(avg(instance:node_cpu_utilisation:rate5m) * 100, 0.1)
        suffix: "%"
        colors:
          - {color: "green", min: 0, max: 35}
          - {color: "orange", min: 36, max: 75}
          - {color: "red", min: 76, max: 9999}
        title: CPU

      - name: cluster_memory_usage
        query: round(sum(node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / sum(node_memory_MemTotal_bytes) * 100, 0.1)
        suffix: "%"
        colors:
          - {color: "green", min: 0, max: 35}
          - {color: "orange", min: 36, max: 75}
          - {color: "red", min: 76, max: 9999}
        title: Memory

      - name: cluster_uptime_days
        query: round((time() - min(node_boot_time_seconds)) / 86400)
        suffix: "d"
        colors:
          - {color: "green", min: 0, max: 180}
          - {color: "orange", min: 181, max: 360}
          - {color: "red", min: 361, max: 9999}
        title: Uptime

      - name: cluster_alert_count
        query: clamp_min(alertmanager_alerts{state="active"} - 1, 0)
        colors:
          - {color: "green", min: 0, max: 0}
          - {color: "red", min: 1, max: 9999}
        title: Alerts
