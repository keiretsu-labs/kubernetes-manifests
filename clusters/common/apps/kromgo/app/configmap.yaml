---
# yaml-language-server: $schema=https://raw.githubusercontent.com/kashalls/kromgo/main/config.schema.json
apiVersion: v1
kind: ConfigMap
metadata:
  name: kromgo-config
data:
  config.yaml: |
    badge:
      font: Verdana.ttf
      size: 12

    metrics:
      - name: talos_version
        query: label_replace(node_os_info{name="Talos"}, "version_id", "$1", "version_id", "v(.+)")
        label: version_id
        title: Talos

      - name: kubernetes_version
        query: label_replace(kubernetes_build_info{service="kubernetes"}, "git_version", "$1", "git_version", "v(.+)")
        label: git_version
        title: Kubernetes

      - name: tailscale_operator_version
        query: label_replace(gotk_resource_info{name="tailscale-operator"}, "chart_app_version", "$1", "chart_app_version", "[vV](.*)")
        label: chart_app_version
        title: Tailscale
