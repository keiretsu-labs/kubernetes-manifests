---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openclaw-operator
spec:
  interval: 30m
  chart:
    spec:
      chart: openclaw-operator
      version: 0.25.0
      sourceRef:
        kind: HelmRepository
        name: openclaw-operator
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    serviceMonitor:
      enabled: true
