---
# SearXNG meta-search backend used by AI agents.
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: app-searxng
  namespace: searxng
spec:
  jobName: blackbox
  module: http_2xx
  prober:
    url: blackbox-exporter.monitoring.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        - http://searxng.searxng:8080/healthz
      labels:
        service: searxng
        target: searxng
---
# Valkey (Redis-compat) backing store for SearXNG.
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: app-valkey
  namespace: searxng
spec:
  jobName: blackbox
  module: tcp_connect
  prober:
    url: blackbox-exporter.monitoring.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        - valkey.searxng:6379
      labels:
        service: searxng
        target: valkey
