---
# StorageStack RGD — volsync backup/restore lifecycle for a PVC
# Creates: GarageKey (S3 creds + restic secret) + optional GarageBucket +
#          PVC (plain, no dataSourceRef — safe to adopt existing PVCs) +
#          ReplicationDestination (Direct restore into destinationPVC) +
#          ReplicationSource (backup)
#
# restorePaused (default: true):
#   true  — restore paused; safe default for new apps and existing PVC adoption.
#           Unset to false + change the manual trigger token to run a restore.
#   false — restore enabled when trigger fires. Stop the app first to avoid
#           writing into a live PVC.
#
# copyMethod: controls how the backup ReplicationSource snapshots the source PVC.
#   Snapshot (default) — takes a VolumeSnapshot before backing up (consistent,
#                        app stays running during backup)
#   Direct             — reads the live PVC directly (simpler, may capture
#                        in-flight writes)
#
# backupPaused: pause the ReplicationSource (default false).
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: storagestack
  annotations:
    kro.run/allow-breaking-changes: "true"
spec:
  schema:
    group: storage.keiretsu.ts.net
    apiVersion: v1alpha1
    kind: StorageStack
    scope: Namespaced
    additionalPrinterColumns:
    - name: Last Backup
      type: date
      jsonPath: .status.lastBackupTime
    - name: Last Restore
      type: date
      jsonPath: .status.lastRestoreTime
    spec:
      # Identity
      name: "string | required=true"
      # PVC config
      size: "string | default=5Gi"
      storageClass: "string | default=${STORAGECLASS_DEFAULT}"
      accessMode: "string | default=ReadWriteOnce"
      # Garage bucket
      bucketCreate: "boolean | default=false"
      bucketAlias: "string | default=keiretsu"
      bucketQuota: "string | default=100Gi"
      # S3/Restic
      s3Endpoint: "string | default=garage-global.garage.svc.cluster.local:3900"
      s3Path: "string | required=true"
      resticPassword: "string | default=${COMMON_RESTIC_SECRET}"
      # Backup schedule
      schedule: "string | required=true"
      pruneIntervalDays: "integer | default=14"
      # Retention
      retainHourly: "integer | default=1"
      retainDaily: "integer | default=3"
      retainWeekly: "integer | default=4"
      retainMonthly: "integer | default=2"
      retainYearly: "integer | default=1"
      # Backup copy method (Snapshot or Direct)
      copyMethod: "string | default=Snapshot"
      snapshotClass: "string | default=csi-rbdplugin-snapclass"
      backupPaused: "boolean | default=false"
      # Restore config
      restorePaused: "boolean | default=true"
      restorePrevious: "integer | default=0"
    status:
      secretName: $${garageKey.spec.secretTemplate.name}
      ready: $${garageKey.metadata.name != ""}
      lastRestoreTime: $${replicationDestination.status.lastSyncTime}
      lastBackupTime: $${replicationSource.status.lastSyncTime}

  resources:

  # --- GarageKey (always created) ---
  - id: garageKey
    readyWhen:
    - $${garageKey.status.phase == "Ready"}
    template:
      apiVersion: garage.rajsingh.info/v1alpha1
      kind: GarageKey
      metadata:
        name: $${"volsync-" + schema.spec.name + "-key"}
      spec:
        clusterRef:
          name: garage
          namespace: garage
        name: $${"Volsync " + schema.spec.name + " Key"}
        secretTemplate:
          name: $${"restic-" + schema.spec.name}
          accessKeyIdKey: AWS_ACCESS_KEY_ID
          secretAccessKeyKey: AWS_SECRET_ACCESS_KEY
          includeEndpoint: false
          includeRegion: false
          additionalData:
            RESTIC_REPOSITORY: '$${"s3:http://" + schema.spec.s3Endpoint + "/" + schema.spec.bucketAlias + "/" + schema.metadata.labels["keiretsu.ts.net/location"] + "/" + schema.spec.s3Path}'
            RESTIC_PASSWORD: $${schema.spec.resticPassword}
        bucketPermissions:
        - globalAlias: $${schema.spec.bucketAlias}
          read: true
          write: true

  # --- GarageBucket (optional dedicated bucket) ---
  - id: garageBucket
    includeWhen:
    - $${schema.spec.bucketCreate}
    template:
      apiVersion: garage.rajsingh.info/v1alpha1
      kind: GarageBucket
      metadata:
        name: $${"volsync-" + schema.spec.name + "-bucket"}
      spec:
        clusterRef:
          name: garage
          namespace: garage
        globalAlias: $${schema.spec.bucketAlias}
        quotas:
          maxSize: $${schema.spec.bucketQuota}
          maxObjects: 1000000

  # --- PVC (always created, no dataSourceRef) ---
  # Plain PVC works for both fresh deployments and existing PVC adoption.
  # SSA update on an already-bound PVC is safe: immutable fields are not
  # changed, so Kubernetes accepts the apply without error.
  - id: pvc
    template:
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: $${schema.spec.name}
      spec:
        accessModes:
        - $${schema.spec.accessMode}
        resources:
          requests:
            storage: $${schema.spec.size}
        storageClassName: $${schema.spec.storageClass}

  # --- ReplicationDestination (Direct restore into the PVC) ---
  # Direct mode writes the restic backup into destinationPVC without needing
  # a dataSourceRef, so it works on both new and pre-existing bound PVCs.
  # Stop the app before unpausing to avoid writing into a live volume.
  - id: replicationDestination
    template:
      apiVersion: volsync.backube/v1alpha1
      kind: ReplicationDestination
      metadata:
        name: $${schema.spec.name}
      spec:
        trigger:
          manual: restore-once
        paused: $${schema.spec.restorePaused}
        restic:
          repository: $${garageKey.status.secretRef.name}
          destinationPVC: $${pvc.metadata.name}
          copyMethod: Direct
          previous: $${schema.spec.restorePrevious}

  # --- ReplicationSource (backup) ---
  # copyMethod controls how volsync reads the source PVC:
  #   Snapshot — quiesces to a VolumeSnapshot first (consistent, recommended)
  #   Direct   — reads the live PVC (simpler, no snapshot overhead)
  - id: replicationSource
    template:
      apiVersion: volsync.backube/v1alpha1
      kind: ReplicationSource
      metadata:
        name: $${schema.spec.name}
      spec:
        sourcePVC: $${schema.spec.name}
        paused: $${schema.spec.backupPaused}
        trigger:
          schedule: $${schema.spec.schedule}
        restic:
          pruneIntervalDays: $${schema.spec.pruneIntervalDays}
          repository: $${garageKey.status.secretRef.name}
          retain:
            hourly: $${schema.spec.retainHourly}
            daily: $${schema.spec.retainDaily}
            weekly: $${schema.spec.retainWeekly}
            monthly: $${schema.spec.retainMonthly}
            yearly: $${schema.spec.retainYearly}
          copyMethod: $${schema.spec.copyMethod}
          volumeSnapshotClassName: $${schema.spec.snapshotClass}
