---
# ServiceIngress RGD — generates Tailscale LoadBalancer services for cross-cluster connectivity
# Creates a per-node VIP (always) and optional global VIP (same hostname across all clusters)
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: serviceingress
  annotations:
    kro.run/allow-breaking-changes: "true"
spec:
  schema:
    group: network.keiretsu.ts.net
    apiVersion: v1alpha1
    kind: ServiceIngress
    scope: Namespaced
    types:
      PortSpec:
        name: "string | required=true"
        port: "integer | required=true"
        protocol: "string | default=TCP"
        targetPort: "integer"
      GlobalSpec:
        enabled: "boolean | default=false"
        hostname: "string | default=''"
        tags: "string | default=tag:k8s"
        ports: "[]PortSpec"
        proxyGroup: "string | default=common-ingress"
    spec:
      selector: "object"
      ports: "[]PortSpec"
      hostname: "string | required=true"
      proxyGroup: "string | default=common-ingress"
      publishNotReadyAddresses: "boolean | default=false"
      global: "GlobalSpec"
    status:
      serviceName: ${perNodeService.metadata.name}
      ready: ${perNodeService.metadata.name != ""}
      fqdn: '${schema.metadata.labels["keiretsu.ts.net/location"] + "-" + schema.spec.hostname + ".keiretsu.ts.net"}'
  resources:
  - id: perNodeService
    template:
      apiVersion: v1
      kind: Service
      metadata:
        name: ${schema.metadata.name + "-ts"}
        annotations:
          tailscale.com/hostname: '${schema.metadata.labels["keiretsu.ts.net/location"] + "-" + schema.spec.hostname}'
          tailscale.com/tags: '${"tag:k8s,tag:" + schema.metadata.labels["keiretsu.ts.net/location"]}'
          tailscale.com/proxy-group: ${schema.spec.proxyGroup}
      spec:
        publishNotReadyAddresses: ${schema.spec.publishNotReadyAddresses}
        selector: ${schema.spec.selector}
        type: LoadBalancer
        loadBalancerClass: tailscale
        ports: ${schema.spec.ports}
  - id: globalService
    includeWhen:
    - ${schema.spec.global.enabled}
    template:
      apiVersion: v1
      kind: Service
      metadata:
        name: ${schema.metadata.name + "-global-ts"}
        annotations:
          tailscale.com/hostname: ${schema.spec.global.hostname}
          tailscale.com/tags: ${schema.spec.global.tags}
          tailscale.com/proxy-group: ${schema.spec.global.proxyGroup}
      spec:
        publishNotReadyAddresses: ${schema.spec.publishNotReadyAddresses}
        selector: ${schema.spec.selector}
        type: LoadBalancer
        loadBalancerClass: tailscale
        ports: ${schema.spec.global.ports}
