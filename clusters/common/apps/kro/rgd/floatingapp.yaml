---
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: floatingapp
spec:
  schema:
    group: apps.keiretsu.ts.net
    apiVersion: v1alpha1
    kind: FloatingApp
    scope: Namespaced
    spec:
      name: "string"
      image: "string"
      port: "integer"
      replicas: "integer | default=1"
      tailscaleHostname: "string"
      tailscaleTags: "string | default=tag:k8s"
      # CSI-S3 volumes (up to 2)
      volumeName: "string | default="
      volumeSize: "string | default=5Gi"
      volumeMountPath: "string | default=/data"
      volume2Name: "string | default="
      volume2Size: "string | default=5Gi"
      volume2MountPath: "string | default=/data2"
    status:
      ready: ${deployment.status.availableReplicas > 0}
  resources:

  # --- Deployment (no volumes) ---
  - id: deployment
    includeWhen:
    - ${schema.spec.volumeName == ""}
    template:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: ${schema.spec.name}
        labels:
          app.keiretsu.ts.net/floating: "true"
      spec:
        replicas: ${schema.spec.replicas}
        selector:
          matchLabels:
            app: ${schema.spec.name}
        strategy:
          type: Recreate
        template:
          metadata:
            labels:
              app: ${schema.spec.name}
          spec:
            containers:
            - name: ${schema.spec.name}
              image: ${schema.spec.image}
              ports:
              - name: http
                containerPort: ${schema.spec.port}
                protocol: TCP

  # --- Deployment (1 volume) ---
  - id: deploymentVol1
    includeWhen:
    - ${schema.spec.volumeName != "" && schema.spec.volume2Name == ""}
    template:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: ${schema.spec.name}
        labels:
          app.keiretsu.ts.net/floating: "true"
      spec:
        replicas: ${schema.spec.replicas}
        selector:
          matchLabels:
            app: ${schema.spec.name}
        strategy:
          type: Recreate
        template:
          metadata:
            labels:
              app: ${schema.spec.name}
          spec:
            containers:
            - name: ${schema.spec.name}
              image: ${schema.spec.image}
              ports:
              - name: http
                containerPort: ${schema.spec.port}
                protocol: TCP
              volumeMounts:
              - name: ${schema.spec.volumeName}
                mountPath: ${schema.spec.volumeMountPath}
            volumes:
            - name: ${schema.spec.volumeName}
              persistentVolumeClaim:
                claimName: ${schema.spec.name + "-" + schema.spec.volumeName}

  # --- Deployment (2 volumes) ---
  - id: deploymentVol2
    includeWhen:
    - ${schema.spec.volume2Name != ""}
    template:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: ${schema.spec.name}
        labels:
          app.keiretsu.ts.net/floating: "true"
      spec:
        replicas: ${schema.spec.replicas}
        selector:
          matchLabels:
            app: ${schema.spec.name}
        strategy:
          type: Recreate
        template:
          metadata:
            labels:
              app: ${schema.spec.name}
          spec:
            containers:
            - name: ${schema.spec.name}
              image: ${schema.spec.image}
              ports:
              - name: http
                containerPort: ${schema.spec.port}
                protocol: TCP
              volumeMounts:
              - name: ${schema.spec.volumeName}
                mountPath: ${schema.spec.volumeMountPath}
              - name: ${schema.spec.volume2Name}
                mountPath: ${schema.spec.volume2MountPath}
            volumes:
            - name: ${schema.spec.volumeName}
              persistentVolumeClaim:
                claimName: ${schema.spec.name + "-" + schema.spec.volumeName}
            - name: ${schema.spec.volume2Name}
              persistentVolumeClaim:
                claimName: ${schema.spec.name + "-" + schema.spec.volume2Name}

  # --- ClusterIP Service ---
  - id: service
    template:
      apiVersion: v1
      kind: Service
      metadata:
        name: ${schema.spec.name}
      spec:
        selector:
          app: ${schema.spec.name}
        ports:
        - name: http
          port: ${schema.spec.port}
          protocol: TCP
          targetPort: ${schema.spec.port}
        type: ClusterIP

  # --- Tailscale LB Ingress (exposes app onto tailnet) ---
  - id: tsIngress
    template:
      apiVersion: v1
      kind: Service
      metadata:
        name: ${schema.spec.name + "-ts"}
        annotations:
          tailscale.com/hostname: ${schema.spec.tailscaleHostname}
          tailscale.com/proxy-group: common-ingress
          tailscale.com/tags: ${schema.spec.tailscaleTags}
      spec:
        selector:
          app: ${schema.spec.name}
        ports:
        - name: http
          port: ${schema.spec.port}
          protocol: TCP
          targetPort: ${schema.spec.port}
        type: LoadBalancer
        loadBalancerClass: tailscale

  # --- CSI-S3 PV + PVC (volume 1) ---
  - id: pv1
    includeWhen:
    - ${schema.spec.volumeName != ""}
    template:
      apiVersion: v1
      kind: PersistentVolume
      metadata:
        name: ${schema.spec.name + "-" + schema.spec.volumeName}
      spec:
        capacity:
          storage: ${schema.spec.volumeSize}
        accessModes:
        - ReadWriteMany
        persistentVolumeReclaimPolicy: Retain
        claimRef:
          namespace: ${schema.metadata.namespace}
          name: ${schema.spec.name + "-" + schema.spec.volumeName}
        csi:
          driver: ru.yandex.s3.csi
          volumeHandle: ${"csi-s3/" + schema.spec.name + "-" + schema.spec.volumeName}
          volumeAttributes:
            mounter: geesefs
            options: "--memory-limit 1000 --dir-mode 0777 --file-mode 0666"
          nodePublishSecretRef:
            name: csi-s3-secret
            namespace: csi-s3

  - id: pvc1
    includeWhen:
    - ${schema.spec.volumeName != ""}
    template:
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: ${schema.spec.name + "-" + schema.spec.volumeName}
      spec:
        accessModes:
        - ReadWriteMany
        resources:
          requests:
            storage: ${schema.spec.volumeSize}
        volumeName: ${schema.spec.name + "-" + schema.spec.volumeName}
        storageClassName: ""

  # --- CSI-S3 PV + PVC (volume 2) ---
  - id: pv2
    includeWhen:
    - ${schema.spec.volume2Name != ""}
    template:
      apiVersion: v1
      kind: PersistentVolume
      metadata:
        name: ${schema.spec.name + "-" + schema.spec.volume2Name}
      spec:
        capacity:
          storage: ${schema.spec.volume2Size}
        accessModes:
        - ReadWriteMany
        persistentVolumeReclaimPolicy: Retain
        claimRef:
          namespace: ${schema.metadata.namespace}
          name: ${schema.spec.name + "-" + schema.spec.volume2Name}
        csi:
          driver: ru.yandex.s3.csi
          volumeHandle: ${"csi-s3/" + schema.spec.name + "-" + schema.spec.volume2Name}
          volumeAttributes:
            mounter: geesefs
            options: "--memory-limit 1000 --dir-mode 0777 --file-mode 0666"
          nodePublishSecretRef:
            name: csi-s3-secret
            namespace: csi-s3

  - id: pvc2
    includeWhen:
    - ${schema.spec.volume2Name != ""}
    template:
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: ${schema.spec.name + "-" + schema.spec.volume2Name}
      spec:
        accessModes:
        - ReadWriteMany
        resources:
          requests:
            storage: ${schema.spec.volume2Size}
        volumeName: ${schema.spec.name + "-" + schema.spec.volume2Name}
        storageClassName: ""
