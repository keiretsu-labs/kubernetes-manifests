---
# OCM bootstrap kubeconfig for hub connectivity
# Auth handled by Tailscale k8s-operator proxy impersonation
# Token is unused — the TS proxy strips it and impersonates based on Tailscale identity
# CSRs must be approved manually (one-time) since the impersonated identity
# doesn't match the autoApproveUsers list
apiVersion: v1
kind: Secret
metadata:
  name: ocm-bootstrap-kubeconfig
  namespace: open-cluster-management-agent
type: Opaque
stringData:
  bootstrapHubKubeConfig: |
    apiVersion: v1
    kind: Config
    clusters:
      - cluster:
          server: https://ottawa-k8s-operator.keiretsu.ts.net
        name: hub
    contexts:
      - context:
          cluster: hub
          user: bootstrap
        name: hub
    current-context: hub
    users:
      - name: bootstrap
        user:
          token: "unused"
