---
# OCM bootstrap kubeconfig for hub connectivity
# The bootstrap token must be generated on the hub cluster:
#   clusteradm get token --use-bootstrap-token
# Then set OCM_BOOTSTRAP_TOKEN in cluster-secrets
# Hub URL uses Tailscale k8s-operator proxy for cross-cluster connectivity
apiVersion: v1
kind: Secret
metadata:
  name: ocm-bootstrap-hub-kubeconfig
  namespace: open-cluster-management-agent
type: Opaque
stringData:
  bootstrapHubKubeConfig: |
    apiVersion: v1
    kind: Config
    clusters:
      - cluster:
          server: https://ottawa-k8s-operator.keiretsu.ts.net
          insecure-skip-tls-verify: true
        name: hub
    contexts:
      - context:
          cluster: hub
          user: bootstrap
        name: hub
    current-context: hub
    users:
      - name: bootstrap
        user:
          token: "${OCM_BOOTSTRAP_TOKEN}"
