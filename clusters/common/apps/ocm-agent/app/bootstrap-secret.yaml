---
# OCM bootstrap kubeconfig for hub connectivity
# Auth handled by Tailscale k8s-operator proxy impersonation
# The proxy impersonates based on the caller's Tailscale identity
# tag:k8s nodes get system:masters via the ACL policy
apiVersion: v1
kind: Secret
metadata:
  name: ocm-bootstrap-hub-kubeconfig
  namespace: open-cluster-management-agent
type: Opaque
stringData:
  bootstrapHubKubeConfig: |
    apiVersion: v1
    kind: Config
    clusters:
      - cluster:
          server: https://ottawa-k8s-operator.tailscale.svc.cluster.local
        name: hub
    contexts:
      - context:
          cluster: hub
          user: bootstrap
        name: hub
    current-context: hub
    users:
      - name: bootstrap
        user:
          token: unused
