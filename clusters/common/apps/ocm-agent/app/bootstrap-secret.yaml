---
# OCM bootstrap kubeconfig for hub connectivity
# Uses raw L4 TCP Tailscale LB (ocm-hub) — no impersonation, tokens pass through
# Bootstrap token pulled from Ottawa via ExternalSecret
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: kubernetes-ottawa-ocm
spec:
  provider:
    kubernetes:
      remoteNamespace: open-cluster-management
      server:
        url: https://ottawa-k8s-operator.keiretsu.ts.net
      auth:
        token:
          bearerToken:
            name: tailscale-api-token
            namespace: external-secrets
            key: token
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ocm-bootstrap-kubeconfig
  namespace: open-cluster-management-agent
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: kubernetes-ottawa-ocm
  target:
    name: ocm-bootstrap-kubeconfig
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        bootstrapHubKubeConfig: |
          apiVersion: v1
          kind: Config
          clusters:
            - cluster:
                server: https://kubernetes-ottawa.keiretsu.ts.net
                certificate-authority-data: 
              name: hub
          contexts:
            - context:
                cluster: hub
                user: bootstrap
              name: hub
          current-context: hub
          users:
            - name: bootstrap
              user:
                token: {{ .token }}
  data:
    - secretKey: token
      remoteRef:
        key: ocm-bootstrap-token
        property: token
