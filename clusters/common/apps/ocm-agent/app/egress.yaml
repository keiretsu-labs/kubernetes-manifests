---
# Egress service for OCM hub API server
# Klusterlet agents resolve ocm-hub.keiretsu.ts.net via the Tailscale nameserver
# This service registers the DNS record and routes traffic through the egress proxy
apiVersion: v1
kind: Service
metadata:
  name: ocm-hub
  namespace: tailscale
  annotations:
    kustomize.toolkit.fluxcd.io/ssa: merge
    tailscale.com/tailnet-fqdn: ocm-hub.keiretsu.ts.net
    tailscale.com/proxy-group: common-egress
spec:
  externalName: placeholder
  type: ExternalName
  ports:
  - name: https
    port: 443
    protocol: TCP
