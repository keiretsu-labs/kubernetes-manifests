---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homer-operator
  namespace: homer-operator 
spec:
  interval: 1m
  chart:
    spec:
      chart: homer-operator
      version: 1.1.0
      sourceRef:
        kind: HelmRepository
        name: homer-operator
        namespace: flux-system 
      interval: 1m
  releaseName: homer-operator
  valuesFrom:
    - kind: ConfigMap
      name: homer-operator-values
      valuesKey: values.yaml
      optional: false
  values:
    operator:
      metrics:
        rbacProxy:
          image:
            repository: quay.io/brancz/kube-rbac-proxy
            tag: v0.21.2
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 256Mi

