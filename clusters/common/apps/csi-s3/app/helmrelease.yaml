---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: csi-s3
  namespace: csi-s3
spec:
  interval: 30m
  chart:
    spec:
      chart: csi-s3
      version: "0.43.6"
      sourceRef:
        kind: HelmRepository
        name: csi-s3
        namespace: flux-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    storageClass:
      name: csi-s3
      singleBucket: csi-s3
      mountOptions: "--memory-limit 1000 --dir-mode 0777 --file-mode 0666"
      reclaimPolicy: Retain

    secret:
      create: false

    tolerations:
      node:
        - operator: Exists
      controller:
        - operator: Exists
