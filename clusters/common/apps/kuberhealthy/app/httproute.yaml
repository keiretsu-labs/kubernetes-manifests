---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kuberhealthy
  annotations:
    item.homer.rajsingh.info/name: "Kuberhealthy"
    item.homer.rajsingh.info/subtitle: "Synthetic Capability Checks"
    item.homer.rajsingh.info/logo: "https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/kubernetes.png"
    item.homer.rajsingh.info/keywords: "monitoring, synthetic, health check"
    service.homer.rajsingh.info/name: "Infrastructure"
    service.homer.rajsingh.info/icon: "fas fa-server"
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: ts
      namespace: home
  hostnames:
    - "kuberhealthy.${CLUSTER_DOMAIN}"
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: kuberhealthy
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /