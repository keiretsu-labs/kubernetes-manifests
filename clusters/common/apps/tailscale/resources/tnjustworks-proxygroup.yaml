---
apiVersion: tailscale.com/v1alpha1
kind: ProxyGroup
metadata:
  name: tnjustworks-egress
spec:
  hostnamePrefix: ${LOCATION}-egress
  tags:
    - tag:k8s
    - tag:${LOCATION}
  proxyClass: common-accept-routes
  type: egress
  tailnet: tnjustworks
  replicas: 2
---
apiVersion: tailscale.com/v1alpha1
kind: ProxyGroup
metadata:
  name: tnjustworks-ingress
spec:
  hostnamePrefix: ${LOCATION}-ingress
  tags:
    - tag:k8s
    - tag:${LOCATION}
  proxyClass: common
  type: ingress
  tailnet: tnjustworks
  replicas: 2
