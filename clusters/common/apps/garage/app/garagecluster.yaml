---
# Unified GarageCluster (v1beta2) — storage + gateway tiers in one CR.
#
# In a unified cluster the operator reconciles the gateway tier as one per-pod
# GarageNode (garage-gateway-N) — each a single-replica StatefulSet with a small
# metadata PVC (persistent node identity) and EmptyDir data. Each gets a
# capacity:null layout role so key/bucket auth resolves locally. Stale roles on
# scale-down are tombstone-reaped (autoApply below applies the cleanup).
# Cross-region peering is established by the storage tier (via
# spec.remoteClusters); the gateway tier rides on that mesh.
apiVersion: garage.rajsingh.info/v1beta2
kind: GarageCluster
metadata:
  name: garage
spec:
  zone: "${LOCATION}"
  image: dxflrs/garage:v2.3.0

  replication:
    factor: 2
    consistencyMode: "degraded" # 2-zone operation; restore factor:3 + zoneRedundancy when stpetersburg returns

  s3Api:
    rootDomain: ".s3.${COMMON_DOMAIN}"

  webApi:
    rootDomain: ".${COMMON_DOMAIN}"

  network:
    rpcPublicAddr: "${LOCATION}-garage.keiretsu.ts.net:3901"
    rpcSecretRef:
      name: garage-rpc-secret
      key: rpc-secret

  remoteClusters:
    - name: ottawa
      zone: ottawa
      connection:
        adminApiEndpoint: "http://ottawa-garage.keiretsu.ts.net:3903"
        gatewayRpcEndpointTemplate: "ottawa-gw-{ordinal}.keiretsu.ts.net:3901"
        adminTokenSecretRef:
          name: garage-admin-token
          key: admin-token
    - name: robbinsdale
      zone: robbinsdale
      connection:
        adminApiEndpoint: "http://robbinsdale-garage.keiretsu.ts.net:3903"
        gatewayRpcEndpointTemplate: "robbinsdale-gw-{ordinal}.keiretsu.ts.net:3901"
        adminTokenSecretRef:
          name: garage-admin-token
          key: admin-token
  # stpetersburg removed 2026-05-30: node is down; re-add when restored

  admin:
    adminTokenSecretRef:
      name: garage-admin-token
      key: admin-token

  monitoring:
    enabled: true
    interval: 30s

  layoutManagement:
    # autoApply DISABLED 2026-06-01: in this federated deployment both regions
    # share the cluster ownership tag "cluster:garage/garage", so each region's
    # gateway tombstone reaper classifies the OTHER region's gateway roles as
    # stale and removes them, while each region's per-node controller re-adds its
    # own — an endless cross-region layout churn that leaves gateway key_table
    # unsynced (S3 403 "No such key"). With autoApply:false the reaper only
    # reports pending tombstones (status.pendingGatewayTombstones) instead of
    # applying removals, so the layout stabilizes. Re-enable once the operator
    # scopes the reaper per-zone (garage-operator#220).
    autoApply: false

  blocks:
    ramBufferMax: 128Mi

  workers:
    resyncWorkerCount: 1
    resyncTranquility: 3
    scrubTranquility: 4

  # Storage tier — persistent identity in metadata PVC; data PVC holds blocks.
  storage:
    replicas: ${GARAGE_REPLICAS:=1}
    metadata:
      size: 3Gi
      storageClassName: "${STORAGECLASS_METADATA}"
    data:
      size: 2Ti
      storageClassName: "${STORAGECLASS_LONGTERM}"
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 3000m
        memory: 3Gi
    # Per-cluster scheduling overrides via Flux postBuild substitution.
    nodeSelector: ${GARAGE_NODE_SELECTOR=}
    topologySpreadConstraints: ${GARAGE_TOPOLOGY_SPREAD=}

  # Gateway tier — per-pod GarageNodes with persistent identity; peers with the
  # local storage tier and inherits federation through it. rpcPublicAddr is the
  # advertised RPC address so remote regions can reach the gateway nodes for
  # cluster-wide table sync (key/bucket FullReplication).
  # NOTE: this is a single shared address for all gateway pods. With
  # gateway.replicas > 1, remote regions reach only one pod via this address;
  # per-pod cross-region reachability needs remoteClusters[].gatewayRpcEndpointTemplate
  # (operator issue: the per-ordinal parser currently requires Manual gateway
  # nodes tagged garage-gateway-<N>). Local S3/Admin HA is unaffected; only
  # cross-region gateway table-sync latency is.
  gateway:
    replicas: ${GARAGE_GATEWAY_REPLICAS:=2}
    rpcPublicAddr: "${LOCATION}-garage-gw.keiretsu.ts.net:3901"
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 2000m
        memory: 1536Mi
    nodeSelector: ${GARAGE_NODE_SELECTOR=}
    affinity: ${GARAGE_GATEWAY_AFFINITY=}
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/instance: garage
            garage.rajsingh.info/tier: gateway
