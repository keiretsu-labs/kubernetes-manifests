---
# Unified GarageCluster (v1beta2) — storage + gateway tiers in one CR.
#
# Gateway tier is ephemeral (Deployment + EmptyDir): node identities rotate per
# pod restart, and the operator garbage-collects stale layout entries via the
# tombstone reconciler. Cross-region peering is established by the storage tier
# (via spec.remoteClusters); the gateway tier rides on that mesh.
apiVersion: garage.rajsingh.info/v1beta2
kind: GarageCluster
metadata:
  name: garage
spec:
  zone: "${LOCATION}"
  image: dxflrs/garage:v2.3.0

  replication:
    factor: 3
    zoneRedundancyMode: "AtLeast"
    zoneRedundancyMinZones: 2
    consistencyMode: "degraded" # stpetersburg down; revert to "consistent" when 3 zones restored

  s3Api:
    rootDomain: ".s3.${COMMON_DOMAIN}"

  webApi:
    rootDomain: ".${COMMON_DOMAIN}"

  network:
    rpcPublicAddr: "${LOCATION}-garage.keiretsu.ts.net:3901"
    rpcSecretRef:
      name: garage-rpc-secret
      key: rpc-secret

  remoteClusters:
    - name: ottawa
      zone: ottawa
      connection:
        adminApiEndpoint: "http://ottawa-garage.keiretsu.ts.net:3903"
        gatewayRpcEndpointTemplate: "ottawa-gw-{ordinal}.keiretsu.ts.net:3901"
        adminTokenSecretRef:
          name: garage-admin-token
          key: admin-token
    - name: robbinsdale
      zone: robbinsdale
      connection:
        adminApiEndpoint: "http://robbinsdale-garage.keiretsu.ts.net:3903"
        gatewayRpcEndpointTemplate: "robbinsdale-gw-{ordinal}.keiretsu.ts.net:3901"
        adminTokenSecretRef:
          name: garage-admin-token
          key: admin-token
  # stpetersburg removed 2026-05-30: node is down; re-add when restored

  admin:
    adminTokenSecretRef:
      name: garage-admin-token
      key: admin-token

  monitoring:
    enabled: true
    interval: 30s

  layoutManagement:
    autoApply: true

  workers:
    resyncWorkerCount: 2
    resyncTranquility: 2
    scrubTranquility: 4

  # Storage tier — persistent identity in metadata PVC; data PVC holds blocks.
  storage:
    replicas: ${GARAGE_REPLICAS:=1}
    metadata:
      size: 3Gi
      storageClassName: "${STORAGECLASS_METADATA}"
    data:
      size: 2Ti
      storageClassName: "${STORAGECLASS_LONGTERM}"
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 3000m
        memory: 3Gi
    # Per-cluster scheduling overrides via Flux postBuild substitution.
    nodeSelector: ${GARAGE_NODE_SELECTOR=}
    topologySpreadConstraints: ${GARAGE_TOPOLOGY_SPREAD=}

  # Gateway tier — ephemeral; peers with the local storage tier in-process and
  # inherits federation through it. RPCPublicAddr lets remote regions dial these
  # gateway pods for cluster-wide admin / table sync operations.
  gateway:
    replicas: ${GARAGE_GATEWAY_REPLICAS:=2}
    rpcPublicAddr: "${LOCATION}-garage-gw.keiretsu.ts.net:3901"
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 2000m
        memory: 1536Mi
    nodeSelector: ${GARAGE_NODE_SELECTOR=}
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/instance: garage
            garage.rajsingh.info/tier: gateway
