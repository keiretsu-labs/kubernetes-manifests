---
apiVersion: garage.rajsingh.info/v1beta1
kind: GarageCluster
metadata:
  name: garage
spec:
  replicas: 1
  zone: "${LOCATION}"
  image: dxflrs/garage:v2.3.0

  replication:
    factor: 3
    zoneRedundancyMode: "AtLeast"
    zoneRedundancyMinZones: 2
    consistencyMode: "degraded" # "consistent" or "degraded"

  s3Api:
    rootDomain: ".s3.${COMMON_DOMAIN}"

  storage:
    metadata:
      size: 3Gi
      storageClassName: "${STORAGECLASS_METADATA}"
    data:
      size: 2Ti
      storageClassName: "${STORAGECLASS_LONGTERM}"

  network:
    rpcPublicAddr: "${LOCATION}-garage.keiretsu.ts.net:3901"
    rpcSecretRef:
      name: garage-rpc-secret
      key: rpc-secret

  remoteClusters:
    - name: ottawa
      zone: ottawa
      connection:
        adminApiEndpoint: "http://ottawa-garage.keiretsu.ts.net:3903"
        adminTokenSecretRef:
          name: garage-admin-token
          key: admin-token
    - name: robbinsdale
      zone: robbinsdale
      connection:
        adminApiEndpoint: "http://robbinsdale-garage.keiretsu.ts.net:3903"
        adminTokenSecretRef:
          name: garage-admin-token
          key: admin-token
    - name: stpetersburg
      zone: stpetersburg
      connection:
        adminApiEndpoint: "http://stpetersburg-garage.keiretsu.ts.net:3903"
        adminTokenSecretRef:
          name: garage-admin-token
          key: admin-token

  admin:
    adminTokenSecretRef:
      name: garage-admin-token
      key: admin-token

  monitoring:
    enabled: true
    interval: 30s

  webApi:
    rootDomain: ".${COMMON_DOMAIN}"

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 3000m
      memory: 3Gi
