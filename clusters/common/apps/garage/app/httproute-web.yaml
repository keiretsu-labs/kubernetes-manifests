---
# Web (static website hosting) HTTPRoute
# Garage serves bucket websites on port 3902, matching by Host header
# e.g. keiretsu.killinit.cc -> bucket "keiretsu"
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: garage-web
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: ts
      namespace: home
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: private
      namespace: home
  hostnames:
    - "keiretsu.${CLUSTER_DOMAIN}"
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: garage
          port: 3902
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
