---
# Web (static website hosting) HTTPRoute
# Garage resolves buckets by stripping the root_domain suffix from the Host header.
# keiretsu.top and www.keiretsu.top need a Host rewrite to keiretsu.keiretsu.top
# so garage maps them to the "keiretsu" bucket.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: garage-web
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: ts
      namespace: home
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: private
      namespace: home
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: public
      namespace: home
  hostnames:
    - "www.${COMMON_DOMAIN}"
    - "${COMMON_DOMAIN}"
  rules:
    - filters:
        - type: URLRewrite
          urlRewrite:
            hostname: "keiretsu.${COMMON_DOMAIN}"
      backendRefs:
        - group: ""
          kind: Service
          name: garage
          port: 3902
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
