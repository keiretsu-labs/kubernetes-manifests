---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: garage-keepalive
  labels:
    app.kubernetes.io/name: garage-keepalive
spec:
  replicas: 4
  selector:
    matchLabels:
      app.kubernetes.io/name: garage-keepalive
  template:
    metadata:
      labels:
        app.kubernetes.io/name: garage-keepalive
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: garage-keepalive
      containers:
        - name: keepalive
          image: busybox:1.37.0
          command:
            - /bin/sh
            - -c
            - |
              set -u
              targets="ottawa-garage robbinsdale-garage stpetersburg-garage"
              while :; do
                for svc in $targets; do
                  nc -zw 3 "$svc" 3901 >/dev/null 2>&1 || true
                done
                sleep 20
              done
          resources:
            requests:
              cpu: 1m
              memory: 4Mi
            limits:
              memory: 16Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop:
                - ALL
