---
# Gateway tier — S3 and Web API termination separated from storage.
#
# Each region's gateway pods peer with that region's storage cluster via
# connectTo.clusterRef (in-cluster admin API), and inherit federation reach
# through the storage cluster's RPC mesh. Gateways store no blocks; they
# carry only node identity + table metadata in a tiny PVC.
apiVersion: garage.rajsingh.info/v1beta1
kind: GarageCluster
metadata:
  name: garage-gateway
spec:
  gateway: true
  replicas: ${GARAGE_GATEWAY_REPLICAS:=2}
  zone: "${LOCATION}"
  image: dxflrs/garage:v2.3.0

  connectTo:
    clusterRef:
      name: garage

  # Replication settings must match the storage cluster — Garage requires
  # identical factor/mode on every node participating in the layout.
  replication:
    factor: 3
    zoneRedundancyMode: "AtLeast"
    zoneRedundancyMinZones: 2
    consistencyMode: "consistent"

  s3Api:
    rootDomain: ".s3.${COMMON_DOMAIN}"

  webApi:
    rootDomain: ".${COMMON_DOMAIN}"

  storage:
    metadata:
      size: 1Gi
      storageClassName: "${STORAGECLASS_METADATA}"

  network:
    rpcSecretRef:
      name: garage-rpc-secret
      key: rpc-secret

  admin:
    adminTokenSecretRef:
      name: garage-admin-token
      key: admin-token

  monitoring:
    enabled: true
    interval: 30s

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 2000m
      memory: 1Gi

  # Reuse storage-tier scheduling vars so stpetersburg gateways land on the
  # Sparks (excluding orin-0). Elsewhere these resolve to no-ops.
  nodeSelector: ${GARAGE_NODE_SELECTOR=}
  # Spread gateway pods across hosts. Selector matches only this CR's pods so
  # it doesn't entangle with the storage cluster's spread.
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app.kubernetes.io/instance: garage-gateway
