---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: garage-webui
  labels:
    app.kubernetes.io/name: garage-webui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: garage-webui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: garage-webui
    spec:
      containers:
        - name: garage-webui
          image: oci.${CLUSTER_DOMAIN}/garage-webadmin:latest
          ports:
            - containerPort: 80
              name: http
          env:
            - name: API_HOST
              value: "http://garage:3903"
            - name: GARAGE_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: garage-admin-token
                  key: admin-token
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi
        - name: garage-webadmin-sidecar
          image: oci.${CLUSTER_DOMAIN}/garage-webadmin-sidecar:latest
          ports:
            - containerPort: 8080
              name: sidecar
          envFrom:
            - secretRef:
                name: garage-webui-sidecar
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              memory: 64Mi
