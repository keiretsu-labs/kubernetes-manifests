---
apiVersion: garage.rajsingh.info/v1beta1
kind: GarageKey
metadata:
  name: webui-sidecar-key
spec:
  clusterRef:
    name: garage
  name: "WebUI Sidecar Key"
  allBuckets:
    read: true
    write: true
  secretTemplate:
    name: garage-webui-sidecar
    accessKeyIdKey: AWS_ACCESS_KEY_ID
    secretAccessKeyKey: AWS_SECRET_ACCESS_KEY
