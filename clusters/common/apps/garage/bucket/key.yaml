---
apiVersion: garage.rajsingh.info/v1alpha1
kind: GarageKey
metadata:
  name: tailscale-recorder-key
spec:
  clusterRef:
    name: garage
  name: "Tailscale Recorder Key"
  secretTemplate:
    name: s3-auth
    namespace: tailscale
    accessKeyIdKey: AWS_ACCESS_KEY_ID
    secretAccessKeyKey: AWS_SECRET_ACCESS_KEY
  bucketPermissions:
    - bucketRef: tailscale-recorder
      read: true
      write: true
---
apiVersion: garage.rajsingh.info/v1alpha1
kind: GarageKey
metadata:
  name: keiretsu-key
spec:
  clusterRef:
    name: garage
  name: "Keiretsu Backup Key"
  secretTemplate:
    name: garage-keiretsu-bucket
    namespace: flux-system
    accessKeyIdKey: KEIRETSU_S3_ACCESS_KEY
    secretAccessKeyKey: KEIRETSU_S3_SECRET_KEY
  bucketPermissions:
    - bucketRef: keiretsu
      read: true
      write: true
---
apiVersion: garage.rajsingh.info/v1alpha1
kind: GarageKey
metadata:
  name: rajsingh-key
spec:
  clusterRef:
    name: garage
  name: "Rajsingh Workspace Key"
  secretTemplate:
    name: garage-rajsingh-bucket
    namespace: flux-system
    accessKeyIdKey: RAJSINGH_S3_ACCESS_KEY
    secretAccessKeyKey: RAJSINGH_S3_SECRET_KEY
  bucketPermissions:
    - bucketRef: rajsingh
      read: true
      write: true
      owner: true
---
apiVersion: garage.rajsingh.info/v1alpha1
kind: GarageKey
metadata:
  name: setec-key
spec:
  clusterRef:
    name: garage
  name: "Setec Backup Key"
  secretTemplate:
    name: setec-s3-auth
    namespace: setec
    accessKeyIdKey: AWS_ACCESS_KEY_ID
    secretAccessKeyKey: AWS_SECRET_ACCESS_KEY
  bucketPermissions:
    - bucketRef: setec
      read: true
      write: true
---
apiVersion: garage.rajsingh.info/v1alpha1
kind: GarageKey
metadata:
  name: tailscale-logs-key
spec:
  clusterRef:
    name: garage
  name: "Tailscale Logs Key"
  secretTemplate:
    name: tailscale-logs-s3-auth
    namespace: flux-system
    accessKeyIdKey: TAILSCALE_LOGS_S3_ACCESS_KEY
    secretAccessKeyKey: TAILSCALE_LOGS_S3_SECRET_KEY
  bucketPermissions:
    - bucketRef: tailscale-logs
      read: true
      write: true
---
apiVersion: garage.rajsingh.info/v1alpha1
kind: GarageKey
metadata:
  name: csi-s3-key
spec:
  clusterRef:
    name: garage
  name: "CSI-S3 Storage Key"
  secretTemplate:
    name: csi-s3-secret
    namespace: csi-s3
    accessKeyIdKey: accessKeyID
    secretAccessKeyKey: secretAccessKey
    additionalData:
      endpoint: "http://garage.garage.svc.cluster.local:3900"
      region: "garage"
  bucketPermissions:
    - bucketRef: csi-s3
      read: true
      write: true
