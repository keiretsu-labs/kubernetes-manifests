---
apiVersion: garage.rajsingh.info/v1alpha1
kind: GarageBucket
metadata:
  name: keiretsu
spec:
  clusterRef:
    name: garage
  globalAlias: keiretsu
  quotas:
    maxSize: 1Ti
    maxObjects: 10000000
  website:
    enabled: true
    indexDocument: index.html
    errorDocument: error.html
  keyPermissions:
    - keyRef: keiretsu-key
      read: true
      write: true
---
apiVersion: garage.rajsingh.info/v1alpha1
kind: GarageBucket
metadata:
  name: rajsingh
spec:
  clusterRef:
    name: garage
  globalAlias: rajsingh
  quotas:
    maxSize: 100Gi
    maxObjects: 1000000
  keyPermissions:
    - keyRef: rajsingh-key
      read: true
      write: true
      owner: true
---
apiVersion: garage.rajsingh.info/v1alpha1
kind: GarageBucket
metadata:
  name: tailscale-logs
spec:
  clusterRef:
    name: garage
  globalAlias: tailscale-logs
  quotas:
    maxSize: 500Gi
    maxObjects: 10000000
  keyPermissions:
    - keyRef: tailscale-logs-key
      read: true
      write: true
---
apiVersion: garage.rajsingh.info/v1alpha1
kind: GarageBucket
metadata:
  name: mimir
spec:
  clusterRef:
    name: garage
    namespace: garage
  globalAlias: mimir
  quotas:
    maxSize: 500Gi
    maxObjects: 50000000
  keyPermissions:
    - keyRef: mimir-key
      read: true
      write: true
---
apiVersion: garage.rajsingh.info/v1alpha1
kind: GarageBucket
metadata:
  name: csi-s3
spec:
  clusterRef:
    name: garage
  globalAlias: csi-s3
  quotas:
    maxSize: 5Ti
    maxObjects: 10000000
  keyPermissions:
    - keyRef: csi-s3-key
      read: true
      write: true
