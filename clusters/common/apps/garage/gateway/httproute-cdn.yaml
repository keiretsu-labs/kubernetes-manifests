---
# CDN HTTPRoute via garage gateway cluster
# keiretsu.cdn.keiretsu.top serves the "keiretsu" bucket through the stateless
# gateway tier and EnvoyProxy CDN GatewayClass.
# Host rewrite → keiretsu.${COMMON_DOMAIN} so garage maps it to the "keiretsu" bucket.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: garage-cdn
  namespace: garage
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: cdn
      namespace: keiretsu
  hostnames:
    - "keiretsu.cdn.keiretsu.top"
  rules:
    - filters:
        - type: URLRewrite
          urlRewrite:
            hostname: "keiretsu.${COMMON_DOMAIN}"
      backendRefs:
        - group: ""
          kind: Service
          name: garage-gateway
          port: 3902
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
