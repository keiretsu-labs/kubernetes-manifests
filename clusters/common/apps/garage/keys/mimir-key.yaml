---
apiVersion: garage.rajsingh.info/v1beta1
kind: GarageKey
metadata:
  name: mimir-key
  namespace: mimir
spec:
  clusterRef:
    name: garage
    namespace: garage
  name: "Mimir Metrics Key"
  secretTemplate:
    name: mimir-s3
    accessKeyIdKey: AWS_ACCESS_KEY_ID
    secretAccessKeyKey: AWS_SECRET_ACCESS_KEY
    additionalData:
      endpoint: "http://garage-gw.keiretsu.ts.net:3900"
      region: "garage"
  bucketPermissions:
    - bucketRef:
        name: mimir
        namespace: garage
      read: true
      write: true
