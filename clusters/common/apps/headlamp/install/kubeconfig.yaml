---
apiVersion: v1
clusters:
- cluster:
    server: https://ottawa-k8s-operator.keiretsu.ts.net
  name: ottawa-k8s-operator.keiretsu.ts.net
- cluster:
    server: https://robbinsdale-k8s-operator.keiretsu.ts.net
  name: robbinsdale-k8s-operator.keiretsu.ts.net
- cluster:
    server: https://stpetersburg-k8s-operator.keiretsu.ts.net
  name: stpetersburg-k8s-operator.keiretsu.ts.net
- cluster:
    server: https://karmada-apiserver.keiretsu.ts.net:5443
    insecure-skip-tls-verify: true
  name: karmada-apiserver.keiretsu.ts.net
contexts:
- context:
    cluster: ottawa-k8s-operator.keiretsu.ts.net
    user: tailscale-auth
  name: ottawa
- context:
    cluster: robbinsdale-k8s-operator.keiretsu.ts.net
    user: tailscale-auth
  name: robbinsdale
- context:
    cluster: stpetersburg-k8s-operator.keiretsu.ts.net
    user: tailscale-auth
  name: stpetersburg
- context:
    cluster: karmada-apiserver.keiretsu.ts.net
    user: karmada-admin
  name: karmada
current-context: ottawa
kind: Config
preferences: {}
users:
- name: tailscale-auth
  user:
    token: unused
- name: karmada-admin
  user:
    token: ${KARMADA_HEADLAMP_TOKEN}
