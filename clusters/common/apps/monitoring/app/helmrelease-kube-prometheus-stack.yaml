---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: kube-prometheus-stack
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: flux-kube-state-metrics-config
      valuesKey: kube-state-metrics-config.yaml
  values:
    cleanPrometheusOperatorObjectNames: true
    # Agent mode evaluates no rules — don't ship dead PrometheusRule objects.
    # The infra alerts in config/prometheusrules.yaml are now unevaluated;
    # re-home them in the Mimir ruler when alerting is reinstated.
    defaultRules:
      create: false
    grafana:
      enabled: false

    prometheusOperator:
      admissionWebhooks:
        enabled: true
    prometheus:
      # Agent mode: scrape + remote_write only. No local TSDB query engine,
      # rule evaluation, or alerting — Mimir is the store/query layer. This
      # sheds both the head-block TSDB and the ~25% remote_write series-cache
      # tax a full server pays, dropping RSS from multi-GB to a few hundred MB.
      agentMode: true
      prometheusSpec:
        externalLabels:
          cluster: ${CLUSTER_NAME}
        externalUrl: https://prometheus.${CLUSTER_DOMAIN}
        serviceMonitorSelector: {}
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        scrapeConfigSelectorNilUsesHelmValues: false
        remoteWrite:
          - url: http://mimir-gateway.mimir.svc.cluster.local:8080/api/v1/push
            headers:
              X-Scope-OrgID: ${CLUSTER_NAME}
            remoteTimeout: 30s
            queueConfig:
              # shard memory ≈ maxShards * (capacity + maxSamplesPerSend).
              # Bound maxShards so a Mimir backlog can't balloon the agent;
              # keep capacity ~5x maxSamplesPerSend to avoid WAL stalls.
              capacity: 10000
              maxSamplesPerSend: 2000
              maxShards: 50
              batchSendDeadline: 5s
        resources:
          requests:
            cpu: 100m
            memory: 1Gi
          limits:
            # Agent WAL + remote_write series cache scales with active series;
            # kubelet/cadvisor cardinality on these nodes needs more than 1Gi.
            # Still half the old full-server 4Gi. auto-gomemlimit (~1.8Gi) keeps
            # GC ahead of the cgroup ceiling. Trim cadvisor cardinality to go lower.
            memory: 2Gi
        storageSpec:
          emptyDir: {}

    # No local rule evaluation in agent mode, so nothing fires alerts here.
    # Re-enable once the Mimir ruler is wired up to drive Alertmanager.
    alertmanager:
      enabled: false
      alertmanagerSpec:
        alertmanagerConfigSelector:
          matchLabels:
            team: monitoring
        externalUrl: https://alertmanager.${CLUSTER_DOMAIN}
        resources:
          requests:
            cpu: 10m
            memory: 50Mi
          limits:
            memory: 100Mi
        storage:
          volumeClaimTemplate:
            spec:
              resources:
                requests:
                  storage: 1Gi

    kubeProxy:
      enabled: false

    coreDns:
      serviceMonitor:
        metricRelabelings:
          - targetLabel: cluster
            replacement: ${CLUSTER_NAME}

    kubeApiServer:
      serviceMonitor:
        metricRelabelings:
          - targetLabel: cluster
            replacement: ${CLUSTER_NAME}

    kubelet:
      serviceMonitor:
        # cadvisor on constrained nodes (Jetson Orin) reports lagging embedded
        # timestamps; honoring them drops ~10k samples/scrape as out-of-order.
        # Use scrape time instead — slightly less precise rates, no data loss.
        # The chart forces honorTimestamps=true on the cadvisor endpoint while
        # trackTimestampsStaleness is true, so both must be false to take effect.
        honorTimestamps: false
        trackTimestampsStaleness: false
        metricRelabelings:
          - targetLabel: cluster
            replacement: ${CLUSTER_NAME}
        cAdvisorMetricRelabelings:
          - targetLabel: cluster
            replacement: ${CLUSTER_NAME}
        probesMetricRelabelings:
          - targetLabel: cluster
            replacement: ${CLUSTER_NAME}

    kubeControllerManager:
      enabled: true
      serviceMonitor:
        metricRelabelings:
          - targetLabel: cluster
            replacement: ${CLUSTER_NAME}

    kubeScheduler:
      enabled: true
      serviceMonitor:
        metricRelabelings:
          - targetLabel: cluster
            replacement: ${CLUSTER_NAME}

    kubeEtcd:
      enabled: false

    kube-state-metrics:
      enabled: true
      prometheus:
        monitor:
          metricRelabelings:
            - targetLabel: cluster
              replacement: ${CLUSTER_NAME}

    prometheus-node-exporter:
      updateStrategy:
        rollingUpdate:
          maxUnavailable: "100%"
      prometheus:
        monitor:
          metricRelabelings:
            - targetLabel: cluster
              replacement: ${CLUSTER_NAME}