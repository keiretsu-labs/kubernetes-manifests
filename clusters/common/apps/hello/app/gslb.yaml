---
apiVersion: k8gb.absa.oss/v1beta1
kind: Gslb
metadata:
  name: hello-world
  namespace: hello
  annotations:
    k8gb.io/exposed-ip-addresses: "${CLUSTER_PUBLIC_IP}"
spec:
  resourceRef:
    apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    name: hello-world-gslb
  strategy:
    type: roundRobin
    dnsTtlSeconds: 30
    weight:
      ottawa: 34
      robbinsdale: 33
      stpetersburg: 33
