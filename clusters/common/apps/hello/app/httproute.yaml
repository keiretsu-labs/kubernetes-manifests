---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hello-world-gslb
  namespace: hello
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: public
      namespace: home
  hostnames:
    - "hello.gslb.${COMMON_DOMAIN}"
  rules:
    - backendRefs:
        - name: hello-world
          port: 80
      matches:
        - path:
            type: PathPrefix
            value: /
