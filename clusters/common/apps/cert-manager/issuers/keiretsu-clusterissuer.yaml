---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: keiretsu-com
spec:
  acme:
    email: ${RAJSINGH_INFO_CLOUDFLARE_EMAIL}
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-keiretsu-key
    solvers:
    - dns01:
        cloudflare:
          email: ${RAJSINGH_INFO_CLOUDFLARE_EMAIL}
          apiTokenSecretRef:
            name: cloudflare-keiretsu
            key: cert-manager-api-token
