---
# Karmada Agent - Pull mode registration
# Credentials pulled from Ottawa via ExternalSecrets
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: karmada-agent
spec:
  interval: 30m
  timeout: 10m
  chart:
    spec:
      chart: karmada
      version: "v1.16.0"
      sourceRef:
        kind: HelmRepository
        name: karmada
        namespace: flux-system
  install:
    remediation:
      retries: 3
    crds: Skip
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
    crds: Skip
  valuesFrom:
    - kind: Secret
      name: karmada-agent-creds
      valuesKey: caCrt
      targetPath: agent.kubeconfig.caCrt
    - kind: Secret
      name: karmada-agent-creds
      valuesKey: crt
      targetPath: agent.kubeconfig.crt
    - kind: Secret
      name: karmada-agent-creds
      valuesKey: key
      targetPath: agent.kubeconfig.key
  values:
    installMode: "agent"

    agent:
      clusterName: "${CLUSTER_NAME}"

      kubeconfig:
        # Resolves to Tailscale egress ClusterIP, cert is valid for this hostname
        server: "https://karmada-apiserver.keiretsu.ts.net:5443"

      labels:
        app: karmada-agent

      replicaCount: 1

      image:
        registry: docker.io
        repository: karmada/karmada-agent
        tag: "v1.17.0"
        pullPolicy: IfNotPresent

      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          memory: 256Mi
