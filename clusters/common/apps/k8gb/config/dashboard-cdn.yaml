---
# Multi-cluster dashboard served via GSLB.
# Uses remoteClusters to discover HTTPRoutes across all 3 clusters
# via Tailscale API server proxy. Shows a unified view of services
# from all locations on a single dashboard.
apiVersion: v1
kind: Secret
metadata:
  name: external-clusters-kubeconfig
  namespace: keiretsu-top
type: Opaque
stringData:
  kubeconfig: |
    apiVersion: v1
    clusters:
    - cluster:
        server: https://ottawa-k8s-operator.keiretsu.ts.net
      name: ottawa
    - cluster:
        server: https://robbinsdale-k8s-operator.keiretsu.ts.net
      name: robbinsdale
    - cluster:
        server: https://stpetersburg-k8s-operator.keiretsu.ts.net
      name: stpetersburg
    contexts:
    - context:
        cluster: ottawa
        user: tailscale-auth
      name: ottawa
    - context:
        cluster: robbinsdale
        user: tailscale-auth
      name: robbinsdale
    - context:
        cluster: stpetersburg
        user: tailscale-auth
      name: stpetersburg
    kind: Config
    users:
    - name: tailscale-auth
      user:
        token: unused
---
apiVersion: homer.rajsingh.info/v1alpha1
kind: Dashboard
metadata:
  name: dashboard-cdn
  namespace: keiretsu-top
  labels:
    app: homer-dashboard
    tier: frontend
spec:
  replicas: 2
  homerConfig:
    title: "keiretsu cloud"
    subtitle: "Multi-Cluster Dashboard"
    logo: "https://raw.githubusercontent.com/rajsinghtech/homer-operator/main/homer/Homer-Operator.png"
    header: true
    footer: '<p>Powered by <strong>Homer-Operator</strong> | <a href="https://github.com/keiretsu-labs/kubernetes-manifests">GitHub</a></p>'
    colors:
      light:
        highlight-primary: "#d4a574"
        highlight-secondary: "#c19660"
        highlight-hover: "#b8885c"
        background: "#faf8f5"
        card-background: "#ffffff"
        text: "#2d2424"
        text-header: "#1a1515"
        text-title: "#3d2f2f"
        text-subtitle: "#6b5d5d"
        card-shadow: rgba(139, 69, 19, 0.08)
        link: "#b87333"
        link-hover: "#8b4513"
      dark:
        highlight-primary: "#daa520"
        highlight-secondary: "#cd9b1d"
        highlight-hover: "#b8860b"
        background: "#1a1612"
        card-background: "#2e2621"
        text: "#f5e6d3"
        text-header: "#faf0e6"
        text-title: "#f5deb3"
        text-subtitle: "#d2b48c"
        card-shadow: rgba(0, 0, 0, 0.3)
        link: "#f4a460"
        link-hover: "#ff8c00"
    defaults:
      layout: "list"
      colorTheme: "auto"
    links:
    - name: "Kubernetes Manifests"
      icon: "fab fa-github"
      url: "https://github.com/keiretsu-labs/kubernetes-manifests"
      target: "_blank"
    services:
    - parameters:
        name: "Infrastructure"
        icon: "fas fa-server"
      items:
      - parameters:
          name: "Tailscale"
          logo: "https://raw.githubusercontent.com/tailscale/tailscale/refs/heads/main/client/web/src/assets/icons/tailscale-icon.svg"
          subtitle: "Private Mesh Network"
          tagstyle: "is-info"
          url: "https://login.tailscale.com/admin/machines"
  remoteClusters:
  - name: ottawa
    enabled: true
    secretRef:
      name: external-clusters-kubeconfig
      key: kubeconfig
    domainFilters:
      - "cdn.keiretsu.top"
    gatewaySelector:
      matchLabels:
        gateway: public
    ingressSelector:
      matchLabels:
        noexist: "true"
  - name: robbinsdale
    enabled: true
    secretRef:
      name: external-clusters-kubeconfig
      key: kubeconfig
    domainFilters:
      - "cdn.keiretsu.top"
    gatewaySelector:
      matchLabels:
        gateway: public
    ingressSelector:
      matchLabels:
        noexist: "true"
  - name: stpetersburg
    enabled: true
    secretRef:
      name: external-clusters-kubeconfig
      key: kubeconfig
    domainFilters:
      - "cdn.keiretsu.top"
    gatewaySelector:
      matchLabels:
        gateway: public
    ingressSelector:
      matchLabels:
        noexist: "true"
  gatewaySelector:
    matchLabels:
      disable-local-cluster: "true"
  ingressSelector:
    matchLabels:
      disable-local-cluster: "true"
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: dashboard-cdn
  namespace: keiretsu-top
  annotations:
    item.homer.rajsingh.info/hide: "true"
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: public
      namespace: home
  hostnames:
    - "home.cdn.${COMMON_DOMAIN}"
  rules:
    - backendRefs:
        - name: dashboard-cdn-homer
          port: 80
      matches:
        - path:
            type: PathPrefix
            value: /
---
apiVersion: k8gb.absa.oss/v1beta1
kind: Gslb
metadata:
  name: dashboard-cdn
  namespace: keiretsu-top
  annotations:
    k8gb.io/exposed-hostnames: "${LOCATION}.${COMMON_DOMAIN}"
spec:
  resourceRef:
    apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    name: dashboard-cdn
  strategy:
    type: roundRobin
    dnsTtlSeconds: 30
    weight:
      ottawa: 33
      robbinsdale: 33
      stpetersburg: 34
