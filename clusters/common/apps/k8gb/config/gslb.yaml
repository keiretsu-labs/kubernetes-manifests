---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: garage-web-gslb
  namespace: garage
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: public
      namespace: home
  hostnames:
    - "keiretsu.gslb.${COMMON_DOMAIN}"
  rules:
    - filters:
        - type: URLRewrite
          urlRewrite:
            hostname: "keiretsu.${COMMON_DOMAIN}"
      backendRefs:
        - name: garage
          port: 3902
      matches:
        - path:
            type: PathPrefix
            value: /
---
apiVersion: k8gb.absa.oss/v1beta1
kind: Gslb
metadata:
  name: keiretsu-web
  namespace: garage
  annotations:
    k8gb.io/exposed-ip-addresses: "${CLUSTER_PUBLIC_IP}"
spec:
  resourceRef:
    apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    name: garage-web-gslb
  strategy:
    type: roundRobin
    dnsTtlSeconds: 60
    weight:
      ottawa: 34
      robbinsdale: 33
      stpetersburg: 33
