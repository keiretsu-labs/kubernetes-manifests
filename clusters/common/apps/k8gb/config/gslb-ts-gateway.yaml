---
# GSLB for the Tailscale home gateway via ts.keiretsu.top zone.
# k8gb discovers Tailscale CGNAT IPs from the ts gateway's service status.
# tsddns configures Tailscale split DNS to route ts.keiretsu.top queries
# to k8gb CoreDNS (Tailscale LB), returning health-checked CGNAT IPs.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ts-gateway-cdn
  namespace: home
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: ts
      namespace: home
  hostnames:
    - "keiretsu.ts.${COMMON_DOMAIN}"
  rules:
    - backendRefs:
        - name: dashboard-ts-homer
          port: 80
      matches:
        - path:
            type: PathPrefix
            value: /
---
apiVersion: k8gb.absa.oss/v1beta1
kind: Gslb
metadata:
  name: ts-gateway
  namespace: home
spec:
  resourceRef:
    apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    name: ts-gateway-cdn
  strategy:
    type: roundRobin
    dnsTtlSeconds: 30
    weight:
      ottawa: 33
      robbinsdale: 33
      stpetersburg: 34
