---
# GSLB for the Tailscale home gateway via ts.keiretsu.top zone.
# References the ts gateway's envoy Service directly so k8gb reads
# Tailscale CGNAT IPs from service.status.loadBalancer.ingress.
# No exposed-hostnames annotation = IPs come from service status.
apiVersion: k8gb.absa.oss/v1beta1
kind: Gslb
metadata:
  name: ts-gateway
  namespace: envoy-gateway-system
  annotations:
    k8gb.io/hostname: "keiretsu.ts.${COMMON_DOMAIN}"
spec:
  resourceRef:
    apiVersion: v1
    kind: Service
    name: envoy-home-ts-bf7a3964
  strategy:
    type: roundRobin
    dnsTtlSeconds: 30
    weight:
      ottawa: 33
      robbinsdale: 33
      stpetersburg: 34
