---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: prometheus-cdn
  namespace: keiretsu-top
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: public
      namespace: home
  hostnames:
    - "prometheus.cdn.${COMMON_DOMAIN}"
  rules:
    - backendRefs:
        - name: prometheus-server
          port: 80
      matches:
        - path:
            type: PathPrefix
            value: /
---
apiVersion: k8gb.absa.oss/v1beta1
kind: Gslb
metadata:
  name: prometheus-status
  namespace: keiretsu-top
  annotations:
    k8gb.io/exposed-hostnames: "${LOCATION}.${COMMON_DOMAIN}"
spec:
  resourceRef:
    apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    name: prometheus-cdn
  strategy:
    type: failover
    dnsTtlSeconds: 30
    primaryGeoTag: robbinsdale
