---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pocket-id-cdn
  namespace: keiretsu-top
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: public
      namespace: home
  hostnames:
    - "pocket-id.cdn.${COMMON_DOMAIN}"
    - "pocket-id.${COMMON_DOMAIN}"
  rules:
    - backendRefs:
        - name: pocket-id
          namespace: pocket-id
          port: 1411
      matches:
        - path:
            type: PathPrefix
            value: /
---
apiVersion: k8gb.absa.oss/v1beta1
kind: Gslb
metadata:
  name: pocket-id
  namespace: keiretsu-top
  annotations:
    k8gb.io/exposed-hostnames: "${LOCATION}.${COMMON_DOMAIN}"
spec:
  resourceRef:
    apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    name: pocket-id-cdn
  strategy:
    type: roundRobin
    dnsTtlSeconds: 30
    weight:
      ottawa: 100
      robbinsdale: 0
      stpetersburg: 0
