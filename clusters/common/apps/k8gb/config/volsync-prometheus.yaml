---
apiVersion: garage.rajsingh.info/v1alpha1
kind: GarageKey
metadata:
  name: volsync-prometheus-key
  namespace: garage
spec:
  clusterRef:
    name: garage
    namespace: garage
  name: "Volsync Prometheus Key"
  secretTemplate:
    name: restic-prometheus-data
    namespace: keiretsu-top
    accessKeyIdKey: AWS_ACCESS_KEY_ID
    secretAccessKeyKey: AWS_SECRET_ACCESS_KEY
    includeEndpoint: false
    includeRegion: false
    additionalData:
      RESTIC_REPOSITORY: "s3:http://${COMMON_S3_ENDPOINT}/keiretsu/shared/keiretsu-top/prometheus"
      RESTIC_PASSWORD: "${COMMON_RESTIC_SECRET}"
  bucketPermissions:
    - globalAlias: keiretsu
      read: true
      write: true
---
# Backup: restic snapshot of prometheus PVC every 6 hours
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: prometheus-data
  namespace: keiretsu-top
spec:
  sourcePVC: prometheus-server
  trigger:
    schedule: "0 */6 * * *"
  restic:
    pruneIntervalDays: 14
    repository: restic-prometheus-data
    retain:
      hourly: 1
      daily: 3
      weekly: 4
      monthly: 2
      yearly: 1
    copyMethod: Direct
---
# Warm cache: restores latest restic snapshot into the prometheus PVC
# every 6 hours (offset 3h from backup). On standby clusters this keeps
# the PVC fresh so prometheus can start immediately on failover.
# On the active cluster the restore is a no-op (same data).
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: prometheus-data-dst
  namespace: keiretsu-top
spec:
  trigger:
    schedule: "0 3,9,15,21 * * *"
  restic:
    repository: restic-prometheus-data
    copyMethod: Direct
    accessModes: ["ReadWriteOnce"]
    capacity: 10Gi
    destinationPVC: prometheus-server
