---
apiVersion: v1
kind: Secret
metadata:
  name: restic-prometheus-data
  namespace: keiretsu-top
type: Opaque
stringData:
  RESTIC_REPOSITORY: s3:http://garage.garage.svc.cluster.local:3900/keiretsu-top/${LOCATION}/prometheus
  RESTIC_PASSWORD: ${COMMON_RESTIC_SECRET}
  AWS_ACCESS_KEY_ID: GK8432cfa4e109b3445ffa289c
  AWS_SECRET_ACCESS_KEY: 349c07ad4d11c793246023b6091e8e4469227901f616e8367595b99c8f8c8b4d
---
# Backup: restic snapshot of prometheus PVC every 6 hours
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: prometheus-data
  namespace: keiretsu-top
spec:
  sourcePVC: prometheus-server
  trigger:
    schedule: "0 */6 * * *"
  restic:
    pruneIntervalDays: 14
    repository: restic-prometheus-data
    retain:
      hourly: 1
      daily: 3
      weekly: 4
      monthly: 2
      yearly: 1
    copyMethod: Direct
---
# Restore target: keeps latest VolumeSnapshot from restic backup
# On clusters with VolumeSnapshot support (Ottawa, Robbinsdale), this
# creates a snapshot that can be used as a PVC dataSource for recovery.
# On StPetersburg (no snapshot support), this will remain idle.
# To restore: create a PVC with dataSourceRef pointing to this resource,
# or use copyMethod: Direct with destinationPVC for manual restore.
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: prometheus-data-dst
  namespace: keiretsu-top
spec:
  trigger:
    manual: standby
  restic:
    repository: restic-prometheus-data
    copyMethod: Direct
    accessModes: ["ReadWriteOnce"]
    capacity: 10Gi
    destinationPVC: prometheus-server
