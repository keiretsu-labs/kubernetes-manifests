---
apiVersion: garage.rajsingh.info/v1alpha1
kind: GarageKey
metadata:
  name: volsync-prometheus-key
  namespace: garage
spec:
  clusterRef:
    name: garage
    namespace: garage
  name: "Volsync Prometheus Key"
  secretTemplate:
    name: restic-prometheus-data
    namespace: keiretsu-top
    accessKeyIdKey: AWS_ACCESS_KEY_ID
    secretAccessKeyKey: AWS_SECRET_ACCESS_KEY
    includeEndpoint: false
    includeRegion: false
    additionalData:
      RESTIC_REPOSITORY: "s3:http://${COMMON_S3_ENDPOINT}/keiretsu/${LOCATION}/keiretsu-top/prometheus"
      RESTIC_PASSWORD: "${COMMON_RESTIC_SECRET}"
  bucketPermissions:
    - globalAlias: keiretsu
      read: true
      write: true
---
# Backup: restic snapshot of prometheus PVC every 6 hours
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: prometheus-data
  namespace: keiretsu-top
spec:
  sourcePVC: prometheus-server
  trigger:
    schedule: "0 */6 * * *"
  restic:
    pruneIntervalDays: 14
    repository: restic-prometheus-data
    retain:
      hourly: 1
      daily: 3
      weekly: 4
      monthly: 2
      yearly: 1
    copyMethod: Direct
---
# Restore target: keeps latest VolumeSnapshot from restic backup
# On clusters with VolumeSnapshot support (Ottawa, Robbinsdale), this
# creates a snapshot that can be used as a PVC dataSource for recovery.
# On StPetersburg (no snapshot support), this will remain idle.
# To restore: create a PVC with dataSourceRef pointing to this resource,
# or use copyMethod: Direct with destinationPVC for manual restore.
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: prometheus-data-dst
  namespace: keiretsu-top
spec:
  trigger:
    manual: standby
  restic:
    repository: restic-prometheus-data
    copyMethod: Direct
    accessModes: ["ReadWriteOnce"]
    capacity: 10Gi
    destinationPVC: prometheus-server
