---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: k8gb
  namespace: k8gb
spec:
  interval: 30m
  chart:
    spec:
      chart: k8gb
      version: "*"
      sourceRef:
        kind: HelmRepository
        name: k8gb
        namespace: flux-system
  values:
    k8gb:
      clusterGeoTag: "${LOCATION}"
      extGslbClustersGeoTags: "${K8GB_EXT_GEO_TAGS}"
      dnsZones:
        - parentZone: "keiretsu.top"
          loadBalancedZone: "gslb.keiretsu.top"
          dnsZoneNegTTL: 30
      edgeDNSServers:
        - "1.1.1.1"
      nsRecordTTL: 30
      reconcileRequeueSeconds: 30

    coredns:
      serviceType: LoadBalancer
      service:
        loadBalancerIP: "${CLUSTER_LOAD_BALANCER_CIDR%.*.*/*}.10.53"

    extdns:
      enabled: false

    gatewayapi:
      enabled: true
