---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: mimir
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  datasource:
    name: Mimir
    type: prometheus
    uid: mimir
    access: proxy
    url: http://mimir.monitoring.svc.cluster.local:8080/prometheus
    isDefault: false
    jsonData:
      timeInterval: 30s
      httpMethod: GET
    editable: false
