---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: setec
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: setec
  template:
    metadata:
      labels:
        app: setec
    spec:
      initContainers:
        - name: generate-authkey
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              TOKEN=$$(curl -sf -d "client_id=$$CLIENT_ID" -d "client_secret=$$CLIENT_SECRET" \
                "https://api.tailscale.com/api/v2/oauth/token" | sed -n 's/.*"access_token":"\([^"]*\)".*/\1/p')
              if [ -z "$$TOKEN" ]; then
                echo "Failed to get OAuth access token"
                exit 1
              fi
              AUTHKEY=$$(curl -sf -X POST \
                -H "Authorization: Bearer $$TOKEN" \
                -H "Content-Type: application/json" \
                -d '{"capabilities":{"devices":{"create":{"reusable":false,"ephemeral":true,"preauthorized":true,"tags":["tag:k8s"]}}}}' \
                "https://api.tailscale.com/api/v2/tailnet/-/keys" | sed -n 's/.*"key":"\([^"]*\)".*/\1/p')
              if [ -z "$$AUTHKEY" ]; then
                echo "Failed to generate auth key"
                exit 1
              fi
              echo "$$AUTHKEY" > /auth/ts-authkey
              echo "Auth key generated successfully"
          env:
            - name: CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: setec-tailscale
                  key: client_id
            - name: CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: setec-tailscale
                  key: client_secret
          volumeMounts:
            - name: auth
              mountPath: /auth
        - name: restore-backup
          image: amazon/aws-cli:latest
          command:
            - sh
            - -c
            - |
              export AWS_ENDPOINT_URL_S3="http://$$S3_ENDPOINT"
              LATEST=$$(aws s3 ls s3://setec/ --recursive 2>/dev/null | sort | tail -1 | awk '{print $$4}')
              if [ -n "$$LATEST" ]; then
                echo "Restoring backup: $$LATEST"
                aws s3 cp "s3://setec/$$LATEST" /app/state/database
                echo "Restore complete"
              else
                echo "No backup found, starting fresh"
              fi
          env:
            - name: S3_ENDPOINT
              value: "${COMMON_S3_ENDPOINT}"
          envFrom:
            - secretRef:
                name: setec-s3-auth
          volumeMounts:
            - name: state
              mountPath: /app/state
      containers:
        - name: setec
          image: ghcr.io/rajsinghtech/setec:latest
          command:
            - sh
            - -c
            - |
              export TS_AUTHKEY=$$(cat /auth/ts-authkey)
              exec ./setec server --dev \
                --hostname ${LOCATION}-secrets \
                --state-dir /app/state \
                --backup-bucket setec \
                --backup-bucket-region garage
          env:
            - name: AWS_ENDPOINT_URL_S3
              value: "http://${COMMON_S3_ENDPOINT}"
          envFrom:
            - secretRef:
                name: setec-s3-auth
          volumeMounts:
            - name: state
              mountPath: /app/state
            - name: auth
              mountPath: /auth
              readOnly: true
      volumes:
        - name: state
          emptyDir: {}
        - name: auth
          emptyDir:
            medium: Memory
