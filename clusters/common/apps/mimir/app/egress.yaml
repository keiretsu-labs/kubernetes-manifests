---
# Cross-cluster memberlist gossip endpoints via Tailscale egress
# All 3 are deployed on every cluster; each cluster uses the others for ring bootstrap
apiVersion: v1
kind: Service
metadata:
  name: ottawa-mimir
  annotations:
    tailscale.com/tailnet-fqdn: ottawa-mimir.keiretsu.ts.net
spec:
  type: ExternalName
  externalName: placeholder
  ports:
    - name: gossip
      port: 7946
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: robbinsdale-mimir
  annotations:
    tailscale.com/tailnet-fqdn: robbinsdale-mimir.keiretsu.ts.net
spec:
  type: ExternalName
  externalName: placeholder
  ports:
    - name: gossip
      port: 7946
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: stpetersburg-mimir
  annotations:
    tailscale.com/tailnet-fqdn: stpetersburg-mimir.keiretsu.ts.net
spec:
  type: ExternalName
  externalName: placeholder
  ports:
    - name: gossip
      port: 7946
      protocol: TCP
