---
# Tailscale LB exposing memberlist gossip port per cluster
# Hostname: ${LOCATION}-mimir.keiretsu.ts.net — used for cross-cluster ring discovery
apiVersion: v1
kind: Service
metadata:
  name: mimir-gossip-ts
  annotations:
    tailscale.com/hostname: ${LOCATION}-mimir
    tailscale.com/tags: "tag:k8s,tag:${LOCATION}"
    tailscale.com/proxy-group: common-ingress
spec:
  selector:
    app.kubernetes.io/name: mimir
    app.kubernetes.io/instance: mimir
  type: LoadBalancer
  loadBalancerClass: tailscale
  ports:
    - name: gossip
      port: 7946
      targetPort: 7946
      protocol: TCP
