---
# Tailscale LB exposing memberlist gossip port per cluster
# No proxy-group: creates a regular Tailscale device (not VIP) discoverable by egress proxy pods
apiVersion: v1
kind: Service
metadata:
  name: mimir-gossip-ts
  annotations:
    tailscale.com/hostname: ${LOCATION}-mimir
    tailscale.com/tags: "tag:k8s,tag:${LOCATION}"
spec:
  selector:
    app.kubernetes.io/name: mimir
    app.kubernetes.io/instance: mimir
    app.kubernetes.io/component: ingester
  type: LoadBalancer
  loadBalancerClass: tailscale
  ports:
    - name: gossip
      port: 7946
      targetPort: 7946
      protocol: TCP
