---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tsk9s
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: tsk9s
  template:
    metadata:
      labels:
        app: tsk9s
    spec:
      containers:
      - name: tsk9s
        image: ghcr.io/rajsinghtech/tsk9s:v0.1.5
        args:
          - --state-dir=/data/tsk9s-state
          - --hostname=${LOCATION}-tsk9s
          - --endpoints=ottawa-k8s.keiretsu.ts.net,robbinsdale-k8s.keiretsu.ts.net,stpetersburg-k8s.keiretsu.ts.net
          - --local-addr=0.0.0.0:8080
          - --tags=tag:k8s,tag:${LOCATION}
        env:
        - name: TS_AUTHKEY
          valueFrom:
            secretKeyRef:
              name: ts-oauth
              key: TS_AUTHKEY_EPHEMERAL
              optional: true
        ports:
        - containerPort: 8080
          name: http
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        emptyDir: {}
