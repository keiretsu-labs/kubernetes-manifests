---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tsflow
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: tsflow
  template:
    metadata:
      labels:
        app: tsflow
    spec:
      containers:
      - name: tsflow
        image: ghcr.io/rajsinghtech/tsflow:v1.6.1
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        env:
        - name: TSFLOW_FLOW_BACKEND
          value: "s3"
        - name: TSFLOW_S3_BUCKET
          value: "tailscale-logs"
        - name: TSFLOW_S3_PREFIX
          value: "network/"
        - name: TSFLOW_S3_ENDPOINT
          value: "http://garage.garage.svc.cluster.local:3900"
        - name: TSFLOW_S3_REGION
          value: "garage"
        - name: TSFLOW_S3_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: tsflow-tailscale-logs-s3-auth
              key: TSFLOW_S3_ACCESS_KEY_ID
        - name: TSFLOW_S3_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: tsflow-tailscale-logs-s3-auth
              key: TSFLOW_S3_SECRET_ACCESS_KEY
        - name: TSFLOW_INITIAL_BACKFILL
          value: "6h"
        - name: ENVIRONMENT
          value: "production"
        - name: TAILSCALE_TAILNET
          value: "-"
        - name: TAILSCALE_OAUTH_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: ts-oauth
              key: client_id
        - name: TAILSCALE_OAUTH_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: ts-oauth
              key: client_secret
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - name: data
          mountPath: /app/data
        # resources:
        #   requests:
        #     memory: "128Mi"
        #     cpu: "100m"
        #   limits:
        #     memory: "1512Mi"
        #     cpu: "1000m"
      volumes:
      - name: data
        emptyDir: {}
