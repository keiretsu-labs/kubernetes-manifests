---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: cdn
spec:
  telemetry:
    metrics:
      prometheus:
        compression:
          type: Gzip
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        replicas: 2
      envoyService:
        annotations:
          tailscale.com/hostname: ${LOCATION}-keiretsu-cdn-gateway
          tailscale.com/tags: tag:k8s
          tailscale.com/proxy-group: common-ingress
        loadBalancerClass: tailscale
