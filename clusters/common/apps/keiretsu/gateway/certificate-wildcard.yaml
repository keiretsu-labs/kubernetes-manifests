---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-cdn-keiretsu-com
spec:
  dnsNames:
    - '*.cdn.keiretsu.com'
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: keiretsu-com
  secretName: wildcard-cdn-keiretsu-com
  usages:
    - digital signature
    - key encipherment
