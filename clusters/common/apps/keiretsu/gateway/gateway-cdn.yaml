---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: cdn
  labels:
    external-dns: keiretsu
spec:
  gatewayClassName: keiretsu-cdn
  listeners:
    - name: wildcard-cdn-keiretsu-top-https
      protocol: HTTPS
      port: 443
      hostname: "*.cdn.keiretsu.top"
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        certificateRefs:
          - group: ''
            kind: Secret
            name: wildcard-cdn-keiretsu-top
    - name: http
      port: 80
      protocol: HTTP
