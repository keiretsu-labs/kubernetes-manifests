---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-${CLUSTER_DOMAIN//./-}
spec:
  dnsNames:
    - '*.${CLUSTER_DOMAIN}'
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: ${CLUSTER_DOMAIN//./-}
  secretName: wildcard-${CLUSTER_DOMAIN//./-}
  usages:
    - digital signature
    - key encipherment
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-${COMMON_DOMAIN//./-}
spec:
  dnsNames:
    - '*.${COMMON_DOMAIN}'
    - '${COMMON_DOMAIN}'
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: keiretsu-top
  secretName: wildcard-${COMMON_DOMAIN//./-}
  usages:
    - digital signature
    - key encipherment
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-cdn-keiretsu-top
spec:
  dnsNames:
    - '*.cdn.keiretsu.top'
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: keiretsu-top
  secretName: wildcard-cdn-keiretsu-top
  usages:
    - digital signature
    - key encipherment