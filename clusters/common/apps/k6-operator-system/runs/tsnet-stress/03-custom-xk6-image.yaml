# Mode 3 (Phase 2 - placeholder): custom xk6 build with an xk6-tsnet extension.
# Build the image first - see ../README.md.
#   sed "s/CLUSTER_SRC_VALUE/$(kubectl get cm -n k6-operator-system cluster-info -o jsonpath='{.data.CLUSTER_NAME}')/" 03-custom-xk6-image.yaml | kubectl create -f -
---
apiVersion: k6.io/v1alpha1
kind: TestRun
metadata:
  generateName: tsnet-xk6-burst-
  namespace: k6-operator-system
spec:
  parallelism: 2
  cleanup: post
  script:
    configMap:
      name: k6-test-dialer-burst
      file: dialer-burst.js
  arguments: >-
    --out experimental-prometheus-rw
    --tag cluster_src=CLUSTER_SRC_VALUE
    --tag cluster_dst=robbinsdale
    --tag transport=tsnet-xk6
    --tag payload=small
    --tag k6_version=xk6-tsnet-placeholder
  runner:
    image: ghcr.io/rajsinghtech/xk6-tsnet:placeholder
    envFrom:
      - configMapRef:
          name: cluster-info
          optional: true
    env:
      - name: TARGET_URL
        value: "http://hello-world-robbinsdale.tailscale-examples"
      - name: TS_AUTHKEY
        valueFrom:
          secretKeyRef:
            name: k6-tsnet-authkey
            key: TS_AUTHKEY
    resources:
      requests: { cpu: 500m, memory: 512Mi }
      limits:   { cpu: 2000m, memory: 1Gi }
