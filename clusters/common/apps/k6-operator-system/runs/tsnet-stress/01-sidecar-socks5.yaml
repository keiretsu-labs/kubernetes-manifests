# Apply: substitute TARGET_LOCATION + CLUSTER_SRC_VALUE
#   sed -e "s/TARGET_LOCATION/robbinsdale/g" \
#       -e "s/CLUSTER_SRC_VALUE/$(kubectl get cm -n k6-operator-system cluster-info -o jsonpath='{.data.CLUSTER_NAME}')/" \
#       01-sidecar-socks5.yaml | kubectl create -f -
#
# Prereq: k6-tsnet-authkey Secret with TS_AUTHKEY (tag:k8s)
---
apiVersion: k6.io/v1alpha1
kind: TestRun
metadata:
  generateName: tsnet-sidecar-burst-to-TARGET_LOCATION-
  namespace: k6-operator-system
spec:
  parallelism: 2
  cleanup: post
  script:
    configMap:
      name: k6-test-dialer-burst
      file: dialer-burst.js
  arguments: >-
    --out experimental-prometheus-rw
    --tag cluster_src=CLUSTER_SRC_VALUE
    --tag cluster_dst=TARGET_LOCATION
    --tag transport=tsnet-sidecar
    --tag payload=small
    --tag k6_version=0.55.0
  runner:
    image: grafana/k6:2.0.0
    envFrom:
      - configMapRef:
          name: cluster-info
          optional: true
    env:
      - name: TARGET_URL
        value: "http://hello-world-TARGET_LOCATION.tailscale-examples"
      - name: HTTP_PROXY
        value: "socks5://localhost:1055"
      - name: HTTPS_PROXY
        value: "socks5://localhost:1055"
      - name: PEAK_RATE
        value: "200"
      - name: HOLD
        value: "2m"
      - name: PRE_VUS
        value: "100"
      - name: MAX_VUS
        value: "1000"
    resources:
      requests: { cpu: 500m, memory: 512Mi }
      limits:   { cpu: 2000m, memory: 1Gi }
    initContainers:
      - name: tailscale
        image: ghcr.io/tailscale/tailscale:latest
        restartPolicy: Always
        env:
          - { name: TS_USERSPACE,      value: "true" }
          - { name: TS_SOCKS5_SERVER,  value: ":1055" }
          - { name: TS_HOSTNAME,       value: "k6-tsnet-runner" }
          - { name: TS_KUBE_SECRET,    value: "" }
          - name: TS_AUTHKEY
            valueFrom:
              secretKeyRef:
                name: k6-tsnet-authkey
                key: TS_AUTHKEY
        securityContext:
          runAsUser: 0
          capabilities:
            add: ["NET_ADMIN"]
        resources:
          requests: { cpu: 100m, memory: 128Mi }
          limits:   { cpu: 1000m, memory: 512Mi }
