# Mode 2: hits the operator's tsnet ingress path via the existing tailnet
# hostname. Apply:
#   sed -e "s/TARGET_LOCATION/robbinsdale/g" \
#       -e "s/CLUSTER_SRC_VALUE/$(kubectl get cm -n k6-operator-system cluster-info -o jsonpath='{.data.CLUSTER_NAME}')/" \
#       02-proxygroup-ingress.yaml | kubectl create -f -
---
apiVersion: k6.io/v1alpha1
kind: TestRun
metadata:
  generateName: tsnet-pgi-burst-to-TARGET_LOCATION-
  namespace: k6-operator-system
spec:
  parallelism: 2
  cleanup: post
  script:
    configMap:
      name: k6-test-dialer-burst
      file: dialer-burst.js
  arguments: >-
    --out experimental-prometheus-rw
    --tag cluster_src=CLUSTER_SRC_VALUE
    --tag cluster_dst=TARGET_LOCATION
    --tag transport=ts-proxygroup-ingress
    --tag payload=small
    --tag k6_version=0.55.0
  runner:
    image: grafana/k6:0.55.0
    envFrom:
      - configMapRef:
          name: cluster-info
          optional: true
    env:
      - name: TARGET_URL
        value: "http://hello-world-TARGET_LOCATION.tailscale-examples"
      - name: PEAK_RATE
        value: "200"
      - name: HOLD
        value: "2m"
    resources:
      requests: { cpu: 200m, memory: 256Mi }
      limits:   { cpu: 1000m, memory: 512Mi }
