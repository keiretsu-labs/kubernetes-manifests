---
# Apply: substitute CLUSTER_SRC_VALUE then create.
#   sed "s/CLUSTER_SRC_VALUE/$(kubectl get cm -n k6-operator-system cluster-info -o jsonpath='{.data.CLUSTER_NAME}')/" lan-bandwidth.yaml | kubectl create -f -
apiVersion: k6.io/v1alpha1
kind: TestRun
metadata:
  generateName: lan-bandwidth-
  namespace: k6-operator-system
spec:
  parallelism: 4
  cleanup: post
  script:
    configMap:
      name: k6-test-bandwidth
      file: bandwidth.js
  arguments: >-
    --out experimental-prometheus-rw
    --tag cluster_src=CLUSTER_SRC_VALUE
    --tag cluster_dst=lan
    --tag transport=lan
    --tag payload=10mb
    --tag k6_version=0.55.0
  runner:
    image: grafana/k6:0.59.0
    envFrom:
      - configMapRef:
          name: cluster-info
          optional: true
    env:
      - name: TARGET_URL
        value: "http://hello-world.tailscale-examples"
      - name: PATH_SUFFIX
        value: "/10mb"
      - name: VUS
        value: "4"
      - name: DURATION
        value: "2m"
    resources:
      requests: { cpu: 200m, memory: 256Mi }
      limits:   { cpu: 1000m, memory: 512Mi }
