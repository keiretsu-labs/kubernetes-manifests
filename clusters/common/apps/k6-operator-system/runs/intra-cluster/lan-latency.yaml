---
apiVersion: k6.io/v1alpha1
kind: TestRun
metadata:
  generateName: lan-latency-
  namespace: k6-operator-system
spec:
  parallelism: 4
  cleanup: post
  script:
    configMap:
      name: k6-test-latency
      file: latency.js
  arguments: --out experimental-prometheus-rw
  runner:
    image: grafana/k6:0.55.0
    env:
      - name: TARGET_URL
        value: "http://hello-world.tailscale-examples"
      - name: CLUSTER_SRC
        valueFrom:
          configMapKeyRef:
            name: cluster-settings
            key: CLUSTER_NAME
            optional: true
      - name: CLUSTER_DST
        value: "lan"
      - name: TRANSPORT
        value: "lan"
      - name: PAYLOAD
        value: "small"
      - name: VUS
        value: "5"
      - name: DURATION
        value: "2m"
      - name: K6_VERSION
        value: "0.55.0"
      - name: K6_PROMETHEUS_RW_SERVER_URL
        value: "http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090/api/v1/write"
      - name: K6_PROMETHEUS_RW_TREND_STATS
        value: "p(50),p(90),p(95),p(99),min,max,avg"
      - name: K6_PROMETHEUS_RW_PUSH_INTERVAL
        value: "5s"
    resources:
      requests: { cpu: 100m, memory: 128Mi }
      limits:   { cpu: 500m, memory: 256Mi }
