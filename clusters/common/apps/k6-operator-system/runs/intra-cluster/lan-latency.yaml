---
apiVersion: k6.io/v1alpha1
kind: TestRun
metadata:
  generateName: lan-latency-
  namespace: k6-operator-system
spec:
  parallelism: 4
  cleanup: post
  script:
    configMap:
      name: k6-test-latency
      file: latency.js
  # Tags pass via --tag (CLI) so they reliably propagate to Prometheus labels.
  # cluster_src is set at apply time. Use sed or envsubst to substitute SRC.
  #   sed "s/CLUSTER_SRC_VALUE/$(kubectl get cm -n k6-operator-system cluster-info -o jsonpath='{.data.CLUSTER_NAME}')/" lan-latency.yaml | kubectl create -f -
  arguments: >-
    --out experimental-prometheus-rw
    --tag cluster_src=CLUSTER_SRC_VALUE
    --tag cluster_dst=lan
    --tag transport=lan
    --tag payload=small
    --tag k6_version=0.55.0
  runner:
    image: grafana/k6:0.55.0
    envFrom:
      - configMapRef:
          name: cluster-info
          optional: true
    env:
      - name: TARGET_URL
        value: "http://hello-world.tailscale-examples"
      - name: VUS
        value: "5"
      - name: DURATION
        value: "2m"
      - name: K6_PROMETHEUS_RW_SERVER_URL
        value: "http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090/api/v1/write"
      - name: K6_PROMETHEUS_RW_TREND_STATS
        value: "p(50),p(90),p(95),p(99),min,max,avg"
      - name: K6_PROMETHEUS_RW_PUSH_INTERVAL
        value: "5s"
    resources:
      requests: { cpu: 100m, memory: 128Mi }
      limits:   { cpu: 500m, memory: 256Mi }
