# Template - substitute TARGET_LOCATION, TAILNET_DOMAIN, CLUSTER_SRC_VALUE
#   sed -e "s/TARGET_LOCATION/robbinsdale/g" \
#       -e "s/TAILNET_DOMAIN/keiretsu.ts.net/g" \
#       -e "s/CLUSTER_SRC_VALUE/$(kubectl get cm -n k6-operator-system cluster-info -o jsonpath='{.data.CLUSTER_NAME}')/" \
#       latency-template.yaml | kubectl create -f -
---
apiVersion: k6.io/v1alpha1
kind: TestRun
metadata:
  generateName: funnel-latency-to-TARGET_LOCATION-
  namespace: k6-operator-system
spec:
  parallelism: 4
  cleanup: post
  script:
    configMap:
      name: k6-test-latency
      file: latency.js
  arguments: >-
    --out experimental-prometheus-rw
    --insecure-skip-tls-verify
    --tag cluster_src=CLUSTER_SRC_VALUE
    --tag cluster_dst=TARGET_LOCATION
    --tag transport=funnel
    --tag payload=small
    --tag k6_version=0.55.0
  runner:
    image: grafana/k6:0.55.0
    # CoreDNS forwards *.ts.net to the Tailscale DNS proxy, which does not
    # resolve Funnel public IPs. Pass HOSTS_OVERRIDE so the script uses
    # k6's options.hosts to map the funnel hostname to a public IP.
    # Get the IP at apply time:
    #   PUBLIC_IP=$(dig +short ottawa-tailscale-examples-hello-world-funnel.keiretsu.ts.net @8.8.8.8 | head -1)
    envFrom:
      - configMapRef:
          name: cluster-info
          optional: true
    env:
      - name: TARGET_URL
        value: "https://TARGET_LOCATION-tailscale-examples-hello-world-funnel.TAILNET_DOMAIN"
      - name: HOSTS_OVERRIDE
        # Substitute PUBLIC_IP at apply time (see comment above on runner).
        value: "TARGET_LOCATION-tailscale-examples-hello-world-funnel.TAILNET_DOMAIN=PUBLIC_IP"
      - name: VUS
        value: "5"
      - name: DURATION
        value: "2m"
    resources:
      requests: { cpu: 100m, memory: 128Mi }
      limits:   { cpu: 500m, memory: 256Mi }
