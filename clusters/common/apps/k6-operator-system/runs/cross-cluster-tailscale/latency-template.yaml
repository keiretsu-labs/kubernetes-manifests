# Template - substitute TARGET_LOCATION and CLUSTER_SRC_VALUE before kubectl create.
#   sed -e "s/TARGET_LOCATION/robbinsdale/g" \
#       -e "s/CLUSTER_SRC_VALUE/$(kubectl get cm -n k6-operator-system cluster-info -o jsonpath='{.data.CLUSTER_NAME}')/" \
#       latency-template.yaml | kubectl create -f -
#
# Valid TARGET_LOCATION: robbinsdale, ottawa, stpetersburg
---
apiVersion: k6.io/v1alpha1
kind: TestRun
metadata:
  generateName: ts-latency-to-TARGET_LOCATION-
  namespace: k6-operator-system
spec:
  parallelism: 4
  cleanup: post
  script:
    configMap:
      name: k6-test-latency
      file: latency.js
  arguments: >-
    --out experimental-prometheus-rw
    --tag cluster_src=CLUSTER_SRC_VALUE
    --tag cluster_dst=TARGET_LOCATION
    --tag transport=ts-egress
    --tag payload=small
    --tag k6_version=0.55.0
  runner:
    image: grafana/k6:0.59.0
    envFrom:
      - configMapRef:
          name: cluster-info
          optional: true
    env:
      - name: TARGET_URL
        value: "http://hello-world-TARGET_LOCATION.tailscale-examples"
      - name: VUS
        value: "5"
      - name: DURATION
        value: "2m"
    resources:
      requests: { cpu: 100m, memory: 128Mi }
      limits:   { cpu: 500m, memory: 256Mi }
