# Template - substitute TARGET_LOCATION + CLUSTER_SRC_VALUE before kubectl create.
#   sed -e "s/TARGET_LOCATION/robbinsdale/g" \
#       -e "s/CLUSTER_SRC_VALUE/$(kubectl get cm -n k6-operator-system cluster-info -o jsonpath='{.data.CLUSTER_NAME}')/" \
#       bandwidth-template.yaml | kubectl create -f -
---
apiVersion: k6.io/v1alpha1
kind: TestRun
metadata:
  generateName: ts-bandwidth-to-TARGET_LOCATION-
  namespace: k6-operator-system
spec:
  parallelism: 4
  cleanup: post
  script:
    configMap:
      name: k6-test-bandwidth
      file: bandwidth.js
  arguments: >-
    --out experimental-prometheus-rw
    --tag cluster_src=CLUSTER_SRC_VALUE
    --tag cluster_dst=TARGET_LOCATION
    --tag transport=ts-egress
    --tag payload=10mb
    --tag k6_version=0.55.0
  runner:
    image: grafana/k6:2.0.0
    envFrom:
      - configMapRef:
          name: cluster-info
          optional: true
    env:
      - name: TARGET_URL
        value: "http://hello-world-TARGET_LOCATION.tailscale-examples"
      - name: PATH_SUFFIX
        value: "/10mb"
      - name: VUS
        value: "4"
      - name: DURATION
        value: "3m"
    resources:
      requests: { cpu: 200m, memory: 256Mi }
      limits:   { cpu: 1000m, memory: 512Mi }
