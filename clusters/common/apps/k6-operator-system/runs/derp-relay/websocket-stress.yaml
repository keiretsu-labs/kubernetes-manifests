# Apply: substitute CLUSTER_SRC_VALUE; CLUSTER_DOMAIN comes from cluster-info.
#   sed "s/CLUSTER_SRC_VALUE/$(kubectl get cm -n k6-operator-system cluster-info -o jsonpath='{.data.CLUSTER_NAME}')/" websocket-stress.yaml | kubectl create -f -
---
apiVersion: k6.io/v1alpha1
kind: TestRun
metadata:
  generateName: derp-ws-stress-
  namespace: k6-operator-system
spec:
  parallelism: 2
  cleanup: post
  script:
    configMap:
      name: k6-test-derp
      file: derp.js
  arguments: >-
    --out experimental-prometheus-rw
    --insecure-skip-tls-verify
    --tag cluster_src=CLUSTER_SRC_VALUE
    --tag cluster_dst=local-derper
    --tag transport=ts-derp
    --tag payload=ws
    --tag k6_version=0.55.0
  runner:
    image: grafana/k6:2.0.0
    envFrom:
      - configMapRef:
          name: cluster-info
          optional: true
    env:
      - name: TARGET_URL_TEMPLATE
        value: "wss://derp.${CLUSTER_DOMAIN}/derp"
      - name: VUS
        value: "30"
      - name: HOLD_MS
        value: "120000"
    resources:
      requests: { cpu: 200m, memory: 256Mi }
      limits:   { cpu: 1000m, memory: 512Mi }
