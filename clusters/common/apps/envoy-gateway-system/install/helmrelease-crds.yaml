---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway-crds
  namespace: envoy-gateway-system
spec:
  interval: 5m
  chart:
    spec:
      chart: gateway-crds
      version: 1.7.0
      sourceRef:
        kind: HelmRepository
        name: envoy-gateway
        namespace: flux-system
      interval: 1m
  releaseName: envoy-gateway-crds
  values:
    crds:
      envoyGateway:
        enabled: true
      gatewayAPI:
        enabled: true
