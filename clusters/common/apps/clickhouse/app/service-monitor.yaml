---
# ServiceMonitor for ClickHouse operator metrics
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: clickhouse-operator
  namespace: clickhouse
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: clickhouse-operator
  namespaceSelector:
    matchNames:
      - clickhouse-operator-system
  endpoints:
    - port: metrics
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
      metricRelabelings:
        - action: labeldrop
          regex: __.*

---
# ClickHouse pod metrics (from ClickHouse itself)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: clickhouse-pods
  namespace: clickhouse
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: clickhouse
      app.kubernetes.io/instance: clickhouse
  namespaceSelector:
    matchNames:
      - clickhouse
  endpoints:
    - port: metrics
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
      metricRelabelings:
        - action: labeldrop
          regex: __.*

---
# ClickHouse HTTP interface metrics
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: clickhouse-http
  namespace: clickhouse
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: clickhouse
      app.kubernetes.io/instance: clickhouse
  namespaceSelector:
    matchNames:
      - clickhouse
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
      metricRelabelings:
        - action: labeldrop
          regex: __.*

---
