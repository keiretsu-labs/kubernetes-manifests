---
apiVersion: install.clickhouse.com/v1beta1
kind: ClickHouseInstallation
metadata:
  name: clickhouse
  namespace: clickhouse
spec:
  cluster:
    name: "${LOCATION}"
    tcpPort: 9000
    httpPort: 8123
    interserverHttpPort: 9009

    storage:
      volumeClaimTemplate:
        storageClassName: "${STORAGECLASS_LONGTERM}"
        volumeClaimSpec:
          resources:
            requests:
              storage: 50Gi

    network:
      ports:
        - port: 9000
          name: tcp
          service: true
          pod: true
        - port: 8123
          name: http
          service: true
          pod: true
        - port: 9009
          name: interserver
          service: false
          pod: true

    layouts:
      shards:
        - count: 1
          definitionMeta:
            topologyKey: "kubernetes.io/hostname"
          replicationFactor: 1
          replicas: 1

    configuration:
      compression:
        rules:
          - meta:
              regexp: .*
            compressor:
              type: lz4
              level: 1

      metrics:
        endpoint: /metrics
        port: 9363

    resources:
      cpu: 2
      memory: 8Gi

    pod:
      template:
        labels:
          app.kubernetes.io/name: clickhouse
          app.kubernetes.io/instance: clickhouse

        container:
          clickhouse:
            image: clickhouse/clickhouse-server:26.4
            resources:
              requests:
                cpu: 2
                memory: 8Gi
              limits:
                cpu: 4
                memory: 16Gi
            ports:
              tcp: 9000
              http: 8123
              interserver: 9009

        securityContext:
          runAsUser: 1000
          fsGroup: 1000

  namespace:
    name: clickhouse
