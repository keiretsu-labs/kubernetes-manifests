---
# Prometheus Blackbox Exporter — original community dashboard.
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: blackbox-exporter
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  folder: Network
  grafanaCom:
    id: 7587
  datasources:
    - inputName: DS_SIGNCL-PROMETHEUS
      datasourceName: Prometheus
---
# Blackbox Exporter (HTTP prober).
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: blackbox-http-prober
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  folder: Network
  grafanaCom:
    id: 13659
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: Prometheus
---
# Blackbox Exporter Overview (target-relabeled). Note: its bundled UID
# collides with dashboard 7587 (both ship "xtkCtBkiz") — last-imported wins.
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: blackbox-exporter-overview
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  folder: Network
  grafanaCom:
    id: 14928
  datasources:
    - inputName: DS_PROMETHEUS-APL
      datasourceName: Prometheus
---
# Blackbox Exporter — "works out of the box" community dashboard.
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: blackbox-exporter-simple
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  folder: Network
  grafanaCom:
    id: 5345
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: Prometheus
