---
apiVersion: v1
kind: Secret
metadata:
  name: ddup-config
type: Opaque
stringData:
  config.yaml: |
    interval: 30s
    domains:
      - recordName: "keiretsu.top"
        provider: "cloudflare"
        ttl: 120
        healthChecks:
          timeout: "5s"
          attempts: 3
        endpoints:
          - name: "ottawa"
            url: "https://ottawa.keiretsu.top"
            ip: "ottawa.keiretsu.top"
            host: "keiretsu.top"
          - name: "robbinsdale"
            url: "https://robbinsdale.keiretsu.top"
            ip: "robbinsdale.keiretsu.top"
            host: "keiretsu.top"
          - name: "stpetersburg"
            url: "https://stpetersburg.keiretsu.top"
            ip: "stpetersburg.keiretsu.top"
            host: "keiretsu.top"
      - recordName: "www.keiretsu.top"
        provider: "cloudflare"
        ttl: 120
        healthChecks:
          timeout: "5s"
          attempts: 3
        endpoints:
          - name: "ottawa"
            url: "https://ottawa.keiretsu.top"
            ip: "ottawa.keiretsu.top"
            host: "www.keiretsu.top"
          - name: "robbinsdale"
            url: "https://robbinsdale.keiretsu.top"
            ip: "robbinsdale.keiretsu.top"
            host: "www.keiretsu.top"
          - name: "stpetersburg"
            url: "https://stpetersburg.keiretsu.top"
            ip: "stpetersburg.keiretsu.top"
            host: "www.keiretsu.top"
      - recordName: "status.keiretsu.top"
        provider: "cloudflare"
        ttl: 120
        healthChecks:
          timeout: "5s"
          attempts: 3
        endpoints:
          - name: "ottawa"
            url: "https://ottawa.keiretsu.top/status"
            ip: "ottawa.keiretsu.top"
            host: "status.keiretsu.top"
          - name: "robbinsdale"
            url: "https://robbinsdale.keiretsu.top/status"
            ip: "robbinsdale.keiretsu.top"
            host: "status.keiretsu.top"
          - name: "stpetersburg"
            url: "https://stpetersburg.keiretsu.top/status"
            ip: "stpetersburg.keiretsu.top"
            host: "status.keiretsu.top"
    providers:
      cloudflare:
        cloudflare:
          apiToken: "${RAJSINGH_INFO_CLOUDFLARE_API_TOKEN}"
          zoneId: "3e149dd72754afa5e7284e1dd3fe526e"
    server:
      enabled: true
      bind: "0.0.0.0"
      port: 7401
    logs:
      level: info
