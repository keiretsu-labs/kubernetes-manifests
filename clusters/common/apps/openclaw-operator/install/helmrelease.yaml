---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openclaw-operator
spec:
  interval: 30m
  chart:
    spec:
      chart: openclaw-operator
      version: "0.34.1"
      sourceRef:
        kind: HelmRepository
        name: openclaw-rocks
        namespace: flux-system
      interval: 1h
  install:
    remediation:
      retries: 3
    crds: CreateReplace
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
    crds: CreateReplace
  values:
    replicaCount: 1
    logLevel: info
    rbac:
      create: true
      aggregateToDefaultRoles: true
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 128Mi
    crds:
      install: true
      keep: true
    networkPolicy:
      enabled: false
