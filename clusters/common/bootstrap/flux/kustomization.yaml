# IMPORTANT: This file is not tracked by flux and should never be. Its
# purpose is to only install the Flux components and CRDs into your cluster.
---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # renovate: datasource=github-releases depName=fluxcd/flux2
  - github.com/fluxcd/flux2/manifests/install?ref=v2.9.3
  - ./secret.yaml
patches:
  # Remove the default network policies
  - patch: |-
      $patch: delete
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: not-used
    target:
      group: networking.k8s.io
      kind: NetworkPolicy
  # Resources renamed to match those installed by oci://ghcr.io/fluxcd/flux-manifests
  - target:
      kind: ResourceQuota
      name: critical-pods
    patch: |
      - op: replace
        path: /metadata/name
        value: critical-pods-flux-system
  - target:
      kind: ClusterRoleBinding
      name: cluster-reconciler
    patch: |
      - op: replace
        path: /metadata/name
        value: cluster-reconciler-flux-system
  - target:
      kind: ClusterRoleBinding
      name: crd-controller
    patch: |
      - op: replace
        path: /metadata/name
        value: crd-controller-flux-system
  - target:
      kind: ClusterRole
      name: crd-controller
    patch: |
      - op: replace
        path: /metadata/name
        value: crd-controller-flux-system
  - target:
      kind: ClusterRole
      name: flux-edit
    patch: |
      - op: replace
        path: /metadata/name
        value: flux-edit-flux-system
  - target:
      kind: ClusterRole
      name: flux-view
    patch: |
      - op: replace
        path: /metadata/name
        value: flux-view-flux-system
  # Image automation/reflector controllers are not used (FluxInstance CR omits them)
  - patch: |-
      $patch: delete
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: image-automation-controller
    target:
      kind: Deployment
      name: image-automation-controller
  - patch: |-
      $patch: delete
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: image-reflector-controller
    target:
      kind: Deployment
      name: image-reflector-controller
  - patch: |-
      $patch: delete
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: image-automation-controller
    target:
      kind: ServiceAccount
      name: image-automation-controller
  - patch: |-
      $patch: delete
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: image-reflector-controller
    target:
      kind: ServiceAccount
      name: image-reflector-controller
  - patch: |-
      $patch: delete
      apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      metadata:
        name: imagepolicies.image.toolkit.fluxcd.io
    target:
      kind: CustomResourceDefinition
      name: imagepolicies.image.toolkit.fluxcd.io
  - patch: |-
      $patch: delete
      apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      metadata:
        name: imagerepositories.image.toolkit.fluxcd.io
    target:
      kind: CustomResourceDefinition
      name: imagerepositories.image.toolkit.fluxcd.io
  - patch: |-
      $patch: delete
      apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      metadata:
        name: imageupdateautomations.image.toolkit.fluxcd.io
    target:
      kind: CustomResourceDefinition
      name: imageupdateautomations.image.toolkit.fluxcd.io
  - target:
      kind: ClusterRoleBinding
      name: crd-controller-flux-system
    patch: |
      - op: test
        path: /subjects/4/name
        value: image-reflector-controller
      - op: remove
        path: /subjects/4
      - op: test
        path: /subjects/4/name
        value: image-automation-controller
      - op: remove
        path: /subjects/4