---
# Backup verification for critical media apps
# Staggered weekly schedules — each app checked once per week
# 10% data subset per run = full coverage in ~10 weeks
apiVersion: storage.keiretsu.ts.net/v1alpha1
kind: BackupVerify
metadata:
  name: sonarr-1080p
  namespace: media
spec:
  name: sonarr-1080p
  resticSecretName: restic-media-sonarr-1080p-config
  schedule: "30 5 * * 0"
  location: "${LOCATION}"
---
apiVersion: storage.keiretsu.ts.net/v1alpha1
