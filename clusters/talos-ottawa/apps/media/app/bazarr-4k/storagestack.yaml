---
apiVersion: storage.keiretsu.ts.net/v1alpha1
kind: StorageStack
metadata:
  name: bazarr-4k-config
  labels:
    keiretsu.ts.net/location: ottawa
spec:
  name: bazarr-4k-config
  size: 5Gi
  storageClass: ceph-block-replicated
  s3Path: media/bazarr-4k-config
  schedule: 0 4 * * *
  restoreMode: restore
  copyMethod: Snapshot
