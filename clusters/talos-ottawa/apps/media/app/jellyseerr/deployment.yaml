---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyseerr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellyseerr
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: jellyseerr
    spec:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: jellyseerr
          image: ghcr.io/seerr-team/seerr:v3.1.0
          ports:
            - name: http
              containerPort: 5055
              protocol: TCP
          volumeMounts:
            - name: config-volume
              mountPath: /app/config
            - name: logs-volume
              mountPath: /app/config/logs
          env:
            - name: TZ
              value: ${TIMEZONE}
            - name: LOG_LEVEL
              value: debug
      volumes:
        - name: config-volume
          persistentVolumeClaim:
            claimName: jellyseerr-config 
        - name: logs-volume
          emptyDir: {} 
