      cache: true
      cache_expiration: 60
      run_again_delay: 2
      missing_only_released: false
      show_unmanaged: false
      show_filtered: false
      show_options: false
      show_missing: false
      save_report: false
    plex:
      url: http://plex:32400
      token: ${PLEX_TOKEN}
      timeout: 60
      clean_bundles: false
      empty_trash: false
      optimize: false
    tmdb:
      apikey: ${KOMETA_TMDB_API_KEY}
      language: en
    tautulli:
      url: http://tautulli:8181
      apikey: ${KOMETA_TAUTULLI_API_KEY}
