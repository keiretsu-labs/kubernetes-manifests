---
apiVersion: v1
kind: Secret
metadata:
  name: kometa
stringData:
  config.yml: |
    libraries:
      Movies:
        collection_files:
          - file: config/movies.yml
        operations:
          mass_critic_rating_update: tmdb
          mass_audience_rating_update: tmdb
        radarr:
          url: http://radarr-1080p:7878
          token: ${RADARR_1080P_API_KEY}
          root_folder_path: /media
          quality_profile: Any
          add_missing: false
          search: false
      4K Movies:
        collection_files:
          - file: config/movies.yml
        operations:
          mass_critic_rating_update: tmdb
          mass_audience_rating_update: tmdb
        radarr:
          url: http://radarr-4k:7878
          token: ${RADARR_4K_API_KEY}
          root_folder_path: /media
          quality_profile: Any
          add_missing: false
          search: false
      4K Remux Movies:
        collection_files:
          - file: config/movies.yml
        operations:
          mass_critic_rating_update: tmdb
          mass_audience_rating_update: tmdb
        radarr:
          url: http://radarr-4kremux:7878
          token: ${RADARR_4KREMUX_API_KEY}
          root_folder_path: /media
          quality_profile: Any
          add_missing: false
          search: false
      Anime Movies:
        collection_files:
          - file: config/movies.yml
        operations:
          mass_critic_rating_update: tmdb
          mass_audience_rating_update: tmdb
        radarr:
          url: http://radarr-anime:7878
          token: ${RADARR_ANIME_API_KEY}
          root_folder_path: /media
          quality_profile: Any
          add_missing: false
          search: false
      TV Shows:
        collection_files:
          - file: config/tv.yml
        operations:
          mass_critic_rating_update: tmdb
          mass_audience_rating_update: tmdb
        sonarr:
          url: http://sonarr-1080p:8989
          token: ${SONARR_1080P_API_KEY}
          root_folder_path: /media
          quality_profile: Any
          add_missing: false
          search: false
      4K TV Shows:
        collection_files:
          - file: config/tv.yml
        operations:
          mass_critic_rating_update: tmdb
          mass_audience_rating_update: tmdb
        sonarr:
          url: http://sonarr-4k:8989
          token: ${SONARR_4K_API_KEY}
          root_folder_path: /media
          quality_profile: Any
          add_missing: false
          search: false
      Anime:
        collection_files:
          - file: config/tv.yml
        operations:
          mass_critic_rating_update: tmdb
          mass_audience_rating_update: tmdb
        sonarr:
          url: http://sonarr-anime:8989
          token: ${SONARR_ANIME_API_KEY}
          root_folder_path: /media
          quality_profile: Any
          series_type: anime
          add_missing: false
          search: false
    settings:
      cache: true
      cache_expiration: 60
      run_again_delay: 2
      missing_only_released: false
      show_unmanaged: false
      show_filtered: false
      show_options: false
      show_missing: false
      save_report: false
    plex:
      url: http://plex:32400
      token: ${PLEX_TOKEN}
      timeout: 60
      clean_bundles: false
      empty_trash: false
      optimize: false
    tmdb:
      apikey: ${KOMETA_TMDB_API_KEY}
      language: en
    tautulli:
      url: http://tautulli:8181
      apikey: ${KOMETA_TAUTULLI_API_KEY}
