---
apiVersion: v1
kind: Secret
metadata:
  name: kometa
stringData:
  config.yml: |
    libraries:
      Movies-1080p:
        collection_files:
          - file: config/movies.yml
        overlay_files:
          - remove_overlays: false
          - default: resolution
          - default: ratings
            template_variables:
              rating1: critic
              rating1_image: imdb
              rating1_font: config/metadata/overlays/fonts/Impact.ttf
              rating1_font_size: 70
              rating2: user
              rating2_image: rt_tomato
              rating2_font: config/metadata/overlays/fonts/Adlib.ttf
              rating2_font_size: 63
              rating3: audience
              rating3_image: rt_popcorn
              rating3_font: config/metadata/overlays/fonts/Avenir_95_Black.ttf
              rating3_font_size: 70
              rating_alignment: horizontal
              horizontal_position: center
              vertical_position: bottom
        operations:
          mass_critic_rating_update: imdb
          mass_user_rating_update: plex_tomatoes
          mass_audience_rating_update: plex_tomatoesaudience
        radarr:
          url: http://radarr-1080p:7878
          token: ${RADARR_1080P_API_KEY}
          root_folder_path: /media
          quality_profile: Any
          add_missing: false
          search: false
      Movies-4K:
