---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plex
  namespace: media
  labels:
    app: plex
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: plex
  template:
    metadata:
      labels:
        app: plex
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: plex-gpu
      containers:
        - name: plex
          image: ghcr.io/home-operations/plex-next:1.43.1.10611
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            claims:
              - name: gpu
          ports:
            - containerPort: 32400
              name: http
              protocol: TCP
          env:
            - name: TZ
              value: ${TIMEZONE}
            - name: PLEX_ADVERTISE_URL
              value: "https://plex.killinit.cc:443"
            - name: PLEX_NO_AUTH_NETWORKS
              value: "10.0.0.0/8,192.168.0.0/16"
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media-volume
              mountPath: /media-share
            - name: tmpfs
              mountPath: /config/Library/Application Support/Plex Media Server/Logs
              subPath: logs
            - name: tmpfs
              mountPath: /transcode
              subPath: transcode
            - name: tmpfs
              mountPath: /tmp
              subPath: tmp
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: plex-config
        - name: media-volume
          persistentVolumeClaim:
            claimName: media-share
        - name: tmpfs
          emptyDir: {}