---
apiVersion: storage.keiretsu.ts.net/v1alpha1
kind: StorageStack
metadata:
  name: radarr-4k-config
  labels:
    keiretsu.ts.net/location: ottawa
spec:
  name: radarr-4k-config
  size: 5Gi
  storageClass: ceph-block-replicated
  s3Path: media/radarr-4k-config
  schedule: 0 4 * * *
  restorePaused: true
  copyMethod: Snapshot
