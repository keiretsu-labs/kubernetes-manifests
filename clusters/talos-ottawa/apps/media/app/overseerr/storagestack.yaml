---
apiVersion: storage.keiretsu.ts.net/v1alpha1
kind: StorageStack
metadata:
  name: overseerr-config
  labels:
    keiretsu.ts.net/location: ottawa
spec:
  name: overseerr-config
  size: 5Gi
  storageClass: ceph-block-replicated
  s3Path: media/overseerr-config
  schedule: 0 4 * * *
  restoreMode: restore
  copyMethod: Snapshot
