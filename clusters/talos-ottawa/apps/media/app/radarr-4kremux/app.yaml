---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr-4kremux
spec:
  replicas: 1
  selector:
    matchLabels:
      app: radarr-4kremux
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: radarr-4kremux
    spec:
      containers:
      - name: radarr-4kremux
        image: lscr.io/linuxserver/radarr:6.1.1
        ports:
        - name: http
          containerPort: 7878
          protocol: TCP
        env:
        - name: PUID
          value: '0'
        - name: GUID
          value: '0'
        - name: TZ
          value: UTC
        volumeMounts:
        - name: config
          mountPath: /config
        - name: media
          mountPath: /media-share
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: radarr-4kremux-config
      - name: media
        persistentVolumeClaim:
          claimName: media-share
---
apiVersion: v1
kind: Service
metadata:
  name: radarr-4kremux
spec:
  selector:
    app: radarr-4kremux
  ports:
  - name: http
    port: 7878
    protocol: TCP
    targetPort: 7878
