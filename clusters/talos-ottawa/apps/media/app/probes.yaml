---
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: app-media-services
spec:
  jobName: blackbox
  module: http_2xx
  prober:
    url: blackbox-exporter.monitoring.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        # Jellyfin stack
        - http://jellyfin.media:8096/health
        - http://jellystat.media:3000
        - http://jellyseerr.media:5055
        # Plex
        - http://plex.media:32400/identity
        # *arr — movies
        - http://radarr-4kremux.media:7878
        - http://radarr-4k.media:7878
        - http://radarr-1080p.media:7878
        - http://radarr-anime.media:7878
        # *arr — TV
        - http://sonarr-4k.media:8989
        - http://sonarr-1080p.media:8989
        - http://sonarr-anime.media:8989
        # *arr — music
        - http://lidarr.media:8686
        # Indexers + subtitles
        - http://prowlarr.media:9696
        - http://bazarr-4kremux.media:6767
        - http://bazarr-4k.media:6767
        - http://bazarr-1080p.media:6767
        - http://bazarr-anime.media:6767
        # Download clients
        - http://qb.media
        - http://qb-pvt.media
        - http://sabnzbd.media:80
        - http://autobrr.media:7474
        - http://flaresolverr.media:8191
        # Plex utilities
        - http://tautulli.media:8181
        - http://maintainerr.media:6246
        # Request / share management
        - http://overseerr.media:5055
        - http://wizarr.media:5690
      labels:
        service: media
