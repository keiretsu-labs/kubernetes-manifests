---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: hermes
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hermes
    spec:
      initContainers:
        - name: init-config
          image: busybox:latest
          command: [sh, -c]
          args:
            - cp /opt/config/config.yaml /opt/data/config.yaml
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: config
              mountPath: /opt/config
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              memory: 64Mi
      containers:
        - name: hermes
          image: nousresearch/hermes-agent:latest
          args: ["gateway", "run"]
          env:
            - name: OPENAI_API_KEY
              value: "unused"
            - name: GATEWAY_ALLOW_ALL_USERS
              value: "true"
          envFrom:
            - secretRef:
                name: hermes-secrets
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              memory: 4Gi
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-data
        - name: config
          configMap:
            name: hermes-config
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
      terminationGracePeriodSeconds: 30
