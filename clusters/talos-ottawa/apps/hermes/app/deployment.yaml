---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: hermes
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hermes
    spec:
      containers:
        - name: hermes
          image: nousresearch/hermes-agent:latest
          args: ["gateway", "run"]
          env:
            - name: OPENAI_API_KEY
              value: "unused"
            - name: OPENAI_BASE_URL
              value: "http://stpetersburg-vllm/v1"
            - name: GATEWAY_ALLOW_ALL_USERS
              value: "true"
            - name: API_SERVER_ENABLED
              value: "true"
            - name: API_SERVER_HOST
              value: "0.0.0.0"
            - name: API_SERVER_PORT
              value: "8642"
            - name: DISCORD_REQUIRE_MENTION
              value: "false"
            - name: DISCORD_AUTO_THREAD
              value: "true"
            - name: DISCORD_REACTIONS
              value: "true"
          envFrom:
            - secretRef:
                name: hermes-secrets
          ports:
            - name: gateway
              containerPort: 8642
              protocol: TCP
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              memory: 4Gi
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: shm
              mountPath: /dev/shm
        - name: dashboard
          image: nousresearch/hermes-agent:latest
          args: ["dashboard", "--host", "0.0.0.0", "--no-open", "--insecure"]
          env:
            - name: GATEWAY_HEALTH_URL
              value: "http://localhost:8642"
          ports:
            - name: dashboard
              containerPort: 9119
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /opt/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-data
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
      terminationGracePeriodSeconds: 30
