---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: hermes
resources:
  - deployment.yaml
  - storagestack.yaml
  - service.yaml
  - httproute.yaml
  - egress.yaml
  - secret.sops.yaml
configMapGenerator:
  - name: hermes-config
    files:
      - config.yaml
generatorOptions:
  disableNameSuffixHash: true
