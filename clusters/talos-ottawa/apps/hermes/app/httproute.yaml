---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hermes-agent
  namespace: hermes
  annotations:
    item.homer.rajsingh.info/name: "Hermes Agent"
    item.homer.rajsingh.info/subtitle: "AI Agent Gateway"
    item.homer.rajsingh.info/keywords: "ai, agent, llm, chat"

    service.homer.rajsingh.info/name: "AI"
    service.homer.rajsingh.info/icon: "fas fa-robot"
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: private
      namespace: home
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: ts
      namespace: home
  hostnames:
    - "hermes.${CLUSTER_DOMAIN}"
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: hermes-agent
          port: 3000
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
