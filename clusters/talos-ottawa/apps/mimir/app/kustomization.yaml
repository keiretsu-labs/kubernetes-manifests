---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: mimir
resources:
  - helmrelease.yaml
  - ingress-ts.yaml
  - egress.yaml
  - alertmanager-secret.sops.yaml
  - loader-job.yaml
configMapGenerator:
  # Hash-suffixed so any rule/AM change rolls the mimir-config-loader Job
  # (its volume refs change), forcing a re-sync into Mimir.
  - name: mimir-rules
    files:
      - rules/blackbox.yaml
      - rules/flux.yaml
      - rules/garage.yaml
      - rules/k8gb.yaml
      - rules/monitoring.yaml
      - rules/smartctl.yaml
  - name: mimir-alertmanager
    files:
      - alertmanager/alertmanager.yaml
