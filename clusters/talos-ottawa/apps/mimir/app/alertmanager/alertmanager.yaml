# Native Alertmanager config, ported from the kube-prometheus-stack
# AlertmanagerConfig CRD (clusters/common/apps/monitoring/config/alertmanagerconfig.yaml).
# Uploaded per tenant by the mimirtool loader Job. Secrets are injected at job
# runtime via envsubst from the alertmanager-secret; the $${...} tokens are
# escaped so Flux postBuild substitution leaves them for the job, not the build.
#
# Dropped from the original: the empty `alertname=""` no-op route for
# kube-controller-manager/scheduler (its kps default alerts no longer exist in
# agent mode). NodeDiskIOSaturation / InfoInhibitor routes are kept verbatim
# but are inert — those alerts came from kps defaults that are now disabled.
route:
  receiver: discord
  group_by: [alertname, cluster, job]
  group_wait: 1m
  group_interval: 5m
  repeat_interval: 12h
  routes:
    # Silenced alerts — must come before the severity catch-all.
    - matchers: ['alertname="DockerhubRateLimitRisk"']
      receiver: blackhole
    - matchers: ['alertname="ProbeFailed"']
      receiver: blackhole
    - matchers: ['alertname="SmartDeviceHighTemperature"']
      receiver: blackhole
    - matchers: ['alertname="SmartDeviceTestFailed"']
      receiver: blackhole
    - matchers: ['alertname="NodeDiskIOSaturation"']
      receiver: blackhole
    - matchers: ['alertname="InfoInhibitor"']
      receiver: blackhole
    - matchers: ['alertname="K8gbNoHealthyRecords"']
      receiver: blackhole
    - matchers: ['alertname="K8gbEndpointNoTargets"']
      receiver: blackhole
    # Dead man's switch heartbeat → Gatus, fast cadence.
    - matchers: ['alertname="Watchdog"']
      receiver: gatus-heartbeat
      group_wait: 0s
      group_interval: 2m
      repeat_interval: 2m30s
    # Everything else with a severity goes to Discord.
    - matchers: ['severity=~"critical|error|warning"']
      receiver: discord

receivers:
  - name: blackhole
  - name: gatus-heartbeat
    webhook_configs:
      - url: $${GATUS_HEARTBEAT_URL}
        send_resolved: false
        http_config:
          authorization:
            type: Bearer
            credentials: $${GATUS_HEARTBEAT_TOKEN}
  - name: discord
    discord_configs:
      - webhook_url: $${DISCORD_ALERTMANAGER_WEBHOOK_URL}
        send_resolved: true
        title: '[Alerts] [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .GroupLabels.alertname }}'
        message: |-
          {{- range .Alerts }}
            {{- if ne .Annotations.description "" }}
              {{ .Annotations.description }}
            {{- else if ne .Annotations.summary "" }}
              {{ .Annotations.summary }}
            {{- else if ne .Annotations.message "" }}
              {{ .Annotations.message }}
            {{- else }}
              Alert description not available
            {{- end }}
            {{- if gt (len .Labels.SortedPairs) 0 }}
              Labels:
              {{- range .Labels.SortedPairs }}
                {{ .Name }}: {{ .Value }}
              {{- end }}
            {{- end }}
          {{- end }}

inhibit_rules:
  - equal: [namespace, alertname]
    source_matchers: ['severity="critical"']
    target_matchers: ['severity=~"error|warning|info"']
  - equal: [namespace, alertname]
    source_matchers: ['severity="error"']
    target_matchers: ['severity=~"warning|info"']
  - equal: [namespace]
    source_matchers: ['alertname="InfoInhibitor"']
    target_matchers: ['severity="info"']
