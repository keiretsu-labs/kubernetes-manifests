---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mimir
spec:
  interval: 30m
  chart:
    spec:
      chart: mimir-distributed
      version: "6.0.6"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    rollout_operator:
      enabled: false

    minio:
      enabled: false

    kafka:
      enabled: false

    alertmanager:
      enabled: false

    ruler:
      enabled: false

    global:
      extraEnvFrom:
        - secretRef:
            name: mimir-s3

    mimir:
      structuredConfig:
        multitenancy_enabled: false
        ingest_storage:
          enabled: false
        frontend:
          parallelize_shardable_queries: false
        ingester:
          push_grpc_method_enabled: true
          ring:
            replication_factor: 1
        store_gateway:
          sharding_ring:
            replication_factor: 1
        common:
          storage:
            backend: s3
            s3:
              endpoint: garage.garage.svc.cluster.local:3900
              bucket_name: mimir
              insecure: true
        limits:
          compactor_blocks_retention_period: 1y
          ingestion_rate: 500000
          ingestion_burst_size: 1000000
          max_global_series_per_user: 10000000
          max_label_names_per_series: 300
          query_sharding_total_shards: 1

    ingester:
      replicas: 1
      zoneAwareReplication:
        enabled: false
      persistentVolume:
        enabled: false
      extraArgs:
        "-ingester.ring.replication-factor": "1"

    store_gateway:
      replicas: 1
      zoneAwareReplication:
        enabled: false
      persistentVolume:
        enabled: false
      extraArgs:
        "-store-gateway.sharding-ring.replication-factor": "1"

    compactor:
      replicas: 1
      persistentVolume:
        enabled: false

    distributor:
      replicas: 2

    querier:
      replicas: 2

    query_frontend:
      replicas: 1

    query_scheduler:
      replicas: 1

    gateway:
      nginxConfig:
        serverSnippet: |
          location /nginx_status {
            stub_status on;
            access_log off;
          }
          location /metrics {
            proxy_pass http://localhost:9113/metrics;
            access_log off;
          }
      extraContainers:
        - name: nginx-exporter
          image: nginx/nginx-prometheus-exporter:1.4
          args:
            - --nginx.scrape-uri=http://localhost:8080/nginx_status
          ports:
            - name: metrics
              containerPort: 9113
          resources:
            requests:
              cpu: 10m
              memory: 16Mi

    metaMonitoring:
      serviceMonitor:
        enabled: true
        clusterLabel: ottawa
