---
apiVersion: garage.rajsingh.info/v1beta1
kind: GarageBucket
metadata:
  name: loki
  namespace: loki
spec:
  clusterRef:
    name: garage
    namespace: garage
  globalAlias: loki
  quotas:
    maxSize: 200Gi
    maxObjects: 50000000
  keyPermissions:
    - keyRef:
        name: loki-key
        namespace: loki
      read: true
      write: true
      owner: true
---
apiVersion: garage.rajsingh.info/v1beta1
kind: GarageKey
metadata:
  name: loki-key
  namespace: loki
spec:
  clusterRef:
    name: garage
    namespace: garage
  name: "Loki Logs Key"
  secretTemplate:
    name: loki-s3
    accessKeyIdKey: AWS_ACCESS_KEY_ID
    secretAccessKeyKey: AWS_SECRET_ACCESS_KEY
    additionalData:
      endpoint: "http://garage.garage.svc.cluster.local:3900"
      region: "garage"
  bucketPermissions:
    - bucketRef:
        name: loki
        namespace: loki
      read: true
      write: true
