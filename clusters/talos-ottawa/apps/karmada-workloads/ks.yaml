---
# ExternalSecret that assembles a Karmada kubeconfig for Flux
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app karmada-kubeconfig
  namespace: flux-system
spec:
  targetNamespace: flux-system
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: external-secrets-config
    - name: karmada
  path: ./clusters/talos-ottawa/apps/karmada-workloads/secrets
  prune: true
  sourceRef:
    kind: GitRepository
    name: kubernetes-manifests
  wait: false
  interval: 30m
  retryInterval: 1m
  timeout: 5m
---
# Flux CRDs installed on Karmada API server (no controllers)
# Enables propagation of HelmRelease/HelmRepository to member clusters
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app karmada-crds
  namespace: flux-system
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: karmada-kubeconfig
  kubeConfig:
    secretRef:
      name: karmada-kubeconfig
  path: ./clusters/talos-ottawa/apps/karmada-workloads/crds
  prune: false
  sourceRef:
    kind: GitRepository
    name: kubernetes-manifests
  wait: false
  interval: 30m
  retryInterval: 1m
  timeout: 5m
---
# Workloads applied to the Karmada API server via kubeConfig
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app karmada-workloads
  namespace: flux-system
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: karmada-kubeconfig
    - name: karmada-crds
  kubeConfig:
    secretRef:
      name: karmada-kubeconfig
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: common-settings
      - kind: Secret
        name: common-secrets
      - kind: ConfigMap
        name: cluster-settings
      - kind: Secret
        name: cluster-secrets
  path: ./clusters/talos-ottawa/apps/karmada-workloads/workloads
  prune: true
  sourceRef:
    kind: GitRepository
    name: kubernetes-manifests
  interval: 30m
  retryInterval: 1m
  timeout: 5m
