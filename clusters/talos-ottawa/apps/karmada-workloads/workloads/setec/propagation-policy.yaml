# PropagationPolicy for setec secrets server
# - Resource-based scheduling: single replica placed on cluster with most available resources
# - Failover with graceful eviction on cluster failure
# - Dependencies (Secret) propagated automatically
# Note: setec-s3-auth secret is created by Garage operator on member clusters (not propagated)
---
apiVersion: policy.karmada.io/v1alpha1
kind: PropagationPolicy
metadata:
  name: setec
  namespace: setec
spec:
  propagateDeps: true

  resourceSelectors:
    - apiVersion: apps/v1
      kind: Deployment
      name: setec
    - apiVersion: v1
      kind: Secret
      name: setec-tailscale

  placement:
    clusterAffinity:
      clusterNames:
        - talos-robbinsdale
        - talos-stpetersburg

    clusterTolerations:
      - key: cluster.karmada.io/unreachable
        effect: NoExecute
        operator: Exists
        tolerationSeconds: 120
      - key: cluster.karmada.io/not-ready
        effect: NoExecute
        operator: Exists
        tolerationSeconds: 120

    replicaScheduling:
      replicaSchedulingType: Divided
      replicaDivisionPreference: Weighted
      weightPreference:
        dynamicWeight: AvailableReplicas

  failover:
    application:
      decisionConditions:
        tolerationSeconds: 120
      purgeMode: Gracefully
      gracePeriodSeconds: 300

# ClusterPropagationPolicy to propagate the namespace to member clusters
---
apiVersion: policy.karmada.io/v1alpha1
kind: ClusterPropagationPolicy
metadata:
  name: setec-namespace
spec:
  resourceSelectors:
    - apiVersion: v1
      kind: Namespace
      name: setec
  placement:
    clusterAffinity:
      clusterNames:
        - talos-robbinsdale
        - talos-stpetersburg
