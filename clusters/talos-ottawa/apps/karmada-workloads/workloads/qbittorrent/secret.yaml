---
apiVersion: v1
kind: Secret
metadata:
  name: qbittorrent-vpn
  namespace: keiretsu-top
type: Opaque
stringData:
  WIREGUARD_PRIVATE_KEY: ${QB_WIREGUARD_PRIVATE_KEY}
  UPDATER_PROTONVPN_EMAIL: ${QB_PROTONVPN_EMAIL}
  UPDATER_PROTONVPN_PASSWORD: ${QB_PROTONVPN_PASSWORD}
---
apiVersion: v1
kind: Secret
metadata:
  name: qbittorrent-ts
  namespace: keiretsu-top
type: Opaque
stringData:
  client_id: ${TS_OAUTH_CLIENT_ID}
  client_secret: ${TS_OAUTH_CLIENT_SECRET}
---
apiVersion: v1
kind: Secret
metadata:
  name: qbittorrent-s3
  namespace: keiretsu-top
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: ${GARAGE_S3_ACCESS_KEY_ID}
  AWS_SECRET_ACCESS_KEY: ${GARAGE_S3_SECRET_ACCESS_KEY}
