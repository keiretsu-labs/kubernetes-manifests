# ClusterPropagationPolicy for static PVs (must exist on ALL clusters)
# PVs are cluster-scoped and need to be present before the PVC can bind
---
apiVersion: policy.karmada.io/v1alpha1
kind: ClusterPropagationPolicy
metadata:
  name: qbittorrent-pvs
spec:
  resourceSelectors:
    - apiVersion: v1
      kind: PersistentVolume
      name: qbittorrent-downloads
    - apiVersion: v1
      kind: PersistentVolume
      name: qbittorrent-config
  placement:
    clusterAffinity:
      clusterNames:
        - talos-ottawa
        - talos-robbinsdale
        - talos-stpetersburg

# PropagationPolicy for qBittorrent with Gluetun VPN
# - Resource-based scheduling across all clusters
# - Downloads and config stored in Garage S3 via static CSI-S3 PVs
# - Same S3 path on every cluster (no UUID-based paths)
---
apiVersion: policy.karmada.io/v1alpha1
kind: PropagationPolicy
metadata:
  name: qbittorrent
  namespace: keiretsu-top
spec:
  propagateDeps: true

  resourceSelectors:
    - apiVersion: apps/v1
      kind: Deployment
      name: qbittorrent
    - apiVersion: v1
      kind: Service
      name: qbittorrent
    - apiVersion: v1
      kind: Secret
      name: qbittorrent-vpn
    - apiVersion: v1
      kind: Secret
      name: qbittorrent-ts
    - apiVersion: v1
      kind: PersistentVolumeClaim
      name: qbittorrent-downloads
    - apiVersion: v1
      kind: PersistentVolumeClaim
      name: qbittorrent-config
    - apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      name: qbittorrent

  placement:
    clusterAffinity:
      clusterNames:
        - talos-ottawa
        - talos-robbinsdale
        - talos-stpetersburg

    clusterTolerations:
      - key: cluster.karmada.io/unreachable
        effect: NoExecute
        operator: Exists
        tolerationSeconds: 120
      - key: cluster.karmada.io/not-ready
        effect: NoExecute
        operator: Exists
        tolerationSeconds: 120

    spreadConstraints:
      - maxGroups: 1
        minGroups: 1
        spreadByField: cluster

    replicaScheduling:
      replicaSchedulingType: Divided
      replicaDivisionPreference: Weighted
      weightPreference:
        dynamicWeight: AvailableReplicas

  failover:
    application:
      decisionConditions:
        tolerationSeconds: 120
      purgeMode: Gracefully
      gracePeriodSeconds: 300
