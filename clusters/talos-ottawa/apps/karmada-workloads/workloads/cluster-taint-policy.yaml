---
# Add NoExecute taint when cluster becomes unreachable
# The taint manager will then evict workloads that don't tolerate it
apiVersion: policy.karmada.io/v1alpha1
kind: ClusterTaintPolicy
metadata:
  name: evict-unreachable
spec:
  targetClusters:
    clusterNames:
      - talos-robbinsdale
      - talos-stpetersburg
  taints:
    - key: cluster.karmada.io/unreachable
      effect: NoExecute
  addOnConditions:
    - conditionType: Ready
      operator: In
      statusValues:
        - "Unknown"
  removeOnConditions:
    - conditionType: Ready
      operator: In
      statusValues:
        - "True"
---
# Add NoExecute taint when cluster becomes not-ready
apiVersion: policy.karmada.io/v1alpha1
kind: ClusterTaintPolicy
metadata:
  name: evict-not-ready
spec:
  targetClusters:
    clusterNames:
      - talos-robbinsdale
      - talos-stpetersburg
  taints:
    - key: cluster.karmada.io/not-ready
      effect: NoExecute
  addOnConditions:
    - conditionType: Ready
      operator: In
      statusValues:
        - "False"
  removeOnConditions:
    - conditionType: Ready
      operator: In
      statusValues:
        - "True"
