---
apiVersion: config.karmada.io/v1alpha1
kind: ResourceInterpreterCustomization
metadata:
  name: cnpg-cluster
spec:
  target:
    apiVersion: postgresql.cnpg.io/v1
    kind: Cluster
  customizations:
    healthInterpretation:
      luaScript: |
        function InterpretHealth(observedObj)
          if observedObj.status == nil then
            return false
          end
          if observedObj.status.phase == "Cluster in healthy state" then
            return true
          end
          if observedObj.status.readyInstances ~= nil and observedObj.status.readyInstances > 0 then
            return true
          end
          return false
        end
    statusReflection:
      luaScript: |
        function ReflectStatus(observedObj)
          status = {}
          if observedObj.status == nil then
            return status
          end
          status.phase = observedObj.status.phase
          status.readyInstances = observedObj.status.readyInstances
          status.instances = observedObj.status.instances
          status.currentPrimary = observedObj.status.currentPrimary
          status.targetPrimary = observedObj.status.targetPrimary
          return status
        end
---
apiVersion: config.karmada.io/v1alpha1
kind: ResourceInterpreterCustomization
metadata:
  name: tailscale-connector
spec:
  target:
    apiVersion: tailscale.com/v1alpha1
    kind: Connector
  customizations:
    healthInterpretation:
      luaScript: |
        function InterpretHealth(observedObj)
          if observedObj.status == nil or observedObj.status.conditions == nil then
            return false
          end
          for _, condition in ipairs(observedObj.status.conditions) do
            if condition.type == "ConnectorReady" and condition.status == "True" then
              return true
            end
          end
          -- fall back to generic Ready condition
          for _, condition in ipairs(observedObj.status.conditions) do
            if condition.type == "Ready" and condition.status == "True" then
              return true
            end
          end
          return false
        end
    statusReflection:
      luaScript: |
        function ReflectStatus(observedObj)
          status = {}
          if observedObj.status == nil then
            return status
          end
          status.conditions = observedObj.status.conditions
          status.isExitNode = observedObj.status.isExitNode
          status.subnetRoutes = observedObj.status.subnetRoutes
          status.hostname = observedObj.status.hostname
          return status
        end
