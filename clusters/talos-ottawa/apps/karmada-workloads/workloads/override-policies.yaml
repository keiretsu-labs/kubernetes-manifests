---
# Storage class override per cluster
# Robbinsdale and Ottawa run Rook-Ceph (ceph-block), StPetersburg only has local-path
# Uses plaintext overrider to patch the storageClassName in PVC volume claim templates
# so workloads distributed across clusters use the right storage backend
apiVersion: policy.karmada.io/v1alpha1
kind: ClusterOverridePolicy
metadata:
  name: storage-class-override
spec:
  resourceSelectors:
    - apiVersion: apps/v1
      kind: StatefulSet
  overrideRules:
    - targetCluster:
        clusterNames:
          - talos-robbinsdale
          - talos-ottawa
      overriders:
        plaintext:
          - path: /spec/volumeClaimTemplates/0/spec/storageClassName
            operator: replace
            value: ceph-block
    - targetCluster:
        clusterNames:
          - talos-stpetersburg
      overriders:
        plaintext:
          - path: /spec/volumeClaimTemplates/0/spec/storageClassName
            operator: replace
            value: local-path
