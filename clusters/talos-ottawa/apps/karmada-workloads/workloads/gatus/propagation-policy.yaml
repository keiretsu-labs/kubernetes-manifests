# PropagationPolicy for distributed gatus
# Duplicated scheduling: pod on every targeted cluster
# k8gb handles traffic steering via DNS health checks
---
apiVersion: policy.karmada.io/v1alpha1
kind: PropagationPolicy
metadata:
  name: gatus
  namespace: keiretsu-top
spec:
  propagateDeps: true

  resourceSelectors:
    - apiVersion: apps/v1
      kind: Deployment
      name: gatus
    - apiVersion: v1
      kind: Service
      name: gatus
    - apiVersion: v1
      kind: ConfigMap
      name: gatus-config

  placement:
    clusterAffinity:
      clusterNames:
        - talos-ottawa
        - talos-robbinsdale
        - talos-stpetersburg

    clusterTolerations:
      - key: cluster.karmada.io/unreachable
        effect: NoExecute
        operator: Exists
        tolerationSeconds: 60
      - key: cluster.karmada.io/not-ready
        effect: NoExecute
        operator: Exists
        tolerationSeconds: 60

    replicaScheduling:
      replicaSchedulingType: Duplicated

  failover:
    application:
      decisionConditions:
        tolerationSeconds: 60
      purgeMode: Graciously
      gracePeriodSeconds: 120

# ClusterPropagationPolicy to propagate the namespace
---
apiVersion: policy.karmada.io/v1alpha1
kind: ClusterPropagationPolicy
metadata:
  name: gatus-namespace
spec:
  resourceSelectors:
    - apiVersion: v1
      kind: Namespace
      name: keiretsu-top
  placement:
    clusterAffinity:
      clusterNames:
        - talos-ottawa
        - talos-robbinsdale
        - talos-stpetersburg
