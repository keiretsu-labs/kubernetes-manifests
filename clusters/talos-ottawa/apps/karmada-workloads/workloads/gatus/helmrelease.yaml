---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gatus
  namespace: keiretsu-top
spec:
  interval: 30m
  chart:
    spec:
      chart: gatus
      version: 1.5.0
      sourceRef:
        kind: HelmRepository
        name: twin
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    image:
      tag: v5.35.0
    config:
      alerting:
        discord:
          # Robbinsdale Discord webhook
          webhook-url: "https://discord.com/api/webhooks/1321884480234852453/Jg5pzoAS6igqV1aqHnP14rho6Uvb7VhTY0-wY8Mr7lkkvcxoB_NjOYVXUi4ZKMPAtN8f"
          failure-threshold: 3
          success-threshold: 2
      ui:
        title: "Keiretsu Global Status"
        description: "Distributed status page - served via k8gb GSLB"
        header: "Keiretsu Infrastructure"
        logo: "https://raw.githubusercontent.com/kubernetes/kubernetes/master/logo/logo.png"
        link: "https://github.com/keiretsu-labs/kubernetes-manifests"

      external-endpoints:
        - name: Heartbeat
          group: Alertmanager
          token: "${GATUS_HEARTBEAT_TOKEN}"
          heartbeat:
            interval: 5m
          alerts:
            - type: discord
              send-on-resolved: true

      endpoints:
        - name: Internet
          group: Network
          url: https://1.1.1.1
          interval: 60s
          client:
            dns-resolver: "tcp://8.8.8.8:53"
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 2000"
          alerts:
            - type: discord
              send-on-resolved: true

        - name: K8s Operator (Ottawa)
          group: Tailscale
          url: https://ottawa-k8s-operator.keiretsu.ts.net:443/readyz
          interval: 60s
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 2000"
            - "[CERTIFICATE_EXPIRATION] > 168h"
          alerts:
            - type: discord
              send-on-resolved: true

        - name: K8s Operator (Robbinsdale)
          group: Tailscale
          url: https://robbinsdale-k8s-operator.keiretsu.ts.net:443/readyz
          interval: 60s
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 2000"
            - "[CERTIFICATE_EXPIRATION] > 168h"
          alerts:
            - type: discord
              send-on-resolved: true

        - name: K8s Operator (StPetersburg)
          group: Tailscale
          url: https://stpetersburg-k8s-operator.keiretsu.ts.net:443/readyz
          interval: 60s
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 2000"
            - "[CERTIFICATE_EXPIRATION] > 168h"
          alerts:
            - type: discord
              send-on-resolved: true

        - name: Garage S3 (Ottawa)
          group: Storage
          url: "tcp://ottawa-garage.garage:3900"
          interval: 60s
          conditions:
            - "[CONNECTED] == true"
            - "[RESPONSE_TIME] < 2000"
          alerts:
            - type: discord
              send-on-resolved: true

        - name: Garage S3 (Robbinsdale)
          group: Storage
          url: "tcp://robbinsdale-garage.garage:3900"
          interval: 60s
          conditions:
            - "[CONNECTED] == true"
            - "[RESPONSE_TIME] < 2000"
          alerts:
            - type: discord
              send-on-resolved: true

        - name: Garage S3 (StPetersburg)
          group: Storage
          url: "tcp://stpetersburg-garage.garage:3900"
          interval: 60s
          conditions:
            - "[CONNECTED] == true"
            - "[RESPONSE_TIME] < 2000"
          alerts:
            - type: discord
              send-on-resolved: true

        - name: Zot Registry
          group: Registry
          url: http://zot-public.zot:5000
          interval: 60s
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 3000"
          alerts:
            - type: discord
              send-on-resolved: true

        - name: Garage S3 (CDN)
          group: Storage
          url: https://keiretsu.cdn.keiretsu.top
          interval: 60s
          client:
            dns-resolver: "tcp://8.8.8.8:53"
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 3000"
            - "[CERTIFICATE_EXPIRATION] > 168h"
          alerts:
            - type: discord
              send-on-resolved: true

        - name: Homer Dashboard (CDN)
          group: CDN
          url: https://home.cdn.keiretsu.top
          interval: 60s
          client:
            dns-resolver: "tcp://8.8.8.8:53"
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 3000"
            - "[CERTIFICATE_EXPIRATION] > 168h"
          alerts:
            - type: discord
              send-on-resolved: true
