---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: keiretsu-top
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
      evaluation_interval: 30s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]

      - job_name: gatus
        metrics_path: /metrics
        static_configs:
          - targets: ["gatus.keiretsu-top:80"]
