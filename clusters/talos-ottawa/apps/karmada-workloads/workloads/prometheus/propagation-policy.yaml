# Floating prometheus: runs on exactly ONE cluster with automatic failover.
# Karmada schedules to the highest-priority healthy cluster. If that cluster
# becomes unreachable, the HelmRelease migrates to the next in the list.
# Data is preserved via Volsync warm-cache PVCs on standby clusters.
---
apiVersion: policy.karmada.io/v1alpha1
kind: PropagationPolicy
metadata:
  name: prometheus
  namespace: keiretsu-top
spec:
  propagateDeps: true

  resourceSelectors:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: prometheus

  placement:
    clusterAffinities:
      - affinityName: primary
        clusterNames:
          - talos-ottawa
      - affinityName: secondary
        clusterNames:
          - talos-robbinsdale
      - affinityName: tertiary
        clusterNames:
          - talos-stpetersburg

    spreadConstraints:
      - maxGroups: 1
        minGroups: 1
        spreadByField: cluster

  failover:
    application:
      decisionConditions:
        tolerationSeconds: 120
      purgeMode: Gracefully
      gracePeriodSeconds: 600

# Propagate HelmRepository to flux-system namespace on all clusters
---
apiVersion: policy.karmada.io/v1alpha1
kind: ClusterPropagationPolicy
metadata:
  name: prometheus-helm-repo
spec:
  resourceSelectors:
    - apiVersion: source.toolkit.fluxcd.io/v1
      kind: HelmRepository
      name: prometheus-community
      namespace: flux-system
  placement:
    clusterAffinity:
      clusterNames:
        - talos-ottawa
        - talos-robbinsdale
        - talos-stpetersburg
