# PropagationPolicy for distributed prometheus
# Propagates HelmRelease + HelmRepository to all member clusters
# Flux controllers on each cluster reconcile the HelmRelease
---
apiVersion: policy.karmada.io/v1alpha1
kind: PropagationPolicy
metadata:
  name: prometheus
  namespace: keiretsu-top
spec:
  propagateDeps: true

  resourceSelectors:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: prometheus

  placement:
    clusterAffinity:
      clusterNames:
        - talos-ottawa
        - talos-robbinsdale
        - talos-stpetersburg

    clusterTolerations:
      - key: cluster.karmada.io/unreachable
        effect: NoExecute
        operator: Exists
        tolerationSeconds: 60
      - key: cluster.karmada.io/not-ready
        effect: NoExecute
        operator: Exists
        tolerationSeconds: 60

    replicaScheduling:
      replicaSchedulingType: Duplicated

  failover:
    application:
      decisionConditions:
        tolerationSeconds: 60
      purgeMode: Graciously
      gracePeriodSeconds: 120

# Propagate HelmRepository to flux-system namespace on all clusters
---
apiVersion: policy.karmada.io/v1alpha1
kind: ClusterPropagationPolicy
metadata:
  name: prometheus-helm-repo
spec:
  resourceSelectors:
    - apiVersion: source.toolkit.fluxcd.io/v1
      kind: HelmRepository
      name: prometheus-community
      namespace: flux-system
  placement:
    clusterAffinity:
      clusterNames:
        - talos-ottawa
        - talos-robbinsdale
        - talos-stpetersburg
