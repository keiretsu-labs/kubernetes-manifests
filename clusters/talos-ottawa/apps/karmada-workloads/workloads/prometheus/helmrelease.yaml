---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus
  namespace: keiretsu-top
spec:
  interval: 30m
  chart:
    spec:
      chart: prometheus
      version: "*"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    server:
      retention: 2d
      retentionSize: 8GB
      persistentVolume:
        enabled: true
        size: 10Gi
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          memory: 512Mi
      extraFlags:
        - "web.enable-lifecycle"

    alertmanager:
      enabled: false
    kube-state-metrics:
      enabled: false
    prometheus-node-exporter:
      enabled: false
    prometheus-pushgateway:
      enabled: false

    # Override default scrape configs to only scrape what we need
    # The chart defaults discover every pod/service in the cluster
    # Disable all default scrape configs to keep this lightweight
    serverFiles:
      prometheus.yml:
        scrape_configs:
          - job_name: gatus
            metrics_path: /metrics
            static_configs:
              - targets: ["gatus.keiretsu-top:80"]
