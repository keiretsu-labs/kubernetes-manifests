---
# ServiceAccount for Karmada Dashboard authentication
# The generated token is used to log into the dashboard UI
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dashboard-admin
  namespace: karmada-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dashboard-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: dashboard-admin
    namespace: karmada-system
---
# Long-lived token for dashboard login
apiVersion: v1
kind: Secret
metadata:
  name: dashboard-admin-token
  namespace: karmada-system
  annotations:
    kubernetes.io/service-account.name: dashboard-admin
type: kubernetes.io/service-account-token
