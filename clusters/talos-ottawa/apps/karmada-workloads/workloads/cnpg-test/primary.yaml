---
# Primary CNPG cluster - deployed to Ottawa only
# WAL archives and base backups go to Garage S3
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: cnpg-test
  namespace: keiretsu-top
  annotations:
    cnpg.io/skipEmptyWalArchiveCheck: "enabled"
spec:
  instances: 1
  enableSuperuserAccess: true
  inheritedMetadata:
    labels:
      app: cnpg-test
  storage:
    size: 5Gi
  monitoring:
    enablePodMonitor: true

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: cnpg-test-s3-store
        serverName: cnpg-test

  backup:
    retentionPolicy: "7d"

  externalClusters:
    - name: cnpg-test-s3
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: cnpg-test-s3-store
          serverName: cnpg-test
---
# Scheduled backup - daily
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: cnpg-test-backup
  namespace: keiretsu-top
spec:
  schedule: "0 0 * * *"
  immediate: true
  backupOwnerReference: self
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
  cluster:
    name: cnpg-test
