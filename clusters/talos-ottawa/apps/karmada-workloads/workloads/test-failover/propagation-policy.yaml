# PropagationPolicy for failover-test deployment
# Configures:
# - Primary: Robbinsdale
# - Failover: St Petersburg
# - Single replica (only one cluster at a time)
# - Graceful failover with 60s tolerance
# Note: Ottawa is the Karmada host cluster, not a member — cannot schedule there
---
apiVersion: policy.karmada.io/v1alpha1
kind: PropagationPolicy
metadata:
  name: failover-test
  namespace: failover-test
spec:
  propagateDeps: true

  resourceSelectors:
    - apiVersion: apps/v1
      kind: Deployment
      name: failover-test

  placement:
    clusterAffinity:
      clusterNames:
        - talos-stpetersburg  # Primary
        - talos-robbinsdale   # Failover

    clusterTolerations:
      - key: cluster.karmada.io/unreachable
        effect: NoExecute
        operator: Exists
        tolerationSeconds: 60
      - key: cluster.karmada.io/not-ready
        effect: NoExecute
        operator: Exists
        tolerationSeconds: 60

    spreadConstraints:
      - maxGroups: 1
        minGroups: 1
        spreadByField: cluster

    replicaScheduling:
      replicaSchedulingType: Duplicated

  failover:
    application:
      decisionConditions:
        tolerationSeconds: 60
      purgeMode: Graciously
      gracePeriodSeconds: 120

# ClusterPropagationPolicy to propagate the namespace first
---
apiVersion: policy.karmada.io/v1alpha1
kind: ClusterPropagationPolicy
metadata:
  name: failover-test-namespace
spec:
  resourceSelectors:
    - apiVersion: v1
      kind: Namespace
      name: failover-test
  placement:
    clusterAffinity:
      clusterNames:
        - talos-robbinsdale
        - talos-stpetersburg
