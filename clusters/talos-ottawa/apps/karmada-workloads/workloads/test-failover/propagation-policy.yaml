# PropagationPolicy for failover-test deployment
# Configures:
# - Divided scheduling: replicas split dynamically across clusters by available resources
# - Failover with graceful eviction
# Note: Ottawa is the Karmada host cluster, not a member — cannot schedule there
---
apiVersion: policy.karmada.io/v1alpha1
kind: PropagationPolicy
metadata:
  name: failover-test
  namespace: failover-test
spec:
  propagateDeps: true

  resourceSelectors:
    - apiVersion: apps/v1
      kind: Deployment
      name: failover-test

  placement:
    clusterAffinity:
      clusterNames:
        - talos-stpetersburg
        - talos-robbinsdale

    clusterTolerations:
      - key: cluster.karmada.io/unreachable
        effect: NoExecute
        operator: Exists
        tolerationSeconds: 60
      - key: cluster.karmada.io/not-ready
        effect: NoExecute
        operator: Exists
        tolerationSeconds: 60

    replicaScheduling:
      replicaSchedulingType: Divided
      replicaDivisionPreference: Weighted
      weightPreference:
        dynamicWeight: AvailableReplicas

  failover:
    application:
      decisionConditions:
        tolerationSeconds: 60
      purgeMode: Graciously
      gracePeriodSeconds: 120

# ClusterPropagationPolicy to propagate the namespace first
---
apiVersion: policy.karmada.io/v1alpha1
kind: ClusterPropagationPolicy
metadata:
  name: failover-test-namespace
spec:
  resourceSelectors:
    - apiVersion: v1
      kind: Namespace
      name: failover-test
  placement:
    clusterAffinity:
      clusterNames:
        - talos-robbinsdale
        - talos-stpetersburg
