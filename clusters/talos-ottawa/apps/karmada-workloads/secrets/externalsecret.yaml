---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: karmada-kubeconfig
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: kubernetes-ottawa-karmada
  target:
    name: karmada-kubeconfig
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        value: |
          apiVersion: v1
          kind: Config
          clusters:
            - cluster:
                server: https://karmada-system-karmada-apiserver.karmada-system.svc:5443
                certificate-authority-data: {{ .caCrt | b64enc }}
              name: karmada
          contexts:
            - context:
                cluster: karmada
                user: karmada-admin
              name: karmada
          current-context: karmada
          users:
            - name: karmada-admin
              user:
                client-certificate-data: {{ .crt | b64enc }}
                client-key-data: {{ .key | b64enc }}
  data:
    - secretKey: caCrt
      remoteRef:
        key: karmada-system-karmada-cert
        property: server-ca.crt
    - secretKey: crt
      remoteRef:
        key: karmada-system-karmada-cert
        property: karmada.crt
    - secretKey: key
      remoteRef:
        key: karmada-system-karmada-cert
        property: karmada.key
