---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opencost
  namespace: opencost
spec:
  interval: 30m
  chart:
    spec:
      chart: opencost
      version: 2.5.22
      sourceRef:
        kind: HelmRepository
        name: opencost
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    opencost:
      exporter:
        defaultClusterId: ottawa
        extraArgs:
          - log-level=info
      metrics:
        serviceMonitor:
          enabled: true
          additionalLabels:
            release: prometheus
      prometheus:
        external:
          enabled: true
          url: http://mimir-gateway.mimir.svc.cluster.local:8080/prometheus
        internal:
          enabled: false
      customPricing:
        enabled: true
        createConfigmap: true
        provider: custom
        costModel:
          description: Ottawa bare-metal pricing (Talos)
          CPU: 0.50
          spotCPU: 0.10
          RAM: 0.10
          spotRAM: 0.02
          GPU: 0.00
          storage: 0.05
          zoneNetworkEgress: 0.00
          regionNetworkEgress: 0.00
          internetNetworkEgress: 0.01