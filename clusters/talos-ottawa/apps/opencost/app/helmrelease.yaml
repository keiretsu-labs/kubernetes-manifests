---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opencost
  namespace: opencost
spec:
  interval: 30m
  chart:
    spec:
      chart: opencost
      version: 2.5.22
      sourceRef:
        kind: HelmRepository
        name: opencost
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    opencost:
      exporter:
        defaultClusterId: ottawa
      metrics:
        serviceMonitor:
          enabled: true
          additionalLabels:
            release: prometheus
      prometheus:
        external:
          enabled: true
          url: http://mimir-gateway.mimir.svc.cluster.local:8080/prometheus
        internal:
          enabled: false