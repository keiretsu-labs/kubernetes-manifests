---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: karmada-dashboard
spec:
  interval: 30m
  chart:
    spec:
      chart: charts/karmada-dashboard
      sourceRef:
        kind: GitRepository
        name: karmada-dashboard
        namespace: flux-system
      reconcileStrategy: Revision
  install:
    disableHooks: true
    remediation:
      retries: 3
  upgrade:
    disableHooks: true
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    global:
      kubectl:
        image: bitnami/kubectl:latest
    api:
      replicaCount: 1
      kubeconfigName: karmada-system-karmada-kubeconfig
      kubeconfigContext: karmada-system-karmada-apiserver
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          memory: 256Mi
    web:
      replicaCount: 1
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          memory: 256Mi
    kubernetes_dashboard_api:
      replicaCount: 1
      kubeconfigName: karmada-system-karmada-kubeconfig
      kubeconfigContext: karmada-system-karmada-apiserver
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          memory: 256Mi
  # Auto-login: inject JWT into dashboard static files.
  # Safe behind Tailscale zero-trust network.
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: karmada-dashboard-web
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: karmada-dashboard-web
              spec:
                template:
                  spec:
                    initContainers:
                      - name: inject-token
                        image: docker.io/karmada/karmada-dashboard-web:latest
                        command:
                          - sh
                          - -c
                          - |
                            TOKEN=$(cat /token/token)
                            # auto-login.js: sets token in localStorage on first visit
                            printf '(function(){if(!localStorage.getItem("token")){localStorage.setItem("token","%s");location.reload();}})();\n' "$TOKEN" > /inject/auto-login.js
                            # Patch index.html to load the script
                            sed 's|</head>|<script src="/auto-login.js"></script></head>|' /static/index.html > /inject/index.html
                        volumeMounts:
                          - name: token
                            mountPath: /token
                            readOnly: true
                          - name: inject
                            mountPath: /inject
                    containers:
                      - name: web
                        volumeMounts:
                          - name: inject
                            mountPath: /static/index.html
                            subPath: index.html
                          - name: inject
                            mountPath: /static/auto-login.js
                            subPath: auto-login.js
                    volumes:
                      - name: token
                        secret:
                          secretName: karmada-dashboard-token
                      - name: inject
                        emptyDir: {}
