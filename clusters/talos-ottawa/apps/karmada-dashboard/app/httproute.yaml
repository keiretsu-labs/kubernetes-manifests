---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: karmada-dashboard
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: ts
      namespace: home
  hostnames:
    - "karmada.${CLUSTER_DOMAIN}"
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: karmada-dashboard-web
          port: 8000
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
