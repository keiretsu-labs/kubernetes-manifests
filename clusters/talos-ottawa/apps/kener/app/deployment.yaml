---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kener
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: kener
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kener
    spec:
      containers:
        - name: kener
          image: ghcr.io/rajnandan1/kener:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: ORIGIN
              value: "https://kener.${CLUSTER_DOMAIN}"
            - name: REDIS_URL
              value: redis://localhost:6379
            - name: KENER_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: kener
                  key: KENER_SECRET_KEY
          volumeMounts:
            - name: database
              mountPath: /app/database
            - name: uploads
              mountPath: /app/uploads
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 30
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          args: ["--save", "", "--appendonly", "no"]
          ports:
            - name: redis
              containerPort: 6379
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
      volumes:
        - name: database
          persistentVolumeClaim:
            claimName: kener
        - name: uploads
          persistentVolumeClaim:
            claimName: kener-uploads
