---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: tailvoy
  namespace: envoy-gateway-system
spec:
  telemetry:
    metrics:
      prometheus:
        compression:
          type: Gzip
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        replicas: 3
        container:
          image: ghcr.io/rajsinghtech/tailvoy:service-mappings
        patch:
          type: StrategicMerge
          value:
            spec:
              template:
                spec:
                  containers:
                    - name: envoy
                      imagePullPolicy: Always
                      command:
                        - tailvoy
                        - --config
                        - /etc/tailvoy/config.yaml
                        - --authz-addr
                        - 0.0.0.0:9001
                        - --log-level
                        - debug
                        - --
                      env:
                        - name: TS_CLIENT_ID
                          valueFrom:
                            secretKeyRef:
                              name: tailvoy-oauth
                              key: client_id
                        - name: TS_CLIENT_SECRET
                          valueFrom:
                            secretKeyRef:
                              name: tailvoy-oauth
                              key: client_secret
                      ports:
                        - containerPort: 9001
                          name: authz
                          protocol: TCP
                      volumeMounts:
                        - name: tailvoy-config
                          mountPath: /etc/tailvoy
                          readOnly: true
                  volumes:
                    - name: tailvoy-config
                      configMap:
                        name: tailvoy-config
