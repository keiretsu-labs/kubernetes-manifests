---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nginx-hello
  namespace: tailvoy
spec:
  parentRefs:
    - name: tailvoy
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /raj
      backendRefs:
        - name: nginx-hello
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /kartik
      backendRefs:
        - name: nginx-hello
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /superuser
      backendRefs:
        - name: nginx-hello
          port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nginx-hello-test
  namespace: tailvoy
spec:
  parentRefs:
    - name: tailvoy
      sectionName: http-test
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /test
      backendRefs:
        - name: nginx-hello
          port: 8080
