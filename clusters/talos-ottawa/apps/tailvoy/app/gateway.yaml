---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: tailvoy
  namespace: tailvoy
spec:
  gatewayClassName: tailvoy
  listeners:
    - name: http
      protocol: HTTP
      port: 8080
      allowedRoutes:
        namespaces:
          from: Same
    # - name: http-test
    #   protocol: HTTP
    #   port: 8081
    #   allowedRoutes:
    #     namespaces:
    #       from: Same
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: enable-proxy-protocol
  namespace: tailvoy
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: tailvoy
      sectionName: http
  enableProxyProtocol: true
