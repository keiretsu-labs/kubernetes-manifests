---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tailvoy-config
  namespace: envoy-gateway-system
data:
  config.yaml: |
    tailscale:
      service: "tailvoy"
      clientId: "$${TS_CLIENT_ID}"
      clientSecret: "$${TS_CLIENT_SECRET}"
      tags:
        - "tag:k8s"
      serviceTags:
        - "tag:k8s"
    discovery:
      envoyAdmin: "http://127.0.0.1:19000"
      envoyAddress: "127.0.0.1"
      pollInterval: "5s"
      proxyProtocol: v2
