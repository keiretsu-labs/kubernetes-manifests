---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: tailboy
  annotations:
    item.homer.rajsingh.info/name: "Tailboy"
    item.homer.rajsingh.info/subtitle: "OpenClaw Agent w/ Tailscale + Syncthing"
    service.homer.rajsingh.info/name: "Utilities"
    service.homer.rajsingh.info/icon: "fas fa-robot"
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: ts
      namespace: home
  hostnames:
    - "tailboy.${CLUSTER_DOMAIN}"
  rules:
    - backendRefs:
        - kind: Service
          name: tailboy
          port: 18789
      matches:
        - path:
            type: PathPrefix
            value: /
