---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tailboy-gateway-ingress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: tailboy
      app.kubernetes.io/name: openclaw
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-gateway-system
      ports:
        - port: 18790
          protocol: TCP
        - port: 18794
          protocol: TCP
