---
apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: openclaw-example
spec:
  image: ghcr.io/openclaw/openclaw:latest
  config:
    raw: |
      gateway:
        port: 18789
        mode: local
        bind: lan
        auth:
          mode: token
          token: "${DEFAULT_PASSWORD}"
      models:
        mode: merge
        providers:
          aperture:
            baseUrl: http://aperture
            apiKey: unused
            api: anthropic-messages
            models:
              - id: MiniMax-M2.7
                name: MiniMax M2.7
                input:
                  - text
                contextWindow: 204800
                maxTokens: 16384
                reasoning: true
      agents:
        defaults:
          model: aperture/MiniMax-M2.7
          userTimezone: America/New_York
          timeoutSeconds: 600
          maxConcurrent: 3
          memorySearch:
            enabled: true
            provider: openai
            model: Qwen3-Coder-Next
            remote:
              baseUrl: http://stpetersburg-llama-cpp/v1
              apiKey: unused
          sandbox: {}
        list:
          - id: main
            default: true
            identity:
              name: OpenClaw Example
      session:
        scope: per-sender
        idleMinutes: 60
      tools:
        profile: full
        web:
          search:
            enabled: true
          fetch:
            enabled: true
      logging:
        level: info
        consoleStyle: compact
  envFrom:
    - secretRef:
        name: openclaw-secrets
  chromium:
    enabled: true
  tailscale:
    enabled: true
    env:
      - name: TS_AUTHKEY
        valueFrom:
          secretKeyRef:
            name: ts-oauth
            key: TS_AUTHKEY
      - name: TS_EXTRA_ARGS
        value: "--advertise-tags=tag:k8s,tag:ottawa --accept-routes"
  storage:
    persistence:
      size: 10Gi
      storageClass: ceph-block
  webTerminal:
    enabled: true
