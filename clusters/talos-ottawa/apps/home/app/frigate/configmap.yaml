---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frigate-config
  namespace: home
  labels:
    app: frigate
data:
  config.yml: |
    mqtt:
      enabled: false

    auth:
      enabled: false

    ffmpeg:
      path: "7.0"
      hwaccel_args: preset-vaapi

    detectors:
      cpu1:
        type: cpu

    go2rtc:
      streams:
        ottawa_cam:
          - rtspx://192.168.169.1:7441/YgigQ2PzZ1QwPCHW

    cameras:
      ottawa_cam:
        enabled: false
        ffmpeg:
          inputs:
            - path: rtsps://192.168.169.1:7441/YgigQ2PzZ1QwPCHW?enableSrtp
              input_args: preset-rtsp-restream
              roles:
                - detect
        detect:
          enabled: false
          width: 1280
          height: 720
        record:
          enabled: false
        snapshots:
          enabled: false

    version: 0.17-0
