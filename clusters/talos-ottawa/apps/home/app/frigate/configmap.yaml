---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frigate-config
  namespace: home
  labels:
    app: frigate
data:
  config.yml: |
    mqtt:
      enabled: false

    auth:
      enabled: false

    ffmpeg:
      path: "7.0"
      hwaccel_args: preset-vaapi

    detectors:
      cpu1:
        type: cpu

    go2rtc:
      webrtc:
        candidates:
          - "frigate.${CLUSTER_DOMAIN}:8555"
          - "stun:8555"
      streams:
        ottawa_cam:
          - rtspx://192.168.169.1:7441/YgigQ2PzZ1QwPCHW
          - "exec:/usr/lib/ffmpeg/7.0/bin/ffmpeg -re -fflags nobuffer -f s16be -ar 8000 -i - -vn -acodec libopus -ar 24000 -sample_fmt s16 -b:a 32k -f rtp rtp://192.168.169.66:7004#backchannel=1#audio=opus/24000"

    cameras:
      ottawa_cam:
        ffmpeg:
          inputs:
            - path: rtsp://127.0.0.1:8554/ottawa_cam
              input_args: preset-rtsp-restream
              roles:
                - detect
        detect:
          enabled: false
          width: 1280
          height: 720
        record:
          enabled: false
        snapshots:
          enabled: false

    version: 0.17-0
