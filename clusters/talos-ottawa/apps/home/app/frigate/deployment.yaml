---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frigate
  namespace: home
  labels:
    app: frigate
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: frigate
  template:
    metadata:
      labels:
        app: frigate
    spec:
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: frigate-gpu
      initContainers:
        - name: seed-config
          image: ghcr.io/blakeblackshear/frigate:stable-rocm
          command:
            - sh
            - -c
            - |
              set -e
              cp -f /config-template/config.yml /config/config.yml
              mkdir -p /config/model_cache /config/exports /config/recordings
          volumeMounts:
            - name: config
              mountPath: /config
            - name: config-template
              mountPath: /config-template
      containers:
        - name: frigate
          image: ghcr.io/blakeblackshear/frigate:stable-rocm
          resources:
            claims:
              - name: gpu
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              memory: 8Gi
          env:
            - name: TZ
              value: ${TIMEZONE}
            - name: LIBVA_DRIVER_NAME
              value: radeonsi
          ports:
            - containerPort: 5000
              name: http
            - containerPort: 8554
              name: rtsp
            - containerPort: 8555
              name: webrtc-tcp
              protocol: TCP
            - containerPort: 8555
              name: webrtc-udp
              protocol: UDP
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /media/frigate
            - name: dshm
              mountPath: /dev/shm
            - name: cache
              mountPath: /tmp/cache
      restartPolicy: Always
      terminationGracePeriodSeconds: 60
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: frigate-config
        - name: config-template
          configMap:
            name: frigate-config
        - name: media
          emptyDir:
            sizeLimit: 1Gi
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
        - name: cache
          emptyDir:
            sizeLimit: 5Gi
