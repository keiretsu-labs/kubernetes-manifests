---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: camofox
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: camofox
  template:
    metadata:
      labels:
        app.kubernetes.io/name: camofox
    spec:
      containers:
        - name: camofox
          # Upstream prebuilt image (no vendored blob). Camoufox is baked in at
          # build time (~300MB) so first start is fast.
          image: ghcr.io/jo-inc/camofox-browser:1.11.2
          env:
            # REST API port consumed by Hermes via CAMOFOX_URL (cluster-internal).
            - name: CAMOFOX_PORT
              value: "9377"
            # Headed mode + interactive noVNC web viewer so raj can watch the
            # browser live and take over (e.g. logins) mid-task.
            - name: ENABLE_VNC
              value: "1"
            - name: NOVNC_PORT
              value: "6080"
          envFrom:
            # VNC_PASSWORD = ${DEFAULT_PASSWORD} (see secret.yaml).
            - secretRef:
                name: camofox-secrets
          ports:
            - name: api
              containerPort: 9377
              protocol: TCP
            - name: novnc
              containerPort: 6080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              memory: 3Gi
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
      terminationGracePeriodSeconds: 30
