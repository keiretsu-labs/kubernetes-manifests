---
# gVisor sandboxed runtime. Handler `runsc` is registered in containerd by the
# `siderolabs/gvisor` Talos system extension (added to shiro's schematic in
# bootstrap/talos/talconfig.yaml). RuntimeClass is cluster-scoped; namespace is ignored.
# Pods opt in with `runtimeClassName: gvisor`.
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: gvisor
handler: runsc
scheduling:
  # Only nodes carrying the gVisor extension can run runsc pods. shiro is the
  # designated worker (workload-class=specialized); the extension is added there.
  nodeSelector:
    workload-class: specialized
