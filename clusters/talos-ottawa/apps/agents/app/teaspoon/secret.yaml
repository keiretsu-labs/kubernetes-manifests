---
# PLACEHOLDER — fill the real Discord bot token then SOPS-encrypt before the
# token connects:
#   sops --encrypt --in-place secret.yaml && git mv secret.yaml secret.sops.yaml
#   (then add secret.sops.yaml to teaspoon/kustomization.yaml in place of secret.yaml)
# The token is the SAME bot identity as the old ns/hermes app — only ONE gateway
# may hold a given Discord token at a time, so retire old hermes's Discord
# connection as part of the cutover (see migration notes).
apiVersion: v1
kind: Secret
metadata:
  name: teaspoon-secrets
type: Opaque
stringData:
  DISCORD_BOT_TOKEN: ""
