---
# PLACEHOLDER secret — intentionally EMPTY in git.
#
# The Discord bot token is NOT stored here. This pod's operator cannot
# SOPS-encrypt (no PGP private key on the box), so committing the real token
# in plaintext is unsafe. Instead the token is injected as LIVE cluster state
# (kubectl patch into this Secret) during the migration, and persists because
# the Secret object already exists.
#
# To make it fully GitOps later, put the real token here and encrypt:
#   sops --encrypt --in-place secret.yaml && git mv secret.yaml secret.sops.yaml
#   (then swap secret.yaml -> secret.sops.yaml in teaspoon/kustomization.yaml)
#
# IMPORTANT: this Secret deliberately does NOT declare DISCORD_BOT_TOKEN, so
# Flux server-side apply does not own that key and will not wipe the live-
# injected value on reconcile.
apiVersion: v1
kind: Secret
metadata:
  name: teaspoon-secrets
type: Opaque
stringData: {}
