---
# Corp aperture LLM endpoint (Tailscale egress ExternalName), mirrored from the
# old ns/hermes app. teaspoon uses anthropic/claude-opus-4-8 (Anthropic OAuth)
# as its MAIN provider; aperture is the secondary "corp" endpoint (Kartik also
# works at Tailscale, so this cork endpoint is reachable) for e.g. Office tasks.
# Reachable in-cluster as http://aperture/v1 via the common-egress ProxyGroup.
# NOTE: stpetersburg-vllm is a SHARED singleton ExternalName already defined in
# this ns by assistant-raj — do NOT redefine it here. aperture is not yet
# defined in ns agents, so adding it here is safe (no duplicate-id collision).
apiVersion: v1
kind: Service
metadata:
  name: aperture
  annotations:
    kustomize.toolkit.fluxcd.io/ssa: IfNotPresent
    tailscale.com/tailnet-fqdn: aperture.keiretsu.ts.net
    tailscale.com/proxy-group: common-egress
spec:
  externalName: placeholder
  type: ExternalName
  ports:
    - name: http
      port: 80
      protocol: TCP
