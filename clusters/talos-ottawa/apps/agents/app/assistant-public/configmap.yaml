---
apiVersion: v1
kind: ConfigMap
metadata:
  name: assistant-public-config
data:
  # ---- PUBLIC hardening ----
  # This agent is reachable on the public Internet via assistant.keiretsu.top.
  # Network-layer (tag:raj) gating no longer applies on the public path, so the
  # gateway must enforce auth itself. Allow-all is OFF.
  GATEWAY_ALLOW_ALL_USERS: "false"
  API_SERVER_ENABLED: "true"
  API_SERVER_HOST: "0.0.0.0"
  API_SERVER_PORT: "8642"
  # Strong key required; sourced from the SOPS secret (not the shared default pw).
  API_SERVER_KEY: "${ASSISTANT_PUBLIC_API_KEY}"

  # LLM endpoint reached through the stpetersburg-vllm ExternalName egress.
  OPENAI_BASE_URL: "http://stpetersburg-vllm/v1"
  OPENAI_API_KEY: "unused"

  # ---- Persona ----
  AGENT_NAME: "assistant"
  AGENT_PERSONA: "assistant"
  AGENT_SYSTEM_PROMPT: |
    You are Assistant, the Keiretsu public AI assistant.
    You are reachable by authenticated users at assistant.keiretsu.top.
    Be helpful, accurate, and concise. Do not reveal infrastructure internals,
    secrets, or other users' data. When uncertain, ask one clarifying question.
