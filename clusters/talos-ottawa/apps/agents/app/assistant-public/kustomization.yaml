---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: agents
resources:
  - deployment.yaml
  - service.yaml
  - storagestack.yaml
  - garagekey.yaml
  # egress.yaml omitted: the stpetersburg-vllm ExternalName Service is already
  # defined once by assistant-raj in the shared `agents` namespace and is reused.
  - configmap.yaml
  - ts-serve-config.yaml
  - ts-auth.yaml
  # secret.sops.yaml is intentionally NOT listed yet. Copy from
  # secret.sops.yaml.example, fill real values, then:
  #   sops --encrypt --in-place secret.sops.yaml
  # and uncomment the line below (do this at home with gpg/sops + the cluster key).
  # - secret.sops.yaml
  - httproute.yaml
