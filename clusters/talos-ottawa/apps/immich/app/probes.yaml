---
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: app-immich
spec:
  jobName: blackbox
  module: http_2xx
  prober:
    url: blackbox-exporter.monitoring.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        - http://immich-server.immich:2283/api/server/ping
      labels:
        service: immich
