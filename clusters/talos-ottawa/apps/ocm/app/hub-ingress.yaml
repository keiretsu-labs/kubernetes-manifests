---
# Expose Ottawa's kube-apiserver on the tailnet as a raw TCP proxy
# No impersonation — bearer tokens pass through untouched
# Used by OCM klusterlets on other clusters to register with the hub
apiVersion: v1
kind: Service
metadata:
  name: ocm-hub-apiserver
  namespace: default
  annotations:
    tailscale.com/hostname: ocm-hub
    tailscale.com/proxy-group: common-ingress
    tailscale.com/tags: "tag:k8s"
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  ports:
    - name: https
      port: 6443
      protocol: TCP
      targetPort: 6443
  selector:
    # Empty selector — we use Endpoints to point at the kube-apiserver
    {}
---
# Endpoints pointing at Ottawa's kube-apiserver
apiVersion: v1
kind: Endpoints
metadata:
  name: ocm-hub-apiserver
  namespace: default
subsets:
  - addresses:
      - ip: 192.168.169.117
    ports:
      - name: https
        port: 6443
        protocol: TCP
