---
# Expose kube-apiserver on the tailnet as raw L4 TCP (no impersonation)
# Klusterlets connect here with bearer tokens intact for CSR registration
apiVersion: v1
kind: Service
metadata:
  name: ocm-hub-apiserver
  namespace: open-cluster-management
  annotations:
    tailscale.com/hostname: ocm-hub
    tailscale.com/proxy-group: common-ingress
    tailscale.com/tags: "tag:k8s"
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  ports:
    - name: https
      port: 443
      protocol: TCP
      targetPort: 6443
---
# Ottawa control plane node endpoints
apiVersion: v1
kind: Endpoints
metadata:
  name: ocm-hub-apiserver
  namespace: open-cluster-management
subsets:
  - addresses:
      - ip: 192.168.169.117
      - ip: 192.168.169.118
      - ip: 192.168.169.119
    ports:
      - name: https
        port: 6443
        protocol: TCP
