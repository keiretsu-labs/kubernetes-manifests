---
# Vendored CSI-Addons controller manifests, pinned to v0.14.0.
# Source: https://github.com/csi-addons/kubernetes-csi-addons/releases/tag/v0.14.0
#   crds.yaml             - NetworkFence, NetworkFenceClass, ReclaimSpace*, CSIAddonsNode CRDs
#   rbac.yaml             - controller ClusterRole/Binding + SAs
#   setup-controller.yaml - csi-addons-system namespace + controller Deployment
#   csi-addons-config.yaml - controller tuning ConfigMap
# Refresh: re-download the 4 release assets at the desired tag and bump ROOK_CSIADDONS_IMAGE
# in the rook-ceph operator HelmRelease to match the sidecar image tag.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - crds.yaml
  - rbac.yaml
  - setup-controller.yaml
  - csi-addons-config.yaml
