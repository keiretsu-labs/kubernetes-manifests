---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app csi-addons
  namespace: flux-system
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    # Rook operator owns the RBD CSI driver that the csi-addons sidecar attaches to.
    - name: rook-ceph-operator
  path: ./clusters/${CLUSTER_NAME}/apps/csi-addons/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: kubernetes-manifests
  interval: 30m
  retryInterval: 1m
  timeout: 5m
