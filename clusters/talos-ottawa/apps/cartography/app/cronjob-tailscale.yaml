---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cartography-tailscale
spec:
  schedule: "45 */6 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          volumes:
            - name: shared
              emptyDir: {}
          initContainers:
            - name: oauth-exchange
              image: alpine:3.24
              command: [/bin/sh, -c]
              args:
                - |
                  set -eu
                  apk add --no-cache curl jq >/dev/null
                  TOKEN=$$(curl -sS --fail -X POST https://api.tailscale.com/api/v2/oauth/token \
                    -H "Content-Type: application/x-www-form-urlencoded" \
                    -d "client_id=$$TS_OAUTH_CLIENT_ID" \
                    -d "client_secret=$$TS_OAUTH_CLIENT_SECRET" \
                    | jq -r .access_token)
                  test -n "$$TOKEN" -a "$$TOKEN" != null
                  printf '%s' "$$TOKEN" >/shared/token
              envFrom:
                - secretRef:
                    name: cartography-secrets
              volumeMounts:
                - name: shared
                  mountPath: /shared
          containers:
            - name: cartography
              image: ghcr.io/cartography-cncf/cartography:latest
              command: [/bin/sh, -c]
              args:
                - |
                  export TAILSCALE_TOKEN=$$(cat /shared/token)
                  exec cartography \
                    --neo4j-uri=bolt://neo4j:7687 \
                    --selected-modules=tailscale \
                    --tailscale-token-env-var=TAILSCALE_TOKEN \
                    --tailscale-org=${TAILSCALE_TAILNET}
              volumeMounts:
                - name: shared
                  mountPath: /shared
                  readOnly: true
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 1Gi
