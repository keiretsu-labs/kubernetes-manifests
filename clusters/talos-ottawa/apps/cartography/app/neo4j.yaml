---
apiVersion: v1
kind: Service
metadata:
  name: neo4j
spec:
  selector:
    app: neo4j
  ports:
    - name: http
      port: 7474
      targetPort: 7474
    - name: bolt
      port: 7687
      targetPort: 7687
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: neo4j
spec:
  serviceName: neo4j
  replicas: 1
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      enableServiceLinks: false
      securityContext:
        fsGroup: 7474
      containers:
        - name: neo4j
          image: neo4j:5.15.0-community
          ports:
            - name: http
              containerPort: 7474
            - name: bolt
              containerPort: 7687
          env:
            - name: NEO4J_AUTH
              value: none
            - name: NEO4J_PLUGINS
              value: '["graph-data-science", "apoc"]'
            - name: NEO4J_server_memory_pagecache_size
              value: 1G
            - name: NEO4J_server_memory_heap_initial__size
              value: 1G
            - name: NEO4J_server_memory_heap_max__size
              value: 2G
            - name: NEO4J_dbms_security_procedures_allowlist
              value: gds.*,apoc.*
            - name: NEO4J_dbms_security_procedures_unrestricted
              value: gds.*,apoc.*
            - name: NEO4J_apoc_export_file_enabled
              value: "true"
            - name: NEO4J_apoc_import_file_enabled
              value: "true"
            - name: NEO4J_apoc_import_file_use__neo4j__config
              value: "true"
            - name: NEO4J_server_default__listen__address
              value: 0.0.0.0
          volumeMounts:
            - name: data
              mountPath: /data
            - name: logs
              mountPath: /logs
          readinessProbe:
            httpGet:
              path: /
              port: 7474
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 2Gi
            limits:
              memory: 4Gi
      volumes:
        - name: logs
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: ${STORAGECLASS_DEFAULT}
        resources:
          requests:
            storage: 50Gi
