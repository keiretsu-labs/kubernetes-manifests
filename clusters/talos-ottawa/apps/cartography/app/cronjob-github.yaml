---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cartography-github
spec:
  # Suspended: requires `read:user` + `user:email` scopes on
  # KUBERNETES_MANIFESTS_GITHUB_TOKEN. Without them the membersWithRole
  # query returns null and the sync hard-fails. Un-suspend after the
  # token is updated.
  suspend: true
  schedule: "30 */6 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: cartography
              image: ghcr.io/cartography-cncf/cartography:latest
              command: [/bin/sh, -c]
              args:
                - |
                  GITHUB_CONFIG=$$(printf '{"organization":[{"token":"%s","url":"https://api.github.com/graphql","name":"%s"}]}' \
                    "$$GITHUB_TOKEN" "$$GITHUB_ORG" | base64 -w0)
                  export GITHUB_CONFIG
                  exec cartography \
                    --neo4j-uri=bolt://neo4j:7687 \
                    --selected-modules=github \
                    --github-config-env-var=GITHUB_CONFIG
              envFrom:
                - secretRef:
                    name: cartography-secrets
              resources:
                requests:
                  cpu: 100m
                  memory: 512Mi
                limits:
                  memory: 2Gi
