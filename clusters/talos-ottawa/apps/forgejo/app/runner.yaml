---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: forgejo-runner
spec:
  replicas: 2
  serviceName: forgejo-runner
  selector:
    matchLabels:
      app: forgejo-runner
  template:
    metadata:
      labels:
        app: forgejo-runner
    spec:
      initContainers:
        - name: register
          image: code.forgejo.org/forgejo/runner:6.3.1
          command:
            - /bin/sh
            - -c
            - |
              if [ ! -f /data/.runner ]; then
                act_runner register \
                  --instance http://forgejo-http:3000 \
                  --token "$(cat /secrets/token)" \
                  --name "$(hostname)" \
                  --labels ubuntu-latest:docker://node:20-bookworm,ubuntu-22.04:docker://node:20-bookworm \
                  --no-interactive
              fi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: token
              mountPath: /secrets
      containers:
        - name: runner
          image: code.forgejo.org/forgejo/runner:6.3.1
          command: [act_runner, daemon, --config, /config/config.yaml]
          env:
            - name: DOCKER_HOST
              value: tcp://localhost:2375
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /config
        - name: dind
          image: docker:dind
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          volumeMounts:
            - name: docker-storage
              mountPath: /var/lib/docker
      volumes:
        - name: token
          secret:
            secretName: forgejo-runner-token
        - name: config
          configMap:
            name: forgejo-runner-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: ${STORAGECLASS_DEFAULT}
        resources:
          requests:
            storage: 1Gi
    - metadata:
        name: docker-storage
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: ${STORAGECLASS_DEFAULT}
        resources:
          requests:
            storage: 10Gi
