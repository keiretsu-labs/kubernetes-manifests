# CronJob that applies a WorkloadRebalancer every 5 minutes
# Triggers fresh rescheduling for failover-test so replicas redistribute
# based on current available resources after cluster recovery.
# Idempotent — if already balanced, the reschedule confirms current distribution.
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: workload-rebalancer
  namespace: karmada-system
spec:
  schedule: "*/5 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Replace
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 120
      template:
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: rebalancer
              image: bitnami/kubectl:latest
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                readOnlyRootFilesystem: true
              command:
                - sh
                - -c
                - |
                  cat <<'EOF' | kubectl --kubeconfig=/etc/kubeconfig/kubeconfig apply -f -
                  apiVersion: apps.karmada.io/v1alpha1
                  kind: WorkloadRebalancer
                  metadata:
                    name: failover-test-rebalance
                  spec:
                    ttlSecondsAfterFinished: 120
                    workloads:
                      - apiVersion: apps/v1
                        kind: Deployment
                        name: failover-test
                        namespace: failover-test
                  EOF
              volumeMounts:
                - name: kubeconfig
                  mountPath: /etc/kubeconfig
                  readOnly: true
          volumes:
            - name: kubeconfig
              secret:
                secretName: karmada-system-karmada-kubeconfig
