# CronJob that snapshots the Karmada etcd cluster every 6 hours
# and uploads the backup to Garage S3-compatible storage.
# Requires GarageBucket + GarageKey below to provision credentials.
---
apiVersion: garage.rajsingh.info/v1alpha1
kind: GarageBucket
metadata:
  name: karmada-etcd-backups
spec:
  clusterRef:
    name: garage
    namespace: garage
  globalAlias: karmada-etcd-backups
  quotas:
    maxSize: 50Gi
    maxObjects: 1000
  keyPermissions:
    - keyRef: karmada-etcd-backup-key
      read: true
      write: true
      owner: true
---
apiVersion: garage.rajsingh.info/v1alpha1
kind: GarageKey
metadata:
  name: karmada-etcd-backup-key
spec:
  clusterRef:
    name: garage
    namespace: garage
  name: "Karmada etcd Backup Key"
  secretTemplate:
    name: karmada-etcd-backup-s3
    accessKeyIdKey: AWS_ACCESS_KEY_ID
    secretAccessKeyKey: AWS_SECRET_ACCESS_KEY
  bucketPermissions:
    - bucketRef: karmada-etcd-backups
      read: true
      write: true
      owner: true
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: etcd-backup
spec:
  schedule: "0 */6 * * *"
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            fsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          initContainers:
            - name: snapshot
              image: registry.k8s.io/etcd:3.6.9-0
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                readOnlyRootFilesystem: true
              env:
                - name: ETCDCTL_API
                  value: "3"
              command:
                - etcdctl
                - snapshot
                - save
                - /backup/snapshot.db
                - --endpoints=https://etcd-0.etcd.karmada-system.svc.cluster.local:2379
                - --cacert=/etc/etcd/certs/server-ca.crt
                - --cert=/etc/etcd/certs/karmada.crt
                - --key=/etc/etcd/certs/karmada.key
              volumeMounts:
                - name: etcd-certs
                  mountPath: /etc/etcd/certs
                  readOnly: true
                - name: backup
                  mountPath: /backup
                - name: tmp
                  mountPath: /tmp
          containers:
            - name: upload
              image: amazon/aws-cli:2.34.14
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                readOnlyRootFilesystem: true
              env:
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: karmada-etcd-backup-s3
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: karmada-etcd-backup-s3
                      key: AWS_SECRET_ACCESS_KEY
              command:
                - sh
                - -c
                - |
                  TIMESTAMP=$$(date +%Y%m%d-%H%M%S)
                  aws s3 cp /backup/snapshot.db \
                    "s3://karmada-etcd-backups/snapshot-$${TIMESTAMP}.db" \
                    --endpoint-url=http://${COMMON_S3_ENDPOINT} \
                    --region=garage
                  echo "Uploaded snapshot-$${TIMESTAMP}.db"
              volumeMounts:
                - name: backup
                  mountPath: /backup
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: etcd-certs
              secret:
                secretName: karmada-cert
                items:
                  - key: karmada.crt
                    path: karmada.crt
                  - key: karmada.key
                    path: karmada.key
                  - key: server-ca.crt
                    path: server-ca.crt
            - name: backup
              emptyDir: {}
            - name: tmp
              emptyDir: {}
