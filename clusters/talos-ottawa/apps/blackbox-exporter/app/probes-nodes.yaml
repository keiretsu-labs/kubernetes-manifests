---
# Talos node control-plane ports.
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: app-nodes-tcp
spec:
  module: tcp_connect
  prober:
    url: blackbox-exporter.monitoring.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        - rei.killinit.internal:6443
        - asuka.killinit.internal:6443
        - kaji.killinit.internal:6443
      labels:
        service: nodes
        target: kubelet-port
---
# NAS (SMB) + JetKVM
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: app-nas-tcp
spec:
  module: tcp_connect
  prober:
    url: blackbox-exporter.monitoring.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        - nagato.killinit.internal:445
        - jetkvm.killinit.internal:80
      labels:
        service: nodes
        target: nas
---
# ICMP reachability for nodes.
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: app-nodes-icmp
spec:
  module: icmp
  prober:
    url: blackbox-exporter.monitoring.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        - rei.killinit.internal
        - asuka.killinit.internal
        - kaji.killinit.internal
        - nagato.killinit.internal
      labels:
        service: nodes
        target: ping
