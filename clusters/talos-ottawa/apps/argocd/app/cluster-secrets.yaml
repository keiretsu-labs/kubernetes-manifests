---
# ArgoCD cluster secrets for all 3 member clusters
# Auth handled by Tailscale k8s-operator proxy (impersonation)
apiVersion: v1
kind: Secret
metadata:
  name: cluster-ottawa
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: cluster
    location: ottawa
type: Opaque
stringData:
  name: ottawa
  server: https://ottawa-k8s-operator.keiretsu.ts.net
  config: |
    {
      "tlsClientConfig": {
        "insecure": true
      }
    }
