---
apiVersion: k8gb.absa.oss/v1beta1
kind: Gslb
metadata:
  name: pocket-id
  annotations:
    k8gb.io/exposed-hostnames: "pocket-id.cdn.${COMMON_DOMAIN}"
spec:
  resourceRef:
    apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    name: pocket-id
    namespace: pocket-id
  strategy:
    type: roundRobin
    dnsTtlSeconds: 30
    weight:
      ottawa: 100
      robbinsdale: 0
      stpetersburg: 0
