---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-settings
  namespace: flux-system
data:
  LOCATION: ottawa
  FAILOVER: robbinsdale
  SITE_ID: "2"
  TIMEZONE: America/New_York
  CLUSTER_NAME: talos-ottawa
  CLUSTER_DISPLAY_NAME: Ottawa

  # K8s
  CLUSTER_POD_CIDR: 10.3.0.0/16
  CLUSTER_SERVICE_CIDR: 10.2.0.0/16
  CLUSTER_LOAD_BALANCER_CIDR: 10.169.0.0/16

  # Networking
  LAN_CIDR: 192.168.169.0/24 
  LAN_GATEWAY_IP: "192.168.169.1"
  KUBERNETES_API_VIP: "192.168.169.25"

  # Domain
  CLUSTER_DOMAIN: killinit.cc


  # Storage
  STORAGECLASS_LONGTERM: smb
  STORAGECLASS_DEFAULT: ceph-block-replicated
  STORAGECLASS_METADATA: ceph-block-replicated

  # Garage S3 endpoint override (takes precedence over common-secrets COMMON_S3_ENDPOINT).
  # Point at the cluster-local GATEWAY service (tier:gateway). As of operator v0.6.9 the
  # gateway holds the full FullReplication key_table (garage-operator#209/#224 fixed), so
  # S3 sig-auth resolves locally — no more "403 No such key". The gateway also survives
  # local-storage-loss: it proxies reads to a surviving region's storage (read_quorum=1),
  # whereas the storage service has NO endpoints if local storage is destroyed. Swap this
  # one value to repoint every app — all S3 clients use ${COMMON_S3_ENDPOINT}.
  COMMON_S3_ENDPOINT: "garage-gateway.garage.svc.cluster.local:3900"
  VICTORIA_LOGS_HOST: "victoria-logs-victoria-logs-single-server.monitoring"

  # Garage: storage layout hand-managed per-node in clusters/talos-ottawa/apps/garage
  # (Manual) so the array can move off SMB to ceph/local-path per node. Gateway
  # tier stays operator-managed (Auto). Requires operator v0.6.11+.
  GARAGE_STORAGE_LAYOUT_POLICY: "Manual"

  # Garage: exclude asuka from gateway scheduling (SIGILL on that node)
  GARAGE_GATEWAY_AFFINITY: '{"nodeAffinity":{"requiredDuringSchedulingIgnoredDuringExecution":{"nodeSelectorTerms":[{"matchExpressions":[{"key":"kubernetes.io/hostname","operator":"NotIn","values":["asuka"]}]}]}}}'
