---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: kbench-pv-smb-egress
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Delete
  csi:
    driver: smb.csi.k8s.io
    volumeHandle: kbench-smb-egress
    volumeAttributes:
      source: //robbinsdale-smb.tailscale/k8s
    nodeStageSecretRef:
      name: csi-smbcreds
      namespace: kube-system
  mountOptions:
    - dir_mode=0777
    - file_mode=0777
    - uid=1001
    - gid=1001
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kbench-pvc-smb-egress
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  volumeName: kbench-pv-smb-egress
  storageClassName: ""
---
apiVersion: v1
kind: Pod
metadata:
  name: test-smb-egress
spec:
  containers:
  - name: test
    image: busybox:latest
    command: ["sleep", "3600"]
    volumeMounts:
    - name: smb
      mountPath: /mnt/smb
  volumes:
  - name: smb
    persistentVolumeClaim:
      claimName: kbench-pvc-smb-egress
  restartPolicy: Never
