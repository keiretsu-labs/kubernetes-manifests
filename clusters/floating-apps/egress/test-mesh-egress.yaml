---
# Tailscale egress service — makes test-mesh reachable from any cluster
# Deployed to ALL clusters via the mesh-egress ApplicationSet
apiVersion: v1
kind: Service
metadata:
  name: test-mesh-ts-egress
  namespace: keiretsu-top
  annotations:
    tailscale.com/tailnet-fqdn: test-mesh.keiretsu.ts.net
    tailscale.com/proxy-group: common-egress
spec:
  externalName: placeholder
  type: ExternalName
  ports:
  - name: http
    port: 80
    protocol: TCP
