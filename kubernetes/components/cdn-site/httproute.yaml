---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ${SITE}-cdn
  annotations:
    # Publish PUBLIC_HOST -> CDN_HOST via the zone's gateway-watching external-dns.
    # CDN_HOST is the k8gb-delegated GSLB name, so this inherits health-checked,
    # multi-cluster resolution. PROXIED toggles the Cloudflare edge in front.
    external-dns.alpha.kubernetes.io/target: "${CDN_HOST}"
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "${PROXIED}"
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: public
      namespace: home
  # Both names: CDN_HOST is what k8gb publishes + what the GSLB resolves to;
  # PUBLIC_HOST is what the client (or Cloudflare) sends as Host, so the gateway
  # must match it too.
  hostnames:
    - "${CDN_HOST}"
    - "${PUBLIC_HOST}"
  rules:
    - filters:
        - type: URLRewrite
          urlRewrite:
            hostname: "${BUCKET}.${COMMON_DOMAIN}"
      backendRefs:
        - group: ""
          kind: Service
          name: garage-gateway
          port: 3902
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
