---
apiVersion: garage.rajsingh.info/v1beta1
kind: GarageKey
metadata:
  name: hermes-placeholder-s3-key
spec:
  clusterRef:
    name: garage
    namespace: garage
  name: "hermes-placeholder"
  secretTemplate:
    name: hermes-placeholder-s3
    accessKeyIdKey: AWS_ACCESS_KEY_ID
    secretAccessKeyKey: AWS_SECRET_ACCESS_KEY
  bucketPermissions:
    - bucketRef:
        name: agents
        namespace: garage
      read: true
      write: true
