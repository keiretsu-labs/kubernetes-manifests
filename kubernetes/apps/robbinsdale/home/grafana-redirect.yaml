---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grafana-redirect
  namespace: flux-system
spec:
  targetNamespace: home
  path: ./kubernetes/apps/base/home/grafana-redirect/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: kubernetes-manifests
  interval: 30m
  retryInterval: 1m
  timeout: 3m
