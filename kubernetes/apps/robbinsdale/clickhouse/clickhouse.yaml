#   namespace: flux-system
# spec:
#   targetNamespace: clickhouse
#   commonMetadata:
#     labels:
#       app.kubernetes.io/name: *app
#   path: ./kubernetes/apps/base/clickhouse/clickhouse
#   prune: true
#   sourceRef:
#     kind: GitRepository
#     name: kubernetes-manifests
#   wait: false
#   interval: 0s
#   retryInterval: 1m
#   timeout: 5m
#   dependsOn:
#     - name: clickhouse-operator-system
