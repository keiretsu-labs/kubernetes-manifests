apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./egress.yaml
  - ./victoria-logs.yaml
patches:
  - patch: |-
      - op: add
        path: /metadata/namespace
        value: monitoring
    target:
      kind: Service
  - patch: |-
      - op: add
        path: /metadata/namespace
        value: monitoring
    target:
      kind: HelmRelease