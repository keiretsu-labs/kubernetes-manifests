  ENCRYPTION_KEY: "122e7127d2ae373a425c1d164eb5765b"
  # Required: 44-char base64 string (openssl rand -base64 32)
  AUTH_SECRET: "lfb+kVVETKbm8Bn+lS/p1RFPCCkmWZCWliKuMs9wglc="
  # Required: absolute URL including protocol
