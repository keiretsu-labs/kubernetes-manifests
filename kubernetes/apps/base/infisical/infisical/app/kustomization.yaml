---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: infisical
resources:
  - helmrelease.yaml
  - pg.yaml
  - s3-backup.yaml
  - dragonfly.yaml
  - httproute.yaml
  - secret.sops.yaml
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  - name: infisical-values
    files:
      - values.yaml