---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: irqbalance
  namespace: kube-system
  labels:
    app: irqbalance
spec:
  selector:
    matchLabels:
      app: irqbalance
  template:
    metadata:
      labels:
        app: irqbalance
    spec:
      hostNetwork: true
      hostPID: true
      hostIPC: true
      containers:
      - name: irqbalance
        image: ghcr.io/home-operations/irqbalance:1.9.5@sha256:5c58790f22fea1e331b3312977005e66586ced3d39e2d0e4fddb7dfacf873fb5
        command: ["/usr/sbin/irqbalance"]
        args: ["--foreground", "--journal"]
        env:
        - name: IRQBALANCE_BANNED_CPULIST
          value: "0-7"
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            memory: 128Mi
        securityContext:
          privileged: true
        volumeMounts:
        - name: run
          mountPath: /run/irqbalance
      volumes:
      - name: run
        emptyDir: {}
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: extensions.talos.dev/intel-ucode
                operator: Exists
