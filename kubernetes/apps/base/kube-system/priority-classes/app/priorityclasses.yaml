# Cluster-foundational PriorityClasses. Referenced by name across the whole
# fleet (cert-manager, prometheus, garage, rook, tailscale proxies, envoy +
# ai gateways, k8gb, ...). Kept in a standalone app — NOT inside any workload
# app — so a single app's failure/suspension can never prune these out from
# under everything that references them (a missing PriorityClass fails pod
# admission cluster-wide). Deployed early via the kube-system overlay.
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: infra-critical
value: 1000000000
globalDefault: false
description: "Critical infrastructure — Tailscale proxies, CNI, cert-manager, Flux controllers. Preempts lower-priority workloads during resource contention."
preemptionPolicy: PreemptLowerPriority
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: infra-high
value: 800000000
globalDefault: false
description: "Important platform services — Garage storage, monitoring, ingress gateways, database operators."
preemptionPolicy: PreemptLowerPriority
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: infra-default
value: 500000000
globalDefault: false
description: "Standard workloads that should not preempt critical infrastructure."
preemptionPolicy: PreemptLowerPriority
