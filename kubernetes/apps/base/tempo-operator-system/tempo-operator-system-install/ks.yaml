apiVersion: kustomize.toolkit.fluxcd.io/v2
kind: Kustomization
metadata:
  name: tempo-operator
  namespace: flux-system
spec:
  targetNamespace: tempo-operator-system
  commonMetadata:
    labels:
      app.kubernetes.io/name: tempo-operator
  path: ./config/default
  prune: true
  sourceRef:
    kind: GitRepository
    name: tempo-operator
    namespace: flux-system
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 5m