---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailgate-operator
spec:
  interval: 30m
  chart:
    spec:
      chart: tailgate-operator
      version: "0.0.9"
      sourceRef:
        kind: HelmRepository
        name: tailgate-operator
        namespace: flux-system
  install:
    remediation:
      retries: 3
    crds: CreateReplace
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
    crds: CreateReplace
  values:
    fullnameOverride: tailgate-operator
    crds:
      install: true
      keep: true
    tailnet:
      # Reference secret.yaml (creds substituted from common-secrets) instead of templating one.
      create: false
      secretName: tailgate-tailnet-creds
    agent:
      enabled: true
      # Local pod + service CIDRs (substituted per-cluster from cluster-settings).
      # Kept on the primary CNI for exit-node members so kube-dns / the API server
      # never blackhole through the tunnel.
      clusterCIDRs: "${CLUSTER_POD_CIDR},${CLUSTER_SERVICE_CIDR}"
      image:
        tag: v0.0.9
    operator:
      image:
        tag: v0.0.9
    gateway:
      image:
        tag: v0.0.9
