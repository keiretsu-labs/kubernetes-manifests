---
# tailgate-ui access control via tinyauth (same pattern as bhaiya, frigate, etc).
# tinyauth does authN (Google/Tailscale login, injects Remote-Email); the UI
# reads the header for identity. No OAuth app needed — the gateway handles login.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: tailgate-ui-tinyauth
  namespace: tailgate-operator-system
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: tailgate-ui
  extAuth:
    headersToExtAuth:
      - cookie
      - x-forwarded-proto
      - x-forwarded-for
      - user-agent
    http:
      backendRefs:
        - name: tinyauth
          namespace: tinyauth
          port: 3000
      path: "/api/auth/envoy?path="
      headersToBackend:
        - remote-user
        - remote-email
        - remote-name
        - remote-groups
  authorization:
    defaultAction: Allow
