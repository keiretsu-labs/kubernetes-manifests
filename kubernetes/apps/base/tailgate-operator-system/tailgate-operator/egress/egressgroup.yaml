---
# One EgressGroup per cluster. The gateway is a Tailscale CLIENT tagged
# tag:k8s + tag:${LOCATION}; it never advertises routes (it dials, not serves).
#
# Cross-cluster reach is granted by the tailnet policy (tailscale/policy.hujson)
# — for every location pair, a grant allows the peer location's tag to reach the
# local ipset (LAN + pod + service + LB CIDRs) via the local subnet router, e.g.:
#
#   { src: ["group:superuser","tag:robbinsdale","tag:stpetersburg","tag:ci"],
#     dst: ["ipset:ottawa"], via: ["tag:ottawa"] }
#
# acceptRoutes: true makes each gateway install every route advertised on the
# tailnet, so member pods (matched by the label below) reach ALL clusters'
# LAN/pod/service/LB ranges subject to those grants. The canary probe in
# probe.yaml is labelled with the local ${LOCATION} and exercises the path.
#
# dns.enabled: true makes the operator's webhook inject MagicDNS into matched
# member pods (resolv.conf -> gateway's 100.100.100.100 + cluster DNS for
# cluster.local), so they can resolve *.ts.net names directly.
apiVersion: tailscale.rajsingh.info/v1alpha1
kind: EgressGroup
metadata:
  name: ${LOCATION}-egress
spec:
  selector:
    podSelector:
      matchLabels:
        tailgate.rajsingh.info/egress: ${LOCATION}
  tags:
    - "tag:k8s"
    - "tag:${LOCATION}"
  acceptRoutes: true
  dns:
    enabled: true
