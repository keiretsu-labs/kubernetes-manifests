apiVersion: v1
kind: Service
metadata:
  name: tinyauth-ts
  annotations:
    tailscale.com/hostname: tinyauth
    tailscale.com/tags: tag:k8s,tag:ottawa
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  externalTrafficPolicy: Cluster
  ports:
    - name: http
      port: 3000
      protocol: TCP
      targetPort: 3000
  selector:
    app: tinyauth
