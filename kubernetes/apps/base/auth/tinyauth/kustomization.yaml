apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - deployment.yaml
  - service.yaml
  - httproute.yaml
  - secret.yaml
  - referencegrant.yaml
# tinyauth-config is generated (not a static manifest) so its name carries a
# content hash. the deployment's envFrom ref (name: tinyauth-config) is
# auto-rewritten to the hashed name, so any edit to tinyauth.env rolls the pod.
configMapGenerator:
  - name: tinyauth-config
    envs:
      - tinyauth.env
