apiVersion: apps/v1
kind: Deployment
metadata:
  name: tinyauth
spec:
  replicas: 1
  strategy:
    # /data is a ReadWriteOnce ceph volume — a rolling update would deadlock on
    # multi-attach, so tear the old pod down before bringing the new one up.
    type: Recreate
  selector:
    matchLabels:
      app: tinyauth
  template:
    metadata:
      labels:
        app: tinyauth
    spec:
      containers:
        - name: tinyauth
          image: ghcr.io/tinyauthapp/tinyauth:v5.1.2
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: tinyauth-config
          env:
            - name: TINYAUTH_OAUTH_PROVIDERS_GOOGLE_CLIENTID
              valueFrom:
                secretKeyRef:
                  name: tinyauth-secret
                  key: google-client-id
            - name: TINYAUTH_OAUTH_PROVIDERS_GOOGLE_CLIENTSECRET
              valueFrom:
                secretKeyRef:
                  name: tinyauth-secret
                  key: google-client-secret
            - name: TINYAUTH_AUTH_USERS
              valueFrom:
                secretKeyRef:
                  name: tinyauth-secret
                  key: users
                  optional: true
            - name: TINYAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: tinyauth-secret
                  key: tinyauth-secret
                  optional: true
            # forgejo OIDC client — registered via `tinyauth oidc create forgejo`
            - name: TINYAUTH_OIDC_CLIENTS_FORGEJO_CLIENTID
              valueFrom:
                secretKeyRef:
                  name: tinyauth-secret
                  key: forgejo-oidc-client-id
            - name: TINYAUTH_OIDC_CLIENTS_FORGEJO_CLIENTSECRET
              valueFrom:
                secretKeyRef:
                  name: tinyauth-secret
                  key: forgejo-oidc-client-secret
            - name: TINYAUTH_OIDC_CLIENTS_FORGEJO_TRUSTEDREDIRECTURIS
              value: https://forgejo.keiretsu.top/user/oauth2/Tinyauth/callback
            - name: TINYAUTH_OIDC_CLIENTS_FORGEJO_NAME
              value: Forgejo
            - name: TINYAUTH_DATABASE_PATH
              value: /data/tinyauth.db
          volumeMounts:
            - name: data
              mountPath: /data
            - name: resources
              mountPath: /resources
              readOnly: true
          livenessProbe:
            exec:
              command:
                - tinyauth
                - healthcheck
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            exec:
              command:
                - tinyauth
                - healthcheck
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: tinyauth-data
        - name: resources
          configMap:
            name: tinyauth-resources
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        # ceph RWO volume mounts as root:root; fsGroup makes /data group-owned
        # by 1000 so the non-root process can create /data/tinyauth.db.
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
