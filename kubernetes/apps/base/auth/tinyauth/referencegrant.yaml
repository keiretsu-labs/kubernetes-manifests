---
# allow SecurityPolicies in app namespaces to point extAuth at tinyauth
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: extauth-to-tinyauth
spec:
  from:
    - group: gateway.envoyproxy.io
      kind: SecurityPolicy
      namespace: agents
    - group: gateway.envoyproxy.io
      kind: SecurityPolicy
      namespace: home
    - group: gateway.envoyproxy.io
      kind: SecurityPolicy
      namespace: keiretsu-top
  to:
    - group: ""
      kind: Service
      name: tinyauth
