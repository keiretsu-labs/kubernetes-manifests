apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: tinyauth
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: public
      namespace: home
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: ts
      namespace: home
  hostnames:
    - "auth.${COMMON_DOMAIN}"
  rules:
    # tinyauth v5.0.7 serves GET /api/oauth/url/<provider> with
    # `Cache-Control: public, max-age=3600`. That response both sets the
    # per-attempt `tinyauth-oauth-*` session cookie and embeds the OAuth
    # `state`. The browser caches it for an hour, so every login after the
    # first replays the cached body WITHOUT re-applying Set-Cookie — the
    # callback then arrives with no session cookie and tinyauth fails with
    # "OAuth session cookie missing" -> /error. Force no-store on this path
    # so the cookie is minted fresh on every attempt. (More specific than the
    # catch-all rule below, so these requests route here.)
    - backendRefs:
        - group: ""
          kind: Service
          name: tinyauth
          port: 3000
          weight: 1
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: Cache-Control
                value: "no-store"
      matches:
        - path:
            type: PathPrefix
            value: /api/oauth/url
    # Catch-all: forward everything to tinyauth transparently
    - backendRefs:
        - group: ""
          kind: Service
          name: tinyauth
          port: 3000
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
    # tinyauth v5.0.7 moved OAuth callback from /api/auth/callback/google
    # (v4 path) to /api/oauth/callback/google. Rewrite the old path so
    # that Google Cloud Console (which has the old redirect URI registered)
    # can still complete the OAuth flow without needing a GCP console update.
    - backendRefs:
        - group: ""
          kind: Service
          name: tinyauth
          port: 3000
          weight: 1
      filters:
        - type: URLRewrite
          urlRewrite:
            hostname: "auth.${COMMON_DOMAIN}"
            path:
              type: ReplaceFullPath
              replaceFullPath: /api/oauth/callback/google
      matches:
        - path:
            type: Exact
            value: /api/auth/callback/google
