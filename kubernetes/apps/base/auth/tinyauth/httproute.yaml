apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: tinyauth
spec:
  parentRefs:
    - { group: gateway.networking.k8s.io, kind: Gateway, name: public, namespace: home }
    - { group: gateway.networking.k8s.io, kind: Gateway, name: ts, namespace: home }
  hostnames:
    - "auth.${COMMON_DOMAIN}"
    - "auth.${CLUSTER_DOMAIN}"
    - "auth.lukehouge.com"
    - "auth.rajsingh.info"
  rules:
    # Forward everything to tinyauth, and force no-store on every response.
    # tinyauth v5.0.7 sends `Cache-Control: public, max-age=3600` on its OAuth
    # init endpoint, which also sets the per-attempt session cookie — browsers
    # cached it and replayed it without the cookie, breaking login. An auth
    # server should never be cached, so we strip caching globally.
    - backendRefs:
        - { group: "", kind: Service, name: tinyauth, port: 3000 }
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - { name: Cache-Control, value: "no-store" }
