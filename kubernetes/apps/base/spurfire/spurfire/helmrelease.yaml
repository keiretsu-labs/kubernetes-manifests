---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: spurfire
spec:
  chartRef:
    kind: OCIRepository
    name: spurfire
  interval: 1h
  # The protected runtime must not consume its one-shot receipt until the
  # private broker is accepting TLS connections.
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: spurfire
            patch: |
              - op: add
                path: /spec/template/spec/initContainers
                value:
                  - name: wait-for-provider-broker
                    image: busybox:1.37.0
                    imagePullPolicy: IfNotPresent
                    command: ["/bin/sh", "-ec"]
                    args:
                      - until nc -z -w 2 spurfire-broker.spurfire.svc 9443; do sleep 1; done
                    securityContext:
                      allowPrivilegeEscalation: false
                      readOnlyRootFilesystem: true
                      runAsNonRoot: true
                      runAsUser: 10001
                      capabilities:
                        drop: ["ALL"]
                    resources:
                      requests:
                        cpu: 1m
                        memory: 4Mi
                      limits:
                        cpu: 50m
                        memory: 16Mi
          # Run F uses a fresh retained vault and never shares a writer lock
          # with an earlier failed-closed generation.
          - target:
              kind: PersistentVolumeClaim
              name: spurfire-broker
            patch: |
              - op: replace
                path: /metadata/name
                value: spurfire-broker-run-f
          - target:
              kind: Deployment
              name: spurfire-broker
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: spurfire-broker
              spec:
                strategy:
                  type: Recreate
                template:
                  spec:
                    terminationGracePeriodSeconds: 5
                    volumes:
                      - name: broker-state
                        persistentVolumeClaim:
                          claimName: spurfire-broker-run-f
  values:
    fullnameOverride: spurfire
    image:
      repository: ghcr.io/rajsinghtech/spurfire-server
      tag: "sha-8792fe1404eabd93ff12dd0726460da5db648b02"
      digest: "sha256:e0b050fa400ba41d2b597de662fe8843b823e541fc24a663b18f9986e03fb33b"
      pullPolicy: IfNotPresent
    # One receipt-bound, two-rider disposable Alpha.
    config:
      dryRun: false
      dryRunTtlSeconds: 300
      maxPlayers: 2
      provisioningMode: tailnet_per_lobby
      sharedTailnet: "-"
    tailscale:
      apiBase: https://api.tailscale.com/api/v2
      existingSecret: ""
      clientIdKey: TS_CLIENT_ID
      clientSecretKey: TS_CLIENT_SECRET
    persistence:
      enabled: true
      existingClaim: spurfire-alpha-state-20260722-f
      storageClass: ceph-block-replicated
      accessModes:
        - ReadWriteOnce
      size: 1Gi
      retain: true
    protectedAlpha:
      prepare: false
      enabled: true
      installationId: ottawa-alpha-20260722-d8db2770512ef01bae17d146
      authorizedLobbyId: f0310165-9724-4be8-9dd1-3e59dd86b39e
      publicOrigin: https://spurfire.rajsingh.info
      internalListener: spurfire-broker.spurfire.svc:9443
      sourceSha: 8792fe1404eabd93ff12dd0726460da5db648b02
      provenanceSha256: 5e371934727ace5a2ad4610abf5cd9aa6777cf612feca3db7b6123dad658936c
      artifactSetSha256: 765f056607d3c7480ad0a6292e7f054265e596dc524676f5db9f2cebe27237f7
      policyProfileSha256: a663104d4ea858a7d888da570d39824a40103da48d8e6e4d2acd698d83caf135
      leaseName: spurfire-protected-alpha
      runtimeImageDigest: "sha256:e0b050fa400ba41d2b597de662fe8843b823e541fc24a663b18f9986e03fb33b"
      brokerImageDigest: "sha256:e0b050fa400ba41d2b597de662fe8843b823e541fc24a663b18f9986e03fb33b"
      receiptSopsSecret: spurfire-alpha-receipt
      brokerCredentialSopsSecret: spurfire-alpha-broker-oauth
      brokerVaultKeySopsSecret: spurfire-alpha-vault-key
      runtimeTlsSecret: spurfire-alpha-runtime-tls
      brokerTlsSecret: spurfire-alpha-broker-tls
      brokerMacSecret: spurfire-alpha-broker-mac
      publicConfigMap: spurfire-alpha-public
      kubernetesApiServerCidrs:
        - 10.2.0.1/32
        - 192.168.169.117/32
        - 192.168.169.118/32
        - 192.168.169.119/32
    service:
      port: 80
