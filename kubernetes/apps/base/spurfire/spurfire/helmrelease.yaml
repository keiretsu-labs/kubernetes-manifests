---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: spurfire
spec:
  chartRef:
    kind: OCIRepository
    name: spurfire
  interval: 1h
  values:
    fullnameOverride: spurfire
    image:
      repository: ghcr.io/rajsinghtech/spurfire-server
      tag: "sha-32eed847693f93b267e1965b47369ba03330f99a"
      digest: "sha256:34eb839ebdb5d502ba93da25a4cb613716b40e77e9d3fa1e600f20a373155bc0"
      pullPolicy: IfNotPresent
    # Public staging remains zero-mutation until API authentication and a
    # fresh dedicated organization OAuth client are deployed together.
    config:
      dryRun: true
      dryRunTtlSeconds: 300
      maxPlayers: 16
      provisioningMode: dry_run
      sharedTailnet: "-"
    tailscale:
      apiBase: https://api.tailscale.com/api/v2
      existingSecret: ""
      clientIdKey: TS_CLIENT_ID
      clientSecretKey: TS_CLIENT_SECRET
    persistence:
      enabled: false
      storageClass: ceph-block-replicated
      accessModes:
        - ReadWriteOnce
      size: 1Gi
      retain: true
    service:
      port: 80
