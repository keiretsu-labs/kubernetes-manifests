---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: spurfire
spec:
  chartRef:
    kind: OCIRepository
    name: spurfire
  interval: 1h
  values:
    fullnameOverride: spurfire
    image:
      repository: ghcr.io/rajsinghtech/spurfire-server
      tag: "sha-786886089691982bf854e48554b989bc00775c71"
      digest: "sha256:5a3b6db9668c764349e662889f5535a757142c8c2560c26ff28968009a476228"
      pullPolicy: IfNotPresent
    # Public staging remains zero-mutation until API authentication and a
    # fresh dedicated organization OAuth client are deployed together.
    config:
      dryRun: true
      dryRunTtlSeconds: 300
      maxPlayers: 16
      provisioningMode: dry_run
      sharedTailnet: "-"
    tailscale:
      apiBase: https://api.tailscale.com/api/v2
      existingSecret: ""
      clientIdKey: TS_CLIENT_ID
      clientSecretKey: TS_CLIENT_SECRET
    persistence:
      enabled: false
      storageClass: ceph-block-replicated
      accessModes:
        - ReadWriteOnce
      size: 1Gi
      retain: true
    service:
      port: 80
