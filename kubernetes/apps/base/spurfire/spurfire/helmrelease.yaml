---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: spurfire
spec:
  chartRef:
    kind: OCIRepository
    name: spurfire
  interval: 1h
  values:
    fullnameOverride: spurfire
    image:
      repository: ghcr.io/rajsinghtech/spurfire-server
      tag: "sha-5117b71ff31941808d2c1c09b58736c0fc4f50f4"
      digest: "sha256:e7f1a5a3a4815673061e164794f1dd68a446659e2ded7b6bfd8a3d876df6e437"
      pullPolicy: IfNotPresent
    # Public staging remains zero-mutation until API authentication and a
    # fresh dedicated organization OAuth client are deployed together.
    config:
      dryRun: true
      dryRunTtlSeconds: 300
      maxPlayers: 16
      provisioningMode: dry_run
      sharedTailnet: "-"
    tailscale:
      apiBase: https://api.tailscale.com/api/v2
      existingSecret: ""
      clientIdKey: TS_CLIENT_ID
      clientSecretKey: TS_CLIENT_SECRET
    persistence:
      enabled: false
      storageClass: ceph-block-replicated
      accessModes:
        - ReadWriteOnce
      size: 1Gi
      retain: true
    service:
      port: 80
