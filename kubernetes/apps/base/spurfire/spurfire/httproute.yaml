---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: spurfire
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: public
      namespace: home
  hostnames:
    - spurfire.rajsingh.info
  rules:
    - matches:
        - path:
            type: Exact
            value: /v1/capabilities
        - path:
            type: Exact
            value: /v1/lobbies
        - path:
            type: PathPrefix
            value: /v1/lobbies/13b7bc0e-0cd3-4eb5-b947-445130d50694
      backendRefs:
        - group: ""
          kind: Service
          name: spurfire
          port: 80
          weight: 1
