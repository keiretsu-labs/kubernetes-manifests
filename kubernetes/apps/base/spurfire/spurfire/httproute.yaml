---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: spurfire
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: public
      namespace: home
  hostnames:
    - spurfire.rajsingh.info
  rules:
    - matches:
        - path:
            type: Exact
            value: /v1/capabilities
        - path:
            type: Exact
            value: /v1/lobbies
        - path:
            type: PathPrefix
            value: /v1/lobbies/db5758b1-af31-4679-82c9-0a87d5e5a2b0
      backendRefs:
        - group: ""
          kind: Service
          name: spurfire
          port: 80
          weight: 1
