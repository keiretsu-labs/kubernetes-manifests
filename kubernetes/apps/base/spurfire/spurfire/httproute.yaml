---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: spurfire
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: public
      namespace: home
  hostnames:
    - spurfire.rajsingh.info
  rules:
    - matches:
        - path:
            type: Exact
            value: /v1/capabilities
        - path:
            type: Exact
            value: /v1/lobbies
        - path:
            type: PathPrefix
            value: /v1/lobbies/dae4b494-ee79-4cca-b3c9-c9366fb7b6a1
      backendRefs:
        - group: ""
          kind: Service
          name: spurfire
          port: 80
          weight: 1
