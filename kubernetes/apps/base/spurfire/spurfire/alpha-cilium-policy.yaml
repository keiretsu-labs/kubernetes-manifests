---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: spurfire-kube-apiserver
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/instance: spurfire
      app.kubernetes.io/name: spurfire-control
  egress:
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
