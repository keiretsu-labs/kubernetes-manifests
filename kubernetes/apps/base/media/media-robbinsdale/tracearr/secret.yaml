kind: Secret
metadata:
  name: tracearr-secret
stringData:
  JWT_SECRET: ${DEFAULT_PASSWORD}
  COOKIE_SECRET: ${DEFAULT_PASSWORD}
---
apiVersion: v1
kind: Secret
metadata:
  name: tracearr-postgres-superuser-creds
type: kubernetes.io/basic-auth
stringData:
  username: postgres
  password: ${DEFAULT_PASSWORD}
