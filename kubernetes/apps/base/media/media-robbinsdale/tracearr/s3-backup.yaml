---
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: tracearr-s3-store
  namespace: media
spec:
  configuration:
    destinationPath: s3://tracearr-postgres/
    endpointURL: http://${COMMON_S3_ENDPOINT}
    s3Credentials:
      accessKeyId:
        name: tracearr-s3-backup
        key: AWS_ACCESS_KEY_ID
      secretAccessKey:
        name: tracearr-s3-backup
        key: AWS_SECRET_ACCESS_KEY
  instanceSidecarConfiguration:
    env:
      - name: AWS_DEFAULT_REGION
        value: garage
  retentionPolicy: "30d"
