---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarr-anime
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sonarr-anime
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: sonarr-anime
    spec:
      containers:
      - name: sonarr-anime
        image: lscr.io/linuxserver/sonarr:4.0.17
        ports:
        - name: http
          containerPort: 8989
          protocol: TCP
        env:
        - name: PUID
          value: '0'
        - name: GUID
          value: '0'
        - name: TZ
          value: UTC
        volumeMounts:
        - name: config
          mountPath: /config
        - name: media
          mountPath: /media-share
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: sonarr-anime-config
      - name: media
        persistentVolumeClaim:
          claimName: media-share
---
apiVersion: v1
kind: Service
metadata:
  name: sonarr-anime
spec:
  selector:
    app: sonarr-anime
  ports:
  - name: http
    port: 8989
    protocol: TCP
    targetPort: 8989
