---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo
spec:
  interval: 30m
  chart:
    spec:
      chart: forgejo
      version: 17.1.1
      sourceRef:
        kind: HelmRepository
        name: forgejo
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    service:
      http:
        type: ClusterIP
        port: 3000
      ssh:
        type: ClusterIP
        port: 22
    persistence:
      enabled: true
      storageClass: ${STORAGECLASS_DEFAULT}
      size: 10Gi
    gitea:
      additionalConfigFromEnvs:
        - name: FORGEJO__database__PASSWD
          valueFrom:
            secretKeyRef:
              name: forgejo-postgres-app
              key: password
        - name: FORGEJO__storage__MINIO_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: garage-s3-auth
              key: AWS_ACCESS_KEY_ID
        - name: FORGEJO__storage__MINIO_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: garage-s3-auth
              key: AWS_SECRET_ACCESS_KEY
      config:
        server:
          DOMAIN: forgejo.${COMMON_DOMAIN}
          ROOT_URL: https://forgejo.${COMMON_DOMAIN}
          SSH_DOMAIN: forgejo.${COMMON_DOMAIN}
        database:
          DB_TYPE: postgres
          HOST: forgejo-postgres-rw:5432
          NAME: forgejo
          USER: forgejo
          SSL_MODE: require
        cache:
          ADAPTER: memory
        session:
          PROVIDER: db
        service:
          DISABLE_REGISTRATION: "false"
          ALLOW_ONLY_EXTERNAL_REGISTRATION: "true"
          SHOW_REGISTRATION_BUTTON: "false"
        openid:
          ENABLE_OPENID_SIGNIN: "false"
          ENABLE_OPENID_SIGNUP: "true"
          WHITELISTED_URIS: auth.keiretsu.top
        storage:
          STORAGE_TYPE: minio
          MINIO_ENDPOINT: ${COMMON_S3_ENDPOINT}
          MINIO_BUCKET: forgejo
          MINIO_LOCATION: garage
          MINIO_USE_SSL: "false"
        security:
          REVERSE_PROXY_TRUSTED_PROXIES: "127.0.0.0/8,::1/128,10.2.0.0/16,10.3.0.0/16"
        actions:
          ENABLED: "true"
