---
apiVersion: v1
kind: ConfigMap
metadata:
  name: forgejo-runner-config
data:
  config.yaml: |
    log:
      level: debug
    runner:
      file: /data/.runner
      capacity: 2
      labels:
        - "ubuntu-latest:docker://ghcr.io/catthehacker/ubuntu:act-latest"
        - "ubuntu-22.04:docker://ghcr.io/catthehacker/ubuntu:go-22.04"
        - "ubuntu-20.04:docker://ghcr.io/catthehacker/ubuntu:act-22.04"
    cache:
      enabled: true
      dir: /data/cache
    container:
      network: bridge
      privileged: true
      docker_host: tcp://127.0.0.1:2375
