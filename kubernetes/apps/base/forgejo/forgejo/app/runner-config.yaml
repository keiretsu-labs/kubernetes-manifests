---
apiVersion: v1
kind: ConfigMap
metadata:
  name: forgejo-runner-config
data:
  config.yaml: |
    log:
      level: debug
    runner:
      file: /data/.runner
      capacity: 2
      labels:
        - "ubuntu-latest:host"
        - "ubuntu-22.04:host"
        - "ubuntu-20.04:host"
    cache:
      enabled: true
      dir: /data/cache
    container:
      # With host labels, job steps run directly in the runner container.
      # No containerization — no docker socket, no dinD, no privileged mode.
      # The runner image has buildah, git, curl, skopeo pre-installed.
      # Buildah uses VFS storage driver and works without CAP_SYS_ADMIN.
      network: host
      # Env vars passed through to every job step. The S3 creds are
      # written to /data/nix-cache.env by the runner entrypoint (sourced
      # from the nix-cache-s3 secret); env_file merges them with these.
      envs:
        AWS_ENDPOINT_URL_S3: http://garage-gateway.garage.svc.cluster.local:3900
        AWS_REGION: garage
        NIX_SUBSTITUTERS: https://cache.nixos.org s3://nix-cache?endpoint=http://garage-gateway.garage.svc.cluster.local:3900&region=garage&scheme=http
        NIX_TRUSTED_PUBLIC_KEYS: cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
      env_file: /data/nix-cache.env
