---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: forgejo-runner
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: forgejo-runner-self-delete
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: forgejo-runner-self-delete
subjects:
  - kind: ServiceAccount
    name: forgejo-runner
roleRef:
  kind: Role
  name: forgejo-runner-self-delete
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: forgejo-runner
spec:
  replicas: 3
  serviceName: forgejo-runner
  selector:
    matchLabels:
      app: forgejo-runner
  template:
    metadata:
      labels:
        app: forgejo-runner
    spec:
      serviceAccountName: forgejo-runner
      # Route OCI registry hostnames to the internal public gateway
      # instead of the external CDN IPs (hairpin NAT issue).
      # Ottawa public gateway = 10.169.10.15.
      hostAliases:
        - ip: "${CLUSTER_LOAD_BALANCER_CIDR%.*.*/*}.10.15"
          hostnames:
            - oci.cdn.keiretsu.top
            - oci.keiretsu.top
      initContainers:
        - name: install-tools
          image: code.forgejo.org/forgejo/runner:12.12.0
          command:
            - /bin/sh
            - -c
            - |
              cp /bin/forgejo-runner /tools/forgejo-runner
              apk add --no-cache --root /tools buildah skopeo git curl ca-certificates 2>&1
              # System-wide containers config
              mkdir -p /tools/etc/containers
              printf '[storage]\ndriver = "vfs"\n' > /tools/etc/containers/storage.conf
              printf 'unqualified-search-registries = ["docker.io"]\n' > /tools/etc/containers/registries.conf
          volumeMounts:
            - name: tools
              mountPath: /tools
        - name: register
          image: code.forgejo.org/forgejo/runner:12.12.0
          command:
            - /bin/sh
            - -c
            - |
              cp /tools/forgejo-runner /usr/local/bin/forgejo-runner || true
              rm -f /data/.runner
              forgejo-runner register \
                --config /config/config.yaml \
                --instance http://forgejo-http:3000 \
                --token "$(cat /secrets/token)" \
                --name "$(hostname)" \
                --labels ubuntu-latest:host,ubuntu-22.04:host,ubuntu-20.04:host \
                --no-interactive
          volumeMounts:
            - name: data
              mountPath: /data
            - name: token
              mountPath: /secrets
            - name: config
              mountPath: /config
            - name: tools
              mountPath: /tools
      containers:
        - name: runner
          image: code.forgejo.org/forgejo/runner:12.12.0
          command:
            - /bin/sh
            - -c
            - |
              # Symlink tools installed in /tools to /usr/local/bin
              ln -sf /tools/usr/bin/* /usr/local/bin/ 2>/dev/null || true
              # Per-user config for HOME=/data
              mkdir -p /data/.config/containers
              printf '[storage]\ndriver = "vfs"\n' > /data/.config/containers/storage.conf
              printf 'unqualified-search-registries = ["docker.io"]\n' > /data/.config/containers/registries.conf
              forgejo-runner daemon --config /config/config.yaml
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /config
            - name: tools
              mountPath: /tools
      volumes:
        - name: token
          secret:
            secretName: forgejo-runner-token
        - name: config
          configMap:
            name: forgejo-runner-config
        - name: tools
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: ${STORAGECLASS_DEFAULT}
        resources:
          requests:
            storage: 1Gi
