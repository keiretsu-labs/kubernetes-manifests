---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: forgejo-runner
spec:
  replicas: 3
  serviceName: forgejo-runner
  selector:
    matchLabels:
      app: forgejo-runner
  template:
    metadata:
      labels:
        app: forgejo-runner
    spec:
      # Route OCI registry hostnames to the internal public gateway (10.169.10.15)
      # instead of the external CDN IPs, which are unreachable from within the
      # cluster due to hairpin NAT. Ottawa public gateway = 10.169.10.15.
      hostAliases:
        - ip: "${CLUSTER_LOAD_BALANCER_CIDR%.*.*/*}.10.15"
          hostnames:
            - oci.cdn.keiretsu.top
            - oci.keiretsu.top
      initContainers:
        - name: chown-data
          image: busybox:1.38
          command: [sh, -c, chown -R 1000:1000 /data]
          volumeMounts:
            - name: data
              mountPath: /data
        - name: register
          image: code.forgejo.org/forgejo/runner:12.11.1
          command:
            - /bin/sh
            - -c
            - |
              if [ ! -f /data/.runner ]; then
                forgejo-runner register \
                  --config /config/config.yaml \
                  --instance http://forgejo-http:3000 \
                  --token "$(cat /secrets/token)" \
                  --name "$(hostname)" \
                  --labels ubuntu-latest:docker://ghcr.io/catthehacker/ubuntu:act-latest,ubuntu-22.04:docker://ghcr.io/catthehacker/ubuntu:go-22.04,ubuntu-20.04:docker://ghcr.io/catthehacker/ubuntu:act-22.04 \
                  --no-interactive
              fi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: token
              mountPath: /secrets
            - name: config
              mountPath: /config
      containers:
        - name: runner
          image: code.forgejo.org/forgejo/runner:12.11.1
          command:
            - /bin/sh
            - -c
            - |
              deadline=$(($(date +%s) + 120))
              until nc -z 127.0.0.1 2375 2>/dev/null; do
                if [ "$(date +%s)" -ge "$deadline" ]; then
                  echo "timed out waiting for docker"; exit 1
                fi
                echo "waiting for docker..."; sleep 2
              done
              forgejo-runner daemon --config /config/config.yaml
          env:
            - name: DOCKER_HOST
              value: tcp://127.0.0.1:2375
            - name: DOCKER_CONFIG
              value: /run/docker-config
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /config
            - name: docker-config
              mountPath: /run/docker-config
              readOnly: true
        - name: dind
          image: docker:29-dind
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          # Heavy Go builds (e.g. bhaiya's k8s-deps compile) crash dind under
          # node memory pressure (lastTerminated=Unknown). Reserve memory so the
          # scheduler doesn't overcommit, with generous headroom for the build.
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 8Gi
          volumeMounts:
            - name: docker-storage
              mountPath: /var/lib/docker
            - name: docker-config
              mountPath: /root/.docker
              readOnly: true
          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - docker system prune -af --volumes 2>/dev/null || true
        # Continuously reclaim docker-storage. dind's socket is loopback-only,
        # so prune runs in-pod rather than via an exec CronJob. until=2h keeps
        # objects from in-flight jobs; everything older is fair game.
        - name: docker-prune
          image: docker:29-cli
          env:
            - name: DOCKER_HOST
              value: tcp://127.0.0.1:2375
          command:
            - /bin/sh
            - -c
            - |
              while true; do
                sleep 1800
                docker container prune -f --filter "until=2h" 2>/dev/null || true
                docker image prune -af --filter "until=2h" 2>/dev/null || true
                docker builder prune -af --filter "until=2h" 2>/dev/null || true
                docker volume prune -f 2>/dev/null || true
              done
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
      volumes:
        - name: token
          secret:
            secretName: forgejo-runner-token
        - name: config
          configMap:
            name: forgejo-runner-config
        - name: docker-config
          secret:
            secretName: forgejo-runner-docker-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: ${STORAGECLASS_DEFAULT}
        resources:
          requests:
            storage: 1Gi
    - metadata:
        name: docker-storage
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: ${STORAGECLASS_DEFAULT}
        resources:
          requests:
            storage: 60Gi
