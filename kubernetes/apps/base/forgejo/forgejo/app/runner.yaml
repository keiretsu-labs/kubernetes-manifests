---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: forgejo-runner
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: forgejo-runner-self-delete
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: forgejo-runner-self-delete
subjects:
  - kind: ServiceAccount
    name: forgejo-runner
roleRef:
  kind: Role
  name: forgejo-runner-self-delete
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: forgejo-runner
spec:
  replicas: 3
  serviceName: forgejo-runner
  selector:
    matchLabels:
      app: forgejo-runner
  template:
    metadata:
      labels:
        app: forgejo-runner
    spec:
      serviceAccountName: forgejo-runner
      hostAliases:
        - ip: "${CLUSTER_LOAD_BALANCER_CIDR%.*.*/*}.10.15"
          hostnames:
            - oci.cdn.keiretsu.top
            - oci.keiretsu.top
      initContainers:
        - name: register
          image: code.forgejo.org/forgejo/runner:12.12.0
          command:
            - /bin/sh
            - -c
            - |
              rm -f /data/.runner
              forgejo-runner register \
                --config /config/config.yaml \
                --instance http://forgejo-http:3000 \
                --token "$(cat /secrets/token)" \
                --name "$(hostname)" \
                --labels ubuntu-latest:host,ubuntu-22.04:host,ubuntu-20.04:host \
                --no-interactive
          volumeMounts:
            - name: data
              mountPath: /data
            - name: token
              mountPath: /secrets
            - name: config
              mountPath: /config
      containers:
        - name: runner
          image: code.forgejo.org/forgejo/runner:12.12.0
          securityContext:
            runAsUser: 0
            capabilities:
              add: ["SYS_ADMIN"]
          command:
            - /bin/sh
            - -c
            - |
              apk add --no-cache buildah skopeo git curl ca-certificates netavark 2>&1 | tail -3
              # Configure buildah VFS storage
              mkdir -p /etc/containers
              printf '[storage]\ndriver = "vfs"\nrunroot = "/var/run/containers/storage"\ngraphroot = "/var/lib/containers/storage"\n' > /etc/containers/storage.conf
              printf 'unqualified-search-registries = ["docker.io"]\n' > /etc/containers/registries.conf
              export STORAGE_DRIVER=vfs BUILDAH_ISOLATION=chroot
              forgejo-runner daemon --config /config/config.yaml
          env:
            - name: STORAGE_DRIVER
              value: vfs
            - name: BUILDAH_ISOLATION
              value: chroot
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /config
      volumes:
        - name: token
          secret:
            secretName: forgejo-runner-token
        - name: config
          configMap:
            name: forgejo-runner-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: ${STORAGECLASS_DEFAULT}
        resources:
          requests:
            storage: 1Gi
