---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: forgejo-runner
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: forgejo-runner-self-delete
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: forgejo-runner-self-delete
subjects:
  - kind: ServiceAccount
    name: forgejo-runner
roleRef:
  kind: Role
  name: forgejo-runner-self-delete
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: forgejo-runner
spec:
  replicas: 3
  serviceName: forgejo-runner
  selector:
    matchLabels:
      app: forgejo-runner
  template:
    metadata:
      labels:
        app: forgejo-runner
    spec:
      serviceAccountName: forgejo-runner
      # Route OCI registry hostnames to the internal public gateway (10.169.10.15)
      # instead of the external CDN IPs, which are unreachable from within the
      # cluster due to hairpin NAT. Ottawa public gateway = 10.169.10.15.
      hostAliases:
        - ip: "${CLUSTER_LOAD_BALANCER_CIDR%.*.*/*}.10.15"
          hostnames:
            - oci.cdn.keiretsu.top
            - oci.keiretsu.top
      initContainers:
        - name: chown-data
          image: busybox:1.38
          command: [sh, -c, chown -R 1000:1000 /data]
          volumeMounts:
            - name: data
              mountPath: /data
        - name: register
          image: code.forgejo.org/forgejo/runner:12.12.0
          command:
            - /bin/sh
            - -c
            - |
              rm -f /data/.runner
              forgejo-runner register \
                --config /config/config.yaml \
                --instance http://forgejo-http:3000 \
                --token "$(cat /secrets/token)" \
                --name "$(hostname)" \
                --labels ubuntu-latest:docker://ghcr.io/catthehacker/ubuntu:act-latest,ubuntu-22.04:docker://ghcr.io/catthehacker/ubuntu:go-22.04,ubuntu-20.04:docker://ghcr.io/catthehacker/ubuntu:act-22.04 \
                --ephemeral \
                --no-interactive
          volumeMounts:
            - name: data
              mountPath: /data
            - name: token
              mountPath: /secrets
            - name: config
              mountPath: /config
      containers:
        - name: runner
          image: code.forgejo.org/forgejo/runner:12.12.0
          command:
            - /bin/sh
            - -c
            - |
              if [ -f /shared/job-done ]; then
                echo "previous job sentinel present, waiting for pod reaper"
                sleep 3600; exit 0
              fi
              deadline=$(($(date +%s) + 120))
              until nc -z 127.0.0.1 2375 2>/dev/null; do
                if [ "$(date +%s)" -ge "$deadline" ]; then
                  echo "timed out waiting for docker"; exit 1
                fi
                echo "waiting for docker..."; sleep 2
              done
              printf 'AWS_ACCESS_KEY_ID=%s\nAWS_SECRET_ACCESS_KEY=%s\n' \
                "$(cat /s3-creds/AWS_ACCESS_KEY_ID)" \
                "$(cat /s3-creds/AWS_SECRET_ACCESS_KEY)" > /data/nix-cache.env
              forgejo-runner one-job --config /config/config.yaml --wait
              echo "one-job exited with code $?, signaling pod-reaper"
              touch /shared/job-done
              sleep 3600
          env:
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /config

            - name: shared
              mountPath: /shared
            - name: nix-cache-s3
              mountPath: /s3-creds
              readOnly: true

        # Watches for the job-done sentinel from the runner container, then
        # deletes the pod so the StatefulSet recreates it with a fresh
        # emptyDir. curl is installed at startup (Alpine has no curl baked in).
        - name: pod-reaper
          image: alpine:3.21
          command:
            - /bin/sh
            - -c
            - |
              apk add --no-cache curl > /dev/null 2>&1
              while [ ! -f /shared/job-done ]; do sleep 5; done
              echo "sentinel detected, deleting pod $POD_NAME"
              for i in 1 2 3 4 5; do
                curl -s -k -X DELETE \
                  -H "Authorization: Bearer $(cat /var/run/secrets/kubernetes.io/serviceaccount/token)" \
                  "https://kubernetes.default.svc/api/v1/namespaces/forgejo/pods/$POD_NAME" && break
                echo "delete attempt $i failed"; sleep 5
              done
              sleep 3600
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: shared
              mountPath: /shared
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
      volumes:
        - name: token
          secret:
            secretName: forgejo-runner-token
        - name: config
          configMap:
            name: forgejo-runner-config
        - name: shared
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: ${STORAGECLASS_DEFAULT}
        resources:
          requests:
            storage: 1Gi
