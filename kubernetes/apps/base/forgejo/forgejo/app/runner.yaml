---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: forgejo-runner
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: forgejo-runner-self-delete
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: forgejo-runner-self-delete
subjects:
  - kind: ServiceAccount
    name: forgejo-runner
roleRef:
  kind: Role
  name: forgejo-runner-self-delete
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: forgejo-runner
spec:
  replicas: 3
  serviceName: forgejo-runner
  selector:
    matchLabels:
      app: forgejo-runner
  template:
    metadata:
      labels:
        app: forgejo-runner
    spec:
      serviceAccountName: forgejo-runner
      # Route OCI registry hostnames to the internal public gateway
      # instead of the external CDN IPs (hairpin NAT issue).
      # Ottawa public gateway = 10.169.10.15.
      hostAliases:
        - ip: "${CLUSTER_LOAD_BALANCER_CIDR%.*.*/*}.10.15"
          hostnames:
            - oci.cdn.keiretsu.top
            - oci.keiretsu.top
      initContainers:
        - name: chown-data
          image: busybox:1.38
          command: [sh, -c, chown -R 1000:1000 /data]
          volumeMounts:
            - name: data
              mountPath: /data
        - name: register
          image: code.forgejo.org/forgejo/runner:12.12.0
          command:
            - /bin/sh
            - -c
            - |
              rm -f /data/.runner
              forgejo-runner register \
                --config /config/config.yaml \
                --instance http://forgejo-http:3000 \
                --token "$(cat /secrets/token)" \
                --name "$(hostname)" \
                --labels ubuntu-latest:docker://ghcr.io/catthehacker/ubuntu:act-latest,ubuntu-22.04:docker://ghcr.io/catthehacker/ubuntu:go-22.04,ubuntu-20.04:docker://ghcr.io/catthehacker/ubuntu:act-22.04 \
                --ephemeral \
                --no-interactive
          volumeMounts:
            - name: data
              mountPath: /data
            - name: token
              mountPath: /secrets
            - name: config
              mountPath: /config
      containers:
        - name: runner
          image: code.forgejo.org/forgejo/runner:12.12.0
          command:
            - /bin/sh
            - -c
            - |
              deadline=$(($(date +%s) + 120))
              until nc -z 127.0.0.1 2375 2>/dev/null; do
                if [ "$(date +%s)" -ge "$deadline" ]; then
                  echo "timed out waiting for docker"; exit 1
                fi
                echo "waiting for docker..."; sleep 2
              done
              forgejo-runner daemon --config /config/config.yaml
          env:
            - name: DOCKER_HOST
              value: tcp://127.0.0.1:2375
            - name: DOCKER_CONFIG
              value: /run/docker-config
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /config
            - name: docker-config
              mountPath: /run/docker-config
              readOnly: true
        - name: dind
          image: docker:27-dind
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 8Gi
          volumeMounts:
            - name: docker-storage
              mountPath: /var/lib/docker
            - name: docker-config
              mountPath: /root/.docker
              readOnly: true
          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - docker system prune -af --volumes 2>/dev/null || true
      volumes:
        - name: token
          secret:
            secretName: forgejo-runner-token
        - name: config
          configMap:
            name: forgejo-runner-config
        - name: docker-config
          secret:
            secretName: forgejo-runner-docker-config
        - name: docker-storage
          emptyDir:
            sizeLimit: 60Gi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: ${STORAGECLASS_DEFAULT}
        resources:
          requests:
            storage: 1Gi
