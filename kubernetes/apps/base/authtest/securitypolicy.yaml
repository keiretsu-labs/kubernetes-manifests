---
# Envoy Gateway SecurityPolicy: forward-auth via tinyauth extAuth.
# tinyauth's envoy mode reads the original host from the check request's own
# authority, the original path from ?path= (the http ext-auth `path` is a
# prefix the original request path is appended to), and REQUIRES cookie +
# x-forwarded-proto to be forwarded. on deny, envoy passes tinyauth's
# 302/Set-Cookie through to the browser.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: authtest-tinyauth
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: authtest
  extAuth:
    headersToExtAuth:
      - cookie
      - x-forwarded-proto
      - x-forwarded-for
      - user-agent
    http:
      backendRefs:
        - name: tinyauth
          namespace: tinyauth
          port: 3000
      path: "/api/auth/envoy?path="
      headersToBackend:
        - remote-user
        - remote-email
        - remote-name
        - remote-groups
  # --- route-level authorization (the point of this PR) -----------------
  # extAuth (tinyauth) now does authN only: it logs the user in via google and
  # injects remote-email / remote-groups onto the request. the *authorization*
  # decision lives here, on the route, instead of in the central
  # tinyauth-config configmap (the TINYAUTH_APPS_AUTHTEST_* keys). EG's RBAC
  # filter runs after extAuth, so it can match on the headers tinyauth injected.
  #
  # this proves the mechanism on the throwaway authtest app before we migrate
  # real apps and drop the per-app keys from the configmap entirely. adding a
  # protected app then = its httproute + this securitypolicy, no configmap edit.
  #
  # validate: log in as rajsinghcpre@gmail.com -> 200 (allow rule matches).
  # log in as any other google account -> 403 from the gateway (defaultAction
  # Deny), NOT a tinyauth redirect. that 403 is the proof EG is enforcing on
  # the injected header.
  authorization:
    defaultAction: Deny
    rules:
      - name: allow-raj
        action: Allow
        principal:
          headers:
            - name: Remote-Email
              values:
                - rajsinghcpre@gmail.com
