apiVersion: tempo.grafana.com/v1alpha1
kind: TempoStack
metadata:
  name: tempo
spec:
  storage:
    secret:
      name: tempo-storage
      type: s3
      credentialMode: static
  storageSize: 10Gi
  retention:
    global:
      traces: 168h
  resources:
    total:
      limits:
        memory: 4Gi
        cpu: 2000m
  template:
    queryFrontend:
      jaegerQuery:
        enabled: true
      component:
        replicas: 1
    distributor:
      component:
        replicas: 1
    ingester:
      replicas: 1
    compactor:
      replicas: 1
    querier:
      replicas: 1