---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: k8sgpt-operator
spec:
  interval: 30m
  chart:
    spec:
      chart: k8sgpt-operator
      version: 0.2.27
      sourceRef:
        kind: HelmRepository
        name: k8sgpt
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    # Continuous analysis Result CRs + AI explanations via the stpetersburg vLLM.
    serviceMonitor:
      enabled: true
    grafanaDashboard:
      enabled: true
    # dynamicRBAC lets the operator grant its in-cluster analyzer read access
    # to the local (ottawa) cluster without hand-written RBAC.
    dynamicRBAC:
      enabled: true
