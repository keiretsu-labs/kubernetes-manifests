---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8sgpt-mcp
  namespace: k8sgpt
---
# Read-only cluster access for the analyze/list/get MCP tools.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8sgpt-mcp-view
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
  - kind: ServiceAccount
    name: k8sgpt-mcp
    namespace: k8sgpt
