---
# k8sgpt in MCP-server mode: exposes the analyze/list/get tools over Streamable-HTTP
# at :8089/mcp for kagent to consume. `serve` needs an AI provider configured to
# start, so it points at the stp vLLM DeepSeek (same backend as the operator).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8sgpt-mcp
  namespace: k8sgpt
  labels:
    app.kubernetes.io/name: k8sgpt-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: k8sgpt-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8sgpt-mcp
    spec:
      serviceAccountName: k8sgpt-mcp
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
      containers:
        - name: k8sgpt
          # renovate: datasource=github-releases depName=k8sgpt-ai/k8sgpt
          image: ghcr.io/k8sgpt-ai/k8sgpt:v0.4.35
          args:
            - serve
            - --mcp
            - --mcp-http
            - --mcp-port=8089
          env:
            - name: K8SGPT_BACKEND
              value: localai
            - name: K8SGPT_MODEL
              value: deepseek-v4-flash
            - name: K8SGPT_BASEURL
              value: http://stpetersburg-vllm.keiretsu.ts.net/v1
            - name: K8SGPT_PASSWORD
              value: no-auth
            - name: XDG_CONFIG_HOME
              value: /tmp/config
            - name: XDG_CACHE_HOME
              value: /tmp/cache
          ports:
            - name: mcp
              containerPort: 8089
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
