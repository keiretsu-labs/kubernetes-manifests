---
apiVersion: core.k8sgpt.ai/v1alpha1
kind: K8sGPT
metadata:
  name: k8sgpt-stpetersburg
  namespace: k8sgpt
spec:
  # renovate: datasource=github-releases depName=k8sgpt-ai/k8sgpt
  version: v0.4.35
  kubeconfig:
    name: k8sgpt-kubeconfig-stpetersburg
    key: kubeconfig
  ai:
    enabled: true
    backend: localai
    baseUrl: http://stpetersburg-vllm.keiretsu.ts.net/v1
    model: deepseek-v4-flash
    secret:
      name: k8sgpt-vllm
      key: password
  noCache: false
  filters:
    - Pod
    - PersistentVolumeClaim
    - CronJob
