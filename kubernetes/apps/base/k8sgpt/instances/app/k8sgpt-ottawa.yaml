---
apiVersion: core.k8sgpt.ai/v1alpha1
kind: K8sGPT
metadata:
  name: k8sgpt-ottawa
  namespace: k8sgpt
spec:
  ai:
    enabled: true
    backend: localai
    baseUrl: http://stpetersburg-vllm.keiretsu.ts.net/v1
    model: deepseek-v4-flash
    secret:
      name: k8sgpt-vllm
      key: password
  noCache: false
  # High-signal analyzers only — the default set floods on service-mesh CA/headless
  # service false positives (341 findings on first full scan). Broaden as needed.
  filters:
    - Pod
    - Deployment
    - StatefulSet
    - CronJob
    - PersistentVolumeClaim
    - Ingress
  sink:
    type: slack
    secret:
      name: k8sgpt-discord
      key: webhook
