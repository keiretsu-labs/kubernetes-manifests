---
apiVersion: core.k8sgpt.ai/v1alpha1
kind: K8sGPT
metadata:
  name: k8sgpt-ottawa
  namespace: k8sgpt
spec:
  ai:
    enabled: true
    backend: localai
    baseUrl: http://stpetersburg-vllm.keiretsu.ts.net/v1
    model: deepseek-v4-flash
    secret:
      name: k8sgpt-vllm
      key: password
  noCache: false
  # Only analyzers that give real signal without false-positiving on this cluster.
  # StatefulSet/Ingress/Service/ConfigMap are deliberately dropped: they misread
  # operator-managed resources (Tailscale StatefulSets have an empty serviceName,
  # Istio CA configmaps, kube-root-ca.crt in every namespace) as broken. The
  # operator CRD has no label selector, so analyzer selection is the only lever.
  filters:
    - Pod
    - PersistentVolumeClaim
    - CronJob
  # sink intentionally omitted until the filtered output is confirmed low-noise;
  # re-added afterward as a controlled daily digest (analysis.interval: 24h).
