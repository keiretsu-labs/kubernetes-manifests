---
apiVersion: core.k8sgpt.ai/v1alpha1
kind: K8sGPT
metadata:
  name: k8sgpt-robbinsdale
  namespace: k8sgpt
spec:
  # Remote analysis: the operator runs the analyzer on ottawa but points at
  # robbinsdale's apiserver via this kubeconfig. The server is robbinsdale's
  # Tailscale k8s-operator proxy FQDN, resolved in-cluster by the DNSConfig
  # nameserver; auth is the tailnet identity of the traffic (token is unused).
  kubeconfig:
    name: k8sgpt-kubeconfig-robbinsdale
    key: kubeconfig
  ai:
    enabled: true
    backend: localai
    baseUrl: http://stpetersburg-vllm.keiretsu.ts.net/v1
    model: deepseek-v4-flash
    secret:
      name: k8sgpt-vllm
      key: password
  noCache: false
  sink:
    type: slack
    secret:
      name: k8sgpt-discord
      key: webhook
