---
# k8sgpt CLI config: localai (stpetersburg vLLM DeepSeek) as the DEFAULT provider,
# so `k8sgpt analyze -e -i` needs no backend flags. Read-only is fine — serve reads
# it via `-b localai`, it never writes.
apiVersion: v1
kind: ConfigMap
metadata:
  name: k8sgpt-chat-config
  namespace: k8sgpt
data:
  k8sgpt.yaml: |
    ai:
      providers:
        - name: localai
          model: deepseek-v4-flash
          baseurl: http://stpetersburg-vllm.keiretsu.ts.net/v1
          password: no-auth
      defaultprovider: localai
