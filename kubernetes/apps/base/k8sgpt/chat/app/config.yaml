---
# Seeds the k8sgpt CLI's config so `exec ... k8sgpt analyze -e -i` uses the
# stpetersburg vLLM (DeepSeek) with no per-invocation flags.
apiVersion: v1
kind: ConfigMap
metadata:
  name: k8sgpt-chat-config
  namespace: k8sgpt
data:
  k8sgpt.yaml: |
    ai:
      providers:
        - name: localai
          model: deepseek-v4-flash
          baseurl: http://stpetersburg-vllm.keiretsu.ts.net/v1
          password: no-auth
      defaultprovider: localai
