---
# Long-lived k8sgpt CLI pod for interactive chat, backed by the stpetersburg vLLM
# DeepSeek. Zero-flag usage (ottawa is the kubeconfig's current-context):
#
#   kubectl -n k8sgpt exec -it deploy/k8sgpt-chat -- k8sgpt analyze --explain --interactive
#
# For the other clusters, add one flag:  --kubecontext robbinsdale  (or stpetersburg)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8sgpt-chat
  namespace: k8sgpt
  labels:
    app.kubernetes.io/name: k8sgpt-chat
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: k8sgpt-chat
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8sgpt-chat
    spec:
      # No in-cluster SA token → k8sgpt uses the mounted kubeconfig (KUBECONFIG env)
      # instead of the permission-less default ServiceAccount.
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
        - name: k8sgpt
          image: ghcr.io/k8sgpt-ai/k8sgpt:v0.4.35
          # serve reads the localai provider from the config (-b localai) and keeps
          # the pod alive; exec `analyze` in for chat.
          args: ["serve", "-b", "localai"]
          env:
            - name: XDG_CONFIG_HOME
              value: /config
            - name: XDG_CACHE_HOME
              value: /tmp/cache
            - name: KUBECONFIG
              value: /kubeconfig/config
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /config/k8sgpt
              readOnly: true
            - name: kubeconfig
              mountPath: /kubeconfig
              readOnly: true
            - name: cache
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: k8sgpt-chat-config
        - name: kubeconfig
          secret:
            secretName: k8sgpt-chat-kubeconfig
        - name: cache
          emptyDir: {}
