---
# Long-lived k8sgpt CLI pod for interactive chat. `serve` keeps it alive; you
# exec in for conversational troubleshooting backed by the stpetersburg vLLM:
#
#   kubectl -n k8sgpt exec -it deploy/k8sgpt-chat -- \
#     /k8sgpt analyze --explain --interactive --no-cache --kubecontext ottawa
#
# Swap --kubecontext to robbinsdale / stpetersburg to chat about those clusters.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8sgpt-chat
  namespace: k8sgpt
  labels:
    app.kubernetes.io/name: k8sgpt-chat
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: k8sgpt-chat
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8sgpt-chat
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
        - name: k8sgpt
          image: ghcr.io/k8sgpt-ai/k8sgpt:v0.4.23
          args: ["serve"]
          env:
            - name: K8SGPT_BACKEND
              value: localai
            - name: K8SGPT_MODEL
              value: deepseek-v4-flash
            - name: K8SGPT_BASEURL
              value: http://stpetersburg-vllm.keiretsu.ts.net/v1
            - name: K8SGPT_PASSWORD
              value: no-auth
            - name: XDG_CONFIG_HOME
              value: /config
            - name: XDG_CACHE_HOME
              value: /tmp/cache
            - name: KUBECONFIG
              value: /kubeconfig/config
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /config/k8sgpt
              readOnly: true
            - name: kubeconfig
              mountPath: /kubeconfig
              readOnly: true
            - name: cache
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: k8sgpt-chat-config
        - name: kubeconfig
          secret:
            secretName: k8sgpt-chat-kubeconfig
        - name: cache
          emptyDir: {}
