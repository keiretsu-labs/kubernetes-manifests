---
apiVersion: clickhouse.altinity.com/v1
kind: ClickHouseInstallation
metadata:
  name: clickhouse
  namespace: clickhouse
spec:
  configuration:
    clusters:
      - name: "${LOCATION}"
        layout:
          shardsCount: 1
          replicasCount: 1
        templates:
          podTemplate: clickhouse-pod-template
          dataVolumeClaimTemplate: data-volume-template
          clusterServiceTemplate: clickhouse-cluster-service-template
    settings:
      prometheus/endpoint: /metrics
      prometheus/port: 9363
      prometheus/metrics: 1
      prometheus/events: 1
      prometheus/asynchronous_metrics: 1
      prometheus/status_info: 1
      compression/case/method: lz4
      compression/case/min_part_size: 0
      compression/case/min_part_size_ratio: "0.0"
  defaults:
    templates:
      podTemplate: clickhouse-pod-template
      dataVolumeClaimTemplate: data-volume-template
      serviceTemplate: clickhouse-cluster-service-template
  templates:
    podTemplates:
      - name: clickhouse-pod-template
        metadata:
          labels:
            app.kubernetes.io/name: clickhouse
            app.kubernetes.io/instance: clickhouse
            app.kubernetes.io/cluster: "${LOCATION}"
        spec:
          securityContext:
            runAsUser: 1000
            fsGroup: 1000
          containers:
            - name: clickhouse
              image: clickhouse/clickhouse-server:26.6
              ports:
                - name: tcp
                  containerPort: 9000
                - name: http
                  containerPort: 8123
                - name: interserver
                  containerPort: 9009
                - name: metrics
                  containerPort: 9363
              resources:
                requests:
                  cpu: 2
                  memory: 8Gi
                limits:
                  cpu: 4
                  memory: 16Gi
    volumeClaimTemplates:
      - name: data-volume-template
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 50Gi
    serviceTemplates:
      - name: clickhouse-cluster-service-template
        # Produce a stable Service named "clickhouse" so existing probes,
        # HTTPRoutes and Tailscale services keep working.
        generateName: clickhouse
        spec:
          ports:
            - name: tcp
              port: 9000
              targetPort: 9000
            - name: http
              port: 8123
              targetPort: 8123
            - name: interserver
              port: 9009
              targetPort: 9009
            - name: metrics
              port: 9363
              targetPort: 9363
          type: ClusterIP
