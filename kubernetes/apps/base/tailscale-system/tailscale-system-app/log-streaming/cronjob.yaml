---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: tailscale-log-streaming-sync
spec:
  schedule: "17 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app: tailscale-log-streaming-sync
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: sync
              image: curlimages/curl:8.21.0
              imagePullPolicy: IfNotPresent
              command: ["/bin/sh", "/scripts/sync.sh"]
              env:
                - name: TAILNET
                  value: "keiretsu.ts.net"
                - name: S3_URL
                  value: "https://s3.keiretsu.top"
                - name: S3_BUCKET
                  value: "tailscale-logs"
                - name: S3_REGION
                  value: "garage"
                - name: COMPRESSION
                  value: "zstd"
                - name: UPLOAD_PERIOD_MINUTES
                  value: "5"
                - name: TS_CLIENT_ID
                  valueFrom:
                    secretKeyRef:
                      name: ts-oauth
                      key: client_id
                - name: TS_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: ts-oauth
                      key: client_secret
              envFrom:
                - secretRef:
                    name: tailscale-logs-s3-auth
              volumeMounts:
                - name: script
                  mountPath: /scripts
                  readOnly: true
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                capabilities:
                  drop: ["ALL"]
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
          volumes:
            - name: script
              configMap:
                name: tailscale-log-streaming-script
                defaultMode: 0555
