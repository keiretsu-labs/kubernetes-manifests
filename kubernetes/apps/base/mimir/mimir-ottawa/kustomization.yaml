---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: mimir
resources:
  - helmrelease.yaml
  - ingress-ts.yaml
  - ingress-qf-ts.yaml
  - egress.yaml
  - loader-job.yaml
configMapGenerator:
  # Hash-suffixed so any rule change rolls the mimir-config-loader Job
  # (its volume ref changes), forcing a re-sync into the Mimir ruler.
  - name: mimir-rules
    files:
      - rules/blackbox.yaml
      - rules/flux.yaml
      - rules/garage.yaml
      - rules/k8gb.yaml
      - rules/monitoring.yaml
      - rules/smartctl.yaml
