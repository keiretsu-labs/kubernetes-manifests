# CSI plugin ServiceAccounts, ClusterRoles, and bindings required by ceph-csi-operator v1.0+
# when running inside the rook-ceph namespace (empty CSI_SERVICE_ACCOUNT_PREFIX).
# These are not created by the rook-ceph Helm chart — they must be applied separately
# per the Rook v1.20 upgrade guide (equivalent of deploying the ceph-csi-drivers chart).
# Source: https://github.com/ceph/ceph-csi-operator/blob/v1.0.1/deploy/multifile/csi-rbac.yaml
---
# ── ServiceAccounts ──────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rbd-ctrlplugin-sa
  namespace: rook-ceph
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rbd-nodeplugin-sa
  namespace: rook-ceph
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cephfs-ctrlplugin-sa
  namespace: rook-ceph
---
apiVersion: v1
kind: ServiceAccount
metadata:
