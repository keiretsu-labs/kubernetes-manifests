---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: k6-operator
spec:
  interval: 30m
  chart:
    spec:
      chart: k6-operator
      version: "4.4.1"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  install:
    remediation:
      retries: 3
    crds: CreateReplace
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
    crds: CreateReplace
  values:
    installCRDs: true
    manager:
      replicas: 1
      serviceAccount:
        create: true
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 10m
          memory: 128Mi
      logging:
        development: false
    metrics:
      serviceMonitor:
        enabled: true
        labels:
          release: monitoring
