---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  - name: k6-test-latency
    files:
      - latency.js
      - tags.js=lib/tags.js
      - thresholds.js=lib/thresholds.js
      - helpers.js=lib/helpers.js
  - name: k6-test-bandwidth
    files:
      - bandwidth.js
      - tags.js=lib/tags.js
      - thresholds.js=lib/thresholds.js
      - helpers.js=lib/helpers.js
  - name: k6-test-dialer-burst
    files:
      - dialer-burst.js
      - tags.js=lib/tags.js
      - thresholds.js=lib/thresholds.js
      - helpers.js=lib/helpers.js
  - name: k6-test-derp
    files:
      - derp.js
      - tags.js=lib/tags.js
      - thresholds.js=lib/thresholds.js
      - helpers.js=lib/helpers.js
  - name: k6-test-soak
    files:
      - soak.js
      - tags.js=lib/tags.js
      - thresholds.js=lib/thresholds.js
      - helpers.js=lib/helpers.js
