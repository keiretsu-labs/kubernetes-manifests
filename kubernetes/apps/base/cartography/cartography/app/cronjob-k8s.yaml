---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cartography-k8s-entrypoint
data:
  run.sh: |
    #!/bin/sh
    set -eu
    KCFG=/tmp/kubeconfig
    CA=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    TOKEN=$$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
    cat >"$$KCFG" <<EOF
    apiVersion: v1
    kind: Config
    clusters:
    - name: ${LOCATION}
      cluster:
        server: https://kubernetes.default.svc
        certificate-authority: $${CA}
    contexts:
    - name: ${LOCATION}
      context:
        cluster: ${LOCATION}
        user: cartography
    current-context: ${LOCATION}
    users:
    - name: cartography
      user:
        token: $${TOKEN}
    EOF
    exec cartography \
      --neo4j-uri bolt://neo4j:7687 \
      --selected-modules kubernetes \
      --k8s-kubeconfig "$$KCFG"
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cartography-k8s
spec:
  schedule: "0 */6 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          serviceAccountName: cartography
          containers:
            - name: cartography
              image: ghcr.io/cartography-cncf/cartography:latest
              command: [/bin/sh, /scripts/run.sh]
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
              resources:
                requests:
                  cpu: 100m
                  memory: 512Mi
                limits:
                  memory: 2Gi
          volumes:
            - name: scripts
              configMap:
                name: cartography-k8s-entrypoint
                defaultMode: 0755
