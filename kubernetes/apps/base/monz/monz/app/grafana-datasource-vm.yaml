---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: monz-victoria-metrics
  namespace: monz
  labels:
    app.kubernetes.io/name: grafana
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      grafana.internal/instance: monz-grafana
  datasource:
    name: VictoriaMetrics
    type: prometheus
    uid: monz-vm
    access: proxy
    url: http://victoria-metrics-victoria-metrics-single-server.monz.svc.cluster.local:8428
    isDefault: true
    jsonData:
      timeInterval: 30s
      httpMethod: GET
    editable: false
