---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: monz-victoria-logs
  namespace: monz
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      grafana.internal/instance: monz-grafana
  datasource:
    name: VictoriaLogs
    type: victoriametrics-logs-datasource
    uid: monz-vl
    access: proxy
    url: http://victoria-logs-victoria-logs-single-server.monz.svc.cluster.local:9428
    jsonData:
      maxLines: 1000
    editable: false
