---
apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: monz-grafana
  namespace: monz
  labels:
    grafana.internal/instance: monz-grafana
spec:
  persistentVolumeClaim:
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 5Gi
  plugins:
    - id: victoriametrics-logs-datasource
      version: latest
  config:
    log:
      mode: console
    server:
      root_url: https://monz.${COMMON_DOMAIN}
      domain: monz.${COMMON_DOMAIN}
    security:
      admin_user: admin
      admin_password: "${DEFAULT_PASSWORD}"
    auth.anonymous:
      enabled: "true"
      org_role: Admin
  deployment:
    spec:
      replicas: 1
