---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns-cloudflare-keiretsu-top
spec:
  interval: 5m
  releaseName: external-dns-cloudflare-keiretsu-top
  chart:
    spec:
      chart: external-dns
      version: "1.21.1"
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: flux-system
      interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    serviceMonitor:
      enabled: true
    provider: cloudflare
    env:
      - name: CF_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: cloudflare
            key: RAJSINGH_INFO_CLOUDFLARE_API_TOKEN
    extraArgs:
      - --crd-source-apiversion=externaldns.k8s.io/v1alpha1
      - --crd-source-kind=DNSEndpoint
      - --label-filter=dns-target==cloudflare
    policy: sync
    sources:
      - crd
    # Also publish rajsingh.info DNSEndpoints (label dns-target=cloudflare) from
    # this CRD-source instance — it already uses the rajsingh Cloudflare token.
    # This is the gateway-owned-zone-safe publisher for cdn-site public CNAMEs:
    # the rajsingh-info gateway-source external-dns runs --force-default-targets
    # and cannot honor a per-route GSLB CNAME, so cdn-site emits a DNSEndpoint
    # instead and excludes its route from the gateway-source (see #1651).
    domainFilters:
      - keiretsu.top
      - rajsingh.info
    txtOwnerId: keiretsu-top
    txtPrefix: k8s.keiretsu.top.
