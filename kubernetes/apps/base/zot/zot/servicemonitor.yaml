---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: zot
  labels:
    app.kubernetes.io/name: zot
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: zot
      app.kubernetes.io/instance: zot
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
