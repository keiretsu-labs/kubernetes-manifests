---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zot
spec:
  interval: 30m
  chart:
    spec:
      chart: zot
      version: 0.1.121
      sourceRef:
        kind: HelmRepository
        name: zot
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    replicaCount: 2
    startupProbe:
      initialDelaySeconds: 30
      periodSeconds: 10
      failureThreshold: 30
    service:
      type: ClusterIP
      port: 5000
    persistence: false
    mountConfig: true
    mountSecret: true
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 2000m
        memory: 2Gi
    env:
      - name: AWS_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            name: garage-s3-auth
            key: AWS_ACCESS_KEY_ID
      - name: AWS_SECRET_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: garage-s3-auth
            key: AWS_SECRET_ACCESS_KEY
    configFiles:
      config.json: |-
        {
          "storage": {
            "rootDirectory": "/var/lib/registry",
            "dedupe": false,
            "gc": true,
            "gcDelay": "1h",
            "gcInterval": "6h",
            "remoteCache": true,
            "cacheDriver": {
              "name": "redis",
              "addr": ["zot-cache:6379"],
              "dial_timeout": "10s",
              "read_timeout": "60s",
              "write_timeout": "60s",
              "keyprefix": "zot"
            },
            "retention": {
              "policies": [{
                "repositories": ["**"],
                "deleteReferrers": true,
                "deleteUntagged": true,
                "keepTags": [{
                  "mostRecentlyPushedCount": 10,
                  "mostRecentlyPulledCount": 10,
                  "pulledWithin": "720h",
                  "pushedWithin": "720h"
                }]
              }]
            },
            "storageDriver": {
              "name": "s3",
              "rootdirectory": "/zot",
              "region": "garage",
              "regionendpoint": "http://${COMMON_S3_ENDPOINT}",
              "bucket": "zot",
              "forcepathstyle": true,
              "secure": false,
              "skipverify": false,
              "multipartcopymaxconcurrency": 16,
              "multipartcopythresholdsize": 33554432,
              "multipartcopychunksize": 16777216
            }
          },
          "http": {
            "address": "0.0.0.0",
            "port": "5000",
            "compat": ["docker2s2"],
            "auth": {
              "htpasswd": { "path": "/secret/htpasswd" }
            },
            "accessControl": {
              "repositories": {
                "**": {
                  "policies": [{
                    "users": ["admin"],
                    "actions": ["read", "create", "update", "delete"]
                  }],
                  "anonymousPolicy": ["read", "create", "update"],
                  "defaultPolicy": []
                }
              }
            }
          },
          "extensions": {
            "search": { "enable": true },
            "ui": { "enable": true },
            "metrics": { "enable": true },
            "sync": {
              "enable": true,
              "downloadDir": "/var/lib/registry/sync-tmp",
              "registries": [{
                "urls": ["https://ghcr.io"],
                "content": [{
                  "prefix": "rajsinghtech/**"
                }],
                "onDemand": true,
                "pollInterval": "6h",
                "tlsVerify": true
              }]
            }
          },
          "log": { "level": "info" }
        }
    secretFiles:
      htpasswd: "${COMMON_OCI}"
