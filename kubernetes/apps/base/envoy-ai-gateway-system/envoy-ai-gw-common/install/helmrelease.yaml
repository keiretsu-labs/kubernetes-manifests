---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ai-gateway
  namespace: envoy-ai-gateway-system
spec:
  interval: 5m
  dependsOn:
    - name: ai-gateway-crds
  chart:
    spec:
      chart: ai-gateway-helm
      # renovate: datasource=docker depName=envoyproxy/ai-gateway-helm
      version: 1.0.0
      sourceRef:
        kind: HelmRepository
        name: envoy-gateway
        namespace: flux-system
      interval: 1m
  releaseName: aieg
  install:
    createNamespace: false
  # The ai-gateway-helm chart exposes no priorityClassName for its controller
  # Deployment, so patch it in post-render (matches the k8gb controller pattern).
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: ai-gateway-controller
            patch: |
              - op: add
                path: /spec/template/spec/priorityClassName
                value: infra-high
