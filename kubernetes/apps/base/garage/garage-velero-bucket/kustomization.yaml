apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: garage
resources:
  - bucket.yaml
  - key.yaml
  - velero-credentials.yaml
  - velero-system-namespace.yaml

patches:
  # Move velero-credentials to velero-system namespace (where Velero reads it)
  - patch: |-
      - op: replace
        path: /metadata/namespace
        value: velero-system
    target:
      kind: Secret
      name: velero-credentials