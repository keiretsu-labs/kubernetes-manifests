# Velero credentials in the INI format Velero's AWS plugin expects.
# Uses the bucket-scoped key created by the garage-velero-bucket GarageKey
# (copied from the velero-s3 secret generated by the operator).
# If the GarageKey is ever recreated, update these values.
# These are bucket-scoped credentials (only access the 'velero' bucket).
apiVersion: v1
kind: Secret
metadata:
  name: velero-credentials
  namespace: velero-system
  annotations:
    garage.rajsingh.info/source-key: velero-key
stringData:
  cloud: |
    [default]
    aws_access_key_id=GK3f5aae965648b3a91eb0d178
    aws_secret_access_key=484980610fd4f2e7bfab29b46cea5d30a9317404e1194908dc8cefc1c1715829