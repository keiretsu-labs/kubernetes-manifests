---
apiVersion: garage.rajsingh.info/v1beta1
kind: GarageKey
metadata:
  name: rajsingh-key
  namespace: flux-system
spec:
  clusterRef:
    name: garage
    namespace: garage
  name: "Rajsingh Workspace Key"
  secretTemplate:
    name: garage-rajsingh-bucket
    accessKeyIdKey: RAJSINGH_S3_ACCESS_KEY
    secretAccessKeyKey: RAJSINGH_S3_SECRET_KEY
  bucketPermissions:
    - bucketRef:
        name: rajsingh
        namespace: garage
      read: true
      write: true
      owner: true
