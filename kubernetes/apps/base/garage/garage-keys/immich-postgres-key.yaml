---
apiVersion: garage.rajsingh.info/v1beta1
kind: GarageKey
metadata:
  name: immich-postgres-key
  namespace: immich
spec:
  clusterRef:
    name: garage
    namespace: garage
  name: "Immich Postgres Backup Key"
  secretTemplate:
    name: immich-s3-backup
    accessKeyIdKey: AWS_ACCESS_KEY_ID
    secretAccessKeyKey: AWS_SECRET_ACCESS_KEY
  bucketPermissions:
    - bucketRef:
        name: immich-postgres
        namespace: garage
      read: true
      write: true
      owner: true
