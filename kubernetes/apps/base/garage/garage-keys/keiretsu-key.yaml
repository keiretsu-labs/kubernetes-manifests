---
apiVersion: garage.rajsingh.info/v1beta1
kind: GarageKey
metadata:
  name: keiretsu-key
  namespace: flux-system
spec:
  clusterRef:
    name: garage
    namespace: garage
  name: "Keiretsu Backup Key"
  secretTemplate:
    name: garage-keiretsu-bucket
    accessKeyIdKey: KEIRETSU_S3_ACCESS_KEY
    secretAccessKeyKey: KEIRETSU_S3_SECRET_KEY
  bucketPermissions:
    - bucketRef:
        name: keiretsu
        namespace: garage
      read: true
      write: true
