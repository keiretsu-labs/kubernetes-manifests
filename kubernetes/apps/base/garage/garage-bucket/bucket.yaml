---
apiVersion: garage.rajsingh.info/v1beta1
kind: GarageBucket
metadata:
  name: rajsingh
spec:
  clusterRef:
    name: garage
  globalAlias: rajsingh
  quotas:
    maxSize: 100Gi
    maxObjects: 1000000
  keyPermissions:
    - keyRef:
        name: rajsingh-key
        namespace: flux-system
      read: true
      write: true
      owner: true
---
apiVersion: garage.rajsingh.info/v1beta1
kind: GarageBucket
metadata:
  name: tailscale-logs
spec:
  clusterRef:
    name: garage
  globalAlias: tailscale-logs
  quotas:
    maxSize: 500Gi
    maxObjects: 10000000
  lifecycle:
    rules:
      - id: expire-logs-30d
        status: Enabled
        expirationDays: 30
      - id: abort-stuck-multipart-7d
        status: Enabled
        abortIncompleteMultipartUploadDays: 7
  keyPermissions:
    - keyRef:
        name: tailscale-logs-key
        namespace: tailscale-system
      read: true
      write: true
    - keyRef:
        name: tailscale-recorder-key
        namespace: tailscale
      read: true
      write: true
---
apiVersion: garage.rajsingh.info/v1beta1
kind: GarageBucket
metadata:
  name: mimir
spec:
  clusterRef:
    name: garage
    namespace: garage
  globalAlias: mimir
  quotas:
    maxSize: 500Gi
    maxObjects: 50000000
  keyPermissions:
    - keyRef:
        name: mimir-key
        namespace: mimir
      read: true
      write: true
      owner: true
