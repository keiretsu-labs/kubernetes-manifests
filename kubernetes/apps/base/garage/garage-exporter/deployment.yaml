---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: garage-exporter
  labels:
    app.kubernetes.io/name: garage-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: garage-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: garage-exporter
    spec:
      containers:
        - name: garage-exporter
          image: oci.cdn.${COMMON_DOMAIN}/kbpersonal/garage-exporter:v0.0.2
          imagePullPolicy: Always
          args:
            - -garage.admin-endpoint=http://garage:3903
            - -scrape-interval=5m
          env:
            - name: GARAGE_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: garage-admin-token
                  key: admin-token
          ports:
            - name: metrics
              containerPort: 9095
          resources:
            requests:
              cpu: 5m
              memory: 64Mi
            limits:
              memory: 256Mi
          readinessProbe:
            tcpSocket:
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
