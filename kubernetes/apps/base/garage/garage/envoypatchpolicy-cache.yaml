---
# Envoy HTTP cache filter for Garage web responses.
#
# Envoy's built-in HTTP cache filter caches responses in-memory, so subsequent
# requests for the same resource are served from Envoy without hitting Garage's
# slow web handler (~400ms per 180KB file on port 3902).
#
# Cache keys include the URL path + headers listed in allowed_vary_headers.
# The cache respects Cache-Control headers — we already set
# "public, max-age=3600" via ResponseHeaderModifier on the garage web HTTPRoutes,
# so responses are cached for 1 hour.
#
# Only caches responses with:
# - Cache-Control: public (set by our ResponseHeaderModifier)
# - HTTP 200 status
# - Payload ≤ 1MB (covers all our static sites)
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyPatchPolicy
metadata:
  name: garage-web-cache
  namespace: home
spec:
  type: JSONPatch
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: public
    namespace: home
  jsonPatches:
    # Patch filter chain 2 (*.rajsingh.info) — cache before router
    - type: type.googleapis.com/envoy.config.listener.v3.Listener
      name: home/public/wildcard-killinit-cc-https
      operation:
        op: add
        path: /filter_chains/2/filters/0/typed_config/http_filters/1
        value:
          name: envoy.filters.http.cache
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.cache.v3.CacheConfig
            max_payload_size_bytes: 1048576
            allowed_vary_headers: []
            cache_service:
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.cache.simple_http_cache.v3.SimpleHttpCacheConfig
                max_entries: 500

    # Patch filter chain 3 (*.keiretsu.top) — cache before router (last filter)
    # Current: header_mutation + ext_authz × 8 + lua + rbac + router
    # Insert cache at one-before-last (before router)
    - type: type.googleapis.com/envoy.config.listener.v3.Listener
      name: home/public/wildcard-killinit-cc-https
      operation:
        op: add
        path: /filter_chains/3/filters/0/typed_config/http_filters/11
        value:
          name: envoy.filters.http.cache
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.cache.v3.CacheConfig
            max_payload_size_bytes: 1048576
            allowed_vary_headers: []
            cache_service:
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.cache.simple_http_cache.v3.SimpleHttpCacheConfig
                max_entries: 500

    # Patch filter chain 4 (keiretsu.top bare) — cache before router
    - type: type.googleapis.com/envoy.config.listener.v3.Listener
      name: home/public/wildcard-killinit-cc-https
      operation:
        op: add
        path: /filter_chains/4/filters/0/typed_config/http_filters/1
        value:
          name: envoy.filters.http.cache
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.cache.v3.CacheConfig
            max_payload_size_bytes: 1048576
            allowed_vary_headers: []
            cache_service:
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.cache.simple_http_cache.v3.SimpleHttpCacheConfig
                max_entries: 500

    # Patch filter chain 5 (*.agents.keiretsu.top) — cache before router
    # Current: header_mutation + ext_authz × 2 + lua + rbac + router
    - type: type.googleapis.com/envoy.config.listener.v3.Listener
      name: home/public/wildcard-killinit-cc-https
      operation:
        op: add
        path: /filter_chains/5/filters/0/typed_config/http_filters/5
        value:
          name: envoy.filters.http.cache
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.cache.v3.CacheConfig
            max_payload_size_bytes: 1048576
            allowed_vary_headers: []
            cache_service:
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.cache.simple_http_cache.v3.SimpleHttpCacheConfig
                max_entries: 500

    # Patch filter chain 7 (*.cdn.keiretsu.top) — cache before router
    - type: type.googleapis.com/envoy.config.listener.v3.Listener
      name: home/public/wildcard-killinit-cc-https
      operation:
        op: add
        path: /filter_chains/7/filters/0/typed_config/http_filters/1
        value:
          name: envoy.filters.http.cache
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.cache.v3.CacheConfig
            max_payload_size_bytes: 1048576
            allowed_vary_headers: []
            cache_service:
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.cache.simple_http_cache.v3.SimpleHttpCacheConfig
                max_entries: 500
