---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: garage
resources:
  - admin-token.yaml
  - egress.yaml
  - reference-grants.yaml
  - service-ts.yaml
  - service-ts-gateway.yaml
  - garagecluster.yaml
  - rpc-secret.yaml
  - httproute-s3.yaml
  - httproute-web.yaml
  - web-cache
  - referencegrant-agent-web.yaml
  - referencegrant-bhaiya-web.yaml
  - probes.yaml
  - prometheusrule.yaml
  - grafana-dashboard.yaml
configMapGenerator:
  - name: garage-grafana-dashboard
    files:
      - dashboard.json
    options:
      labels:
        grafana_dashboard: "1"
      annotations:
        grafana_folder: garage
generatorOptions:
  disableNameSuffixHash: true