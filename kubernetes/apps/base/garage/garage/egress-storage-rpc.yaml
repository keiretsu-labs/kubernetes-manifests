# Identity-specific storage RPC egress entries. The Tailscale operator
# publishes each tailnet FQDN through the cluster DNSConfig nameserver and
# routes it through common-egress. This lets Garage pods resolve the original
# *.keiretsu.ts.net names to per-node proxy ClusterIPs without exposing CGNAT
# addresses in public DNS.
---
apiVersion: v1
kind: Service
metadata:
  name: ottawa-garage-asuka
  annotations:
    kustomize.toolkit.fluxcd.io/ssa: IfNotPresent
    tailscale.com/tailnet-fqdn: ottawa-garage-asuka.keiretsu.ts.net
    tailscale.com/proxy-group: common-egress
spec:
  type: ExternalName
  externalName: placeholder
  ports:
    - name: rpc
      port: 3901
      protocol: TCP
---
