---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kromgo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kromgo
  template:
    metadata:
      labels:
        app: kromgo
    spec:
      containers:
        - name: kromgo
          image: ghcr.io/home-operations/kromgo:0.14.11
          env:
            - name: PROMETHEUS_URL
              value: http://127.0.0.1:9090/prometheus
            - name: SERVER_PORT
              value: "8080"
            - name: HEALTH_PORT
              value: "8888"
          ports:
            - name: http
              containerPort: 8080
            - name: health
              containerPort: 8888
          livenessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /config/config.yaml
              subPath: config.yaml
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
            limits:
              memory: 64Mi
        - name: mimir-proxy
          image: nginxinc/nginx-unprivileged:1.31.2-alpine
          ports:
            - name: proxy
              containerPort: 9090
          volumeMounts:
            - name: mimir-proxy-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: nginx-tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              memory: 32Mi
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: config
          configMap:
            name: kromgo-config
        - name: mimir-proxy-config
          configMap:
            name: kromgo-mimir-proxy
        - name: nginx-tmp
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
