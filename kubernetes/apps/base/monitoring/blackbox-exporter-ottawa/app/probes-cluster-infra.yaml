---
# Cluster-local Kubernetes API (via the cluster VIP / DNS name).
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: app-k8s-api-local
spec:
  jobName: blackbox
  module: http_401
  prober:
    url: blackbox-exporter.monitoring.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        - https://k8s.killinit.internal:6443/readyz
      labels:
        service: kubernetes-api
        target: cluster-vip
---
# etcd metrics ports on each control-plane node.
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: app-etcd
spec:
  jobName: blackbox
  module: http_2xx
  prober:
    url: blackbox-exporter.monitoring.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        - http://rei.killinit.internal:2381/metrics
        - http://asuka.killinit.internal:2381/metrics
        - http://kaji.killinit.internal:2381/metrics
      labels:
        service: etcd
---
# CoreDNS and Flux source-controller (cluster-local).
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: app-cluster-services
spec:
  jobName: blackbox
  module: http_2xx
  prober:
    url: blackbox-exporter.monitoring.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        - http://kube-dns.kube-system:9153/metrics
        - http://source-controller.flux-system:80/
      labels:
        service: cluster-infra
|---
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: app-mimir-gateway
spec:
  jobName: blackbox
  module: http_2xx
  prober:
    url: blackbox-exporter.monitoring.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        - http://mimir-gateway.mimir:80/ready
      labels:
        service: mimir-gateway
        target: cluster-vip
