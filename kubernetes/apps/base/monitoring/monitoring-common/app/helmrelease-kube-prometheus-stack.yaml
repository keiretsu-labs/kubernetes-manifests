---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: kube-prometheus-stack
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: flux-kube-state-metrics-config
      valuesKey: kube-state-metrics-config.yaml
  values:
    cleanPrometheusOperatorObjectNames: true
    # Agent mode evaluates no rules — don't ship dead PrometheusRule objects.
    # The infra alerts in config/prometheusrules.yaml are now unevaluated;
    # re-home them in the Mimir ruler when alerting is reinstated.
    defaultRules:
      create: false
    grafana:
      enabled: false

    prometheusOperator:
      admissionWebhooks:
        enabled: true
      priorityClassName: "infra-high"
    prometheus:
      # Agent mode: scrape + remote_write only. No local TSDB query engine,
      # rule evaluation, or alerting — Mimir is the store/query layer. This
      # sheds both the head-block TSDB and the ~25% remote_write series-cache
      # tax a full server pays, dropping RSS from multi-GB to a few hundred MB.
      agentMode: true
      prometheusSpec:
        # Observability agent — keep it above default workloads under memory
        # pressure so it isn't the first thing evicted (its sibling alertmanager
        # below already uses infra-high).
        priorityClassName: infra-high
        externalLabels:
          cluster: ${CLUSTER_NAME}
        externalUrl: https://prometheus.${CLUSTER_DOMAIN}
        serviceMonitorSelector: {}
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        scrapeConfigSelectorNilUsesHelmValues: false
        remoteWrite:
          - url: http://mimir-gateway.mimir.svc.cluster.local:8080/api/v1/push
            headers:
              X-Scope-OrgID: ${CLUSTER_NAME}
            remoteTimeout: 30s
            queueConfig:
              # shard memory ≈ maxShards * (capacity + maxSamplesPerSend).
              # Bound maxShards so a Mimir backlog can't balloon the agent;
              # keep capacity ~5x maxSamplesPerSend to avoid WAL stalls.
              capacity: 10000
              maxSamplesPerSend: 2000
              maxShards: 10
              batchSendDeadline: 5s
        topologySpreadConstraints:
          - maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: ScheduleAnyway
        resources:
          requests:
            cpu: 100m
            memory: 1Gi
          limits:
            # Agent WAL memory scales with active series. The OOM crashloop (exit
            # 137) at 2Gi was driven by ~470k of 936k series being apiserver/etcd
            # latency-histogram buckets — dropped via the kubeApiServer
            # metricRelabelings below. That roughly halves active series, so the
            # agent fits back under 2Gi without flapping the Mimir tenant.
            memory: 2Gi
        storageSpec:
          emptyDir: {}

    # Prometheus Alertmanager — the Mimir ruler's notification target, since the
    # bundled Mimir AM hits an upstream notify bug (mimir#2910). matcherStrategy
    # None so the AlertmanagerConfig routes apply by alertname/severity across
    # all namespaces/clusters (the ruler sends alerts from every namespace).
    alertmanager:
      enabled: true
      alertmanagerSpec:
        priorityClassName: "infra-high"
        alertmanagerConfigMatcherStrategy:
          type: None
        alertmanagerConfigSelector:
          matchLabels:
            team: monitoring
        externalUrl: https://alertmanager.${CLUSTER_DOMAIN}
        resources:
          requests:
            cpu: 10m
            memory: 50Mi
          limits:
            memory: 100Mi
        storage:
          volumeClaimTemplate:
            spec:
              resources:
                requests:
                  storage: 1Gi

    kubeProxy:
      enabled: false

    coreDns:
      serviceMonitor:
        metricRelabelings:
          - targetLabel: cluster
            replacement: ${CLUSTER_NAME}

    kubeApiServer:
      serviceMonitor:
        metricRelabelings:
          - targetLabel: cluster
            replacement: ${CLUSTER_NAME}
          # Drop the apiserver/etcd latency-histogram buckets — ~470k of the
          # agent's ~936k active series (half its WAL memory, and the OOM cause).
          # These per-verb/-resource/-le _bucket families back only apiserver SLO
          # latency panels; request rates/errors (_count, _sum, codes) are kept,
          # as is everything kromgo and the standard dashboards use. Re-add a
          # specific bucket here if a latency panel needs it.
          - action: drop
            sourceLabels: [__name__]
            regex: (apiserver_request_duration_seconds|apiserver_request_sli_duration_seconds|apiserver_request_body_size_bytes|apiserver_response_sizes|apiserver_watch_cache_read_wait_seconds|apiserver_watch_list_duration_seconds|apiserver_watch_events_sizes|etcd_request_duration_seconds|rpc_duration_seconds|rpc_duration)_bucket
          # Second pass: the _sum/_count of those histograms plus apiserver/etcd
          # internal bookkeeping series — verified referenced by zero dashboards,
          # alerts, or badges. apiserver_request_total and
          # apiserver_request_duration_seconds_{sum,count} are deliberately NOT
          # matched here (the API dashboards use them).
          - action: drop
            sourceLabels: [__name__]
            regex: (apiserver_request_sli_duration_seconds|apiserver_response_sizes|apiserver_watch_events_sizes|etcd_request_duration_seconds|apiserver_admission_controller_admission_duration_seconds|apiserver_admission_step_admission_duration_seconds|apiserver_admission_webhook_admission_duration_seconds)_(sum|count)|apiserver_watch_events_total|apiserver_watch_cache_.*|apiserver_storage_list_.*|apiserver_cache_list_.*|apiserver_longrunning_requests|apiextensions_openapi_v3?_regeneration_count|etcd_requests_total|etcd_bookmark_total|watch_cache_capacity

    kubelet:
      serviceMonitor:
        # cadvisor on constrained nodes (Jetson Orin) reports lagging embedded
        # timestamps; honoring them drops ~10k samples/scrape as out-of-order.
        # Use scrape time instead — slightly less precise rates, no data loss.
        # The chart forces honorTimestamps=true on the cadvisor endpoint while
        # trackTimestampsStaleness is true, so both must be false to take effect.
        honorTimestamps: false
        trackTimestampsStaleness: false
        metricRelabelings:
          - targetLabel: cluster
            replacement: ${CLUSTER_NAME}
          # storage_operation latency histogram (kubelet /metrics) — unused.
          # NOTE: prober_probe_* is on the /metrics/probes endpoint, so its drop
          # lives under probesMetricRelabelings below, not here.
          - action: drop
            sourceLabels: [__name__]
            regex: storage_operation_duration_seconds_(bucket|sum|count)
        cAdvisorMetricRelabelings:
          - targetLabel: cluster
            replacement: ${CLUSTER_NAME}
          - action: labeldrop
            regex: ^id$
          # Drop high-cardinality, low-value cadvisor series that bloat the agent
          # WAL (root of the OOM crashloop). container_fs_*/blkio_* are per-device
          # and explode on these Ceph rbd-heavy nodes — they were also the source
          # of the err-mimir-sample-duplicate-timestamp rejections on /dev/rbd*.
          # Kept: container_cpu_*, container_memory_working_set_bytes, network.
          - action: drop
            sourceLabels: [__name__]
            regex: container_(fs|blkio|spec|tasks_state|memory_failures_total|file_descriptors|sockets|threads|threads_max|ulimits_soft|processes|start_time_seconds|last_seen).*
          # Redundant cadvisor container variants no dashboard uses. Kept:
          # container_cpu_usage_seconds_total, container_cpu_cfs_throttled_seconds_total,
          # container_memory_working_set_bytes/rss/cache/swap, container_network_*.
          - action: drop
            sourceLabels: [__name__]
            regex: container_pressure_.*|container_health_state|container_memory_(usage_bytes|max_usage_bytes|mapped_file|kernel_usage|failcnt|total_inactive_file_bytes|total_active_file_bytes)|container_cpu_(user_seconds_total|system_seconds_total|load_average_10s|load_d_average_10s|cfs_periods_total|cfs_burst_periods_total|cfs_burst_seconds_total|cfs_throttled_periods_total)
        probesMetricRelabelings:
          - targetLabel: cluster
            replacement: ${CLUSTER_NAME}
          # prober_probe_* latency histogram (kubelet /metrics/probes) — unused.
          - action: drop
            sourceLabels: [__name__]
            regex: prober_probe_duration_seconds_(bucket|sum|count)

    kubeControllerManager:
      enabled: true
      serviceMonitor:
        metricRelabelings:
          - targetLabel: cluster
            replacement: ${CLUSTER_NAME}

    kubeScheduler:
      enabled: true
      serviceMonitor:
        metricRelabelings:
          - targetLabel: cluster
            replacement: ${CLUSTER_NAME}

    kubeEtcd:
      enabled: false

    kube-state-metrics:
      enabled: true
      priorityClassName: "infra-high"
      prometheus:
        monitor:
          metricRelabelings:
            - targetLabel: cluster
              replacement: ${CLUSTER_NAME}

    prometheus-node-exporter:
      priorityClassName: "infra-high"
      updateStrategy:
        rollingUpdate:
          maxUnavailable: "100%"
      prometheus:
        monitor:
          metricRelabelings:
            - targetLabel: cluster
              replacement: ${CLUSTER_NAME}