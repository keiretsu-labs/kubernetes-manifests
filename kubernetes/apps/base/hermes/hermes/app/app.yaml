---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
spec:
  # Scaled to 0: migrated to the templated agent `teaspoon` in ns `agents`
  # (Discord bot + tag:k8s). Only one gateway may hold the Discord token at a
  # time, so this old non-templated app is retired. Kept in git (not deleted)
  # as a rollback anchor until teaspoon is confirmed stable.
  replicas: 0
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: hermes
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hermes
    spec:
      initContainers:
        - name: seed-aws-credentials
          image: busybox:1.38
          command:
            - sh
            - -c
            - |
              set -eu
              mkdir -p /opt/data/.aws
              umask 077
              cat >/opt/data/.aws/credentials <<EOF
              [default]
              aws_access_key_id = $${AWS_ACCESS_KEY_ID}
              aws_secret_access_key = $${AWS_SECRET_ACCESS_KEY}
              EOF
              cat >/opt/data/.aws/config <<EOF
              [default]
              region = $${AWS_REGION}
              endpoint_url = $${AWS_ENDPOINT_URL}
              s3 =
                  endpoint_url = $${AWS_ENDPOINT_URL_S3}
                  addressing_style = path
              EOF
          envFrom:
            - secretRef:
                name: hermes-s3
          volumeMounts:
            - name: data
              mountPath: /opt/data
      containers:
        - name: hermes
          image: nousresearch/hermes-agent:v2026.6.19
          args: ["gateway", "run"]
          env:
            - name: OPENAI_API_KEY
              value: "unused"
            - name: ANTHROPIC_API_KEY
              value: "unused"
            - name: GATEWAY_ALLOW_ALL_USERS
              value: "true"
            - name: API_SERVER_ENABLED
              value: "true"
            - name: API_SERVER_HOST
              value: "0.0.0.0"
            - name: API_SERVER_PORT
              value: "8642"
            - name: DISCORD_REQUIRE_MENTION
              value: "false"
            - name: DISCORD_AUTO_THREAD
              value: "true"
            - name: DISCORD_REACTIONS
              value: "true"
            - name: AWS_SHARED_CREDENTIALS_FILE
              value: /opt/data/.aws/credentials
            - name: AWS_CONFIG_FILE
              value: /opt/data/.aws/config
            # v2026.5.29 introduced s6 supervision — dashboard runs in the same
            # container as the gateway. HERMES_DASHBOARD=1 spawns it; TUI=1
            # enables the embedded chat tab; HOST=0.0.0.0 exposes it.
            # HERMES_DASHBOARD_INSECURE=1 skips the dashboard's OAuth gate;
            # network access is already gated by the Tailscale `ts` gateway ACL.
            - name: HERMES_DASHBOARD
              value: "1"
            - name: HERMES_DASHBOARD_TUI
              value: "1"
            - name: HERMES_DASHBOARD_HOST
              value: "0.0.0.0"
            - name: HERMES_DASHBOARD_PORT
              value: "9119"
            - name: HERMES_DASHBOARD_INSECURE
              value: "1"
          envFrom:
            - secretRef:
                name: hermes-secrets
            - secretRef:
                name: hermes-s3
          ports:
            - name: gateway
              containerPort: 8642
              protocol: TCP
            - name: dashboard
              containerPort: 9119
              protocol: TCP
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              memory: 4Gi
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-data
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: hermes
spec:
  selector:
    app.kubernetes.io/name: hermes
  ports:
    - name: gateway
      port: 8642
      targetPort: 8642
      protocol: TCP
    - name: dashboard
      port: 9119
      targetPort: 9119
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: hermes-ts
  annotations:
    tailscale.com/hostname: "hermes"
    tailscale.com/proxy-group: common-ingress
    tailscale.com/tags: "tag:k8s"
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 8642
  selector:
    app.kubernetes.io/name: hermes
