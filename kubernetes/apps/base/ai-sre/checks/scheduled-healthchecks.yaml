---
apiVersion: holmesgpt.dev/v1alpha1
kind: ScheduledHealthCheck
metadata:
  name: ceph-health
  namespace: ai-sre
  labels:
    app.kubernetes.io/managed-by: ai-sre
spec:
  schedule: "0 */6 * * *"
  enabled: true
  query: "Check the health of the Ceph cluster. Look at rook-ceph pods, CephBlockPool status, and any degraded PGs. Report any issues with OSDs, mons, or placement groups."
  timeout: 120
  mode: monitor
---
apiVersion: holmesgpt.dev/v1alpha1
kind: ScheduledHealthCheck
metadata:
  name: flux-reconcile-state
  namespace: ai-sre
  labels:
    app.kubernetes.io/managed-by: ai-sre
spec:
  schedule: "*/30 * * * *"
  enabled: true
  query: "Check FluxCD reconciliation status across all namespaces. Look for any Kustomizations or HelmReleases that are not Ready, have errors, or are stalled. Report the name, namespace, and error message for any failing reconciliations."
  timeout: 120
  mode: monitor
---
apiVersion: holmesgpt.dev/v1alpha1
kind: ScheduledHealthCheck
metadata:
  name: bhaiya-workspaces
  namespace: ai-sre
  labels:
    app.kubernetes.io/managed-by: ai-sre
spec:
  schedule: "0 */4 * * *"
  enabled: true
  query: "Check the health of bhaiya workspaces. Look at pods in the bhaiya namespace with label bhaiya.corp/workspace. Report any workspaces in a failed, crashlooping, or stuck provisioning state. Check if the bhaiya deployment itself is healthy."
  timeout: 120
  mode: monitor
---
apiVersion: holmesgpt.dev/v1alpha1
kind: ScheduledHealthCheck
metadata:
  name: mimir-ingest
  namespace: ai-sre
  labels:
    app.kubernetes.io/managed-by: ai-sre
spec:
  schedule: "*/15 * * * *"
  enabled: true
  query: "Check Mimir ingestion health. Look at the mimir namespace pods, check for any distributor or ingester errors, and verify that the querier is responsive. Report any issues with the mimir-gateway."
  timeout: 90
  mode: monitor
