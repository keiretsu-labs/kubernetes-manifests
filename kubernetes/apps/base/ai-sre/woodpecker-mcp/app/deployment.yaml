---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: woodpecker-mcp
  labels:
    app: woodpecker-mcp
    app.kubernetes.io/name: woodpecker-mcp
    app.kubernetes.io/managed-by: ai-sre
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: woodpecker-mcp
  template:
    metadata:
      labels:
        app: woodpecker-mcp
        app.kubernetes.io/name: woodpecker-mcp
        app.kubernetes.io/managed-by: ai-sre
    spec:
      serviceAccountName: woodpecker-mcp
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: woodpecker-mcp
          image: ghcr.io/rajsinghtech/woodpecker-mcp-kuzu:0.2.0
          imagePullPolicy: IfNotPresent
          args: ["serve", "--http", "--port", "8000"]
          env:
            - name: WP_GRAPH_BACKEND
              value: kuzu
            - name: WP_KUZU_PATH
              value: /data/woodpecker.kuzu
            - name: WP_TOPOLOGY
              value: k8s
            - name: WP_K8S_NAMESPACES
              value: "*"
            - name: WP_PROM_URL
              value: http://127.0.0.1:9090/prometheus
            - name: WP_SNAPSHOT_DIR
              value: /data/snapshots
            - name: WP_TOPOLOGY_MEMORY
              value: /data/topology-memory.json
            - name: WP_HTTP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: woodpecker-mcp-token
                  key: token
          ports:
            - name: http
              containerPort: 8000
          volumeMounts:
            - name: data
              mountPath: /data
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
        - name: mimir-proxy
          image: nginxinc/nginx-unprivileged:1.31.2-alpine
          ports:
            - name: proxy
              containerPort: 9090
          volumeMounts:
            - name: mimir-proxy-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: nginx-tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              memory: 32Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: woodpecker-mcp
        - name: mimir-proxy-config
          configMap:
            name: woodpecker-mcp-mimir-proxy
        - name: nginx-tmp
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
