---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: woodpecker-mcp
  labels:
    app.kubernetes.io/name: woodpecker-mcp
    app.kubernetes.io/managed-by: ai-sre
spec:
  endpointSelector:
    matchLabels:
      app: woodpecker-mcp
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": mimir
            "k8s:k8s-app": mimir-gateway
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            "k8s:k8s-app": kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
