---
apiVersion: v1
kind: ConfigMap
metadata:
  name: woodpecker-mcp-mimir-proxy
  labels:
    app.kubernetes.io/name: woodpecker-mcp
    app.kubernetes.io/managed-by: ai-sre
data:
  default.conf: |
    server {
      listen 127.0.0.1:9090;
      resolver kube-dns.kube-system.svc.cluster.local valid=30s;
      set $upstream mimir-gateway.mimir.svc.cluster.local;
      location / {
        proxy_set_header X-Scope-OrgID ${CLUSTER_NAME};
        proxy_pass http://$upstream:8080;
      }
    }
