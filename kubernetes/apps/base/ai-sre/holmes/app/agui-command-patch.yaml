---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: holmes-holmes
spec:
  template:
    spec:
      containers:
        - name: holmes
          command: ["python3", "-u", "/app/experimental/ag-ui/server-agui.py"]
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
