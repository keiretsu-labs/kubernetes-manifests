---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: holmes-shim
  labels:
    app: holmes-shim
    app.kubernetes.io/name: holmes-shim
    app.kubernetes.io/managed-by: ai-sre
spec:
  replicas: 1
  selector:
    matchLabels:
      app: holmes-shim
  template:
    metadata:
      labels:
        app: holmes-shim
        app.kubernetes.io/name: holmes-shim
        app.kubernetes.io/managed-by: ai-sre
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: holmes-shim
          image: ghcr.io/keiretsu-labs/kubernetes-manifests/holmes-shim:0.2.1
          imagePullPolicy: IfNotPresent
          env:
            - name: HOLMES_URLS
              valueFrom:
                configMapKeyRef:
                  name: holmes-shim
                  key: HOLMES_URLS
            - name: DISCORD_WEBHOOK_URL
              value: ${DISCORD_WEBHOOK_URL}
          ports:
            - name: http
              containerPort: 8000
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
