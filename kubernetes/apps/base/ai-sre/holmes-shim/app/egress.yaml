---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: holmes-shim
  labels:
    app.kubernetes.io/name: holmes-shim
    app.kubernetes.io/managed-by: ai-sre
spec:
  endpointSelector:
    matchLabels:
      app: holmes-shim
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": ai-sre
            "k8s:app": holmes
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
    # Cross-cluster Holmes read-agents via Tailscale egress (ExternalName Services
    # route through proxy-group pods in tailscale-system)
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": tailscale-system
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "80"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": bhaiya
            "k8s:app": bifrost
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": monitoring
            "k8s:app": alertmanager
      toPorts:
        - ports:
            - port: "9093"
              protocol: TCP
    # Discord webhook (investigation results fan-out)
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            "k8s:k8s-app": kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
