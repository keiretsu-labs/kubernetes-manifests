---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: holmes-shim-ingress
  labels:
    app.kubernetes.io/name: holmes-shim
    app.kubernetes.io/managed-by: ai-sre
spec:
  endpointSelector:
    matchLabels:
      app: holmes-shim
  ingress:
    # Bifrost MCP proxy (bhaiya namespace) → shim /mcp
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": bhaiya
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
    # Alertmanager (monitoring namespace) → shim /alertmanager webhook
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": monitoring
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
    # Gatus (gatus namespace) → shim /gatus webhook
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": gatus
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
    # Envoy gateway (ts gateway data plane) → shim /mcp for tailnet MCP access
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": envoy-gateway-system
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
