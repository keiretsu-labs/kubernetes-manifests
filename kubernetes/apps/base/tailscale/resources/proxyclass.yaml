---
apiVersion: tailscale.com/v1alpha1
kind: ProxyClass
metadata:
  name: common
spec:
  metrics:
    enable: true
    serviceMonitor:
      enable: true
  statefulSet:
    pod:
      priorityClassName: "infra-high"
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              tailscale.com/managed: "true"
          matchLabelKeys:
            - tailscale.com/parent-resource
---
apiVersion: tailscale.com/v1alpha1
kind: ProxyClass
metadata:
  name: common-accept-routes
spec:
  tailscale:
    acceptRoutes: true
  metrics:
    enable: true
    serviceMonitor:
      enable: true
  statefulSet:
    pod:
      priorityClassName: "infra-high"
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              tailscale.com/managed: "true"
          matchLabelKeys:
            - tailscale.com/parent-resource
---
apiVersion: tailscale.com/v1alpha1
kind: ProxyClass
metadata:
  name: common-userspace
spec:
  statefulSet:
    pod:
      tailscaleContainer:
        env:
          - name: TS_USERSPACE
            value: "true"
        securityContext:
          privileged: false
          capabilities:
            drop:
              - ALL
      tailscaleInitContainer:
        securityContext:
          privileged: false
          capabilities:
            drop:
              - ALL
---
apiVersion: tailscale.com/v1alpha1
kind: ProxyClass
metadata:
  name: k8s-proxy-l4-test
spec:
  statefulSet:
    pod:
      tailscaleContainer:
        image: ghcr.io/rajsinghtech/tailscale/k8s-proxy:81
  metrics:
    enable: true
    serviceMonitor:
      enable: true