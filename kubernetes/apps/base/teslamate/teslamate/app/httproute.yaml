---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: teslamate
  namespace: teslamate
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: public
      namespace: home
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: private
      namespace: home
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: ts
      namespace: home
  hostnames:
    - teslamate.keiretsu.top
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: teslamate
          port: 4000
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
