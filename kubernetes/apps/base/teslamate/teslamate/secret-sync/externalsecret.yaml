---
# Syncs the CNPG-generated teslamate-postgres-app secret into the monitoring
# namespace so GrafanaDatasource can reference it via valuesFrom without a
# cross-namespace secretKeyRef (not supported by the Grafana operator CRD).
# Uses the kubernetes-local ClusterSecretStore (ESO) which already has
# cluster-wide secret read access via the external-secrets-store SA.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: teslamate-postgres-app
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: kubernetes-local
    kind: ClusterSecretStore
  target:
    name: teslamate-postgres-app
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: teslamate-postgres-app
        property: password
        remoteNamespace: teslamate
    - secretKey: username
      remoteRef:
        key: teslamate-postgres-app
        property: username
        remoteNamespace: teslamate
