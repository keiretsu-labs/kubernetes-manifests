---
# Syncs the CNPG-generated teslamate-postgres-app secret into the monitoring
# namespace so GrafanaDatasource can reference it via valuesFrom without a
# cross-namespace secretKeyRef (not supported by the Grafana operator CRD).
# Uses the kubernetes-teslamate ClusterSecretStore (ESO) which reads from
# the teslamate namespace via the cluster-wide external-secrets-store SA.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: teslamate-postgres-app
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: kubernetes-teslamate
    kind: ClusterSecretStore
  target:
    name: teslamate-postgres-app
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: teslamate-postgres-app
        property: password
    - secretKey: username
      remoteRef:
        key: teslamate-postgres-app
        property: username
