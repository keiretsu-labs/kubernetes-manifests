apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: music-assistant
spec:
  replicas: 0
  serviceName: music-assistant
  selector:
    matchLabels:
      app: music-assistant
  template:
    metadata:
      labels:
        app: music-assistant
      annotations:
        # macvlan side-leg + default-route on LAN. MA's stream-server
        # auto-detects its publish IP via getsockname() on a UDP socket to
        # 8.8.8.8 — with the default route on the LAN iface, that returns
        # the 192.168.73.x address Sonos can fetch from. Also gives the
        # Sonos UPnP/SSDP discovery a real LAN identity.
        k8s.v1.cni.cncf.io/networks: |
          [{"name":"lan","namespace":"home-assistant","default-route":["192.168.73.1"]}]
    spec:
      containers:
        - name: music-assistant
          image: ghcr.io/music-assistant/server:2.9.5
          securityContext:
            capabilities:
              add:
                - SYS_ADMIN
                - DAC_READ_SEARCH
          env:
            - name: TZ
              value: ${TIMEZONE}
            - name: LOG_LEVEL
              value: info
          ports:
            - name: http
              containerPort: 8095
            - name: stream
              containerPort: 8097
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: musicassistant-data