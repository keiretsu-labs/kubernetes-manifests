---
# Multus NetworkAttachmentDefinition: macvlan side-leg on eth0 with static IPAM
# on 192.168.73.x LAN so HomeKit Bridge + HA mobile app mDNS can advertise
# from a real LAN IP. Routes are managed by a route-fix init container in the
# StatefulSet (pins cluster pod/service CIDR 10.5.0.0/16 + 10.4.0.0/16 to eth0).
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: lan
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "name": "lan",
      "plugins": [
        {
          "type": "macvlan",
          "master": "eth0",
          "mode": "bridge",
          "ipam": {
            "type": "static",
            "addresses": [
              {
                "address": "192.168.73.140/24",
                "gateway": "192.168.73.1"
              }
            ],
            "routes": [
              {
                "dst": "0.0.0.0/0",
                "gw": "192.168.73.1"
              }
            ]
          }
        }
      ]
    }
