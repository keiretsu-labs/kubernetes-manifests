apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: homeassistant
spec:
  replicas: 1
  serviceName: homeassistant
  selector:
    matchLabels:
      app: homeassistant
  template:
    metadata:
      labels:
        app: homeassistant
      annotations:
        # macvlan side-leg on the LAN so HomeKit Bridge + HA mobile app
        # mDNS discovery can advertise from a real 192.168.73.x IP.
        # default-route on the LAN iface so HA's mDNS/Bonjour goes out the
        # right interface; Cilium's BPF still handles intra-cluster traffic.
        k8s.v1.cni.cncf.io/networks: |
          [{"name":"lan","namespace":"home-assistant","default-route":["192.168.73.1"]}]
    spec:
      nodeSelector:
        kubernetes.io/hostname: orin-0
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      priorityClassName: "infra-high"
      initContainers:
        - name: route-fix
          image: alpine:3.21
          command:
            - /bin/sh
            - -c
            - |
              # Pin cluster pod/service CIDR routes to eth0 so intra-cluster
              # traffic doesn't exit via the macvlan/LAN interface.
              # Wait for the net1 interface to appear (macvlan is slower).
              for i in $(seq 1 30); do
                ip link show net1 >/dev/null 2>&1 && break
                sleep 2
              done
              ip route add 10.5.0.0/16 dev eth0 2>/dev/null || true
              ip route add 10.4.0.0/16 dev eth0 2>/dev/null || true
              ip route add 169.254.0.0/16 dev eth0 2>/dev/null || true
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
      containers:
        - name: homeassistant
          image: homeassistant/home-assistant:2026.7
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1"
          env:
            - name: TZ
              value: ${TIMEZONE}
          ports:
            - name: http
              containerPort: 8123
          volumeMounts:
            - name: config
              mountPath: /config
            - name: google-assistant
              mountPath: /config/google_assistant.yaml
              subPath: google_assistant.yaml
              readOnly: true
            - name: lights
              mountPath: /config/lights.yaml
              subPath: lights.yaml
              readOnly: true
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: homeassistant-config
        - name: google-assistant
          secret:
            secretName: home-assistant-google-assistant
        - name: lights
          configMap:
            name: home-assistant-lights