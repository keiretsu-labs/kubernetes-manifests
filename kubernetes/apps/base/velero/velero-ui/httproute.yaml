---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: velero-ui
spec:
  hostnames:
    - "velero.${COMMON_DOMAIN}"
    - "velero.${LOCATION}.${COMMON_DOMAIN}"
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: public
      namespace: home
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: velero-ui
          port: 3000
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: velero-ui-ts
spec:
  hostnames:
    - "velero.${CLUSTER_DOMAIN}"
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: ts
      namespace: home
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: velero-ui
          port: 3000
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
