---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: velero-ui
spec:
  interval: 30m
  chart:
    spec:
      chart: velero-ui
      version: 0.14.0
      sourceRef:
        kind: HelmRepository
        name: otwld
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    replicaCount: 1

    image:
      repository: otwld/velero-ui
      tag: ""

    # Point at the velero namespace (same cluster, in-cluster auth via service account)
    veleroNamespace: velero-system

    # Use default password from cluster-secrets
    secretPassPhrase:
      value: "${DEFAULT_PASSWORD}"

    # Override basic auth password (admin/${DEFAULT_PASSWORD}) from cluster-secrets
    env:
      - name: BASIC_AUTH_PASSWORD
        value: "${DEFAULT_PASSWORD}"

    # RBAC: grant cluster admin read access so it can list backups/schedules
    rbac:
      create: true
      clusterAdministrator: true

    # Service — ClusterIP (HTTPRoute handles external access)
    service:
      type: ClusterIP
      port: 3000

    # Probe paths used by the chart default on /health
    livenessProbe:
      enabled: true
      path: /health
    readinessProbe:
      enabled: true
      path: /health
