---
# allow the velero-cdn HTTPRoute (keiretsu-top ns, k8gb GSLB) to backend the
# velero-ui Service. The route + tinyauth SecurityPolicy live in keiretsu-top
# so the Gslb can reference them same-namespace (see
# k8gb-common/config/gslb-velero.yaml).
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: velero-cdn
  namespace: velero-system
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: keiretsu-top
  to:
    - group: ""
      kind: Service
      name: velero-ui
