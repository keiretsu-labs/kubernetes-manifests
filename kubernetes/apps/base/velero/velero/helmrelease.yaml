---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: velero
spec:
  interval: 30m
  chart:
    spec:
      chart: velero
      version: 12.1.0
      sourceRef:
        kind: HelmRepository
        name: vmware-tanzu
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    image:
      repository: docker.io/velero/velero
      tag: v1.18.2

    initContainers:
      - name: velero-plugin-for-aws
        image: velero/velero-plugin-for-aws:v1.14.2
        volumeMounts:
          - mountPath: /target
            name: plugins

    credentials:
      useSecret: true
      existingSecret: velero-credentials

    configuration:
      clientQPS: 100
      clientBurst: 200
      backupStorageLocation:
        - name: garage
          provider: aws
          bucket: velero
          default: true
          config:
            region: garage
            s3Url: "http://${COMMON_S3_ENDPOINT}"
            s3ForcePathStyle: "true"
            prefix: "${LOCATION}"
          credential:
            name: velero-credentials
            key: cloud
      volumeSnapshotLocation: []

    deployNodeAgent: true
    nodeAgent:
      uploaderType: kopia
      podVolumePath: /var/lib/kubelet/pods
      resources:
        requests:
          cpu: 200m
          memory: 256Mi
        limits:
          cpu: 1
          memory: 1Gi

    metrics:
      enabled: true