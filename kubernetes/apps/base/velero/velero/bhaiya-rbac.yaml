---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: bhaiya-velero
  namespace: velero-system
rules:
  - apiGroups: ["velero.io"]
    resources:
      - backups
      - schedules
      - restores
      - deletebackuprequests
    verbs:
      - create
      - get
      - list
      - watch
      - delete
      - patch
      - update
  - apiGroups: ["velero.io"]
    resources:
      - backupstoragelocations
      - podvolumebackups
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bhaiya-velero
  namespace: velero-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: bhaiya-velero
subjects:
  - kind: ServiceAccount
    name: bhaiya
    namespace: bhaiya
