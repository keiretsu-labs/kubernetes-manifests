---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: k8gb
  namespace: k8gb
spec:
  interval: 30m
  chart:
    spec:
      chart: k8gb
      version: "v0.19.0"
      sourceRef:
        kind: HelmRepository
        name: k8gb
        namespace: flux-system
  values:
    k8gb:
      imageRepo: ghcr.io/rajsinghtech/k8gb
      imageTag: 1fae0311
      clusterGeoTag: "${LOCATION}"
      extGslbClustersGeoTags: "${K8GB_EXT_GEO_TAGS}"
      dnsZones:
        - parentZone: "keiretsu.top"
          loadBalancedZone: "cdn.keiretsu.top"
          dnsZoneNegTTL: 30
          # cdn.keiretsu.top is NS-delegated here, which occludes the
          # _acme-challenge TXT cert-manager writes into cloudflare. Answer the
          # challenge name with a CNAME back into the undelegated parent zone
          # (cert-manager follows it via the issuer's cnameStrategy: Follow).
          extraPlugins:
            - |
              template IN ANY _acme-challenge.cdn.keiretsu.top {
                answer "_acme-challenge.cdn.keiretsu.top. 30 IN CNAME _acme-challenge-cdn.keiretsu.top."
              }
        - parentZone: "keiretsu.top"
          loadBalancedZone: "ts.keiretsu.top"
          dnsZoneNegTTL: 30
      edgeDNSServers:
        - "1.1.1.1"
      nsRecordTTL: 30
      reconcileRequeueSeconds: 60

      exposeMetrics: true
      serviceMonitor:
        enabled: true

    coredns:
      replicaCount: 3
      serviceType: LoadBalancer
      service:
        loadBalancerIP: "${CLUSTER_LOAD_BALANCER_CIDR%.*.*/*}.10.53"

    extdns:
      enabled: false

    gatewayapi:
      enabled: true
