---
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: keiretsu-top-cnames
  namespace: cloudflare
  labels:
    dns-target: cloudflare
spec:
  endpoints:
    - dnsName: "${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "keiretsu.cdn.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "true"
    - dnsName: "www.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "keiretsu.cdn.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "true"
    - dnsName: "auth.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "ottawa.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    - dnsName: "hello.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "hello.cdn.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    - dnsName: "home.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "home.cdn.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    - dnsName: "home.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "home.cdn.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    - dnsName: "forgejo.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "forgejo.cdn.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    - dnsName: "pocket-id.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "pocket-id.cdn.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    # bhaiya admin console + per-workspace opencode instances live ONLY in
    # ottawa, so point straight at the ottawa edge (one healthy WAN IP) instead
    # of the k8gb cdn GSLB — the GSLB hands back a second, broken WAN edge that
    # 404s ~50% of requests. The *.bhaiya wildcard backs <slug>.bhaiya.keiretsu.top
    # workspace URLs (ExposeRoute creates the per-workspace HTTPRoutes).
    - dnsName: "bhaiya.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "ottawa.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    - dnsName: "*.bhaiya.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "ottawa.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    # ACME challenge delegation for the *.bhaiya wildcard cert. PROBLEM: the
    # _acme-challenge.bhaiya record falls UNDER the *.bhaiya wildcard above, so a
    # bare DNS-01 challenge name resolves to a (wildcard) CNAME → cert-manager's
    # Cloudflare zone-detection chokes ("Found no Zones"; a clean non-wildcarded
    # name issues in 40s — verified). FIX: an EXPLICIT CNAME at the challenge name
    # (explicit beats wildcard) delegating to a clean apex-level name. The issuer's
    # cnameStrategy:Follow then follows this to _acme-challenge-bhaiya (in the
    # keiretsu.top zone, no wildcard) and writes the TXT there; LE follows the same
    # CNAME to read it. _acme-challenge-bhaiya itself needs no record — cert-manager
    # creates the TXT on it at solve time.
    - dnsName: "_acme-challenge.bhaiya.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "_acme-challenge-bhaiya.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    - dnsName: "velero.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "velero.cdn.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    - dnsName: "oci.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "oci.cdn.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    - dnsName: "zot.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "zot.cdn.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    - dnsName: "status.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "status.cdn.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    - dnsName: "s3.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "s3.cdn.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    - dnsName: "tailscale-logs.s3.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "s3.cdn.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    # multi-tenant hermes agents: every <group>.agents.${COMMON_DOMAIN} lands on
    # the ottawa public gateway (per-group HTTPRoute + OIDC). one wildcard covers
    # all groups; DNS-only (proxied=false) so the *.agents wildcard cert is served
    # at origin (cloudflare universal TLS does not cover the second-level wildcard).
    - dnsName: "*.agents.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "ottawa.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    - dnsName: "*.hermes.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "ottawa.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
