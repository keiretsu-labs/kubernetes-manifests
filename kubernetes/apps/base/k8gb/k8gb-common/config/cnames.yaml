---
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: keiretsu-top-cnames
  namespace: cloudflare
  labels:
    dns-target: cloudflare
spec:
  endpoints:
    - dnsName: "${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "keiretsu.cdn.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "true"
    - dnsName: "www.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "keiretsu.cdn.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "true"
    - dnsName: "auth.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "ottawa.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    - dnsName: "hello.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "hello.cdn.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    - dnsName: "home.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "home.cdn.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    - dnsName: "home.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "home.cdn.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    - dnsName: "forgejo.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "forgejo.cdn.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    - dnsName: "pocket-id.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "pocket-id.cdn.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    # bhaiya admin console + per-workspace opencode instances live ONLY in
    # ottawa, so point straight at the ottawa edge (one healthy WAN IP) instead
    # of the k8gb cdn GSLB — the GSLB hands back a second, broken WAN edge that
    # 404s ~50% of requests. The *.bhaiya wildcard backs <slug>.bhaiya.keiretsu.top
    # workspace URLs (ExposeRoute creates the per-workspace HTTPRoutes).
    - dnsName: "bhaiya.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "ottawa.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    # A record, NOT a CNAME, on purpose. A wildcard CNAME here shadows
    # _acme-challenge.bhaiya.${COMMON_DOMAIN} and breaks DNS-01 issuance of the
    # *.bhaiya wildcard cert: cert-manager (cnameStrategy: Follow) chases the
    # wildcard CNAME and fails to locate the zone for the challenge. A wildcard A
    # record does not answer CNAME queries, so cert-manager writes the TXT
    # directly at _acme-challenge.bhaiya, and that explicit record shadows the
    # wildcard for just that name. Target is the ottawa edge (== ottawa.${COMMON_DOMAIN}).
    - dnsName: "*.bhaiya.${COMMON_DOMAIN}"
      recordType: A
      targets:
        - "76.71.101.187"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    - dnsName: "velero.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "velero.cdn.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    - dnsName: "oci.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "oci.cdn.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    - dnsName: "zot.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "zot.cdn.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    - dnsName: "status.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "status.cdn.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    - dnsName: "s3.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "s3.cdn.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    - dnsName: "tailscale-logs.s3.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "s3.cdn.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    # multi-tenant hermes agents: every <group>.agents.${COMMON_DOMAIN} lands on
    # the ottawa public gateway (per-group HTTPRoute + OIDC). one wildcard covers
    # all groups; DNS-only (proxied=false) so the *.agents wildcard cert is served
    # at origin (cloudflare universal TLS does not cover the second-level wildcard).
    - dnsName: "*.agents.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "ottawa.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    - dnsName: "*.hermes.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "ottawa.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
