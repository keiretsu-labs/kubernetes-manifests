---
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: keiretsu-top-cnames
  namespace: cloudflare
  labels:
    dns-target: cloudflare
spec:
  endpoints:
    - dnsName: "${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "keiretsu.cdn.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "true"
    - dnsName: "www.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "keiretsu.cdn.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "true"
    - dnsName: "auth.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "ottawa.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    - dnsName: "hello.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "hello.cdn.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    - dnsName: "home.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "home.cdn.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    - dnsName: "home.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "home.cdn.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    - dnsName: "forgejo.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "forgejo.cdn.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    # bhaiya admin console + per-workspace opencode instances live ONLY in
    # ottawa, so point straight at the ottawa edge (one healthy WAN IP) instead
    # of the k8gb cdn GSLB — the GSLB hands back a second, broken WAN edge that
    # 404s ~50% of requests. The *.bhaiya wildcard lives in keiretsu-top-wildcards
    # (below) because UniFi's static-DNS API rejects wildcard hostnames.
    - dnsName: "bhaiya.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "ottawa.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    - dnsName: "velero.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "velero.cdn.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    - dnsName: "oci.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "oci.cdn.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    - dnsName: "status.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "status.cdn.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    - dnsName: "s3.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "s3.cdn.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    - dnsName: "tailscale-logs.s3.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "s3.cdn.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    # teslamate behind tinyauth on the public envoy gateway — same domain family
    - dnsName: "teslamate.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "ottawa.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    # multi-tenant hermes agents: every <group>.agents.${COMMON_DOMAIN} lands on
    # the ottawa public gateway (per-group HTTPRoute + OIDC). one wildcard covers
    # all groups; DNS-only (proxied=false) so the *.agents wildcard cert is served
    # at origin (cloudflare universal TLS does not cover the second-level wildcard).
    - dnsName: "litellm.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "ottawa.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    - dnsName: "woodpecker.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "ottawa.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    - dnsName: "infisical.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "ottawa.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    # frigate NVR behind tinyauth on the public envoy gateway
    - dnsName: "frigate.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "ottawa.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    - dnsName: "frigate.${LOCATION}.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "ottawa.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
---
# Wildcard CNAMEs that only Cloudflare can serve. UniFi's static-DNS API rejects
# wildcard hostnames (400 Invalid Hostname), so these are isolated under a
# dedicated DNSEndpoint tagged dns-scope=public-only. external-dns-unifi uses
# --label-filter=dns-scope!=public-only to skip this object entirely, while
# external-dns-cloudflare (--label-filter=dns-target==cloudflare) still picks
# it up. Add any future wildcard CNAMEs here — no other changes needed.
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: keiretsu-top-wildcards
  namespace: cloudflare
  labels:
    dns-target: cloudflare
    dns-scope: public-only
spec:
  endpoints:
    - dnsName: "*.bhaiya.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "ottawa.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    - dnsName: "*.agents.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "ottawa.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    - dnsName: "*.hermes.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "ottawa.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    # per-location wildcard: *.ottawa.keiretsu.top → ottawa.keiretsu.top, etc.
    # each cluster manages its own entry via ${LOCATION} substitution
    - dnsName: "*.${LOCATION}.${COMMON_DOMAIN}"
      recordType: CNAME
      targets:
        - "${LOCATION}.${COMMON_DOMAIN}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
