---
# bhaiya admin console. bhaiya is ottawa-only, so DNS points straight at the
# ottawa edge (CNAME in cnames.yaml) — no k8gb GSLB, which handed back a broken
# second WAN edge that 404'd ~50% of requests. Access is gated by tinyauth to
# raj + kartik only. The route lives in keiretsu-top (where the apex hostnames
# and tinyauth ReferenceGrant already are); per-workspace routes are created in
# the bhaiya namespace by ExposeRoute.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: bhaiya-cdn
  namespace: keiretsu-top
  annotations:
    item.homer.rajsingh.info/name: "Bhaiya"
    item.homer.rajsingh.info/subtitle: "Sandbox Control Plane"
    item.homer.rajsingh.info/keywords: "sandbox, workspace, control-plane"
    service.homer.rajsingh.info/name: "Infrastructure"
    service.homer.rajsingh.info/icon: "fas fa-cubes"
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: public
      namespace: home
  hostnames:
    - "bhaiya.${COMMON_DOMAIN}"
  rules:
    - backendRefs:
        - name: bhaiya
          namespace: bhaiya
          port: 80
      matches:
        - path:
            type: PathPrefix
            value: /
---
# admin console access control via tinyauth — raj + kartik only.
# tinyauth does authN (Google login, injects Remote-Email); this policy's
# authorization block is the per-user authZ gate.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: bhaiya-tinyauth
  namespace: keiretsu-top
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: bhaiya-cdn
  extAuth:
    headersToExtAuth:
      - cookie
      - x-forwarded-proto
      - x-forwarded-for
      - user-agent
    http:
      backendRefs:
        - name: tinyauth
          namespace: tinyauth
          port: 3000
      path: "/api/auth/envoy?path="
      headersToBackend:
        - remote-user
        - remote-email
        - remote-name
        - remote-groups
  authorization:
    defaultAction: Deny
    rules:
      - name: allow-admins
        action: Allow
        principal:
          headers:
            - name: Remote-Email
              values:
                - rajsinghcpre@gmail.com
                - kartikbharath@gmail.com
