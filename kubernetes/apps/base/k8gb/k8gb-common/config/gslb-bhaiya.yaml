---
# bhaiya admin console. bhaiya is ottawa-only, so DNS points straight at the
# ottawa edge (CNAME in cnames.yaml) — no k8gb GSLB, which handed back a broken
# second WAN edge that 404'd ~50% of requests. Access is gated by tinyauth
# (authN only); bhaiya's in-process users table handles authZ (admin/member
# roles, managed via the bhaiya admin UI). The route lives in keiretsu-top
# (where the apex hostnames and tinyauth ReferenceGrant already are);
# per-workspace routes are created in the bhaiya namespace by ExposeRoute.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: bhaiya-cdn
  namespace: keiretsu-top
  annotations:
    item.homer.rajsingh.info/name: "Bhaiya"
    item.homer.rajsingh.info/subtitle: "Sandbox Control Plane"
    item.homer.rajsingh.info/keywords: "sandbox, workspace, control-plane"
    service.homer.rajsingh.info/name: "Infrastructure"
    service.homer.rajsingh.info/icon: "fas fa-cubes"
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: public
      namespace: home
  hostnames:
    - "bhaiya.${COMMON_DOMAIN}"
  rules:
    - backendRefs:
        - name: bhaiya
          namespace: bhaiya
          port: 80
      matches:
        - path:
            type: PathPrefix
            value: /
---
# admin console access control via tinyauth. tinyauth does authN (Google login,
# injects Remote-Email); bhaiya does its own authZ in-process against its users
# table (admin/member roles, per-owner workspace caps). No EG authorization
# block here — bhaiya returns 403 itself for unregistered users. Per-workspace
# routes (created by ExposeRoute) keep their own SecurityPolicy with owner +
# AllowedEmails + admin email authorization.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: bhaiya-tinyauth
  namespace: keiretsu-top
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: bhaiya-cdn
  extAuth:
    headersToExtAuth:
      - cookie
      - x-forwarded-proto
      - x-forwarded-for
      - user-agent
    http:
      backendRefs:
        - name: tinyauth
          namespace: tinyauth
          port: 3000
      path: "/api/auth/envoy?path="
      headersToBackend:
        - remote-user
        - remote-email
        - remote-name
        - remote-groups
