---
# Webhook token for the bhaiya Flux Receiver.
# The CI runner (in-cluster) uses this token + SHA256 HMAC to
# trigger immediate reconciliation of ImageRepository,
# ImageUpdateAutomation, and Kustomization after a tag push.
apiVersion: v1
kind: Secret
metadata:
  name: bhaiya-webhook-token
  namespace: flux-system
stringData:
  token: ${BHAIYA_FLUX_WEBHOOK_TOKEN}
  # NOTE: After applying this secret, set the matching token in Forgejo
  # as a CI secret named BHAIYA_FLUX_WEBHOOK_TOKEN.
  # The token that pairs with this deploy is:
  # 8f9467cd3d09f34c31b55f5e6c6f99a4afe0247664c28478f17fe9444a3de299
  # This is NOT in SOPS because the token value comes from the cluster
  # secret substitution (${BHAIYA_FLUX_WEBHOOK_TOKEN}) which is already
  # stored encrypted in cluster-secrets.
