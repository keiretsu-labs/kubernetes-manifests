---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: bhaiya-platform
  namespace: bhaiya
  labels:
    app.kubernetes.io/name: bhaiya
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    count/services: "200"
    count/secrets: "200"
    # Hard GPU deny: workspace sandboxes are untrusted (gVisor) and must never
    # land on a GPU node. A zero quota rejects any pod that requests a GPU.
    requests.nvidia.com/gpu: "0"
