---
# bhaiya needs to create/manage Velero backups and schedules. Velero runs in
# velero-system, which is a different namespace from bhaiya's own Role, so we
# need a separate Role + RoleBinding there.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: bhaiya-velero
  namespace: velero-system
  labels:
    app.kubernetes.io/name: bhaiya
rules:
  - apiGroups: [velero.io]
    resources: [backups, schedules, restores]
    verbs: [create, get, list, watch, delete, patch, update]
  - apiGroups: [velero.io]
    resources: [backupstoragelocations]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bhaiya-velero
  namespace: velero-system
  labels:
    app.kubernetes.io/name: bhaiya
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: bhaiya-velero
subjects:
  - kind: ServiceAccount
    name: bhaiya
    namespace: bhaiya
