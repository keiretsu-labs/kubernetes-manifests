---
# allow the bhaiya-cdn HTTPRoute (keiretsu-top ns, k8gb GSLB) to backend the
# bhaiya Service. The route + tinyauth SecurityPolicy live in keiretsu-top so
# the Gslb can reference them same-namespace (see k8gb-common/config/gslb-bhaiya.yaml).
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: bhaiya-cdn
  namespace: bhaiya
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: keiretsu-top
  to:
    - group: ""
      kind: Service
      name: bhaiya
