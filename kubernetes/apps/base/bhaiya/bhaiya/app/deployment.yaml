---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bhaiya
  namespace: bhaiya
  labels:
    app.kubernetes.io/name: bhaiya
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: bhaiya
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bhaiya
    spec:
      serviceAccountName: bhaiya
      automountServiceAccountToken: true
      # distroless:nonroot runs as uid/gid 65532. fsGroup makes the (root-owned)
      # ceph-block PV writable so SQLite can create /data/bhaiya.db.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
        - name: bhaiya
          image: oci.cdn.keiretsu.top/corp/bhaiya:0.5.11 # {"$imagepolicy": "bhaiya:bhaiya"}
          imagePullPolicy: Always
          ports:
            - name: grpc-web
              containerPort: 8080
              protocol: TCP
          env:
            - name: BHAIYA_ADDR
              value: ":8080"
            - name: BHAIYA_DB_PATH
              value: /data/bhaiya.db
            - name: BHAIYA_FORGEJO_TOKEN
              valueFrom:
                secretKeyRef:
                  name: bhaiya-forgejo-token
                  key: BHAIYA_FORGEJO_TOKEN
            - name: BHAIYA_FORGEJO_API_URL
              value: "https://forgejo.keiretsu.top/api/v1"
            # The app default (amazon/aws-cli:2) isn't resolvable from this
            # cluster's registry path; AWS public ECR is anonymous-pullable and
            # avoids docker.io. Used by the sandbox S3 sync init/sidecar.
            - name: BHAIYA_GARAGE_SYNC_IMAGE
              value: "public.ecr.aws/aws-cli/aws-cli:latest"
            - name: BHAIYA_MIMIR_URL
              value: "http://mimir-gateway.mimir.svc.cluster.local:8080"
            - name: BHAIYA_MIMIR_TENANT
              value: "talos-ottawa"
            - name: BHAIYA_LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: bhaiya-litellm
                  key: master_key
            # Velero lives in velero-system with a BSL named "garage" (not the app
            # defaults velero/default) — without these, all backup ops hit a
            # nonexistent namespace/BSL and silently fail.
            - name: BHAIYA_VELERO_NAMESPACE
              value: "velero-system"
            - name: BHAIYA_VELERO_STORAGE_LOCATION
              value: "garage"
            # Default opencode model: the LiteLLM proxy serves deepseek-v4-flash
            # (+ anthropic/*). Without this the autoconfig picks the first discovered
            # id alphabetically (anthropic/*), which is a glob, not a usable default.
            - name: BHAIYA_LITELLM_MODEL
              value: "deepseek-v4-flash"
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: bhaiya-data
