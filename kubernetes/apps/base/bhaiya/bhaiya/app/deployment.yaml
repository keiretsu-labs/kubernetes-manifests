---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bhaiya
  namespace: bhaiya
  labels:
    app.kubernetes.io/name: bhaiya
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: bhaiya
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bhaiya
    spec:
      serviceAccountName: bhaiya
      automountServiceAccountToken: true
      # distroless:nonroot runs as uid/gid 65532. fsGroup makes the (root-owned)
      # ceph-block PV writable so SQLite can create /data/bhaiya.db.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
        - name: bhaiya
          image: oci.cdn.keiretsu.top/corp/bhaiya@sha256:ce4a1fc982c7d7e9b3926f11314b53136f04abdf02758894a8fdf731d5eb8b20 # {"$imagepolicy": "bhaiya:bhaiya"}
          imagePullPolicy: Always
          ports:
            - name: grpc-web
              containerPort: 8080
              protocol: TCP
          env:
            - name: BHAIYA_ADDR
              value: ":8080"
            - name: BHAIYA_DB_PATH
              value: /data/bhaiya.db
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: bhaiya-data
