apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: bhaiya-keiretsu-top
  namespace: bhaiya
spec:
  secretName: bhaiya-keiretsu-top-tls
  commonName: bhaiya.keiretsu.top
  dnsNames:
    - bhaiya.keiretsu.top
    - "*.bhaiya.keiretsu.top"
  issuerRef:
    name: cloudflare-cluster-issuer
    kind: ClusterIssuer
  secretTemplate:
    labels:
      app.kubernetes.io/name: bhaiya
