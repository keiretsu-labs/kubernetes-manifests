---
# Flux Receiver for bhaiya CI's post-build webhook trigger.
# The CI runner (in-cluster, forgejo namespace) curls this after
# pushing a new image tag, forcing the ImageRepository and
# ImageUpdateAutomation to reconcile immediately instead of
# waiting for their 1m polling interval.
#
# The webhook path is auto-generated from (name, namespace, token hash).
# The token is stored as a cluster-secret (common to both clusters
# running bhaiya).
apiVersion: notification.toolkit.fluxcd.io/v1
kind: Receiver
metadata:
  name: bhaiya
  namespace: flux-system
spec:
  type: generic-hmac
  secretRef:
    name: bhaiya-webhook-token
  resources:
    - kind: ImageRepository
      name: bhaiya
    - kind: ImageUpdateAutomation
      name: bhaiya
    - kind: Kustomization
      name: bhaiya
