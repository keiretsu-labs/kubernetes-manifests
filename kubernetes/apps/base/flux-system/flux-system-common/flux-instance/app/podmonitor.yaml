---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: flux-controllers
  labels:
    app.kubernetes.io/part-of: flux
    app.kubernetes.io/component: monitoring
spec:
  namespaceSelector:
    matchNames:
      - flux-system
  selector:
    matchExpressions:
      - key: app.kubernetes.io/component
        operator: In
        values:
          - helm-controller
          - source-controller
          - kustomize-controller
          - notification-controller
  podMetricsEndpoints:
    - honorLabels: true
      port: http-prom
      # gotk_reconcile_duration_seconds_bucket (~3.2k series) is unused by the
      # flux dashboards — they use gotk_reconcile_duration_seconds_count, which
      # (and gotk_resource_info, a kromgo badge) are deliberately kept.
      metricRelabelings:
        - action: drop
          sourceLabels: [__name__]
          regex: gotk_reconcile_duration_seconds_bucket
