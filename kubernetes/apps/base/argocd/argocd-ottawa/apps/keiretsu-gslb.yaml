---
# ApplicationSet for Keiretsu GSLB — deploys GSLBEndpoint to clusters running k8gb
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: keiretsu-gslb
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  has-gslb: "true"
              values:
                location: '{{ index .metadata.labels "location" }}'
          - git:
              repoURL: https://github.com/keiretsu-labs/kubernetes-manifests
              revision: HEAD
              directories:
                - path: clusters/apps/*/gslb
  template:
    metadata:
      name: 'gslb-{{index .path.segments 2}}-{{.name}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/keiretsu-labs/kubernetes-manifests
        targetRevision: HEAD
        path: "{{.path.path}}"
        kustomize:
          commonLabels:
            keiretsu.ts.net/location: '{{.values.location}}'
      destination:
        name: "{{.name}}"
        namespace: '{{index .path.segments 2}}'
      ignoreDifferences:
        - group: network.keiretsu.ts.net
          kind: GSLBEndpoint
          managedFieldsManagers:
            - kro
            - kro.run/labeller
            - kro.run/applyset
            - kro.run/applyset-parent
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
