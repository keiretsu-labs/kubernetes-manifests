---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frigate
  namespace: home
  annotations:
    item.homer.rajsingh.info/name: "Frigate"
    item.homer.rajsingh.info/subtitle: "NVR"
    item.homer.rajsingh.info/logo: "https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/svg/frigate.svg"
    item.homer.rajsingh.info/keywords: "nvr, cameras, surveillance, protect"
    service.homer.rajsingh.info/name: "Home"
    service.homer.rajsingh.info/icon: "fas fa-video"
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: public
      namespace: home
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: private
      namespace: home
  hostnames:
    - "frigate.${COMMON_DOMAIN}"
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: frigate
          port: 5000
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frigate-ts
  annotations:
    item.homer.rajsingh.info/name: "Frigate"
    item.homer.rajsingh.info/subtitle: "NVR"
    item.homer.rajsingh.info/logo: "https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/svg/frigate.svg"
    item.homer.rajsingh.info/keywords: "nvr, cameras, surveillance, protect"
    service.homer.rajsingh.info/name: "Home"
    service.homer.rajsingh.info/icon: "fas fa-video"
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: ts
      namespace: home
  hostnames:
    - "frigate.${LOCATION}.${CLUSTER_DOMAIN}"
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: frigate
          port: 5000
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
