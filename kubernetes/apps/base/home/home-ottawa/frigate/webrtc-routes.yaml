---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata:
  name: frigate-webrtc-tcp
  namespace: home
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: public
      namespace: home
      sectionName: webrtc-tcp
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: frigate
          port: 8555
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: UDPRoute
metadata:
  name: frigate-webrtc-udp
  namespace: home
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: public
      namespace: home
      sectionName: webrtc-udp
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: frigate
          port: 8555
