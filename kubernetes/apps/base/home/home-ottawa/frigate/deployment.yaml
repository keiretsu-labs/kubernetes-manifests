---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frigate
  namespace: home
  labels:
    app: frigate
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: frigate
  template:
    metadata:
      labels:
        app: frigate
      annotations:
        reload-trigger: "2026-07-03-reseed-basement"
    spec:
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: frigate-gpu
      initContainers:
        - name: seed-config
          image: ghcr.io/blakeblackshear/frigate:stable-rocm
          command:
            - sh
            - -c
            - |
              set -e
              cp -f /config-template/config.yml /config/config.yml
              mkdir -p /config/model_cache /config/exports /config/recordings
          volumeMounts:
            - name: config
              mountPath: /config
            - name: config-template
              mountPath: /config-template
      containers:
        - name: frigate
          image: ghcr.io/blakeblackshear/frigate:stable-rocm
          resources:
            claims:
              - name: gpu
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              memory: 8Gi
          env:
            - name: TZ
              value: ${TIMEZONE}
            - name: LIBVA_DRIVER_NAME
              value: radeonsi
            - name: GO2RTC_ALLOW_ARBITRARY_EXEC
              value: "true"
          ports:
            - containerPort: 5000
              name: http
            - containerPort: 8554
              name: rtsp
            - containerPort: 8555
              name: webrtc-tcp
              protocol: TCP
            - containerPort: 8555
              name: webrtc-udp
              protocol: UDP
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /media/frigate
            - name: dshm
              mountPath: /dev/shm
            - name: cache
              mountPath: /tmp/cache
        - name: talkback-keepalive
          image: ghcr.io/blakeblackshear/frigate:stable-rocm
          command:
            - /bin/sh
            - -c
            - |
              set -u
              while true; do
                CAMERAS=$(curl -ks -X GET "https://$${UNIFI_PROTECT_HOST}/proxy/protect/integration/v1/cameras" \
                  -H "X-API-KEY: $${UNIFI_PROTECT_API_KEY}" -H "Accept: application/json" \
                  | jq -r '.[] | "\(.id) \(.name)"')
                if [ -z "$${CAMERAS}" ]; then
                  echo "$(date -u +%FT%TZ) ERROR: no cameras returned from Protect API"
                else
                  echo "$${CAMERAS}" | while read -r CAM_ID CAM_NAME; do
                    [ -z "$${CAM_ID}" ] && continue
                    RESP=$(curl -ks -X POST "https://$${UNIFI_PROTECT_HOST}/proxy/protect/integration/v1/cameras/$${CAM_ID}/talkback-session" \
                      -H "X-API-KEY: $${UNIFI_PROTECT_API_KEY}" -H "Accept: application/json")
                    echo "$(date -u +%FT%TZ) talkback-session $${CAM_NAME} ($${CAM_ID}): $${RESP}"
                  done
                fi
                sleep 300
              done
          env:
            - name: UNIFI_PROTECT_HOST
              value: "192.168.169.1"
            - name: UNIFI_PROTECT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: frigate-unifi-talkback
                  key: UNIFI_PROTECT_API_KEY
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
      restartPolicy: Always
      terminationGracePeriodSeconds: 60
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: frigate-config
        - name: config-template
          configMap:
            name: frigate-config
        - name: media
          emptyDir:
            sizeLimit: 1Gi
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
        - name: cache
          emptyDir:
            sizeLimit: 5Gi
