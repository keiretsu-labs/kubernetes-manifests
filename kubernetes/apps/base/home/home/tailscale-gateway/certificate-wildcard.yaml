---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-killinit-cc
spec:
  dnsNames:
    - '*.killinit.cc'
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: killinit-cc
  secretName: wildcard-killinit-cc
  usages:
    - digital signature
    - key encipherment
