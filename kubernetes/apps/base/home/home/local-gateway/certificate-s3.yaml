---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-s3-keiretsu-top
spec:
  dnsNames:
    - '*.s3.keiretsu.top'
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: keiretsu-top
  secretName: wildcard-s3-keiretsu-top
  usages:
    - digital signature
    - key encipherment
