---
# Wildcard cert for per-workspace opencode instances: <slug>.bhaiya.keiretsu.top.
# bhaiya's ExposeRoute creates an HTTPRoute per workspace under this domain; the
# *.bhaiya listener on the public gateway terminates TLS with this secret.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-bhaiya-${COMMON_DOMAIN//./-}
spec:
  # Both the apex and the wildcard (spec §5). Adding the apex SAN also changes the
  # "exact identifier set", which sidesteps LE's duplicate-certificate rate limit
  # that our earlier failed-DNS retries tripped on the wildcard-only set. Both SANs
  # validate through the same _acme-challenge.bhaiya delegation CNAME.
  dnsNames:
    - 'bhaiya.${COMMON_DOMAIN}'
    - '*.bhaiya.${COMMON_DOMAIN}'
  # Shared Follow issuer — it follows the explicit _acme-challenge.bhaiya
  # delegation CNAME (see cnames.yaml) to a clean apex name and validates there.
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: keiretsu-top
  secretName: wildcard-bhaiya-${COMMON_DOMAIN//./-}
  usages:
    - digital signature
    - key encipherment
