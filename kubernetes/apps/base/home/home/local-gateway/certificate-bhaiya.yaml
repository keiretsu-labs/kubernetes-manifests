---
# Wildcard cert for per-workspace opencode instances: <slug>.bhaiya.keiretsu.top.
# bhaiya's ExposeRoute creates an HTTPRoute per workspace under this domain; the
# *.bhaiya listener on the public gateway terminates TLS with this secret.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-bhaiya-${COMMON_DOMAIN//./-}
spec:
  dnsNames:
    - '*.bhaiya.${COMMON_DOMAIN}'
  # keiretsu-top-direct = no cnameStrategy:Follow — the shared issuer's Follow
  # chases the *.bhaiya serving CNAME and fails DNS-01 zone detection.
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: keiretsu-top-direct
  secretName: wildcard-bhaiya-${COMMON_DOMAIN//./-}
  usages:
    - digital signature
    - key encipherment
