---
# Wildcard cert for per-workspace opencode instances: <slug>.bhaiya.keiretsu.top.
# bhaiya's ExposeRoute creates an HTTPRoute per workspace under this domain; the
# *.bhaiya listener on the public gateway terminates TLS with this secret.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-bhaiya-${COMMON_DOMAIN//./-}
spec:
  # Both the apex and the wildcard. Adding the apex SAN changes the "exact
  # identifier set", sidestepping LE's duplicate-certificate rate limit.
  # DNS-01 validation: cert-manager follows the wildcard CNAME
  # *.bhaiya.keiretsu.top → ottawa.keiretsu.top and places the TXT there.
  dnsNames:
    - 'bhaiya.${COMMON_DOMAIN}'
    - '*.bhaiya.${COMMON_DOMAIN}'
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: keiretsu-top
  secretName: wildcard-bhaiya-${COMMON_DOMAIN//./-}
  usages:
    - digital signature
    - key encipherment
