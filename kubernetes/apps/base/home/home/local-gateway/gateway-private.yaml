---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: private
  labels:
    external-dns: private
    gateway: private
spec:
  gatewayClassName: private
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    - name: wildcard-killinit-cc-https
      protocol: HTTPS
      port: 443
      hostname: "*.killinit.cc"
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        certificateRefs:
        - group: ''
          kind: Secret
          name: wildcard-killinit-cc
    - name: wildcard-lukehouge-com-https
      protocol: HTTPS
      port: 443
      hostname: "*.lukehouge.com"
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        certificateRefs:
        - group: ''
          kind: Secret
          name: wildcard-lukehouge-com
    - name: wildcard-rajsingh-info-https
      protocol: HTTPS
      port: 443
      hostname: "*.rajsingh.info"
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        certificateRefs:
        - group: ''
          kind: Secret
          name: wildcard-rajsingh-info
    - name: wildcard-keiretsu-top-https
      protocol: HTTPS
      port: 443
      hostname: "*.keiretsu.top"
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        certificateRefs:
        - group: ''
          kind: Secret
          name: wildcard-keiretsu-top
    - name: forgejo-ssh
      protocol: TCP
      port: 22
      allowedRoutes:
        kinds:
        - kind: TCPRoute
        namespaces:
          from: All
    