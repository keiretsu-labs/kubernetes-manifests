---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: wildcard-lan
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: public
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: private
  clientIPDetection:
    xForwardedFor:
      numTrustedHops: 1
  timeout:
    http:
      requestReceivedTimeout: 0s 
      idleTimeout: 3600s
      streamIdleTimeout: 900s
  headers:
    requestID: PreserveOrGenerate
    # Do NOT blanket-set Cache-Control here. addIfAbsent caches every response
    # whose backend doesn't send its own — which silently cached tinyauth's
    # OAuth init and broke login. Routes that want caching set it per-route
    # (garage-web, cdn-site, agent web UIs, plex).
  http2:
    initialStreamWindowSize: 64Ki 
    initialConnectionWindowSize: 1Mi 
    maxConcurrentStreams: 100