# home.keiretsu.top access control via tinyauth.
# tinyauth does authN only (google login, injects remote-email); the per-user
# authorization decision lives in this policy's authorization block. EG's RBAC
# filter runs after extAuth, so it matches on the header tinyauth injects.
# The Python app reads Remote-Email for display personalization (trusts the
# gateway — the header is only set by Envoy after successful extAuth).
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: homepage-tinyauth
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: homepage
  extAuth:
    headersToExtAuth:
      - cookie
      - x-forwarded-proto
      - x-forwarded-for
      - user-agent
    http:
      backendRefs:
        - name: tinyauth
          namespace: tinyauth
          port: 3000
      path: "/api/auth/envoy?path="
      headersToBackend:
        - remote-user
        - remote-email
        - remote-name
        - remote-groups
  authorization:
    defaultAction: Deny
    rules:
      - name: allow-raj
        action: Allow
        principal:
          headers:
            - name: Remote-Email
              values:
                - rajsinghcpre@gmail.com
      - name: allow-kartik
        action: Allow
        principal:
          headers:
            - name: Remote-Email
              values:
                - kartikbharath@gmail.com