apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: home
resources:
  - ./deployment.yaml
  - ./service.yaml
  - ./httproute.yaml
  - ./securitypolicy.yaml
configMapGenerator:
  - name: homepage-app
    files:
      - server.py
  - name: homepage-config
    files:
      - users.json
      - style.css