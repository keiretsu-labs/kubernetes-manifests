---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
spec:
  interval: 30m
  chart:
    spec:
      chart: immich
      version: 0.12.0
      sourceRef:
        kind: HelmRepository
        name: immich
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: false
    remediation:
      retries: 3
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/immich-app/immich-server
              tag: v3.0.1
            command:
              - /bin/sh
              - -c
              - |
                node -e "
                const fs=require('fs');
                let c=fs.readFileSync('/usr/src/app/server/dist/repositories/database.repository.js','utf8');
                c=c.replace(
                  'async acquireLock(lock, connection) {\n        await (0, kysely_1.sql) \`SELECT pg_advisory_lock(\${lock})\`.execute(connection);',
                  'async acquireLock(lock, connection) {\n        while(true){const{rows}=await(0,kysely_1.sql)\`SELECT pg_try_advisory_lock(\${lock})\`.execute(connection);if(rows[0].pg_try_advisory_lock)break;await new Promise(r=>setTimeout(r,100))}'
                );
                fs.writeFileSync('/usr/src/app/server/dist/repositories/database.repository.js',c);
                "
                exec /usr/src/app/server/bin/start.sh
            resources:
              requests:
                cpu: "2"
                memory: 4Gi
              limits:
                cpu: "8"
                memory: 8Gi
            env:
              DB_DATABASE_NAME: immich
              DB_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-postgres-app
                    key: username
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: immich-postgres-app
                    key: password
              DB_HOSTNAME: immich-postgres-rw
              REDIS_HOSTNAME: dragonfly-immich
              REDIS_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: immich-dragonfly-secret
                    key: password
    immich:
      metrics:
        enabled: true
      persistence:
        library:
          existingClaim: immich-library
    valkey:
      enabled: false
    server:
      persistence:
        pics:
          enabled: true
          existingClaim: immich-pics
          globalMounts:
            - path: /pics
              readOnly: true
      controllers:
        main:
          strategy: Recreate
          containers:
            main:
              env:
                DB_DATABASE_NAME: immich
                DB_USERNAME:
                  valueFrom:
                    secretKeyRef:
                      name: immich-postgres-app
                      key: username
                DB_PASSWORD:
                  valueFrom:
                    secretKeyRef:
                      name: immich-postgres-app
                      key: password
                DB_HOSTNAME: immich-postgres-rw
                REDIS_HOSTNAME: dragonfly-immich
                REDIS_PASSWORD:
                  valueFrom:
                    secretKeyRef:
                      name: immich-dragonfly-secret
                      key: password
    machine-learning:
      controllers:
        main:
          containers:
            main:
              env:
                DB_DATABASE_NAME: immich
                DB_USERNAME:
                  valueFrom:
                    secretKeyRef:
                      name: immich-postgres-app
                      key: username
                DB_PASSWORD:
                  valueFrom:
                    secretKeyRef:
                      name: immich-postgres-app
                      key: password
                DB_HOSTNAME: immich-postgres-rw
                REDIS_HOSTNAME: dragonfly-immich
                REDIS_PASSWORD:
                  valueFrom:
                    secretKeyRef:
                      name: immich-dragonfly-secret
                      key: password
