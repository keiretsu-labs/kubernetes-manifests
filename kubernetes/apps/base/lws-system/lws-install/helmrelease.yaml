---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: lws
  namespace: lws-system
spec:
  interval: 30m
  chart:
    spec:
      chart: lws
      version: "v0.9.0"
      sourceRef:
        kind: HelmRepository
        name: lws
        namespace: lws-system
      interval: 1h
  install:
    remediation:
      retries: 3
    crds: CreateReplace
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
    crds: CreateReplace
