#
# DeepSeek-V4-Flash on 2× DGX Spark — vLLM v1 engine (MTP spec-decode)
#
# Architecture  : TP=2 via PyTorch mp backend, MTP spec-decode,
#                 fp8 KV cache, LeaderWorkerSet gang scheduling.
# Image         : eugr/spark-vllm:nightly-YYYYMMDD
#                 (eugr's community standard image, 1.8k stars, vLLM + jasl fork)
#                 Pinned for Renovate auto-update — see .renovate/customManagers.json
# Model         : deepseek-ai/DeepSeek-V4-Flash-DSpark (48 shards, FP8, 79.44 GiB)
#
# Key settings:
# - --kv-cache-dtype fp8 (standard fp8, not DSpark-specific nvfp4_ds_mla)
# - --max-num-seqs 6, --max-model-len 1000000
# - --speculative-config method=mtp (standard MTP, not DSpark)
# - --distributed-executor-backend mp (no Ray dependency)
# - --enable-chunked-prefill, --enable-prefix-caching
# - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
#
# Memory guard  : 93Gi Guaranteed QoS, drop-caches init + loop sidecar,
#                 GPU reset at startup.
#                 fp8 KV: ~800K ctx fits (6.53 GiB KV avail).
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dsv4-download-script
  namespace: ai
data:
  download-and-validate.sh: |
    #!/bin/bash
    set -euo pipefail
    MODEL_DIR="$${MODEL_DIR:-/models/dsv4}"
    HF_REPO="$${HF_REPO:-deepseek-ai/DeepSeek-V4-Flash-DSpark}"
    EXPECTED=48

    mkdir -p "$${MODEL_DIR}"
    cd "$${MODEL_DIR}"

    # Check if model is already cached on PVC — skip download if complete
    COUNT="$$(find . -maxdepth 1 -name '*.safetensors' | wc -l)"
    if [ "$${COUNT}" -ge "$${EXPECTED}" ]; then
      echo "[download] All $${EXPECTED} shards already present — skipping download."
      echo "[validate] Shard validation OK ($${COUNT}/$${EXPECTED})"
      echo "[download] Done."
      exit 0
    fi

    # Clean stale lock files from previous force-killed downloads
    echo "[download] Cleaning stale lock files…"
    rm -rf "$${MODEL_DIR}"/.cache/huggingface/download/*.lock 2>/dev/null || true

    echo "[download] Starting model download with hf CLI ($${HF_REPO})…"
    hf download "$${HF_REPO}" --local-dir "$${MODEL_DIR}" 2>&1

    echo "[validate] Checking for $${EXPECTED} shards…"
    COUNT="$$(find . -maxdepth 1 -name '*.safetensors' | wc -l)"
    echo "[validate] Found $${COUNT} shard(s)"

    if [ "$${COUNT}" -lt "$${EXPECTED}" ]; then
      echo "[ERROR] Expected $${EXPECTED} shards, got $${COUNT}. Redownloading…"
      rm -rf "$${MODEL_DIR}"/*
      hf download "$${HF_REPO}" --local-dir "$${MODEL_DIR}" 2>&1
      COUNT="$$(find . -maxdepth 1 -name '*.safetensors' | wc -l)"
      if [ "$${COUNT}" -lt "$${EXPECTED}" ]; then
        echo "[FATAL] Still only $${COUNT} shards after retry. Aborting."
        exit 1
      fi
    fi

    echo "[validate] Shard validation OK ($${COUNT}/$${EXPECTED})"
    echo "[download] Done."
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dsv4-head-models
  namespace: ai
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 200Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dsv4-worker-models
  namespace: ai
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 200Gi
---
apiVersion: leaderworkerset.x-k8s.io/v1
kind: LeaderWorkerSet
metadata:
  name: dsv4
  namespace: ai
  labels: { app: dsv4 }
spec:
  replicas: 1
  startupPolicy: LeaderCreated
  leaderWorkerTemplate:
    size: 2
    restartPolicy: RecreateGroupOnPodRestart
    # ---------- LEADER (rank 0 / API server) ----------
    leaderTemplate:
      metadata:
        labels: { app: dsv4, role: head }
      spec:
        terminationGracePeriodSeconds: 60
        hostNetwork: true
        hostIPC: true
        dnsPolicy: ClusterFirstWithHostNet
        enableServiceLinks: false
        nodeSelector: { kubernetes.io/hostname: spark-0 }
        initContainers:
        - name: drop-caches
          image: busybox:1.38
          command: [sh, -c, "echo 3 > /proc/sys/vm/drop_caches 2>/dev/null || true"]
          securityContext: { privileged: true }
          resources:
            requests: { memory: "64Mi", cpu: "100m" }
            limits: { memory: "256Mi", cpu: "500m" }
        - name: download-models
          # renovate: datasource=docker depName=eugr/spark-vllm
          image: eugr/spark-vllm:nightly-20260704
          command:
          - /bin/bash
          args:
          - /scripts/download-and-validate.sh
          env:
          - { name: MODEL_DIR, value: "/models/dsv4" }
          - { name: HUGGING_FACE_HUB_TOKEN, valueFrom: { secretKeyRef: { name: hf-secret, key: HF_TOKEN } } }
          - { name: HF_HOME, value: "/models/huggingface" }
          - { name: HF_HUB_OFFLINE, value: "0" }
          - { name: TRANSFORMERS_OFFLINE, value: "0" }
          volumeMounts:
          - { name: models, mountPath: /models }
          - { name: download-script, mountPath: /scripts }
          resources:
            requests: { memory: "4Gi", cpu: "2000m" }
            limits: { memory: "8Gi", cpu: "4000m" }
        containers:
        - name: drop-caches-loop
          image: busybox:1.38
          command: [sh, -c, "while true; do sleep 15; echo 3 > /proc/sys/vm/drop_caches 2>/dev/null || true; done"]
          securityContext: { privileged: true }
          resources:
            requests: { memory: "64Mi", cpu: "100m" }
            limits: { memory: "256Mi", cpu: "500m" }
        - name: vllm
          # renovate: datasource=docker depName=eugr/spark-vllm
          image: eugr/spark-vllm:nightly-20260704
          command: [bash, -c]
          args:
          - |
            # Drop page cache immediately before weight load
            echo 3 > /proc/sys/vm/drop_caches 2>/dev/null || true
            nvidia-smi --gpu-reset -i 0 >/dev/null 2>/dev/null || true
            echo "[vllm] Starting vLLM (eugr/spark-vllm image)…"
            exec vllm serve /models/dsv4 \
              --served-model-name deepseek-v4-flash deepseek-v4-flash-dspark vllm/deepseek-v4-flash \
              --host 0.0.0.0 --port 8000 --trust-remote-code \
              --tensor-parallel-size 2 --pipeline-parallel-size 1 \
              --distributed-executor-backend mp \
              --kv-cache-dtype fp8 --block-size 256 \
              --max-model-len 1000000 \
              --max-num-seqs 6 --max-num-batched-tokens 8192 \
              --max-cudagraph-capture-size 6 \
              --gpu-memory-utilization 0.80 \
              --enable-prefix-caching \
              --enable-flashinfer-autotune \
              --async-scheduling \
              --enable-chunked-prefill \
              --compilation-config '{"cudagraph_mode":"PIECEWISE"}' \
              --tokenizer-mode deepseek_v4 \
              --tool-call-parser deepseek_v4 --enable-auto-tool-choice \
              --reasoning-parser deepseek_v4 \
              --reasoning-config '{"reasoning_parser":"deepseek_v4","reasoning_start_str":"","reasoning_end_str":""}' \
              --default-chat-template-kwargs '{"thinking":false}' \
              --generation-config vllm \
              --speculative-config '{"method":"mtp","num_speculative_tokens":5}' \
              --nnodes 2 --node-rank 0 \
              --master-addr 192.168.74.1 --master-port 25002
          ports:
          - { containerPort: 8000, name: http, protocol: TCP }
          env:
          - { name: NODE_RANK, value: "0" }
          - { name: VLLM_HOST_IP, value: "192.168.74.1" }
          - { name: MASTER_ADDR, value: "192.168.74.1" }
          - { name: VLLM_ALLOW_LONG_MAX_MODEL_LEN, value: "1" }
          - { name: VLLM_SPARSE_INDEXER_MAX_LOGITS_MB, value: "256" }
          - { name: PYTORCH_CUDA_ALLOC_CONF, value: "expandable_segments:True" }
          - { name: NCCL_NVLS_ENABLE, value: "0" }
          - { name: VLLM_PORT, value: "25001" }
          - { name: TRANSFORMERS_OFFLINE, value: "1" }
          - { name: NCCL_SOCKET_IFNAME, value: "eth2" }
          - { name: GLOO_SOCKET_IFNAME, value: "eth2" }
          - { name: NCCL_IB_HCA, value: "mlx5_1" }
          - { name: NCCL_IB_GID_INDEX, value: "3" }
          - { name: NCCL_IB_DISABLE, value: "0" }
          - { name: NCCL_NET_GDR_LEVEL, value: "5" }
          - { name: NCCL_IB_TIMEOUT, value: "22" }
          - { name: NCCL_DEBUG, value: "WARN" }
          - { name: NCCL_CROSS_NIC, value: "1" }
          - { name: NCCL_IGNORE_CPU_AFFINITY, value: "1" }
          - { name: NCCL_CUMEM_ENABLE, value: "0" }
          - { name: HUGGING_FACE_HUB_TOKEN, valueFrom: { secretKeyRef: { name: hf-secret, key: HF_TOKEN } } }
          - { name: HF_HOME, value: "/models/huggingface" }
          - { name: VLLM_COMPILE_CACHE_DIR, value: "/models/compile-cache" }
          - { name: VLLM_CACHE_ROOT, value: "/models/vllm-cache" }
          securityContext:
            privileged: true
            capabilities:
              add: ["IPC_LOCK", "SYS_RESOURCE"]
          volumeMounts:
          - { name: models, mountPath: /models }
          - { name: shm, mountPath: /dev/shm }
          - { name: infiniband, mountPath: /dev/infiniband }
          - { name: sys-ib, mountPath: /sys/class/infiniband }
          resources:
            requests: { memory: "93Gi", cpu: "8000m", nvidia.com/gpu: "1" }
            limits: { memory: "93Gi", nvidia.com/gpu: "1" }
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 900
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 900
            periodSeconds: 15
            timeoutSeconds: 10
        volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: "64Gi"
        - name: infiniband
          hostPath: { path: /dev/infiniband, type: "" }
        - name: sys-ib
          hostPath: { path: /sys/class/infiniband, type: "" }
        - name: models
          persistentVolumeClaim: { claimName: dsv4-head-models }
        - name: download-script
          configMap:
            name: dsv4-download-script
    # ---------- WORKER (rank 1 / headless) ----------
    workerTemplate:
      metadata:
        labels: { app: dsv4, role: worker }
      spec:
        terminationGracePeriodSeconds: 60
        hostNetwork: true
        hostIPC: true
        dnsPolicy: ClusterFirstWithHostNet
        enableServiceLinks: false
        nodeSelector: { kubernetes.io/hostname: spark-1 }
        initContainers:
        - name: drop-caches
          image: busybox:1.38
          command: [sh, -c, "echo 3 > /proc/sys/vm/drop_caches 2>/dev/null || true"]
          securityContext: { privileged: true }
          resources:
            requests: { memory: "64Mi", cpu: "100m" }
            limits: { memory: "256Mi", cpu: "500m" }
        - name: download-models
          # renovate: datasource=docker depName=eugr/spark-vllm
          image: eugr/spark-vllm:nightly-20260704
          command:
          - /bin/bash
          args:
          - /scripts/download-and-validate.sh
          env:
          - { name: MODEL_DIR, value: "/models/dsv4" }
          - { name: HUGGING_FACE_HUB_TOKEN, valueFrom: { secretKeyRef: { name: hf-secret, key: HF_TOKEN } } }
          - { name: HF_HOME, value: "/models/huggingface" }
          - { name: HF_HUB_OFFLINE, value: "0" }
          - { name: TRANSFORMERS_OFFLINE, value: "0" }
          volumeMounts:
          - { name: models, mountPath: /models }
          - { name: download-script, mountPath: /scripts }
          resources:
            requests: { memory: "4Gi", cpu: "2000m" }
            limits: { memory: "8Gi", cpu: "4000m" }
        containers:
        - name: drop-caches-loop
          image: busybox:1.38
          command: [sh, -c, "while true; do sleep 15; echo 3 > /proc/sys/vm/drop_caches 2>/dev/null || true; done"]
          securityContext: { privileged: true }
          resources:
            requests: { memory: "64Mi", cpu: "100m" }
            limits: { memory: "256Mi", cpu: "500m" }
        - name: vllm
          # renovate: datasource=docker depName=eugr/spark-vllm
          image: eugr/spark-vllm:nightly-20260704
          command: [bash, -c]
          args:
          - |
            echo 3 > /proc/sys/vm/drop_caches 2>/dev/null || true
            nvidia-smi --gpu-reset -i 0 >/dev/null 2>/dev/null || true
            echo "[vllm] Starting vLLM (eugr/spark-vllm image)…"
            exec vllm serve /models/dsv4 \
              --served-model-name deepseek-v4-flash deepseek-v4-flash-dspark vllm/deepseek-v4-flash \
              --host 0.0.0.0 --port 8000 --trust-remote-code \
              --tensor-parallel-size 2 --pipeline-parallel-size 1 \
              --distributed-executor-backend mp \
              --kv-cache-dtype fp8 --block-size 256 \
              --max-model-len 1000000 \
              --max-num-seqs 6 --max-num-batched-tokens 8192 \
              --max-cudagraph-capture-size 6 \
              --gpu-memory-utilization 0.80 \
              --enable-prefix-caching \
              --enable-flashinfer-autotune \
              --async-scheduling \
              --enable-chunked-prefill \
              --compilation-config '{"cudagraph_mode":"PIECEWISE"}' \
              --tokenizer-mode deepseek_v4 \
              --tool-call-parser deepseek_v4 --enable-auto-tool-choice \
              --reasoning-parser deepseek_v4 \
              --reasoning-config '{"reasoning_parser":"deepseek_v4","reasoning_start_str":"","reasoning_end_str":""}' \
              --default-chat-template-kwargs '{"thinking":false}' \
              --generation-config vllm \
              --speculative-config '{"method":"mtp","num_speculative_tokens":5}' \
              --nnodes 2 --node-rank 1 \
              --master-addr 192.168.74.1 --master-port 25002 \
              --headless
          env:
          - { name: NODE_RANK, value: "1" }
          - { name: VLLM_HOST_IP, value: "192.168.74.2" }
          - { name: MASTER_ADDR, value: "192.168.74.1" }
          - { name: HEADLESS, value: "1" }
          - { name: VLLM_ALLOW_LONG_MAX_MODEL_LEN, value: "1" }
          - { name: VLLM_SPARSE_INDEXER_MAX_LOGITS_MB, value: "256" }
          - { name: PYTORCH_CUDA_ALLOC_CONF, value: "expandable_segments:True" }
          - { name: NCCL_NVLS_ENABLE, value: "0" }
          - { name: VLLM_PORT, value: "25001" }
          - { name: TRANSFORMERS_OFFLINE, value: "1" }
          - { name: NCCL_SOCKET_IFNAME, value: "eth2" }
          - { name: GLOO_SOCKET_IFNAME, value: "eth2" }
          - { name: NCCL_IB_HCA, value: "mlx5_1" }
          - { name: NCCL_IB_GID_INDEX, value: "3" }
          - { name: NCCL_IB_DISABLE, value: "0" }
          - { name: NCCL_NET_GDR_LEVEL, value: "5" }
          - { name: NCCL_IB_TIMEOUT, value: "22" }
          - { name: NCCL_DEBUG, value: "WARN" }
          - { name: NCCL_CROSS_NIC, value: "1" }
          - { name: NCCL_IGNORE_CPU_AFFINITY, value: "1" }
          - { name: NCCL_CUMEM_ENABLE, value: "0" }
          - { name: HUGGING_FACE_HUB_TOKEN, valueFrom: { secretKeyRef: { name: hf-secret, key: HF_TOKEN } } }
          - { name: HF_HOME, value: "/models/huggingface" }
          - { name: VLLM_COMPILE_CACHE_DIR, value: "/models/compile-cache" }
          - { name: VLLM_CACHE_ROOT, value: "/models/vllm-cache" }
          securityContext:
            privileged: true
            capabilities:
              add: ["IPC_LOCK", "SYS_RESOURCE"]
          volumeMounts:
          - { name: models, mountPath: /models }
          - { name: shm, mountPath: /dev/shm }
          - { name: infiniband, mountPath: /dev/infiniband }
          - { name: sys-ib, mountPath: /sys/class/infiniband }
          resources:
            requests: { memory: "93Gi", cpu: "8000m", nvidia.com/gpu: "1" }
            limits: { memory: "93Gi", nvidia.com/gpu: "1" }
        volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: "64Gi"
        - name: infiniband
          hostPath: { path: /dev/infiniband, type: "" }
        - name: sys-ib
          hostPath: { path: /sys/class/infiniband, type: "" }
        - name: models
          persistentVolumeClaim: { claimName: dsv4-worker-models }
        - name: download-script
          configMap:
            name: dsv4-download-script
---
apiVersion: v1
kind: Service
metadata:
  name: dsv4
  namespace: ai
  labels: { app: dsv4 }
spec:
  type: ClusterIP
  selector: { app: dsv4, role: head }
  ports:
  - { name: http, port: 8000, protocol: TCP, targetPort: 8000 }
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: dsv4
  namespace: ai
  labels:
    app: dsv4
    release: kube-prometheus-stack
spec:
  endpoints:
  - port: http
    path: /metrics
    interval: 15s
    scrapeTimeout: 10s
    metricRelabelings:
    - action: replace
      replacement: talos-stpetersburg
      targetLabel: cluster
  selector:
    matchLabels:
      app: dsv4
  namespaceSelector:
    matchNames:
    - ai