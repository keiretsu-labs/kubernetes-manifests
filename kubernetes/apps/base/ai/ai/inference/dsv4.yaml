#
# DeepSeek-V4-Flash-DSpark on 2× DGX Spark — vLLM v1 engine
#
# Intent        : Serve the DSpark-optimized DeepSeek-V4-Flash-DSpark (685B MoE,
#                 DSpark speculative decoding heads) across 2× DGX Spark nodes,
#                 each with a single Jetson Thor Blackwell GPU (120 GiB usable).
#
#                 Migrated from MTP speculative decoding to DSpark (NVIDIA's
#                 Draft-Spark speculative decoding) based on tonyd2wild's
#                 validated recipe achieving 62.48 tok/s mean throughput
#                 (66.78/62.36/58.30 across 3 runs), 0.673 draft acceptance,
#                 3.36 accepted tokens per draft.
#
# Recipe        : github.com/tonyd2wild/DeepSeek-v4-Flash-DSpark-60-tok-s--2x-DGX-Spark
# Base image    : ghcr.io/bjk110/vllm-spark:unholy-fusion-prod-ready (Rafael Caricio's
#                 DSpark vLLM fork + bjk110 build for SM12.1a/GB10)
# Overlay       : Tony DeAngelo's validated DSpark overlay patches (vendored at
#                 dspark-overlay/ in this repo)
#
# Architecture  : TP=2 across 2 nodes via PyTorch mp backend (no Ray).
#                 Each pod gets a single GPU; NCCL-RoCEv2 over CX-7 for
#                 the cross-node tensor-parallel shard.
#
#                 Modeled as a LeaderWorkerSet (kubernetes-sigs/lws): the
#                 leader (rank 0, API server) and worker (rank 1, headless)
#                 form one gang-scheduled group with
#                 restartPolicy=RecreateGroupOnPodRestart — so a crash of
#                 either rank recreates BOTH pods together and the NCCL
#                 rendezvous always re-forms cleanly.
#                 startupPolicy=LeaderCreated: the worker must come up
#                 alongside the leader, since rank 0 blocks at distributed
#                 init waiting for rank 1.
#
# Memory guard  : Control-plane shares the GPU node (spark-0). Without
#                 drop-caches, the OS page cache from weight load pushes
#                 kubelet past the evictionThreshold. Init + sidecar
#                 echo 3 > /proc/sys/vm/drop_caches pre- and during weight
#                 load to keep host memory under the evictionHard (6 GiB)
#                 thresholds.
#                 kubelet memory guard: systemReserved 4Gi, kubeReserved 4Gi,
#                 evictionHard 6Gi.
#                 Guaranteed QoS at 93Gi (request==limit).
#
#   DSpark profile: 0.80 util / 262K ctx / 1 seq — validated by tonyd2wild
#   GPU reset at startup. NCCL tuning: CROSS_NIC=1, CUMEM_ENABLE=0,
#   IGNORE_CPU_AFFINITY=1 over RoCE via ConnectX-7.
#   DSpark-specific: VLLM_USE_B12X_WO_PROJECTION=1, VLLM_TRITON_MLA_SPARSE=1,
#   VLLM_DSPARK_LOCAL_ARGMAX=1, VLLM_DSPARK_CONFIDENCE_SCHEDULER=off
#   terminationGracePeriodSeconds=180
#   NOTE: B12X kernel (VLLM_USE_B12X_MOE=1) does NOT support
#   --enable-expert-parallel; the two are mutually exclusive.
#   DSpark speculative decoding (method "dspark", 5 tokens) replaces MTP.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dsv4-download-script
  namespace: ai
data:
  download-and-validate.sh: |
    #!/bin/bash
    set -euo pipefail
    MODEL_DIR="${MODEL_DIR:-/models/dsv4}"
    HF_REPO="${HF_REPO:-deepseek-ai/DeepSeek-V4-Flash-DSpark}"
    EXPECTED=46

    mkdir -p "$MODEL_DIR"
    cd "$MODEL_DIR"

    echo "[download] Starting model download with hf CLI…"
    hf download "$HF_REPO" --local-dir "$MODEL_DIR" 2>&1

    echo "[validate] Checking for $${EXPECTED} shards…"
    COUNT="$(find . -name '*.safetensors' | wc -l)"
    echo "[validate] Found $${COUNT} shard(s)"

    if [ "$COUNT" -lt "$EXPECTED" ]; then
      echo "[ERROR] Expected $${EXPECTED} shards, got $${COUNT}. Redownloading…"
      rm -rf "$MODEL_DIR"/*
      hf download "$HF_REPO" --local-dir "$MODEL_DIR" 2>&1
      COUNT="$(find . -name '*.safetensors' | wc -l)"
      if [ "$COUNT" -lt "$EXPECTED" ]; then
        echo "[FATAL] Still only $${COUNT} shards after retry. Aborting."
        exit 1
      fi
    fi

    echo "[validate] Shard validation OK ($${COUNT}/$${EXPECTED})"
    echo "[download] Done."
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dsv4-head-models
  namespace: ai
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 200Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dsv4-worker-models
  namespace: ai
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 200Gi
---
apiVersion: leaderworkerset.x-k8s.io/v1
kind: LeaderWorkerSet
metadata:
  name: dsv4
  namespace: ai
  labels: { app: dsv4 }
spec:
  replicas: 1                    # one TP=2 group
  startupPolicy: LeaderCreated   # worker starts alongside leader (rank 0 blocks on rank 1 at init)
  leaderWorkerTemplate:
    size: 2                       # 1 leader (rank 0) + 1 worker (rank 1)
    restartPolicy: RecreateGroupOnPodRestart   # crash of either rank recreates the whole group
    # ---------- LEADER (rank 0 / API server) ----------
    leaderTemplate:
      metadata:
        labels: { app: dsv4, role: head }
      spec:
        terminationGracePeriodSeconds: 180
        hostNetwork: true
        hostIPC: true
        nodeSelector: { kubernetes.io/hostname: spark-0 }
        initContainers:
        - name: drop-caches
          image: busybox:1.38
          command: [sh, -c, "echo 3 > /proc/sys/vm/drop_caches 2>/dev/null || true"]
          securityContext: { privileged: true }
          resources:
            requests: { memory: "64Mi", cpu: "100m" }
            limits: { memory: "256Mi", cpu: "500m" }
        - name: download-models
          image: aidendle94/sparkrun-vllm-ds4-gb10:dspark
          command:
          - /bin/bash
          args:
          - /scripts/download-and-validate.sh
          env:
          - { name: MODEL_DIR, value: "/models/dsv4" }
          - { name: HF_REPO, value: "deepseek-ai/DeepSeek-V4-Flash-DSpark" }
          - { name: HUGGING_FACE_HUB_TOKEN, valueFrom: { secretKeyRef: { name: hf-secret, key: HF_TOKEN } } }
          - { name: HF_HOME, value: "/models/huggingface" }
          - { name: HF_HUB_OFFLINE, value: "0" }
          - { name: TRANSFORMERS_OFFLINE, value: "0" }
          volumeMounts:
          - { name: models, mountPath: /models }
          - { name: download-script, mountPath: /scripts }
          resources:
            requests: { memory: "4Gi", cpu: "2000m" }
            limits: { memory: "8Gi", cpu: "4000m" }
        containers:
        - name: drop-caches-loop
          image: busybox:1.38
          command: [sh, -c, "while true; do sleep 15; echo 3 > /proc/sys/vm/drop_caches 2>/dev/null || true; done"]
          securityContext: { privileged: true }
          resources:
            requests: { memory: "64Mi", cpu: "100m" }
            limits: { memory: "256Mi", cpu: "500m" }
        - name: vllm
          image: aidendle94/sparkrun-vllm-ds4-gb10:dspark
          command: [bash, -c]
          args:
          - |
            # Drop page cache immediately before weight load (belt + suspenders
            # with the drop-caches init container above).
            echo 3 > /proc/sys/vm/drop_caches 2>/dev/null || true
            nvidia-smi --gpu-reset -i 0 >/dev/null 2>/dev/null || true
            export PATH="/opt/env/bin:/opt/env/nvvm/bin:/opt/env/targets/sbsa-linux/nvvm/bin:${PATH:-}"
            export CUDA_HOME="${CUDA_HOME:-/opt/env/targets/sbsa-linux}"
            export CUDA_PATH="${CUDA_PATH:-${CUDA_HOME}}"
            export CUDAToolkit_ROOT="${CUDAToolkit_ROOT:-${CUDA_HOME}}"
            export LD_LIBRARY_PATH="/opt/env/lib:/opt/env/targets/sbsa-linux/lib:${LD_LIBRARY_PATH:-}"
            exec /opt/env/bin/vllm serve /models/dsv4 \
              --served-model-name deepseek-v4-flash-dspark DeepSeek-V4-Flash-DSpark \
              --host 0.0.0.0 --port 8000 --trust-remote-code \
              --tensor-parallel-size 2 --pipeline-parallel-size 1 \
              --distributed-executor-backend mp \
              --kv-cache-dtype fp8 --block-size 256 \
              --max-model-len 262144 \
              --max-num-seqs 1 --max-num-batched-tokens 8192 \
              --gpu-memory-utilization 0.80 \
              --enable-prefix-caching \
              --enable-flashinfer-autotune \
              --speculative-config '{"method":"dspark","num_speculative_tokens":5}' \
              --tokenizer-mode deepseek_v4 \
              --tool-call-parser deepseek_v4 --enable-auto-tool-choice \
              --reasoning-parser deepseek_v4 \
              --reasoning-config '{"reasoning_parser":"deepseek_v4","reasoning_start_str":"<think>","reasoning_end_str":"</think>"}' \
              --default-chat-template-kwargs '{"thinking":true}' \
              --nnodes 2 --node-rank 0 \
              --master-addr 192.168.74.1 --master-port 25002
          ports:
          - { containerPort: 8000, name: http, protocol: TCP }
          env:
          - { name: NODE_RANK, value: "0" }
          - { name: VLLM_HOST_IP, value: "192.168.74.1" }
          - { name: MASTER_ADDR, value: "192.168.74.1" }
          - { name: MASTER_PORT, value: "25002" }
          # DSpark / B12X MoE
          - { name: VLLM_USE_B12X_MOE, value: "1" }
          - { name: VLLM_USE_B12X_WO_PROJECTION, value: "1" }
          - { name: VLLM_B12X_W4A16_FORCE_BLOCKS_PER_SM, value: "0" }
          - { name: VLLM_B12X_W4A16_FORCE_BLOCKS_MAX_M, value: "16" }
          - { name: B12X_W4A16_TC_DECODE, value: "0" }
          # DSpark speculative decoding tuning
          - { name: VLLM_DSPARK_CONFIDENCE_THRESHOLD, value: "0.0" }
          - { name: VLLM_DSPARK_CONFIDENCE_SCHEDULER, value: "off" }
          - { name: VLLM_DSPARK_LOCAL_ARGMAX, value: "1" }
          - { name: VLLM_DSPARK_REPLICATE_MARKOV_W1, value: "1" }
          - { name: VLLM_DSPARK_FUSED_MARKOV_ARGMAX, value: "0" }
          - { name: VLLM_DSPARK_GPU_REJECTED_CONTEXT_MASK, value: "1" }
          - { name: VLLM_DSPARK_REFERENCE_KV_QUANT_DEQUANT, value: "0" }
          - { name: VLLM_DSPARK_HARDWARE_SCHEDULER_EARLY_STOP, value: "1" }
          - { name: VLLM_DSV4_B12X_COMPRESSED_MLA, value: "0" }
          - { name: VLLM_DSV4_DSPARK_DEFER_TARGET_CAPTURE, value: "0" }
          - { name: VLLM_DSV4_DSPARK_DEFER_TARGET_CAPTURE_EXACT, value: "0" }
          # Runtime optimizations
          - { name: VLLM_SPARSE_INDEXER_MAX_LOGITS_MB, value: "256" }
          - { name: VLLM_ALLOW_LONG_MAX_MODEL_LEN, value: "1" }
          - { name: VLLM_TRITON_MLA_SPARSE, value: "1" }
          - { name: VLLM_SKIP_INIT_MEMORY_CHECK, value: "1" }
          - { name: VLLM_CACHE_ROOT, value: "/models/vllm-cache" }
          # NCCL / RDMA
          - { name: NCCL_SOCKET_IFNAME, value: "eth2" }
          - { name: GLOO_SOCKET_IFNAME, value: "eth2" }
          - { name: NCCL_IB_HCA, value: "mlx5_1" }
          - { name: NCCL_IB_GID_INDEX, value: "3" }
          - { name: NCCL_IB_DISABLE, value: "0" }
          - { name: NCCL_NET_GDR_LEVEL, value: "5" }
          - { name: NCCL_IB_TIMEOUT, value: "22" }
          - { name: NCCL_DEBUG, value: "WARN" }
          - { name: NCCL_CROSS_NIC, value: "1" }
          - { name: NCCL_IGNORE_CPU_AFFINITY, value: "1" }
          - { name: NCCL_CUMEM_ENABLE, value: "0" }
          - { name: NCCL_NVLS_ENABLE, value: "0" }
          # CUDA / compiler
          - { name: PYTORCH_CUDA_ALLOC_CONF, value: "expandable_segments:True" }
          - { name: TORCH_CUDA_ARCH_LIST, value: "12.1a" }
          - { name: FLASHINFER_CUDA_ARCH_LIST, value: "12.1a" }
          - { name: FLASHINFER_DISABLE_VERSION_CHECK, value: "1" }
          - { name: TILELANG_CLEANUP_TEMP_FILES, value: "1" }
          # HuggingFace / model
          - { name: VLLM_PORT, value: "25001" }
          - { name: HUGGING_FACE_HUB_TOKEN, valueFrom: { secretKeyRef: { name: hf-secret, key: HF_TOKEN } } }
          - { name: HF_HOME, value: "/models/huggingface" }
          - { name: HF_HUB_OFFLINE, value: "1" }
          - { name: TRANSFORMERS_OFFLINE, value: "1" }
          - { name: HF_HUB_DISABLE_XET, value: "1" }
          - { name: VLLM_COMPILE_CACHE_DIR, value: "/models/compile-cache" }
          securityContext:
            privileged: true
            capabilities:
              add: ["IPC_LOCK", "SYS_RESOURCE"]
          volumeMounts:
          - { name: models, mountPath: /models }
          - { name: shm, mountPath: /dev/shm }
          - { name: infiniband, mountPath: /dev/infiniband }
          - { name: sys-ib, mountPath: /sys/class/infiniband }
          resources:
            requests: { memory: "93Gi", cpu: "8000m", nvidia.com/gpu: "1" }
            limits: { memory: "93Gi", nvidia.com/gpu: "1" }
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 900
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 900
            periodSeconds: 15
            timeoutSeconds: 10
        volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: "128Gi"
        - name: infiniband
          hostPath: { path: /dev/infiniband, type: "" }
        - name: sys-ib
          hostPath: { path: /sys/class/infiniband, type: "" }
        - name: models
          persistentVolumeClaim: { claimName: dsv4-head-models }
        - name: download-script
          configMap:
            name: dsv4-download-script
    # ---------- WORKER (rank 1 / headless) ----------
    workerTemplate:
      metadata:
        labels: { app: dsv4, role: worker }
      spec:
        terminationGracePeriodSeconds: 180
        hostNetwork: true
        hostIPC: true
        nodeSelector: { kubernetes.io/hostname: spark-1 }
        initContainers:
        - name: drop-caches
          image: busybox:1.38
          command: [sh, -c, "echo 3 > /proc/sys/vm/drop_caches 2>/dev/null || true"]
          securityContext: { privileged: true }
          resources:
            requests: { memory: "64Mi", cpu: "100m" }
            limits: { memory: "256Mi", cpu: "500m" }
        - name: download-models
          image: aidendle94/sparkrun-vllm-ds4-gb10:dspark
          command:
          - /bin/bash
          args:
          - /scripts/download-and-validate.sh
          env:
          - { name: MODEL_DIR, value: "/models/dsv4" }
          - { name: HF_REPO, value: "deepseek-ai/DeepSeek-V4-Flash-DSpark" }
          - { name: HUGGING_FACE_HUB_TOKEN, valueFrom: { secretKeyRef: { name: hf-secret, key: HF_TOKEN } } }
          - { name: HF_HOME, value: "/models/huggingface" }
          - { name: HF_HUB_OFFLINE, value: "0" }
          - { name: TRANSFORMERS_OFFLINE, value: "0" }
          volumeMounts:
          - { name: models, mountPath: /models }
          - { name: download-script, mountPath: /scripts }
          resources:
            requests: { memory: "4Gi", cpu: "2000m" }
            limits: { memory: "8Gi", cpu: "4000m" }
        containers:
        - name: drop-caches-loop
          image: busybox:1.38
          command: [sh, -c, "while true; do sleep 15; echo 3 > /proc/sys/vm/drop_caches 2>/dev/null || true; done"]
          securityContext: { privileged: true }
          resources:
            requests: { memory: "64Mi", cpu: "100m" }
            limits: { memory: "256Mi", cpu: "500m" }
        - name: vllm
          image: aidendle94/sparkrun-vllm-ds4-gb10:dspark
          command: [bash, -c]
          args:
          - |
            echo 3 > /proc/sys/vm/drop_caches 2>/dev/null || true
            nvidia-smi --gpu-reset -i 0 >/dev/null 2>/dev/null || true
            export PATH="/opt/env/bin:/opt/env/nvvm/bin:/opt/env/targets/sbsa-linux/nvvm/bin:${PATH:-}"
            export CUDA_HOME="${CUDA_HOME:-/opt/env/targets/sbsa-linux}"
            export CUDA_PATH="${CUDA_PATH:-${CUDA_HOME}}"
            export CUDAToolkit_ROOT="${CUDAToolkit_ROOT:-${CUDA_HOME}}"
            export LD_LIBRARY_PATH="/opt/env/lib:/opt/env/targets/sbsa-linux/lib:${LD_LIBRARY_PATH:-}"
            exec /opt/env/bin/vllm serve /models/dsv4 \
              --served-model-name deepseek-v4-flash-dspark DeepSeek-V4-Flash-DSpark \
              --host 0.0.0.0 --port 8000 --trust-remote-code \
              --tensor-parallel-size 2 --pipeline-parallel-size 1 \
              --distributed-executor-backend mp \
              --kv-cache-dtype fp8 --block-size 256 \
              --max-model-len 262144 \
              --max-num-seqs 1 --max-num-batched-tokens 8192 \
              --gpu-memory-utilization 0.80 \
              --enable-prefix-caching \
              --enable-flashinfer-autotune \
              --speculative-config '{"method":"dspark","num_speculative_tokens":5}' \
              --tokenizer-mode deepseek_v4 \
              --tool-call-parser deepseek_v4 --enable-auto-tool-choice \
              --reasoning-parser deepseek_v4 \
              --reasoning-config '{"reasoning_parser":"deepseek_v4","reasoning_start_str":"<think>","reasoning_end_str":"</think>"}' \
              --default-chat-template-kwargs '{"thinking":true}' \
              --nnodes 2 --node-rank 1 \
              --master-addr 192.168.74.1 --master-port 25002 \
              --headless
          env:
          - { name: NODE_RANK, value: "1" }
          - { name: VLLM_HOST_IP, value: "192.168.74.2" }
          - { name: MASTER_ADDR, value: "192.168.74.1" }
          - { name: MASTER_PORT, value: "25002" }
          - { name: HEADLESS, value: "1" }
          # DSpark / B12X MoE
          - { name: VLLM_USE_B12X_MOE, value: "1" }
          - { name: VLLM_USE_B12X_WO_PROJECTION, value: "1" }
          - { name: VLLM_B12X_W4A16_FORCE_BLOCKS_PER_SM, value: "0" }
          - { name: VLLM_B12X_W4A16_FORCE_BLOCKS_MAX_M, value: "16" }
          - { name: B12X_W4A16_TC_DECODE, value: "0" }
          # DSpark speculative decoding tuning
          - { name: VLLM_DSPARK_CONFIDENCE_THRESHOLD, value: "0.0" }
          - { name: VLLM_DSPARK_CONFIDENCE_SCHEDULER, value: "off" }
          - { name: VLLM_DSPARK_LOCAL_ARGMAX, value: "1" }
          - { name: VLLM_DSPARK_REPLICATE_MARKOV_W1, value: "1" }
          - { name: VLLM_DSPARK_FUSED_MARKOV_ARGMAX, value: "0" }
          - { name: VLLM_DSPARK_GPU_REJECTED_CONTEXT_MASK, value: "1" }
          - { name: VLLM_DSPARK_REFERENCE_KV_QUANT_DEQUANT, value: "0" }
          - { name: VLLM_DSPARK_HARDWARE_SCHEDULER_EARLY_STOP, value: "1" }
          - { name: VLLM_DSV4_B12X_COMPRESSED_MLA, value: "0" }
          - { name: VLLM_DSV4_DSPARK_DEFER_TARGET_CAPTURE, value: "0" }
          - { name: VLLM_DSV4_DSPARK_DEFER_TARGET_CAPTURE_EXACT, value: "0" }
          # Runtime optimizations
          - { name: VLLM_SPARSE_INDEXER_MAX_LOGITS_MB, value: "256" }
          - { name: VLLM_ALLOW_LONG_MAX_MODEL_LEN, value: "1" }
          - { name: VLLM_TRITON_MLA_SPARSE, value: "1" }
          - { name: VLLM_SKIP_INIT_MEMORY_CHECK, value: "1" }
          - { name: VLLM_CACHE_ROOT, value: "/models/vllm-cache" }
          # NCCL / RDMA
          - { name: NCCL_SOCKET_IFNAME, value: "eth2" }
          - { name: GLOO_SOCKET_IFNAME, value: "eth2" }
          - { name: NCCL_IB_HCA, value: "mlx5_1" }
          - { name: NCCL_IB_GID_INDEX, value: "3" }
          - { name: NCCL_IB_DISABLE, value: "0" }
          - { name: NCCL_NET_GDR_LEVEL, value: "5" }
          - { name: NCCL_IB_TIMEOUT, value: "22" }
          - { name: NCCL_DEBUG, value: "WARN" }
          - { name: NCCL_CROSS_NIC, value: "1" }
          - { name: NCCL_IGNORE_CPU_AFFINITY, value: "1" }
          - { name: NCCL_CUMEM_ENABLE, value: "0" }
          - { name: NCCL_NVLS_ENABLE, value: "0" }
          # CUDA / compiler
          - { name: PYTORCH_CUDA_ALLOC_CONF, value: "expandable_segments:True" }
          - { name: TORCH_CUDA_ARCH_LIST, value: "12.1a" }
          - { name: FLASHINFER_CUDA_ARCH_LIST, value: "12.1a" }
          - { name: FLASHINFER_DISABLE_VERSION_CHECK, value: "1" }
          - { name: TILELANG_CLEANUP_TEMP_FILES, value: "1" }
          # HuggingFace / model
          - { name: VLLM_PORT, value: "25001" }
          - { name: HUGGING_FACE_HUB_TOKEN, valueFrom: { secretKeyRef: { name: hf-secret, key: HF_TOKEN } } }
          - { name: HF_HOME, value: "/models/huggingface" }
          - { name: HF_HUB_OFFLINE, value: "1" }
          - { name: TRANSFORMERS_OFFLINE, value: "1" }
          - { name: HF_HUB_DISABLE_XET, value: "1" }
          - { name: VLLM_COMPILE_CACHE_DIR, value: "/models/compile-cache" }
          securityContext:
            privileged: true
            capabilities:
              add: ["IPC_LOCK", "SYS_RESOURCE"]
          volumeMounts:
          - { name: models, mountPath: /models }
          - { name: shm, mountPath: /dev/shm }
          - { name: infiniband, mountPath: /dev/infiniband }
          - { name: sys-ib, mountPath: /sys/class/infiniband }
          resources:
            requests: { memory: "93Gi", cpu: "8000m", nvidia.com/gpu: "1" }
            limits: { memory: "93Gi", nvidia.com/gpu: "1" }
        volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: "128Gi"
        - name: infiniband
          hostPath: { path: /dev/infiniband, type: "" }
        - name: sys-ib
          hostPath: { path: /sys/class/infiniband, type: "" }
        - name: models
          persistentVolumeClaim: { claimName: dsv4-worker-models }
        - name: download-script
          configMap:
            name: dsv4-download-script
---
apiVersion: v1
kind: Service
metadata:
  name: dsv4
  namespace: ai
  labels: { app: dsv4 }
spec:
  type: ClusterIP
  selector: { app: dsv4, role: head }
  ports:
  - { name: http, port: 8000, protocol: TCP, targetPort: 8000 }
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: dsv4
  namespace: ai
  labels:
    app: dsv4
    release: kube-prometheus-stack
spec:
  endpoints:
  - port: http
    path: /metrics
    interval: 15s
    scrapeTimeout: 10s
    metricRelabelings:
    - action: replace
      replacement: talos-stpetersburg
      targetLabel: cluster
