---
apiVersion: v1
kind: Service
metadata:
  name: dsv4
  namespace: ai
  labels: { app: dsv4 }
spec:
  type: ClusterIP
  selector: { app: dsv4, role: head }
  ports:
  - { name: http, port: 8000, protocol: TCP, targetPort: 8000 }
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: dsv4
  namespace: ai
  labels:
    app: dsv4
    release: kube-prometheus-stack
spec:
  endpoints:
  - port: http
    path: /metrics
    interval: 15s
    scrapeTimeout: 10s
    metricRelabelings:
    - action: replace
      replacement: talos-stpetersburg
      targetLabel: cluster
  selector:
    matchLabels:
      app: dsv4
  namespaceSelector:
    matchNames:
    - ai