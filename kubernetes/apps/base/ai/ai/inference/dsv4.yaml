#
# DeepSeek-V4-Flash on 2× DGX Spark — vLLM v1 engine (DSpark spec-decode)
#
# Architecture  : TP=2 via PyTorch mp backend, DSpark spec-decode,
#                 fp8 KV cache, LeaderWorkerSet gang scheduling.
# Image         : aidendle94/sparkrun-vllm-ds4-gb10:production-3.7 (2d old)
#                 (Aiden's community image, B12X MoE, CUDA 12.1, sm121)
#                 Built from: https://github.com/local-inference-lab/vllm/tree/dev/unholy-fusion
# Model         : deepseek-ai/DeepSeek-V4-Flash-DSpark (48 shards, FP8, 79.44 GiB)
#
# Key settings (kept from comprehensive upgrade):
# - --max-num-seqs 6, --max-model-len 1000000
# - --enable-chunked-prefill, --enable-prefix-caching, --async-scheduling
# - --reasoning-config, --default-chat-template-kwargs '{"thinking":false}'
# - --generation-config vllm (no server-side sampling override)
# - draft_sample_method: probabilistic → ~49 tok/s vs ~32 tok/s greedy
# - VLLM_USE_B12X_MOE=1, VLLM_USE_B12X_WO_PROJECTION=1 (critical speed lift)
# - DSpark garble-fix env vars (confidence_scheduler=off, local_argmax=1, etc.)
#
# Memory guard  : 93Gi Guaranteed QoS, drop-caches init + loop sidecar,
#                 GPU reset at startup. DSpark weights: 79.44 GiB.
#                 fp8 KV: ~800K ctx fits (6.53 GiB KV avail).
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dsv4-download-script
  namespace: ai
data:
  download-and-validate.sh: |
    #!/bin/bash
    set -euo pipefail
    MODEL_DIR="$${MODEL_DIR:-/models/dsv4}"
    HF_REPO="$${HF_REPO:-deepseek-ai/DeepSeek-V4-Flash-DSpark}"
    EXPECTED=48

    mkdir -p "$${MODEL_DIR}"
    cd "$${MODEL_DIR}"

    # Check if model is already cached on PVC — skip download if complete
    COUNT="$$(find . -maxdepth 1 -name '*.safetensors' | wc -l)"
    if [ "$${COUNT}" -ge "$${EXPECTED}" ]; then
      echo "[download] All $${EXPECTED} shards already present — skipping download."
      echo "[validate] Shard validation OK ($${COUNT}/$${EXPECTED})"
      echo "[download] Done."
      exit 0
    fi

    # Clean stale lock files from previous force-killed downloads
    echo "[download] Cleaning stale lock files…"
    rm -rf "$${MODEL_DIR}"/.cache/huggingface/download/*.lock 2>/dev/null || true

    echo "[download] Starting model download with hf CLI ($${HF_REPO})…"
    hf download "$${HF_REPO}" --local-dir "$${MODEL_DIR}" 2>&1

    echo "[validate] Checking for $${EXPECTED} shards…"
    COUNT="$$(find . -maxdepth 1 -name '*.safetensors' | wc -l)"
    echo "[validate] Found $${COUNT} shard(s)"

    if [ "$${COUNT}" -lt "$${EXPECTED}" ]; then
      echo "[ERROR] Expected $${EXPECTED} shards, got $${COUNT}. Redownloading…"
      rm -rf "$${MODEL_DIR}"/*
      hf download "$${HF_REPO}" --local-dir "$${MODEL_DIR}" 2>&1
      COUNT="$$(find . -maxdepth 1 -name '*.safetensors' | wc -l)"
      if [ "$${COUNT}" -lt "$${EXPECTED}" ]; then
        echo "[FATAL] Still only $${COUNT} shards after retry. Aborting."
        exit 1
      fi
    fi

    echo "[validate] Shard validation OK ($${COUNT}/$${EXPECTED})"
    echo "[download] Done."
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dsv4-head-models
  namespace: ai
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 200Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dsv4-worker-models
  namespace: ai
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 200Gi
---
apiVersion: leaderworkerset.x-k8s.io/v1
kind: LeaderWorkerSet
metadata:
  name: dsv4
  namespace: ai
  labels: { app: dsv4 }
spec:
  replicas: 1
  startupPolicy: LeaderCreated
  leaderWorkerTemplate:
    size: 2
    restartPolicy: RecreateGroupOnPodRestart
    # ---------- LEADER (rank 0 / API server) ----------
    leaderTemplate:
      metadata:
        labels: { app: dsv4, role: head }
      spec:
        terminationGracePeriodSeconds: 60
        hostNetwork: true
        hostIPC: true
        dnsPolicy: ClusterFirstWithHostNet
        enableServiceLinks: false
        nodeSelector: { kubernetes.io/hostname: spark-0 }
        initContainers:
        - name: drop-caches
          image: busybox:1.38
          command: [sh, -c, "echo 3 > /proc/sys/vm/drop_caches 2>/dev/null || true"]
          securityContext: { privileged: true }
          resources:
            requests: { memory: "64Mi", cpu: "100m" }
            limits: { memory: "256Mi", cpu: "500m" }
        - name: download-models
          image: aidendle94/sparkrun-vllm-ds4-gb10:production-3.7
          command:
          - /bin/bash
          args:
          - /scripts/download-and-validate.sh
          env:
          - { name: MODEL_DIR, value: "/models/dsv4" }
          - { name: HUGGING_FACE_HUB_TOKEN, valueFrom: { secretKeyRef: { name: hf-secret, key: HF_TOKEN } } }
          - { name: HF_HOME, value: "/models/huggingface" }
          - { name: HF_HUB_OFFLINE, value: "0" }
          - { name: TRANSFORMERS_OFFLINE, value: "0" }
          volumeMounts:
          - { name: models, mountPath: /models }
          - { name: download-script, mountPath: /scripts }
          resources:
            requests: { memory: "4Gi", cpu: "2000m" }
            limits: { memory: "8Gi", cpu: "4000m" }
        - name: dspark-overlay
          image: aidendle94/sparkrun-vllm-ds4-gb10:production-3.7
          command: [bash, -c]
          args:
          - |
            set -e
            GIT=$(command -v git || true)
            if [ -z "$GIT" ]; then
              echo "[dspark-overlay] ERROR: git not found on this image"
              echo "[dspark-overlay] Trying pip install git…"
              pip install git 2>&1 | tail -2
              GIT=$(command -v git || true)
            fi
            if [ -z "$GIT" ]; then
              echo "[dspark-overlay] FATAL: cannot find or install git"
              exit 1
            fi
            echo "[dspark-overlay] Using git at: $GIT"
            echo "[dspark-overlay] Cloning Tony's DSpark overlay…"
            $GIT clone --depth 1 \
              https://github.com/tonyd2wild/DeepSeek-v4-Flash-DSpark-1M-NVFP4-KV-2x-DGX-Spark.git \
              /tmp/dspark-repo 2>&1
            echo "[dspark-overlay] Installing overlay files…"
            mkdir -p /overlay/vllm
            cp -r /tmp/dspark-repo/recipe/overlay/vllm/* /overlay/vllm/
            echo "[dspark-overlay] Patching envs.py for production-3.7 compat…"
            # The base image's _aiter_ops.py references VLLM_ROCM_USE_AITER_LINEAR_HIPBMM
            # which isn't in Tony's overlay envs.py — add it
            sed -i '/VLLM_ROCM_USE_AITER_LINEAR: bool = True/a\    VLLM_ROCM_USE_AITER_LINEAR_HIPBMM: bool = False' /overlay/vllm/envs.py
            sed -i '/"VLLM_ROCM_USE_AITER_LINEAR":/a\    "VLLM_ROCM_USE_AITER_LINEAR_HIPBMM": lambda: bool(int(os.getenv("VLLM_ROCM_USE_AITER_LINEAR_HIPBMM", "0"))),' /overlay/vllm/envs.py
            echo "[dspark-overlay] Done. Files:"
            find /overlay/vllm -type f | wc -l
          volumeMounts:
          - { name: overlay-files, mountPath: /overlay }
          resources:
            requests: { memory: "2Gi", cpu: "1000m" }
            limits: { memory: "4Gi", cpu: "2000m" }
        containers:
        - name: drop-caches-loop
          image: busybox:1.38
          command: [sh, -c, "while true; do sleep 15; echo 3 > /proc/sys/vm/drop_caches 2>/dev/null || true; done"]
          securityContext: { privileged: true }
          resources:
            requests: { memory: "64Mi", cpu: "100m" }
            limits: { memory: "256Mi", cpu: "500m" }
        - name: vllm
          image: aidendle94/sparkrun-vllm-ds4-gb10:production-3.7
          command: [bash, -c]
          args:
          - |
            # Drop page cache immediately before weight load
            echo 3 > /proc/sys/vm/drop_caches 2>/dev/null || true
            nvidia-smi --gpu-reset -i 0 >/dev/null 2>/dev/null || true
            # Find vllm site-packages path
            VLLM_DIR=$(python3 -c "import vllm; print(vllm.__path__[0])" 2>/dev/null || echo "/opt/env/lib/python3.12/site-packages/vllm")
            echo "[dspark] vLLM site-packages: $VLLM_DIR"
            # Apply DSpark overlay
            echo "[dspark] Applying DSpark overlay (17 files) to $VLLM_DIR…"
            mkdir -p "$VLLM_DIR"
            cp -r /overlay/vllm/* "$VLLM_DIR/"
            # Find vllm entrypoint
            VLLM_ENTRY=$(command -v vllm || echo "/usr/local/bin/vllm")
            echo "[dspark] Using entrypoint: $VLLM_ENTRY"
            echo "[dspark] Overlay applied. Starting vLLM with DSpark…"
            exec "$VLLM_ENTRY" serve /models/dsv4 \
              --served-model-name deepseek-v4-flash deepseek-v4-flash-dspark vllm/deepseek-v4-flash \
              --host 0.0.0.0 --port 8000 --trust-remote-code \
              --tensor-parallel-size 2 --pipeline-parallel-size 1 \
              --distributed-executor-backend mp \
              --kv-cache-dtype fp8 --block-size 256 \
              --max-model-len 1000000 \
              --max-num-seqs 6 --max-num-batched-tokens 8192 \
              --max-cudagraph-capture-size 6 \
              --gpu-memory-utilization 0.78 \
              --enable-prefix-caching \
              --enable-flashinfer-autotune \
              --async-scheduling \
              --enable-chunked-prefill \
              --compilation-config '{"cudagraph_mode":"PIECEWISE"}' \
              --tokenizer-mode deepseek_v4 \
              --tool-call-parser deepseek_v4 --enable-auto-tool-choice \
              --reasoning-parser deepseek_v4 \
              --reasoning-config '{"reasoning_parser":"deepseek_v4","reasoning_start_str":"","reasoning_end_str":""}' \
              --default-chat-template-kwargs '{"thinking":false}' \
              --generation-config vllm \
              --speculative-config '{"method":"dspark","num_speculative_tokens":5,"draft_sample_method":"probabilistic"}' \
              --nnodes 2 --node-rank 0 \
              --master-addr 192.168.74.1 --master-port 25002
          ports:
          - { containerPort: 8000, name: http, protocol: TCP }
          env:
          - { name: NODE_RANK, value: "0" }
          - { name: VLLM_HOST_IP, value: "192.168.74.1" }
          - { name: MASTER_ADDR, value: "192.168.74.1" }
          - { name: VLLM_USE_B12X_MOE, value: "1" }
          - { name: VLLM_USE_B12X_WO_PROJECTION, value: "1" }
          - { name: VLLM_USE_FLASHINFER_SAMPLER, value: "1" }
          - { name: VLLM_SPARSE_INDEXER_MAX_LOGITS_MB, value: "256" }
          - { name: VLLM_ALLOW_LONG_MAX_MODEL_LEN, value: "1" }
          # Enables the DSpark ragged mixed prefill+decode path (Keys' concurrency
          # patch). Required for --max-num-seqs > 1.
          - { name: VLLM_DSPARK_GPU_REJECTED_CONTEXT_MASK, value: "1" }
          # DSpark agent-stability env vars (from Tony's 2026-07-03 garble-fix profile)
          - { name: VLLM_DSPARK_CONFIDENCE_THRESHOLD, value: "0.0" }
          - { name: VLLM_DSPARK_CONFIDENCE_SCHEDULER, value: "off" }
          - { name: VLLM_DSPARK_LOCAL_ARGMAX, value: "1" }
          - { name: VLLM_DSPARK_REPLICATE_MARKOV_W1, value: "1" }
          - { name: VLLM_DSPARK_FUSED_MARKOV_ARGMAX, value: "0" }
          - { name: VLLM_DSPARK_REFERENCE_KV_QUANT_DEQUANT, value: "0" }
          - { name: VLLM_DSPARK_HARDWARE_SCHEDULER_EARLY_STOP, value: "1" }
          - { name: VLLM_DSV4_B12X_COMPRESSED_MLA, value: "0" }
          - { name: VLLM_DSV4_DSPARK_DEFER_TARGET_CAPTURE, value: "0" }
          - { name: VLLM_DSV4_DSPARK_DEFER_TARGET_CAPTURE_EXACT, value: "0" }
          - { name: VLLM_B12X_W4A16_FORCE_BLOCKS_PER_SM, value: "0" }
          - { name: VLLM_B12X_W4A16_FORCE_BLOCKS_MAX_M, value: "16" }
          - { name: VLLM_B12X_W4A16_FORCE_TILE_CONFIG, value: "" }
          - { name: B12X_W4A16_TC_DECODE, value: "0" }
          - { name: PYTORCH_CUDA_ALLOC_CONF, value: "expandable_segments:True" }
          - { name: NCCL_NVLS_ENABLE, value: "0" }
          - { name: NCCL_NET, value: "IB" }
          - { name: VLLM_PORT, value: "25001" }
          - { name: TRANSFORMERS_OFFLINE, value: "1" }
          - { name: NCCL_SOCKET_IFNAME, value: "eth2" }
          - { name: GLOO_SOCKET_IFNAME, value: "eth2" }
          - { name: NCCL_IB_HCA, value: "mlx5_1" }
          - { name: NCCL_IB_GID_INDEX, value: "3" }
          - { name: NCCL_IB_DISABLE, value: "0" }
          - { name: NCCL_NET_GDR_LEVEL, value: "5" }
          - { name: NCCL_IB_TIMEOUT, value: "22" }
          - { name: NCCL_DEBUG, value: "WARN" }
          - { name: NCCL_CROSS_NIC, value: "1" }
          - { name: NCCL_IGNORE_CPU_AFFINITY, value: "1" }
          - { name: NCCL_CUMEM_ENABLE, value: "0" }
          - { name: HUGGING_FACE_HUB_TOKEN, valueFrom: { secretKeyRef: { name: hf-secret, key: HF_TOKEN } } }
          - { name: HF_HOME, value: "/models/huggingface" }
          - { name: VLLM_COMPILE_CACHE_DIR, value: "/models/compile-cache" }
          - { name: VLLM_CACHE_ROOT, value: "/models/vllm-cache" }
          securityContext:
            privileged: true
            capabilities:
              add: ["IPC_LOCK", "SYS_RESOURCE"]
          volumeMounts:
          - { name: overlay-files, mountPath: /overlay }
          - { name: models, mountPath: /models }
          - { name: shm, mountPath: /dev/shm }
          - { name: infiniband, mountPath: /dev/infiniband }
          - { name: sys-ib, mountPath: /sys/class/infiniband }
          resources:
            requests: { memory: "93Gi", cpu: "8000m", nvidia.com/gpu: "1" }
            limits: { memory: "93Gi", nvidia.com/gpu: "1" }
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 900
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 900
            periodSeconds: 15
            timeoutSeconds: 10
        volumes:
        - name: overlay-files
          emptyDir: {}
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: "64Gi"
        - name: infiniband
          hostPath: { path: /dev/infiniband, type: "" }
        - name: sys-ib
          hostPath: { path: /sys/class/infiniband, type: "" }
        - name: models
          persistentVolumeClaim: { claimName: dsv4-head-models }
        - name: download-script
          configMap:
            name: dsv4-download-script
    # ---------- WORKER (rank 1 / headless) ----------
    workerTemplate:
      metadata:
        labels: { app: dsv4, role: worker }
      spec:
        terminationGracePeriodSeconds: 60
        hostNetwork: true
        hostIPC: true
        dnsPolicy: ClusterFirstWithHostNet
        enableServiceLinks: false
        nodeSelector: { kubernetes.io/hostname: spark-1 }
        initContainers:
        - name: drop-caches
          image: busybox:1.38
          command: [sh, -c, "echo 3 > /proc/sys/vm/drop_caches 2>/dev/null || true"]
          securityContext: { privileged: true }
          resources:
            requests: { memory: "64Mi", cpu: "100m" }
            limits: { memory: "256Mi", cpu: "500m" }
        - name: download-models
          image: aidendle94/sparkrun-vllm-ds4-gb10:production-3.7
          command:
          - /bin/bash
          args:
          - /scripts/download-and-validate.sh
          env:
          - { name: MODEL_DIR, value: "/models/dsv4" }
          - { name: HUGGING_FACE_HUB_TOKEN, valueFrom: { secretKeyRef: { name: hf-secret, key: HF_TOKEN } } }
          - { name: HF_HOME, value: "/models/huggingface" }
          - { name: HF_HUB_OFFLINE, value: "0" }
          - { name: TRANSFORMERS_OFFLINE, value: "0" }
          volumeMounts:
          - { name: models, mountPath: /models }
          - { name: download-script, mountPath: /scripts }
          resources:
            requests: { memory: "4Gi", cpu: "2000m" }
            limits: { memory: "8Gi", cpu: "4000m" }
        - name: dspark-overlay
          image: aidendle94/sparkrun-vllm-ds4-gb10:production-3.7
          command: [bash, -c]
          args:
          - |
            set -e
            GIT=$(command -v git || true)
            if [ -z "$GIT" ]; then
              echo "[dspark-overlay] ERROR: git not found on this image"
              echo "[dspark-overlay] Trying pip install git…"
              pip install git 2>&1 | tail -2
              GIT=$(command -v git || true)
            fi
            if [ -z "$GIT" ]; then
              echo "[dspark-overlay] FATAL: cannot find or install git"
              exit 1
            fi
            echo "[dspark-overlay] Using git at: $GIT"
            echo "[dspark-overlay] Cloning Tony's DSpark overlay…"
            $GIT clone --depth 1 \
              https://github.com/tonyd2wild/DeepSeek-v4-Flash-DSpark-1M-NVFP4-KV-2x-DGX-Spark.git \
              /tmp/dspark-repo 2>&1
            echo "[dspark-overlay] Installing overlay files…"
            mkdir -p /overlay/vllm
            cp -r /tmp/dspark-repo/recipe/overlay/vllm/* /overlay/vllm/
            echo "[dspark-overlay] Patching envs.py for production-3.7 compat…"
            # The base image's _aiter_ops.py references VLLM_ROCM_USE_AITER_LINEAR_HIPBMM
            # which isn't in Tony's overlay envs.py — add it
            sed -i '/VLLM_ROCM_USE_AITER_LINEAR: bool = True/a\    VLLM_ROCM_USE_AITER_LINEAR_HIPBMM: bool = False' /overlay/vllm/envs.py
            sed -i '/"VLLM_ROCM_USE_AITER_LINEAR":/a\    "VLLM_ROCM_USE_AITER_LINEAR_HIPBMM": lambda: bool(int(os.getenv("VLLM_ROCM_USE_AITER_LINEAR_HIPBMM", "0"))),' /overlay/vllm/envs.py
            echo "[dspark-overlay] Done. Files:"
            find /overlay/vllm -type f | wc -l
          volumeMounts:
          - { name: overlay-files, mountPath: /overlay }
          resources:
            requests: { memory: "2Gi", cpu: "1000m" }
            limits: { memory: "4Gi", cpu: "2000m" }
        containers:
        - name: drop-caches-loop
          image: busybox:1.38
          command: [sh, -c, "while true; do sleep 15; echo 3 > /proc/sys/vm/drop_caches 2>/dev/null || true; done"]
          securityContext: { privileged: true }
          resources:
            requests: { memory: "64Mi", cpu: "100m" }
            limits: { memory: "256Mi", cpu: "500m" }
        - name: vllm
          image: aidendle94/sparkrun-vllm-ds4-gb10:production-3.7
          command: [bash, -c]
          args:
          - |
            echo 3 > /proc/sys/vm/drop_caches 2>/dev/null || true
            nvidia-smi --gpu-reset -i 0 >/dev/null 2>/dev/null || true
            # Find vllm site-packages path
            VLLM_DIR=$(python3 -c "import vllm; print(vllm.__path__[0])" 2>/dev/null || echo "/opt/env/lib/python3.12/site-packages/vllm")
            echo "[dspark] vLLM site-packages: $VLLM_DIR"
            # Apply DSpark overlay
            echo "[dspark] Applying DSpark overlay (17 files) to $VLLM_DIR…"
            mkdir -p "$VLLM_DIR"
            cp -r /overlay/vllm/* "$VLLM_DIR/"
            # Find vllm entrypoint
            VLLM_ENTRY=$(command -v vllm || echo "/usr/local/bin/vllm")
            echo "[dspark] Using entrypoint: $VLLM_ENTRY"
            echo "[dspark] Overlay applied. Starting vLLM with DSpark…"
            exec "$VLLM_ENTRY" serve /models/dsv4 \
              --served-model-name deepseek-v4-flash deepseek-v4-flash-dspark vllm/deepseek-v4-flash \
              --host 0.0.0.0 --port 8000 --trust-remote-code \
              --tensor-parallel-size 2 --pipeline-parallel-size 1 \
              --distributed-executor-backend mp \
              --kv-cache-dtype fp8 --block-size 256 \
              --max-model-len 1000000 \
              --max-num-seqs 6 --max-num-batched-tokens 8192 \
              --max-cudagraph-capture-size 6 \
              --gpu-memory-utilization 0.78 \
              --enable-prefix-caching \
              --enable-flashinfer-autotune \
              --async-scheduling \
              --enable-chunked-prefill \
              --compilation-config '{"cudagraph_mode":"PIECEWISE"}' \
              --tokenizer-mode deepseek_v4 \
              --tool-call-parser deepseek_v4 --enable-auto-tool-choice \
              --reasoning-parser deepseek_v4 \
              --reasoning-config '{"reasoning_parser":"deepseek_v4","reasoning_start_str":"","reasoning_end_str":""}' \
              --default-chat-template-kwargs '{"thinking":false}' \
              --generation-config vllm \
              --speculative-config '{"method":"dspark","num_speculative_tokens":5,"draft_sample_method":"probabilistic"}' \
              --nnodes 2 --node-rank 1 \
              --master-addr 192.168.74.1 --master-port 25002 \
              --headless
          env:
          - { name: NODE_RANK, value: "1" }
          - { name: VLLM_HOST_IP, value: "192.168.74.2" }
          - { name: MASTER_ADDR, value: "192.168.74.1" }
          - { name: HEADLESS, value: "1" }
          - { name: VLLM_USE_B12X_MOE, value: "1" }
          - { name: VLLM_USE_B12X_WO_PROJECTION, value: "1" }
          - { name: VLLM_USE_FLASHINFER_SAMPLER, value: "1" }
          - { name: VLLM_SPARSE_INDEXER_MAX_LOGITS_MB, value: "256" }
          - { name: VLLM_ALLOW_LONG_MAX_MODEL_LEN, value: "1" }
          - { name: VLLM_DSPARK_GPU_REJECTED_CONTEXT_MASK, value: "1" }
          - { name: VLLM_DSPARK_CONFIDENCE_THRESHOLD, value: "0.0" }
          - { name: VLLM_DSPARK_CONFIDENCE_SCHEDULER, value: "off" }
          - { name: VLLM_DSPARK_LOCAL_ARGMAX, value: "1" }
          - { name: VLLM_DSPARK_REPLICATE_MARKOV_W1, value: "1" }
          - { name: VLLM_DSPARK_FUSED_MARKOV_ARGMAX, value: "0" }
          - { name: VLLM_DSPARK_REFERENCE_KV_QUANT_DEQUANT, value: "0" }
          - { name: VLLM_DSPARK_HARDWARE_SCHEDULER_EARLY_STOP, value: "1" }
          - { name: VLLM_DSV4_B12X_COMPRESSED_MLA, value: "0" }
          - { name: VLLM_DSV4_DSPARK_DEFER_TARGET_CAPTURE, value: "0" }
          - { name: VLLM_DSV4_DSPARK_DEFER_TARGET_CAPTURE_EXACT, value: "0" }
          - { name: VLLM_B12X_W4A16_FORCE_BLOCKS_PER_SM, value: "0" }
          - { name: VLLM_B12X_W4A16_FORCE_BLOCKS_MAX_M, value: "16" }
          - { name: VLLM_B12X_W4A16_FORCE_TILE_CONFIG, value: "" }
          - { name: B12X_W4A16_TC_DECODE, value: "0" }
          - { name: PYTORCH_CUDA_ALLOC_CONF, value: "expandable_segments:True" }
          - { name: NCCL_NVLS_ENABLE, value: "0" }
          - { name: NCCL_NET, value: "IB" }
          - { name: VLLM_PORT, value: "25001" }
          - { name: TRANSFORMERS_OFFLINE, value: "1" }
          - { name: NCCL_SOCKET_IFNAME, value: "eth2" }
          - { name: GLOO_SOCKET_IFNAME, value: "eth2" }
          - { name: NCCL_IB_HCA, value: "mlx5_1" }
          - { name: NCCL_IB_GID_INDEX, value: "3" }
          - { name: NCCL_IB_DISABLE, value: "0" }
          - { name: NCCL_NET_GDR_LEVEL, value: "5" }
          - { name: NCCL_IB_TIMEOUT, value: "22" }
          - { name: NCCL_DEBUG, value: "WARN" }
          - { name: NCCL_CROSS_NIC, value: "1" }
          - { name: NCCL_IGNORE_CPU_AFFINITY, value: "1" }
          - { name: NCCL_CUMEM_ENABLE, value: "0" }
          - { name: HUGGING_FACE_HUB_TOKEN, valueFrom: { secretKeyRef: { name: hf-secret, key: HF_TOKEN } } }
          - { name: HF_HOME, value: "/models/huggingface" }
          - { name: VLLM_COMPILE_CACHE_DIR, value: "/models/compile-cache" }
          - { name: VLLM_CACHE_ROOT, value: "/models/vllm-cache" }
          securityContext:
            privileged: true
            capabilities:
              add: ["IPC_LOCK", "SYS_RESOURCE"]
          volumeMounts:
          - { name: overlay-files, mountPath: /overlay }
          - { name: models, mountPath: /models }
          - { name: shm, mountPath: /dev/shm }
          - { name: infiniband, mountPath: /dev/infiniband }
          - { name: sys-ib, mountPath: /sys/class/infiniband }
          resources:
            requests: { memory: "93Gi", cpu: "8000m", nvidia.com/gpu: "1" }
            limits: { memory: "93Gi", nvidia.com/gpu: "1" }
        volumes:
        - name: overlay-files
          emptyDir: {}
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: "64Gi"
        - name: infiniband
          hostPath: { path: /dev/infiniband, type: "" }
        - name: sys-ib
          hostPath: { path: /sys/class/infiniband, type: "" }
        - name: models
          persistentVolumeClaim: { claimName: dsv4-worker-models }
        - name: download-script
          configMap:
            name: dsv4-download-script
---
apiVersion: v1
kind: Service
metadata:
  name: dsv4
  namespace: ai
  labels: { app: dsv4 }
spec:
  type: ClusterIP
  selector: { app: dsv4, role: head }
  ports:
  - { name: http, port: 8000, protocol: TCP, targetPort: 8000 }
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: dsv4
  namespace: ai
  labels:
    app: dsv4
    release: kube-prometheus-stack
spec:
  endpoints:
  - port: http
    path: /metrics
    interval: 15s
    scrapeTimeout: 10s
    metricRelabelings:
    - action: replace
      replacement: talos-stpetersburg
      targetLabel: cluster
  selector:
    matchLabels:
      app: dsv4
  namespaceSelector:
    matchNames:
    - ai
