---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: woodpecker
spec:
  interval: 30m
  chart:
    spec:
      chart: woodpecker
      version: 3.6.5
      sourceRef:
        kind: HelmRepository
        name: woodpecker
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    force: true
    remediation:
      retries: 3
  values:
    server:
      enabled: true
      statefulSet:
        replicaCount: 1
      persistentVolume:
        enabled: true
        size: 10Gi
        storageClass: ${STORAGECLASS_DEFAULT}
        mountPath: /var/lib/woodpecker
      env:
        WOODPECKER_ADMIN: raj
        WOODPECKER_OPEN: "true"
        WOODPECKER_HOST: https://woodpecker.${COMMON_DOMAIN}
        WOODPECKER_FORGEJO: "true"
        WOODPECKER_FORGEJO_URL: https://forgejo.${COMMON_DOMAIN}
        WOODPECKER_FORGEJO_CLIENT: ${WOODPECKER_FORGEJO_CLIENT}
        WOODPECKER_FORGEJO_SECRET: ${WOODPECKER_FORGEJO_SECRET}
        WOODPECKER_LOG_LEVEL: info
        WOODPECKER_DATABASE_DRIVER: postgres
        WOODPECKER_DATABASE_DATASOURCE:
          valueFrom:
            secretKeyRef:
              name: woodpecker-postgres-app
              key: uri
      createAgentSecret: true
      service:
        type: ClusterIP
        port: 80
      resources:
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          cpu: 1
          memory: 1Gi
    agent:
      enabled: true
      replicaCount: 3
      env:
        WOODPECKER_SERVER: woodpecker-server:9000
        WOODPECKER_BACKEND: kubernetes
        WOODPECKER_BACKEND_K8S_NAMESPACE: woodpecker
        WOODPECKER_BACKEND_K8S_STORAGE_CLASS: ${STORAGECLASS_DEFAULT}
        WOODPECKER_BACKEND_K8S_VOLUME_SIZE: 10G
        WOODPECKER_BACKEND_K8S_STORAGE_RWX: false
        WOODPECKER_LOG_LEVEL: info
      persistence:
        enabled: false
      serviceAccount:
        create: true
        rbac:
          create: true
      resources:
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          cpu: 1
          memory: 1Gi
