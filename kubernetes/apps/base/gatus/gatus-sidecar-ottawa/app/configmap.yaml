---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gatus-config-ottawa
  namespace: gatus
data:
  config.yaml: |
    alerting:
      discord:
        webhook-url: "${discord-webhook-url}"
        failure-threshold: 2
        success-threshold: 1

    ui:
      title: "K8s Ottawa Status"
      description: "GitOps-managed Kubernetes cluster monitoring"
      header: "K8s-Ottawa Infrastructure Dashboard"
      logo: "https://raw.githubusercontent.com/kubernetes/kubernetes/master/logo/logo.png"
      link: "https://github.com/keiretsu-labs/kubernetes-manifests"
      buttons:
        - name: "GitOps Repository"
          link: "https://github.com/keiretsu-labs/kubernetes-manifests"

    storage:
      type: postgres
      config:
        address: postgres://gatus-postgres.gatus:5432
        user: gatus
        password: "${gatus-pg-password}"

    # Static endpoints — everything else is auto-discovered by the sidecar via HTTPRoutes
    endpoints:
      # === External ═══════════════════════════
      - name: Internet
        group: External
        url: https://1.1.1.1
        interval: 60s
        client:
          dns-resolver: "tcp://8.8.8.8:53"
        conditions:
          - "[STATUS] == 200"
          - "[RESPONSE_TIME] < 2000"
        alerts:
          - type: discord
            send-on-resolved: true

      # === Cross-Cluster ══════════════════════
      - name: K8s Ottawa Operator
        group: Cross-Cluster
        url: https://ottawa-k8s-operator.keiretsu.ts.net:443/readyz
        interval: 60s
        conditions:
          - "[STATUS] == 200"
          - "[RESPONSE_TIME] < 2000"
          - "[CERTIFICATE_EXPIRATION] > 168h"
        alerts:
          - type: discord
            send-on-resolved: true
      - name: K8s Robbinsdale Operator
        group: Cross-Cluster
        url: https://robbinsdale-k8s-operator.keiretsu.ts.net:443/readyz
        interval: 60s
        conditions:
          - "[STATUS] == 200"
          - "[RESPONSE_TIME] < 2000"
          - "[CERTIFICATE_EXPIRATION] > 168h"
        alerts:
          - type: discord
            send-on-resolved: true
      - name: K8s StPetersburg Operator
        group: Cross-Cluster
        url: https://stpetersburg-k8s-operator.keiretsu.ts.net:443/readyz
        interval: 60s
        conditions:
          - "[STATUS] == 200"
          - "[RESPONSE_TIME] < 2000"
          - "[CERTIFICATE_EXPIRATION] > 168h"
        alerts:
          - type: discord
            send-on-resolved: true

      # === Nodes ══════════════════════════════
      - name: Rei (Node)
        group: Nodes
        url: tcp://rei.killinit.internal:6443
        interval: 60s
        conditions:
          - "[CONNECTED] == true"
          - "[RESPONSE_TIME] < 1000"
        alerts:
          - type: discord
            send-on-resolved: true
      - name: Asuka (Node)
        group: Nodes
        url: tcp://asuka.killinit.internal:6443
        interval: 60s
        conditions:
          - "[CONNECTED] == true"
          - "[RESPONSE_TIME] < 1000"
        alerts:
          - type: discord
            send-on-resolved: true
      - name: Kaji (Node)
        group: Nodes
        url: tcp://kaji.killinit.internal:6443
        interval: 60s
        conditions:
          - "[CONNECTED] == true"
          - "[RESPONSE_TIME] < 1000"
        alerts:
          - type: discord
            send-on-resolved: true
      - name: Nagato (NAS)
        group: Nodes
        url: tcp://nagato.killinit.internal:445
        interval: 60s
        client:
          insecure: true
        conditions:
          - "[CONNECTED] == true"
          - "[RESPONSE_TIME] < 1000"
        alerts:
          - type: discord
            send-on-resolved: true
      - name: JetKVM
        group: Nodes
        url: tcp://jetkvm.killinit.internal:80
        interval: 60s
        client:
          insecure: true
        conditions:
          - "[CONNECTED] == true"
          - "[RESPONSE_TIME] < 1000"
        alerts:
          - type: discord
            send-on-resolved: true

      # === Control Plane ═════════════════════
      - name: etcd (rei)
        group: Control Plane
        url: http://rei.killinit.internal:2381/metrics
        interval: 60s
        conditions:
          - "[STATUS] == 200"
          - "[RESPONSE_TIME] < 500"
        alerts:
          - type: discord
            send-on-resolved: true
      - name: etcd (asuka)
        group: Control Plane
        url: http://asuka.killinit.internal:2381/metrics
        interval: 60s
        conditions:
          - "[STATUS] == 200"
          - "[RESPONSE_TIME] < 500"
        alerts:
          - type: discord
            send-on-resolved: true
      - name: etcd (kaji)
        group: Control Plane
        url: http://kaji.killinit.internal:2381/metrics
        interval: 60s
        conditions:
          - "[STATUS] == 200"
          - "[RESPONSE_TIME] < 500"
        alerts:
          - type: discord
            send-on-resolved: true
      - name: Kubernetes API Ready
        group: Control Plane
        url: https://k8s.killinit.internal:6443/readyz
        interval: 60s
        client:
          insecure: true
        conditions:
          - "[STATUS] == 401"
          - "[RESPONSE_TIME] < 2000"
          - "[CERTIFICATE_EXPIRATION] > 168h"
        alerts:
          - type: discord
            send-on-resolved: true

      # === Storage ═══════════════════════════
      - name: Ceph MGR Metrics
        group: Storage
        url: http://rook-ceph-mgr.rook-ceph:9283
        interval: 60s
        conditions:
          - "[STATUS] == 200"
          - "[RESPONSE_TIME] < 2000"
        alerts:
          - type: discord
            send-on-resolved: true
      - name: Garage Robbinsdale (Cross-Cluster)
        group: Storage
        url: tcp://robbinsdale-garage.garage:3900
        interval: 60s
        client:
          timeout: 30s
        conditions:
          - "[CONNECTED] == true"
        alerts:
          - type: discord
            send-on-resolved: true
      - name: Garage StPetersburg (Cross-Cluster)
        group: Storage
        url: tcp://stpetersburg-garage.garage:3900
        interval: 60s
        client:
          timeout: 30s
        conditions:
          - "[CONNECTED] == true"
        alerts:
          - type: discord
            send-on-resolved: true