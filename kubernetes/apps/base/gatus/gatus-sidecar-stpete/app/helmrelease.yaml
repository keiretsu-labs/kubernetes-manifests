---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gatus
spec:
  interval: 30m
  chart:
    spec:
      chart: gatus-sidecar
      version: "0.3.6"
      sourceRef:
        kind: HelmRepository
        name: home-operations
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    priorityClassName: "infra-critical"
    podLabels:
      fwmark-workaround: v1
    podAnnotations:
      checksum/webhook: "${DISCORD_WEBHOOK_URL}"

    gatus:
      image:
        tag: v5.36.0
      logLevel: INFO
      env:
        TZ: America/Chicago
      envFrom:
        - secretRef:
            name: gatus

    sidecar:
      enabled: true
      logLevel: info
      gatewayNames:
        - public
        - ts
        - private
      kinds:
        ingress:
          enable: false
          auto: false
        httproute:
          enable: true
          auto: true
        service:
          enable: true
          auto: false
        ingressroute:
          enable: false
          auto: false
      defaultInterval: 1m
      probePaths: true

    config:
      existingConfigMap: gatus-config-stpetersburg
      items:
        - key: config.yaml
          path: config.yaml

    httpRoute:
      enabled: true
      annotations:
        item.homer.rajsingh.info/name: "Gatus"
        item.homer.rajsingh.info/subtitle: "Service Monitoring"
        item.homer.rajsingh.info/logo: "https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/svg/gatus.svg"
        item.homer.rajsingh.info/keywords: "monitoring, uptime, status"
        service.homer.rajsingh.info/name: "Infrastructure"
        service.homer.rajsingh.info/icon: "fas fa-server"
      parentRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: public
          namespace: home
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: ts
          namespace: home
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: private
          namespace: home
      hostnames:
        - "status.${CLUSTER_DOMAIN}"

    persistence:
      enabled: true
      storageClass: local-path
      size: 1Gi

    resources:
      limits:
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 128Mi