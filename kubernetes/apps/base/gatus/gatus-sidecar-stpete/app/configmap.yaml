---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gatus-config-stpetersburg
  namespace: gatus
data:
  config.yaml: |
    alerting:
      discord:
        webhook-url: "${discord-webhook-url}"
        failure-threshold: 2
        success-threshold: 1

    ui:
      title: "K8s St. Petersburg Status"
      description: "GitOps-managed GPU cluster monitoring"
      header: "K8s-StPetersburg GPU Infrastructure Dashboard"
      link: "https://github.com/keiretsu-labs/kubernetes-manifests"
      buttons:
        - name: "GitOps Repository"
          link: "https://github.com/keiretsu-labs/kubernetes-manifests"

    endpoints:
      # === External ═══════════════════════════
      - name: Internet
        group: External
        url: https://1.1.1.1
        interval: 60s
        client:
          dns-resolver: "tcp://8.8.8.8:53"
        conditions:
          - "[STATUS] == 200"
          - "[RESPONSE_TIME] < 2000"
        alerts:
          - type: discord
            send-on-resolved: true

      # === Cross-Cluster ══════════════════════
      - name: K8s Ottawa Operator
        group: Cross-Cluster
        url: https://ottawa-k8s-operator.keiretsu.ts.net:443/readyz
        interval: 60s
        conditions:
          - "[STATUS] == 200"
          - "[RESPONSE_TIME] < 2000"
          - "[CERTIFICATE_EXPIRATION] > 168h"
        alerts:
          - type: discord
            send-on-resolved: true
      - name: K8s Robbinsdale Operator
        group: Cross-Cluster
        url: https://robbinsdale-k8s-operator.keiretsu.ts.net:443/readyz
        interval: 60s
        conditions:
          - "[STATUS] == 200"
          - "[RESPONSE_TIME] < 2000"
          - "[CERTIFICATE_EXPIRATION] > 168h"
        alerts:
          - type: discord
            send-on-resolved: true
      - name: K8s StPetersburg Operator
        group: Cross-Cluster
        url: https://stpetersburg-k8s-operator.keiretsu.ts.net:443/readyz
        interval: 60s
        conditions:
          - "[STATUS] == 200"
          - "[RESPONSE_TIME] < 2000"
          - "[CERTIFICATE_EXPIRATION] > 168h"
        alerts:
          - type: discord
            send-on-resolved: true

      # === Control Plane ═════════════════════
      - name: Kubernetes API Ready
        group: Control Plane
        url: https://k8s.stpetersburg.internal:6443/readyz
        interval: 60s
        client:
          insecure: true
        conditions:
          - "[STATUS] == 401"
          - "[RESPONSE_TIME] < 2000"
          - "[CERTIFICATE_EXPIRATION] > 168h"
        alerts:
          - type: discord
            send-on-resolved: true

      # === Storage ═══════════════════════════
      - name: Garage Ottawa
        group: Storage
        url: tcp://ottawa-garage.garage:3900
        interval: 60s
        client:
          timeout: 30s
        conditions:
          - "[CONNECTED] == true"
        alerts:
          - type: discord
            send-on-resolved: true
      - name: Garage Robbinsdale
        group: Storage
        url: tcp://robbinsdale-garage.garage:3900
        interval: 60s
        client:
          timeout: 30s
        conditions:
          - "[CONNECTED] == true"
        alerts:
          - type: discord
            send-on-resolved: true