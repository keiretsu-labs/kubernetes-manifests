---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gatus
spec:
  interval: 30m
  chart:
    spec:
      chart: gatus
      version: "1.5.0"
      sourceRef:
        kind: HelmRepository
        name: twin
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    image:
      tag: v5.35.0
    # Forces a Cilium identity whose low byte != 0x08, avoiding a collision with
    # Tailscale's LinuxBypassMark (0x80000/0xff0000) that diverts ProxyGroup egress
    # traffic out eth0 instead of tailscale0. Do not remove without verifying
    # the resulting identity hex; ~1 in 256 identities will reproduce the bug.
    podLabels:
      fwmark-workaround: v1
    podAnnotations:
      checksum/webhook: "${DISCORD_WEBHOOK_URL}"
    envFrom:
      - secretRef:
          name: gatus
    config:
      alerting:
        discord:
          webhook-url: "$${discord-webhook-url}"
          failure-threshold: 3
          success-threshold: 2
      ui:
        title: "K8s St. Petersburg Status"
        description: "GitOps-managed Kubernetes cluster monitoring"
        header: "K8s-StPetersburg Infrastructure Dashboard"
      endpoints:
        - name: Kubernetes API
          group: kubernetes
          url: https://k8s.stpetersburg.internal:6443/readyz
          interval: 60s
          client:
            insecure: true
          conditions:
            - "[STATUS] == 401"
            - "[RESPONSE_TIME] < 2000"
            - "[CERTIFICATE_EXPIRATION] > 168h"
          alerts:
            - type: discord
              send-on-resolved: true
        # === Storage: Garage Cross-Cluster ===
        - name: Garage Local (StPetersburg)
          group: storage
          url: tcp://garage.garage:3900
          interval: 60s
          conditions:
            - "[CONNECTED] == true"
            - "[RESPONSE_TIME] < 1000"
          alerts:
            - type: discord
              send-on-resolved: true
        - name: Garage Ottawa
          group: storage
          url: tcp://ottawa-garage.garage:3900
          interval: 60s
          client:
            timeout: 30s
          conditions:
            - "[CONNECTED] == true"
          alerts:
            - type: discord
              send-on-resolved: true
        - name: Garage Robbinsdale
          group: storage
          url: tcp://robbinsdale-garage.garage:3900
          interval: 60s
          client:
            timeout: 30s
          conditions:
            - "[CONNECTED] == true"
          alerts:
            - type: discord
              send-on-resolved: true
