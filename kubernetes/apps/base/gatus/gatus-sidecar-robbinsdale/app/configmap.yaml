---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gatus-config-robbinsdale
  namespace: gatus
data:
  config.yaml: |
    alerting:
      discord:
        webhook-url: "${discord-webhook-url}"
        failure-threshold: 2
        success-threshold: 1

    ui:
      title: "K8s Robbinsdale Status"
      description: "GitOps-managed Kubernetes cluster monitoring"
      header: "K8s-Robbinsdale Infrastructure Dashboard"
      logo: "https://raw.githubusercontent.com/kubernetes/kubernetes/master/logo/logo.png"
      link: "https://github.com/keiretsu-labs/kubernetes-manifests"
      buttons:
        - name: "GitOps Repository"
          link: "https://github.com/keiretsu-labs/kubernetes-manifests"

    endpoints:
      # === External ═══════════════════════════
      - name: Internet
        group: External
        url: https://1.1.1.1
        interval: 60s
        client:
          dns-resolver: "tcp://8.8.8.8:53"
        conditions:
          - "[STATUS] == 200"
          - "[RESPONSE_TIME] < 2000"
        alerts:
          - type: discord
            send-on-resolved: true

      # === Websites ═══════════════════════════
      - name: Raj Singh Portfolio
        group: Websites
        url: https://www.rajsingh.info
        interval: 60s
        conditions:
          - "[STATUS] == 200"
          - "[RESPONSE_TIME] < 2000"
          - "[CERTIFICATE_EXPIRATION] > 168h"
        alerts:
          - type: discord
            send-on-resolved: true
      - name: Luke Houge Portfolio
        group: Websites
        url: https://www.lukehouge.com
        interval: 60s
        conditions:
          - "[STATUS] == 200"
          - "[RESPONSE_TIME] < 2000"
          - "[CERTIFICATE_EXPIRATION] > 168h"
        alerts:
          - type: discord
            send-on-resolved: true
      - name: Cloudflared Tunnel
        group: Websites
        url: https://status.rajsingh.info
        interval: 60s
        client:
          dns-resolver: "tcp://1.1.1.1:53"
        conditions:
          - "[STATUS] == 200"
          - "[RESPONSE_TIME] < 2000"
          - "[CERTIFICATE_EXPIRATION] > 168h"
        alerts:
          - type: discord
            send-on-resolved: true

      # === Cross-Cluster ══════════════════════
      - name: K8s Ottawa Operator
        group: Cross-Cluster
        url: https://ottawa-k8s-operator.keiretsu.ts.net:443/readyz
        interval: 60s
        conditions:
          - "[STATUS] == 200"
          - "[RESPONSE_TIME] < 2000"
          - "[CERTIFICATE_EXPIRATION] > 168h"
        alerts:
          - type: discord
            send-on-resolved: true
      - name: K8s Robbinsdale Operator
        group: Cross-Cluster
        url: https://robbinsdale-k8s-operator.keiretsu.ts.net:443/readyz
        interval: 60s
        conditions:
          - "[STATUS] == 200"
          - "[RESPONSE_TIME] < 2000"
          - "[CERTIFICATE_EXPIRATION] > 168h"
        alerts:
          - type: discord
            send-on-resolved: true
      - name: K8s StPetersburg Operator
        group: Cross-Cluster
        url: https://stpetersburg-k8s-operator.keiretsu.ts.net:443/readyz
        interval: 60s
        conditions:
          - "[STATUS] == 200"
          - "[RESPONSE_TIME] < 2000"
          - "[CERTIFICATE_EXPIRATION] > 168h"
        alerts:
          - type: discord
            send-on-resolved: true

      # === Nodes ══════════════════════════════
      - name: Stone (Node)
        group: Nodes
        url: tcp://stone.local:6443
        interval: 60s
        conditions:
          - "[CONNECTED] == true"
          - "[RESPONSE_TIME] < 1000"
        alerts:
          - type: discord
            send-on-resolved: true
      - name: Tank (Node)
        group: Nodes
        url: tcp://tank.local:6443
        interval: 60s
        conditions:
          - "[CONNECTED] == true"
          - "[RESPONSE_TIME] < 1000"
        alerts:
          - type: discord
            send-on-resolved: true
      - name: Titan (Node)
        group: Nodes
        url: tcp://titan.local:6443
        interval: 60s
        conditions:
          - "[CONNECTED] == true"
          - "[RESPONSE_TIME] < 1000"
        alerts:
          - type: discord
            send-on-resolved: true
      - name: Ubiquiti UNAS Pro
        group: Nodes
        url: https://nas.local
        interval: 60s
        client:
          insecure: true
        conditions:
          - "[STATUS] == 200"
          - "[RESPONSE_TIME] < 3000"
          - "[CERTIFICATE_EXPIRATION] > 168h"
        alerts:
          - type: discord
            send-on-resolved: true

      # === Control Plane ═════════════════════
      - name: Kubernetes API Ready
        group: Control Plane
        url: https://k8s.robbinsdale.local:6443/readyz
        interval: 60s
        client:
          insecure: true
        conditions:
          - "[STATUS] == 401"
          - "[RESPONSE_TIME] < 2000"
          - "[CERTIFICATE_EXPIRATION] > 168h"
        alerts:
          - type: discord
            send-on-resolved: true

      # === Storage ═══════════════════════════
      - name: Garage Ottawa
        group: Storage
        url: tcp://ottawa-garage.garage:3900
        interval: 60s
        client:
          timeout: 30s
        conditions:
          - "[CONNECTED] == true"
        alerts:
          - type: discord
            send-on-resolved: true
      - name: Garage StPetersburg
        group: Storage
        url: tcp://stpetersburg-garage.garage:3900
        interval: 60s
        client:
          timeout: 30s
        conditions:
          - "[CONNECTED] == true"
        alerts:
          - type: discord
            send-on-resolved: true