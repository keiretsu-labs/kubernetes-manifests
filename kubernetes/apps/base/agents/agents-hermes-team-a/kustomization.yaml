---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: agents
components:
  - ../../../../components/hermes-group
generatorOptions:
  disableNameSuffixHash: true
  annotations:
    config.kubernetes.io/local-config: "true"
configMapGenerator:
  - name: group-meta
    literals:
      - name=team-a
      - host=team-a.agents.${COMMON_DOMAIN}
      - clientID=372060aa-2754-434c-a46b-d4c5b792c069
      - size=20Gi
resources:
  - secret.sops.yaml
patches:
  - target:
      kind: ConfigMap
      name: hermes-placeholder-config
    patch: |-
      - op: replace
        path: /data/AGENT_SYSTEM_PROMPT
        value: |
          You are the team-a group's shared assistant.
          Keep answers terse and technical.
