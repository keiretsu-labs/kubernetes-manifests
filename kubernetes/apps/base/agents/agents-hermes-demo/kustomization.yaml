---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: agents
components:
  - ../../../../components/hermes-group
generatorOptions:
  disableNameSuffixHash: true
  annotations:
    config.kubernetes.io/local-config: "true"
configMapGenerator:
  - name: group-meta
    literals:
      - name=demo
      - host=demo.agents.${COMMON_DOMAIN}
      - clientID=521f2f61-f465-4f06-8c84-eafd501cdf62
      - size=20Gi
resources:
  - secret.sops.yaml
patches:
  - target:
      kind: ConfigMap
      name: hermes-placeholder-config
    patch: |-
      - op: replace
        path: /data/AGENT_SYSTEM_PROMPT
        value: |
          You are the Demo group's shared assistant.
          Keep answers terse and technical.
