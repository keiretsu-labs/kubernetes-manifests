---
# Shared Tinyauth extAuth for all *.hermes.keiretsu.top agent dashboards.
# Uses the global tinyauth config (Google OAuth, whitelist: rajsinghcpre@gmail.com).
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: hermes-auth
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: teaspoon-hermes-web
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: assistant-raj-hermes-web
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: kartik-hermes-web
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: abtar-hermes-web
  extAuth:
    headersToExtAuth:
      - cookie
      - x-forwarded-proto
      - x-forwarded-for
      - user-agent
    http:
      backendRefs:
        - name: tinyauth
          namespace: tinyauth
          port: 3000
      path: "/api/auth/envoy?path="
      headersToBackend:
        - remote-user
        - remote-email
        - remote-name
        - remote-groups