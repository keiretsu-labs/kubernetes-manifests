---
# Per-dashboard access control for *.hermes.keiretsu.top via tinyauth.
# tinyauth does authN only (google login, whitelist in tinyauth.env, injects
# remote-email); the per-user authorization decision lives on each route below.
# EG's RBAC filter runs after extAuth, so it matches the injected Remote-Email.
# split out of the old single hermes-auth policy so each dashboard gets its own
# allow-list:
#   teaspoon.hermes -> raj + kartik (shared)
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: teaspoon-hermes-auth
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: teaspoon-hermes-web
  extAuth:
    headersToExtAuth: [cookie, x-forwarded-proto, x-forwarded-for, user-agent]
    http:
      backendRefs:
        - name: tinyauth
          namespace: tinyauth
          port: 3000
      path: "/api/auth/envoy?path="
      headersToBackend: [remote-user, remote-email, remote-name, remote-groups]
  authorization:
    defaultAction: Deny
    rules:
      - name: allow-shared
        action: Allow
        principal:
          headers:
            - name: Remote-Email
              values: ["rajsinghcpre@gmail.com", "kartikbharath@gmail.com"]
