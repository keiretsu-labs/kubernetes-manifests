---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: abtar
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: abtar
  template:
    metadata:
      labels:
        app.kubernetes.io/name: abtar
        agents.keiretsu.ts.net/persona: assistant
        agents.keiretsu.ts.net/owner: raj
    spec:
      initContainers:
        - name: seed-aws-credentials
          image: busybox:1.38
          command:
            - sh
            - -c
            - |
              set -eu
              mkdir -p /opt/data/.aws
              umask 077
              cat >/opt/data/.aws/credentials <<EOF
              [default]
              aws_access_key_id = $${AWS_ACCESS_KEY_ID}
              aws_secret_access_key = $${AWS_SECRET_ACCESS_KEY}
              EOF
              cat >/opt/data/.aws/config <<EOF
              [default]
              region = $${AWS_REGION}
              endpoint_url = $${AWS_ENDPOINT_URL}
              s3 =
                  endpoint_url = $${AWS_ENDPOINT_URL_S3}
                  addressing_style = path
              EOF
          envFrom:
            - secretRef:
                name: abtar-s3
          volumeMounts:
            - name: data
              mountPath: /opt/data
      containers:
        - name: gateway
          image: nousresearch/hermes-agent:v2026.7.7
          args: ["gateway", "run"]
          envFrom:
            - configMapRef:
                name: abtar-config
            - secretRef:
                name: abtar-secrets
            - secretRef:
                name: abtar-s3
          env:
            - name: AWS_SHARED_CREDENTIALS_FILE
              value: /opt/data/.aws/credentials
            - name: AWS_CONFIG_FILE
              value: /opt/data/.aws/config
            # v2026.5.29 introduced s6 supervision — dashboard runs in the same
            # container as the gateway. HERMES_DASHBOARD=1 spawns it; TUI=1
            # enables the embedded chat tab; HOST=0.0.0.0 exposes it.
            - name: HERMES_DASHBOARD
              value: "1"
            - name: HERMES_DASHBOARD_TUI
              value: "1"
            - name: HERMES_DASHBOARD_HOST
              value: "0.0.0.0"
            - name: HERMES_DASHBOARD_PORT
              value: "9119"
            # Skip the dashboard's OAuth gate. Safe here because access is
            # already gated at the network layer by Tailscale `tag:raj` ACL.
            - name: HERMES_DASHBOARD_INSECURE
              value: "1"
          ports:
            - name: gateway
              containerPort: 8642
              protocol: TCP
            - name: dashboard
              containerPort: 9119
              protocol: TCP
          resources:
            requests:
              cpu: 1000m
              memory: 2Gi
            limits:
              memory: 6Gi
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: abtar-data
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
      terminationGracePeriodSeconds: 30
