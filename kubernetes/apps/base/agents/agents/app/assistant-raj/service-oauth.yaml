---
apiVersion: v1
kind: Service
metadata:
  name: assistant-raj-rh-oauth
  annotations:
    tailscale.com/hostname: rh-oauth
    tailscale.com/tags: "tag:raj"
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  selector:
    app.kubernetes.io/name: assistant-raj
  ports:
    - name: oauth-callback
      port: 53279
      targetPort: 53279
      protocol: TCP
