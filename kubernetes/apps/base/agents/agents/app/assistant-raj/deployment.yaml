---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: assistant-raj
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: assistant-raj
  template:
    metadata:
      labels:
        app.kubernetes.io/name: assistant-raj
        agents.keiretsu.ts.net/persona: assistant
        agents.keiretsu.ts.net/owner: raj
    spec:
      initContainers:
        - name: seed-aws-credentials
          image: busybox:1.38
          command:
            - sh
            - -c
            - |
              set -eu
              mkdir -p /opt/data/.aws
              umask 077
              cat >/opt/data/.aws/credentials <<EOF
              [default]
              aws_access_key_id = $${AWS_ACCESS_KEY_ID}
              aws_secret_access_key = $${AWS_SECRET_ACCESS_KEY}
              EOF
              cat >/opt/data/.aws/config <<EOF
              [default]
              region = $${AWS_REGION}
              endpoint_url = $${AWS_ENDPOINT_URL}
              s3 =
                  endpoint_url = $${AWS_ENDPOINT_URL_S3}
                  addressing_style = path
              EOF
          envFrom:
            - secretRef:
                name: assistant-raj-s3
          volumeMounts:
            - name: data
              mountPath: /opt/data
      containers:
        - name: gateway
          image: nousresearch/hermes-agent:v2026.7.1
          args: ["gateway", "run"]
          envFrom:
            - configMapRef:
                name: assistant-raj-config
            - secretRef:
                name: assistant-raj-secrets
            - secretRef:
                name: assistant-raj-s3
          env:
            - name: AWS_SHARED_CREDENTIALS_FILE
              value: /opt/data/.aws/credentials
            - name: AWS_CONFIG_FILE
              value: /opt/data/.aws/config
            # v2026.5.29 introduced s6 supervision — dashboard runs in the same
            # container as the gateway. HERMES_DASHBOARD=1 spawns it; TUI=1
            # enables the embedded chat tab.
            #
            # v2026.7.1 removed HERMES_DASHBOARD_INSECURE — a non-loopback
            # dashboard bind now hard-fails without an auth provider. Bind to
            # 127.0.0.1:9120 (loopback → no auth gate) and proxy 0.0.0.0:9119
            # → 127.0.0.1:9120 via a postStart Python TCP proxy. The dashboard
            # route is gated by tinyauth SecurityPolicy + Tailscale tag:raj
            # ACL, so no second auth prompt is needed.
            - name: HERMES_DASHBOARD
              value: "1"
            - name: HERMES_DASHBOARD_TUI
              value: "1"
            - name: HERMES_DASHBOARD_HOST
              value: "127.0.0.1"
            - name: HERMES_DASHBOARD_PORT
              value: "9120"
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    cat > /tmp/dashboard-proxy.py <<'PYEOF'
                    import socket, threading
                    def fwd(s, d):
                        try:
                            while True:
                                b = s.recv(8192)
                                if not b: break
                                d.sendall(b)
                        except: pass
                        finally:
                            s.close(); d.close()
                    l = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                    l.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
                    l.bind(("0.0.0.0", 9119)); l.listen(128)
                    while True:
                        c, _ = l.accept()
                        try:
                            u = socket.create_connection(("127.0.0.1", 9120), timeout=5)
                            threading.Thread(target=fwd, args=(c, u), daemon=True).start()
                            threading.Thread(target=fwd, args=(u, c), daemon=True).start()
                        except: c.close()
                    PYEOF
                    (while true; do python3 /tmp/dashboard-proxy.py 2>/dev/null; sleep 1; done) &
          ports:
            - name: gateway
              containerPort: 8642
              protocol: TCP
            - name: dashboard
              containerPort: 9119
              protocol: TCP
          resources:
            requests:
              cpu: 1000m
              memory: 2Gi
            limits:
              memory: 6Gi
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: assistant-raj-data
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
      terminationGracePeriodSeconds: 30
