---
apiVersion: v1
kind: Service
metadata:
  name: assistant-raj-ts
  annotations:
    tailscale.com/hostname: assistant-raj
    tailscale.com/tags: "tag:raj"
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  selector:
    app.kubernetes.io/name: assistant-raj
  ports:
    - name: dashboard
      port: 80
      targetPort: 9119
      protocol: TCP
    - name: gateway
      port: 8642
      targetPort: 8642
      protocol: TCP
