#
# LiteLLM proxy deployment — fronts StPete DSV4 Sparks with Corp AI overflow.
# Runs on Ottawa (agents ns) since StPete has tight memory and LiteLLM
# needs ~2Gi RAM for its proxy logic + Prometheus metrics.
---
# ── ConfigMap ──────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: agents
data:
  config.yaml: |
    model_list:
      # ── Primary: StPete DGX Sparks via Envoy AI Gateway ────────────
      - model_name: deepseek-v4-flash
        litellm_params:
          model: hosted_vllm/deepseek-v4-flash
          # stpetersburg-ai-gateway.keiretsu.ts.net resolves from Ottawa
          # via Tailscale MagicDNS and routes to dsv4.ai:8000
          api_base: http://stpetersburg-ai-gateway.keiretsu.ts.net/v1
          api_key: ""
          rpm: 60
        model_info:
          mode: primary

      # ── Fallback: Corp AI endpoint ───────────────────────────────────
      - model_name: deepseek-v4-flash
        litellm_params:
          model: hosted_vllm/deepseek-v4-flash
          # ai.keiretsu.ts.net resolves from Ottawa via Tailscale MagicDNS
          api_base: http://ai/v1
          api_key: ""
        model_info:
          mode: fallback

    router_settings:
      fallbacks: [{ "deepseek-v4-flash": ["deepseek-v4-flash"] }]
      num_retries: 2
      retry_after: 5
      timeout: 30
      routing_strategy: usage-based-routing
      enable_pre_call_checks: true
      allowed_fails: 3

    general_settings:
      database_url: "sqlite:///./litellm_proxy.db"

    litellm_settings:
      callbacks: ["prometheus"]
---
# ── Secret ────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: litellm-secret
  namespace: agents
stringData:
  master_key: DEFAULT_PASSWORD
  salt_key: DEFAULT_PASSWORD
---
# ── Deployment ───────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: agents
  labels:
    app: litellm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:main-latest
          imagePullPolicy: Always
          args:
            - "--config"
            - "/app/config.yaml"
            - "--port"
            - "4000"
          env:
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secret
                  key: master_key
            - name: LITELLM_SALT_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secret
                  key: salt_key
            - name: PROMETHEUS_MULTIPROC_DIR
              value: /prometheus_multiproc
          ports:
            - containerPort: 4000
              name: http
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
            - name: prometheus-multiproc
              mountPath: /prometheus_multiproc
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
      volumes:
        - name: config
          configMap:
            name: litellm-config
        - name: prometheus-multiproc
          emptyDir: {}
---
# ── ClusterIP Service ────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: litellm
  namespace: agents
  labels:
    app: litellm
spec:
  type: ClusterIP
  selector:
    app: litellm
  ports:
    - name: http
      port: 4000
      protocol: TCP
      targetPort: http
---
# ── Tailscale LoadBalancer ──────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: litellm-ts
  namespace: agents
  annotations:
    tailscale.com/hostname: litellm
    tailscale.com/proxy-group: common-ingress
    tailscale.com/tags: tag:singh360,tag:k8s,tag:ottawa
  labels:
    app: litellm
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  selector:
    app: litellm
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: http
---
# ── ServiceMonitor ──────────────────────────────────────────────────
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: litellm
  namespace: agents
  labels:
    app: litellm
    release: kube-prometheus-stack
spec:
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
      metricRelabelings:
        - action: replace
          replacement: talos-ottawa
          targetLabel: cluster
  selector:
    matchLabels:
      app: litellm
  namespaceSelector:
    matchNames:
      - agents