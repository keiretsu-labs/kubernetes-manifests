---
# teaspoon-web static site served from Garage S3 via web API (port 3902)
# OIDC-gated through the public/private gateways (same pattern as grafana).
# Garage resolves buckets by stripping the root_domain suffix from the Host
# header, so we rewrite hostname → teaspooon-web.keiretsu.top (bucket name).
# Also proxies /api/mimir/ → Mimir gateway for the live dashboard.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: teaspoon-web
  annotations:
    item.homer.rajsingh.info/name: "Teaspoon Web"
    item.homer.rajsingh.info/subtitle: "Static Website"
    item.homer.rajsingh.info/keywords: "website, teaspoon, agent"
    service.homer.rajsingh.info/name: "Infrastructure"
    service.homer.rajsingh.info/icon: "fas fa-globe"
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: public
      namespace: home
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: private
      namespace: home
  hostnames:
    - "teaspoon.agents.${COMMON_DOMAIN}"
  rules:
    # Mimir API proxy — JS on the dashboard queries Mimir through this
    - matches:
        - path:
            type: PathPrefix
            value: /api/mimir
      backendRefs:
        - group: ""
          kind: Service
          name: mimir-gateway
          namespace: mimir
          port: 80
          weight: 1
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
    # Garage S3 static site serving (original rule)
    - filters:
        - type: URLRewrite
          urlRewrite:
            hostname: "teaspoon-web-v2.${COMMON_DOMAIN}"
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            add:
              - name: Cache-Control
                value: "public, max-age=3600"
      backendRefs:
        - group: ""
          kind: Service
          name: garage-gateway
          namespace: garage
          port: 3902
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
