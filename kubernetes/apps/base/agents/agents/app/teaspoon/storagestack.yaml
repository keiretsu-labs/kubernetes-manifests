---
apiVersion: storage.keiretsu.ts.net/v1alpha1
kind: StorageStack
metadata:
  name: teaspoon-data
  labels:
    keiretsu.ts.net/location: ottawa
spec:
  name: teaspoon-data
  size: 20Gi
  storageClass: ceph-block-replicated
  s3Path: agents/teaspoon/data
  schedule: 0 4 * * *
  copyMethod: Snapshot
  restorePaused: false
