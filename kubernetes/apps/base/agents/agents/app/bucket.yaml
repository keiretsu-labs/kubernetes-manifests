---
apiVersion: garage.rajsingh.info/v1beta1
kind: GarageBucket
metadata:
  name: agents
spec:
  clusterRef:
    name: garage
    namespace: garage
  globalAlias: agents
  quotas:
    maxSize: 100Gi
    maxObjects: 10000000
  website:
    indexDocument: "index.html"
    errorDocument: "error.html"
  keyPermissions:
    - keyRef:
        name: assistant-raj-s3-key
      read: true
      write: true
      owner: true
    - keyRef:
        name: abtar-s3-key
      read: true
      write: true
      owner: true
    - keyRef:
        name: kartik-s3-key
      read: true
      write: true
      owner: true
    - keyRef:
        name: teaspoon-s3-key
      read: true
      write: true
      owner: true
    - keyRef:
        name: trading-web-s3-key
      read: true
      write: true
      owner: true
