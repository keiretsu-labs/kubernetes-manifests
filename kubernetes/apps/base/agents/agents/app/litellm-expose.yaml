#
# Expose LiteLLM at litellm.keiretsu.top through Envoy Gateway with
# tinyauth authentication (Google OAuth).
# TLS cert is covered by the wildcard *.keiretsu.top on the public gateway.
---
# ── HTTPRoute ──────────────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: litellm
  namespace: agents
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: public
      namespace: home
  hostnames:
    - "litellm.${COMMON_DOMAIN}"
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: litellm
          port: 4000
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
---
# ── SecurityPolicy (tinyauth ext_authz) ────────────────────────────
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: litellm-tinyauth
  namespace: agents
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: litellm
  extAuth:
    headersToExtAuth:
      - cookie
      - x-forwarded-proto
      - x-forwarded-for
      - user-agent
    http:
      backendRefs:
        - name: tinyauth
          namespace: tinyauth
          port: 3000
      path: "/api/auth/envoy?path="
      headersToBackend:
        - remote-user
        - remote-email
        - remote-name
        - remote-groups
  authorization:
    defaultAction: Deny
    rules:
      - name: allow-raj
        action: Allow
        principal:
          headers:
            - name: Remote-Email
              values:
                - rajsinghcpre@gmail.com
      - name: allow-kartik
        action: Allow
        principal:
          headers:
            - name: Remote-Email
              values:
                - kartikbharath@gmail.com
---
# ── EnvoyExtensionPolicy (Lua redirect for 401→302) ────────────────
# tinyauth returns 401 + x-tinyauth-location on unauthenticated requests.
# EG's ext_authz passes the 401 straight to the client. This Lua response
# script converts it to a proper 302 redirect to the Google OAuth login.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyExtensionPolicy
metadata:
  name: tinyauth-redirect-litellm
  namespace: agents
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: litellm
  lua:
    - inline: |
        function envoy_on_response(response_handle)
          local headers = response_handle:headers()
          if headers:get(":status") == "401" then
            local location = headers:get("x-tinyauth-location")
            if location then
              headers:replace(":status", "302")
              headers:add("Location", location)
              headers:remove("x-tinyauth-location")
            end
          end
        end