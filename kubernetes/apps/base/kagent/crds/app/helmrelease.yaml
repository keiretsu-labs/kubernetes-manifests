---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent-crds
spec:
  interval: 30m
  chart:
    spec:
      chart: kagent-crds
      # renovate: datasource=docker depName=ghcr.io/kagent-dev/kagent/helm/kagent-crds
      version: "0.9.11"
      sourceRef:
        kind: HelmRepository
        name: kagent
        namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    # KMCP CRDs are needed (kagent tool servers); substrate is not.
    kmcp:
      enabled: true
    substrate:
      enabled: false
