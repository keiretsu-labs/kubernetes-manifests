---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent
spec:
  interval: 30m
  chart:
    spec:
      chart: kagent
      # renovate: datasource=docker depName=ghcr.io/kagent-dev/kagent/helm/kagent
      version: "0.9.11"
      sourceRef:
        kind: HelmRepository
        name: kagent
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  dependsOn:
    - name: kagent-crds
  values:
    # Default model → the stpetersburg vLLM DeepSeek (OpenAI-compatible). The chart
    # renders spec.openAI.baseUrl from providers.openAI.config.baseUrl, and the model
    # is confirmed to do OpenAI tool-calling (required for the agent to use tools).
    providers:
      default: openAI
      openAI:
        provider: OpenAI
        model: deepseek-v4-flash
        apiKeySecretRef: kagent-openai
        apiKeySecretKey: OPENAI_API_KEY
        apiKey: "no-auth"   # vLLM is keyless; dummy so the chart mints the secret
        config:
          baseUrl: http://stpetersburg-vllm.keiretsu.ts.net/v1
    # Tool subcharts that hard-require an OpenAI SaaS key — disable to stay local.
    querydoc:
      enabled: false
    grafana-mcp:
      enabled: false
