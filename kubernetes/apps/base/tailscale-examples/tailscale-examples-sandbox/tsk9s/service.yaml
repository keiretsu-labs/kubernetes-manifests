---
apiVersion: v1
kind: Service
metadata:
  name: tsk9s
  annotations:
    tailscale.com/hostname: k9s
    tailscale.com/proxy-group: common-ingress
    tailscale.com/tags: "tag:k8s"
spec:
  selector:
    app: tsk9s
  ports:
  - name: http
    port: 80
    targetPort: http
  type: LoadBalancer
  loadBalancerClass: tailscale
