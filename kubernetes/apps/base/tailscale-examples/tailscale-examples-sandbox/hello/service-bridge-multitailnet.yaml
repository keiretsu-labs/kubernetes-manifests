---
apiVersion: v1
kind: Service
metadata:
  name: hello-world-tsjustworks
  annotations:
    tailscale.com/hostname: ${LOCATION}-bridge-hello-tsjustworks
    tailscale.com/proxy-group: tsjustworks-ingress
    tailscale.com/tags: "tag:k8s"
spec:
  selector:
    app: hello-world
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer
  loadBalancerClass: tailscale
