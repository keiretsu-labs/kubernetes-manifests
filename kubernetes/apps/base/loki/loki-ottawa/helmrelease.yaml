---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
spec:
  interval: 30m
  chart:
    spec:
      chart: loki
      version: "7.0.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    deploymentMode: SimpleScalable

    loki:
      auth_enabled: true
      analytics:
        reporting_enabled: false
      server:
        log_level: info
        http_listen_port: 3100
        grpc_listen_port: 9095
      commonConfig:
        replication_factor: 1
        path_prefix: /var/loki
      schemaConfig:
        configs:
          - from: "2026-05-01"
            store: tsdb
            object_store: s3
            schema: v13
            index:
              prefix: index_
              period: 24h
      storage:
        type: s3
        bucketNames:
          chunks: loki
          ruler: loki
          admin: loki
        s3:
          endpoint: ${COMMON_S3_ENDPOINT}
          region: garage
          s3ForcePathStyle: true
          insecure: true
          # access key and secret pulled from loki-s3 secret via extraEnvFrom
      limits_config:
        retention_period: 24h
        reject_old_samples: true
        reject_old_samples_max_age: 168h
        max_cache_freshness_per_query: 10m
        split_queries_by_interval: 15m
        ingestion_rate_mb: 16
        ingestion_burst_size_mb: 32
        max_global_streams_per_user: 50000
        allow_structured_metadata: true
        volume_enabled: true
      compactor:
        working_directory: /var/loki/compactor
        retention_enabled: true
        delete_request_store: s3
        compaction_interval: 10m
        retention_delete_delay: 2h
      pattern_ingester:
        enabled: true
      ruler:
        enable_api: false
      ingester:
        chunk_encoding: snappy
        # Flush chunks aggressively to prevent WAL from filling the disk
        chunk_idle_period: 5m
        max_chunk_age: 30m
        chunk_target_size: 1048576
        wal:
          disk_full_threshold: 0.85
      tracing:
        enabled: false
      querier:
        max_concurrent: 4
      structuredConfig:
        memberlist:
          join_members:
            - loki-memberlist
        storage_config:
          tsdb_shipper:
            cache_ttl: 1h

    serviceAccount:
      create: true
    global:
      extraEnvFrom:
        - secretRef:
            name: loki-s3

    read:
      replicas: 2
      persistence:
        enabled: false
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 1Gi

    write:
      replicas: 2
      persistence:
        enabled: true
        size: 10Gi
        storageClass: ceph-block-replicated
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 2Gi

    backend:
      replicas: 1
      persistence:
        enabled: true
        size: 10Gi
        storageClass: ceph-block-replicated
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 512Mi

    gateway:
      enabled: true
      replicas: 1
      service:
        port: 80
      basicAuth:
        enabled: false
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          memory: 128Mi

    chunksCache:
      enabled: false
    resultsCache:
      enabled: false
    minio:
      enabled: false
    test:
      enabled: false
    lokiCanary:
      enabled: false

    monitoring:
      dashboards:
        enabled: false
      rules:
        enabled: false
      serviceMonitor:
        enabled: true
        labels:
          release: kube-prometheus-stack
        metricsInstance:
          enabled: false
      selfMonitoring:
        enabled: false
        grafanaAgent:
          installOperator: false
      lokiCanary:
        enabled: false
