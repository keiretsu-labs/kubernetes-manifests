apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: velero-bsl-ottawa
  namespace: flux-system
spec:
  targetNamespace: velero-system
  commonMetadata:
    labels:
      app.kubernetes.io/name: velero-bsl-ottawa
  path: ./kubernetes/apps/stpetersburg/velero/bsl-ottawa
  prune: true
  sourceRef:
    kind: GitRepository
    name: kubernetes-manifests
  dependsOn:
    - name: velero
  interval: 30m
  retryInterval: 1m
  timeout: 5m