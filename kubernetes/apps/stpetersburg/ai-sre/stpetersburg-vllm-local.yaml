---
# stpetersburg-local vLLM alias: the vllm-ts LoadBalancer in the ai namespace
# already maps port 80 → 8000. Holmes uses the same hostname as remote clusters
# but resolves it locally (no Tailscale roundtrip).
apiVersion: v1
kind: Service
metadata:
  name: stpetersburg-vllm
  namespace: ai-sre
  labels:
    app.kubernetes.io/managed-by: ai-sre
spec:
  type: ExternalName
  externalName: vllm-ts.ai.svc.cluster.local
  ports:
    - name: http
      port: 80
      protocol: TCP
