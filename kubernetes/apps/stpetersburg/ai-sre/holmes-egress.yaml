---
# Tailscale LoadBalancer exposing the Holmes read-agent on the tailnet
# so the holmes-shim in Ottawa can reach it cross-cluster.
apiVersion: v1
kind: Service
metadata:
  name: holmes-ts
  namespace: ai-sre
  annotations:
    tailscale.com/hostname: stpetersburg-holmes
    tailscale.com/proxy-group: common-ingress
    tailscale.com/tags: tag:k8s,tag:stpetersburg
  labels:
    app.kubernetes.io/managed-by: ai-sre
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  selector:
    app: holmes
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
