---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: holmes
  namespace: flux-system
spec:
  targetNamespace: ai-sre
  commonMetadata:
    labels:
      app.kubernetes.io/name: holmes
  path: ./kubernetes/apps/base/ai-sre/holmes-read-agent/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: kubernetes-manifests
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  dependsOn:
    - name: woodpecker-mcp
  decryption:
    provider: sops
    secretRef:
      name: sops-gpg
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: common-settings
      - kind: Secret
        name: common-secrets
      - kind: ConfigMap
        name: cluster-settings
        optional: true
      - kind: Secret
        name: cluster-secrets
        optional: true
