apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base/victoria-logs/victoria-logs/app
  - ingress-ts.yaml
  - egress-svc.yaml
  - victoria-logs.yaml
patches:
  - patch: |-
      - op: add
        path: /metadata/namespace
        value: monitoring
    target:
      kind: Service
      name: victoria-logs-ts
  - patch: |-
      - op: add
        path: /metadata/namespace
        value: monitoring
    target:
      kind: Service
      name: victoria-logs-victoria-logs-single-server-egress
  - patch: |-
      - op: add
        path: /metadata/namespace
        value: monitoring
    target:
      kind: HelmRelease
