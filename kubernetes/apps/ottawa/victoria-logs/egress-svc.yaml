apiVersion: v1
kind: Service
metadata:
  name: victoria-logs-victoria-logs-single-server-egress
  annotations:
    tailscale.com/proxy-group: common-egress
    tailscale.com/tailnet-fqdn: victoria-logs.keiretsu.ts.net
spec:
