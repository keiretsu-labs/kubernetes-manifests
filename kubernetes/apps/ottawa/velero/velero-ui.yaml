apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: velero-ui
  namespace: flux-system
spec:
  targetNamespace: velero-system
  commonMetadata:
    labels:
      app.kubernetes.io/name: velero-ui
  path: ./kubernetes/apps/base/velero/velero-ui
  dependsOn:
    - name: velero
  prune: true
  sourceRef:
    kind: GitRepository
    name: kubernetes-manifests
  interval: 30m
  retryInterval: 1m
  timeout: 10m
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: common-settings
      - kind: Secret
        name: common-secrets
      - kind: ConfigMap
        name: cluster-settings
        optional: true
      - kind: Secret
        name: cluster-secrets
        optional: true
