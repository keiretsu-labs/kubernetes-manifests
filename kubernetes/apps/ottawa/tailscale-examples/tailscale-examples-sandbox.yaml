---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app tailscale-examples-sandbox
  namespace: flux-system
spec:
  targetNamespace: tailscale-examples
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  path: ./kubernetes/apps/base/tailscale-examples/tailscale-examples-sandbox
  prune: true
  sourceRef:
    kind: GitRepository
    name: kubernetes-manifests
  wait: false
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  patches:
    - target:
        group: gateway.networking.k8s.io
        version: v1
        kind: HTTPRoute
        name: tsflow
      patch: |-
        - op: add
          path: /spec/hostnames/-
          value: tsflow.rajsingh.info
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: common-settings
      - kind: Secret
        name: common-secrets
      - kind: ConfigMap
        name: cluster-settings
        optional: true
      - kind: Secret
        name: cluster-secrets
        optional: true
