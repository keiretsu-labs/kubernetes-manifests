---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app kagent
  namespace: flux-system
spec:
  targetNamespace: kagent
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: kagent-crds
  path: ./kubernetes/apps/base/kagent/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: kubernetes-manifests
  interval: 30m
  retryInterval: 1m
  timeout: 15m
