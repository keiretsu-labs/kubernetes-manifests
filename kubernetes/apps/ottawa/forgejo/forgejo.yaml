---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app forgejo
  namespace: flux-system
spec:
  targetNamespace: forgejo
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: garage
    - name: cnpg-system
  path: ./kubernetes/apps/base/forgejo/forgejo/app
  prune: true
  # Runner StatefulSet volumeClaimTemplates are immutable; force lets Flux
  # recreate the StatefulSet when they change (PVCs are Retain, data survives).
  force: true
  sourceRef:
    kind: GitRepository
    name: kubernetes-manifests
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: common-settings
      - kind: Secret
        name: common-secrets
      - kind: ConfigMap
        name: cluster-settings
        optional: true
      - kind: Secret
        name: cluster-secrets
        optional: true
