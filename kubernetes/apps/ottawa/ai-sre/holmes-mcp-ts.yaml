---
# Direct Tailscale LoadBalancer for holmes-shim MCP — no gateway, no external-dns.
# Resolves via MagicDNS (keiretsu.ts.net) which the user's Mac already uses
# as a supplemental DNS resolver. HTTP only (MCP Streamable-HTTP).
apiVersion: v1
kind: Service
metadata:
  name: holmes-shim-ts
  namespace: ai-sre
  annotations:
    tailscale.com/hostname: ottawa-holmes-mcp
    tailscale.com/proxy-group: common-ingress
    tailscale.com/tags: tag:k8s,tag:ottawa
  labels:
    app.kubernetes.io/managed-by: ai-sre
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  selector:
    app: holmes-shim
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
