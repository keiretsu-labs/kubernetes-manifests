---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: holmes-mcp
  namespace: ai-sre
  annotations:
    item.homer.rajsingh.info/hide: "true"
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: ts
      namespace: home
  hostnames:
    - "holmes-mcp.${CLUSTER_DOMAIN}"
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: holmes-shim
          port: 8000
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
