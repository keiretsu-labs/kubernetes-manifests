---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: holmes
  namespace: ai-sre
  annotations:
    item.homer.rajsingh.info/name: "HolmesGPT"
    item.homer.rajsingh.info/subtitle: "AI SRE Investigator"
    item.homer.rajsingh.info/logo: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/jellyseerr.svg"
    item.homer.rajsingh.info/keywords: "sre,ai,holmes,investigate,alerts"
    service.homer.rajsingh.info/name: "Infrastructure"
    service.homer.rajsingh.info/icon: "fas fa-server"
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: ts
      namespace: home
  hostnames:
    - "holmes.${CLUSTER_DOMAIN}"
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: holmes-holmes
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
