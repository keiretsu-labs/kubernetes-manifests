---
apiVersion: notification.toolkit.fluxcd.io/v1
kind: Receiver
metadata:
  name: bhaiya
  namespace: bhaiya
spec:
  type: generic-hmac
  interval: 10m
  secretRef:
    name: bhaiya-webhook-token
  resources:
    - apiVersion: source.toolkit.fluxcd.io/v1
      kind: GitRepository
      name: bhaiya
      namespace: flux-system
    - apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      name: bhaiya
      namespace: flux-system
