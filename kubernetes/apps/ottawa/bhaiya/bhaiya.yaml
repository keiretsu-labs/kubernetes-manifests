---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app bhaiya
  namespace: flux-system
spec:
  targetNamespace: bhaiya
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: garage
    - name: cnpg-system
    - name: agent-sandbox
    - name: cert-manager
  path: ./deploy
  prune: true
  sourceRef:
    kind: GitRepository
    name: bhaiya
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  decryption:
    provider: sops
    secretRef:
      name: sops-gpg
