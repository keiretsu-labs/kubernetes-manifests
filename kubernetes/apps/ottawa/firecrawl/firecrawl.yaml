---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app firecrawl
  namespace: flux-system
spec:
  targetNamespace: firecrawl
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  path: ./examples/kubernetes/cluster-install
  prune: true
  sourceRef:
    kind: GitRepository
    name: firecrawl
  wait: false
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  patches:
    - target:
        kind: Deployment
        name: nuq-worker
      patch: |-
        - op: replace
          path: /spec/replicas
          value: 1
