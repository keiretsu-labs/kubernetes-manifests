---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app firecrawl
  namespace: flux-system
spec:
  targetNamespace: firecrawl
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  path: ./examples/kubernetes/cluster-install
  prune: true
  sourceRef:
    kind: GitRepository
    name: firecrawl
  wait: false
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  patches:
    - target:
        kind: Deployment
        name: nuq-worker
      patch: |-
        - op: replace
          path: /spec/replicas
          value: 1
    # Upstream manifests reference a docker-registry-secret that doesn't
    # exist here; the images are public on ghcr.io, so the ref only spams
    # FailedToRetrieveImagePullSecret warnings on every kubelet sync.
    - target:
        kind: Deployment
      patch: |-
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: any
        spec:
          template:
            spec:
              imagePullSecrets: null
