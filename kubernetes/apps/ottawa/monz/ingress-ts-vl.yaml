---
apiVersion: v1
kind: Service
metadata:
  name: monz-vl-ts
  namespace: monz
  annotations:
    tailscale.com/hostname: monz-vl
    tailscale.com/tags: "tag:k8s,tag:ottawa"
    tailscale.com/proxy-group: "common-ingress"
spec:
  selector:
    app.kubernetes.io/instance: victoria-logs
    app.kubernetes.io/name: victoria-logs-single
  type: LoadBalancer
  loadBalancerClass: tailscale
  ports:
    - name: http
      port: 9428
      targetPort: 9428
      protocol: TCP
