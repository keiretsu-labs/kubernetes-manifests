---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app monz
  namespace: flux-system
spec:
  targetNamespace: monz
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: tinyauth
  path: ./kubernetes/apps/ottawa/monz
  prune: true
  sourceRef:
    kind: GitRepository
    name: kubernetes-manifests
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  postBuild:
    substituteFrom:
      - { kind: ConfigMap, name: common-settings }
      - { kind: Secret,    name: common-secrets }
      - { kind: ConfigMap, name: cluster-settings, optional: true }
      - { kind: Secret,    name: cluster-secrets,  optional: true }
