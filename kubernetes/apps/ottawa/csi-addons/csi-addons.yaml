---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app csi-addons
  namespace: flux-system
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: rook-ceph-operator
  path: ./deploy/controller
  prune: true
  sourceRef:
    kind: GitRepository
    name: csi-addons
  interval: 30m
  retryInterval: 1m
  timeout: 5m
