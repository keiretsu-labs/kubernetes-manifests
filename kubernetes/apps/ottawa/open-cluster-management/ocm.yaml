---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app ocm
  namespace: flux-system
spec:
  targetNamespace: open-cluster-management
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  path: ./kubernetes/apps/base/open-cluster-management/ocm-ottawa
  prune: true
  sourceRef:
    kind: GitRepository
    name: kubernetes-manifests
  interval: 30m
  retryInterval: 1m
  timeout: 10m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ocm-grpc-lb
  namespace: flux-system
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: ocm-grpc-lb
  path: ./kubernetes/apps/base/open-cluster-management/ocm-grpc-lb-ottawa
  prune: true
  sourceRef:
    kind: GitRepository
    name: kubernetes-manifests
  interval: 30m
  retryInterval: 1m
  timeout: 5m
