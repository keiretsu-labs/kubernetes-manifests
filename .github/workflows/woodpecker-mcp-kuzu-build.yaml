name: Build & Push woodpecker-mcp-kuzu

on:
  push:
    branches: ["main"]
    paths:
      - "images/woodpecker-mcp-kuzu/**"
      - ".github/workflows/woodpecker-mcp-kuzu-build.yaml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}/woodpecker-mcp-kuzu

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: images/woodpecker-mcp-kuzu
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:0.2.0
            ${{ env.IMAGE }}:${{ steps.tags.outputs.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha,scope=woodpecker-mcp-kuzu
          cache-to: type=gha,scope=woodpecker-mcp-kuzu,mode=max
          provenance: false
          sbom: false
