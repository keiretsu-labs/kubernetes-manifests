name: Build & Push Swarm Images

on:
  push:
    branches: ["main"]
    paths:
      - "swarm/**.go"
      - "swarm/go.mod"
      - "swarm/go.sum"
      - "swarm/Dockerfile"
      - ".github/workflows/swarm-build.yaml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}/swarm

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: imjasonh/setup-crane@v0.7

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Build amd64
        uses: docker/build-push-action@v7
        with:
          context: ./swarm
          file: swarm/Dockerfile
          platforms: linux/amd64
          outputs: type=docker,dest=amd64.tar
          cache-from: type=gha,scope=swarm-amd64
          cache-to: type=gha,scope=swarm-amd64,mode=max
          provenance: false

      - name: Build arm64
        uses: docker/build-push-action@v7
        with:
          context: ./swarm
          file: swarm/Dockerfile
          platforms: linux/arm64
          outputs: type=docker,dest=arm64.tar
          cache-from: type=gha,scope=swarm-arm64
          cache-to: type=gha,scope=swarm-arm64,mode=max
          provenance: false

      - name: Push per-arch images with skopeo
        run: |
          set -e
          for ARCH in amd64 arm64; do
            skopeo copy \
              "docker-archive:${ARCH}.tar" \
              "docker://${{ env.IMAGE }}:build-${ARCH}"
          done

      - name: Create and push multi-arch manifest
        run: |
          set -e
          for TAG in "${{ steps.tags.outputs.sha }}" "latest"; do
            crane index append \
              --manifest "${{ env.IMAGE }}:build-amd64" \
              --manifest "${{ env.IMAGE }}:build-arm64" \
              --tag "${{ env.IMAGE }}:${TAG}"
          done
