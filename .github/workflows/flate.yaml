name: flate

on:
  pull_request:
    branches: [main]
    paths:
      - "clusters/**"
      - "kubernetes/**"
  workflow_dispatch:

concurrency:
  group: flate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        cluster: [talos-ottawa, talos-robbinsdale, talos-stpetersburg]
    steps:
      - uses: actions/checkout@v7
      - uses: home-operations/flate/action@v0.4.9
        with:
          cache: true
      - name: flate test
        # the flate action exports FLATE_BASE=<pr base> which switches test to
        # changed-only mode and requires rendering the base tree; unset it so a
        # broken main can never fail PR tests — always test the full head tree
        run: |
          unset FLATE_BASE
          flate test all \
            --path clusters/${{ matrix.cluster }}/flux/config \
            --allow-missing-secrets \
            --no-progress

  diff:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        cluster: [talos-ottawa, talos-robbinsdale, talos-stpetersburg]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: home-operations/flate/action@v0.4.9
        with:
          cache: true
      - name: flate diff
        id: diff
        run: |
          set +e
          flate diff all \
            --path clusters/${{ matrix.cluster }}/flux/config \
            --base origin/main \
            --no-progress \
            -o github > diff.txt 2>diff.err
          FLATE_EXIT=$?
          set -e
          # -o github emits text for GitHub's diff lexer — it must live inside a
          # ```diff fence or the '# resource' lines render as markdown headings
          {
            echo "### flate diff — ${{ matrix.cluster }}"
            if [ "$FLATE_EXIT" -ne 0 ]; then
              echo "**flate diff failed (exit $FLATE_EXIT)**"
              echo '```'
              tail -c 4000 diff.err
              echo '```'
            elif [ ! -s diff.txt ]; then
              echo "No rendered changes."
            else
              echo '```diff'
              head -c 58000 diff.txt
              if [ "$(wc -c < diff.txt)" -gt 58000 ]; then
                echo ""
                echo "# ... truncated; run 'make diff' locally for the full diff."
              fi
              echo '```'
            fi
          } > comment.md
          cat comment.md >> "$GITHUB_STEP_SUMMARY"
          # informational only: a diff failure (e.g. unrenderable base tree) is
          # surfaced via the PR comment and a warning annotation; the test job
          # is the merge gate
          if [ "$FLATE_EXIT" -ne 0 ]; then
            echo "::warning::flate diff exited $FLATE_EXIT for ${{ matrix.cluster }} — see the sticky PR comment"
          fi
      - uses: marocchino/sticky-pull-request-comment@v3.0.4
        with:
          header: flate-diff-${{ matrix.cluster }}
          path: comment.md
