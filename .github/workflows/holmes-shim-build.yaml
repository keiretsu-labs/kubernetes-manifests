name: Build & Push holmes-shim

on:
  push:
    branches: ["main"]
    paths:
      - "images/holmes-shim/**"
      - ".github/workflows/holmes-shim-build.yaml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}/holmes-shim

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: images/holmes-shim
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:0.2.2
            ${{ env.IMAGE }}:${{ steps.tags.outputs.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha,scope=holmes-shim
          cache-to: type=gha,scope=holmes-shim,mode=max
          provenance: false
          sbom: false
